<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ದೇಹದ ಭಾಗಗಳು - UKG ಕನ್ನಡ</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@500;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --radius: 30px; --top-h: 70px; }

body {
  font-family: 'Baloo Tamma 2', cursive;
  background: #f0f4ff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--top-h);
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 300;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
.topbar-title {
  font-size: 1.55rem; font-weight: 900;
  background: linear-gradient(90deg, #e84393, #a29bfe, #fdcb6e);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.top-right { display: flex; align-items: center; gap: 10px; }
.score-pill {
  background: #FFD93D; color: #1a1a2e;
  font-weight: 900; font-size: 1rem;
  padding: 7px 18px; border-radius: 50px;
  box-shadow: 0 4px 14px rgba(255,217,61,0.45);
  white-space: nowrap;
}
.sound-btn {
  background: rgba(255,255,255,0.13);
  border: 2px solid rgba(255,255,255,0.22);
  color: white; border-radius: 12px;
  padding: 8px 14px; font-size: 1.2rem;
  cursor: pointer; font-family: inherit;
  transition: background 0.2s;
}
.sound-btn:hover { background: rgba(255,255,255,0.22); }
.sound-btn.off { opacity: 0.4; }

/* ── TAB NAV ── */
.tab-nav {
  display: flex;
  background: #1a1a2e;
  padding: 0 12px 14px;
  gap: 8px;
  position: sticky; top: var(--top-h); z-index: 200;
}
.tab-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 10px 16px; border-radius: 18px; border: none;
  cursor: pointer; font-family: 'Baloo Tamma 2', cursive;
  font-weight: 800; color: rgba(255,255,255,0.45);
  background: rgba(255,255,255,0.07);
  transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; position: relative;
}
.tab-btn .t-icon { font-size: 1.7rem; line-height: 1; }
.tab-btn .t-kn   { font-size: 0.95rem; }
.tab-btn .t-en   { font-size: 0.68rem; opacity: 0.55; font-weight: 600; }
.tab-btn.active  { transform: translateY(-3px) scale(1.04); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
.tab-btn[data-t="outside"].active { background: linear-gradient(135deg,#e84393,#c0336f); color: white; }
.tab-btn[data-t="inside"].active  { background: linear-gradient(135deg,#a29bfe,#6c5ce7); color: white; }
.tab-count {
  position: absolute; top: 5px; right: 7px;
  background: rgba(255,255,255,0.22); border-radius: 50px;
  padding: 1px 6px; font-size: 0.62rem; font-weight: 900;
}
.tab-btn.active .tab-count { background: rgba(0,0,0,0.15); }

/* ── PANEL HERO ── */
.panel-hero {
  padding: 28px 24px 16px; text-align: center; position: relative; overflow: hidden;
}
.panel-hero h2 { font-size: 2.6rem; font-weight: 900; line-height: 1.1; margin-bottom: 5px; }
.panel-hero p  { font-size: 1.05rem; font-weight: 700; opacity: 0.65; margin-bottom: 13px; }
.tap-hint {
  display: inline-flex; align-items: center; gap: 7px;
  border: 2.5px dashed currentColor; border-radius: 50px;
  padding: 7px 20px; font-size: 0.98rem; font-weight: 800; opacity: 0.7;
  animation: wag 2s ease-in-out infinite;
}
@keyframes wag { 0%,100%{transform:rotate(-1.5deg)} 50%{transform:rotate(1.5deg)} }
.hf {
  position: absolute; font-size: 3.5rem;
  animation: fy 4s ease-in-out infinite; pointer-events: none; opacity: 0.13;
}
@keyframes fy { 0%,100%{transform:translateY(0) rotate(-8deg)} 50%{transform:translateY(-18px) rotate(8deg)} }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 22px; padding: 20px 26px 60px;
  max-width: 1300px; margin: 0 auto;
}

/* ── CARD ── */
.card {
  border-radius: var(--radius); background: white;
  box-shadow: 0 6px 28px rgba(0,0,0,0.09);
  cursor: pointer; overflow: hidden;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  border: 3.5px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.5) rotate(-6deg); }
  to   { opacity:1; transform:scale(1); }
}
.card:hover { transform:translateY(-12px) scale(1.04) rotate(.6deg); box-shadow:0 24px 56px rgba(0,0,0,0.15); }
.card:active { transform:scale(0.91); }
.card.playing { animation: cb .5s cubic-bezier(.34,1.56,.64,1) !important; }
@keyframes cb { 0%{transform:scale(1)} 30%{transform:scale(1.22) rotate(-4deg)} 65%{transform:scale(.94) rotate(2deg)} 100%{transform:scale(1)} }

/* Card face */
.card-face {
  height: 160px;
  display: flex; align-items: center; justify-content: center;
  font-size: 5.5rem; position: relative;
}
.star-pop {
  position: absolute; top: 8px; right: 12px;
  font-size: 1.6rem; transform: scale(0); opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1); pointer-events: none;
}
.card.playing .star-pop { transform: scale(1) rotate(25deg); opacity: 1; }
.card.learned .star-pop { transform: scale(0.85); opacity: 0.55; }

/* Function pill at bottom of face */
.fn-pill {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 5px 8px; text-align: center;
  font-size: 0.65rem; font-weight: 700;
  color: white; line-height: 1.3;
  background: rgba(0,0,0,0.28); backdrop-filter: blur(6px);
}

/* Card info */
.card-info { padding: 14px 12px 18px; text-align: center; border-top: 3px solid rgba(0,0,0,0.05); }
.kn-word { font-size: 1.75rem; font-weight: 900; color: #1a1a2e; line-height: 1.1; }
.en-word { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; opacity: 0.4; color: #1a1a2e; }
.count-pill {
  display: inline-block; margin-top: 8px; border-radius: 50px;
  padding: 4px 14px; font-size: 0.82rem; font-weight: 800; color: white;
}

/* ── CONFETTI ── */
.cf { position:fixed; border-radius:3px; top:-20px; pointer-events:none; z-index:9999; animation:cff 1.4s ease-in forwards; }
@keyframes cff { to { transform: translateY(110vh) rotate(600deg); opacity:0; } }

/* ── RESPONSIVE ── */
@media (max-width: 580px) {
  .grid { grid-template-columns: repeat(2,1fr); gap:13px; padding:12px 12px 44px; }
  .card-face { height: 115px; font-size: 3.8rem; }
  .kn-word { font-size: 1.3rem; }
  .panel-hero h2 { font-size: 2rem; }
  .fn-pill { font-size: 0.58rem; }
}
@media (min-width: 900px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); }
  .card-face { height: 178px; font-size: 6.2rem; }
  .kn-word { font-size: 2rem; }
}


/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.topbar-title{font-size:clamp(15px,2vw,28px);}
.hero h1{font-size:clamp(22px,3.5vw,52px);}
.hero h2{font-size:clamp(22px,3.5vw,52px);}
.hero p{font-size:clamp(13px,1.6vw,22px);}
.hero{padding:clamp(18px,3vw,48px) clamp(20px,5vw,80px) clamp(44px,6vw,80px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.card{border-radius:clamp(16px,2vw,28px);}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">🧠 ದೇಹದ ಭಾಗಗಳು</div>
  <div class="top-right">
    <div class="score-pill" id="scorePill">⭐ 0 / 26</div>
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
  </div>
</div>

<!-- TAB NAV -->
<nav class="tab-nav">
  <button class="tab-btn active" data-t="outside" onclick="switchTab('outside', this)">
    <span class="t-icon">🙋</span><span class="t-kn">ಹೊರ ಭಾಗಗಳು</span><span class="t-en">Outside</span>
    <span class="tab-count" id="cnt-outside">0/16</span>
  </button>
  <button class="tab-btn" data-t="inside" onclick="switchTab('inside', this)">
    <span class="t-icon">🫀</span><span class="t-kn">ಒಳ ಭಾಗಗಳು</span><span class="t-en">Inside</span>
    <span class="tab-count" id="cnt-inside">0/10</span>
  </button>
</nav>

<!-- PANEL HERO -->
<div class="panel-hero" id="panelHero"></div>

<!-- GRID -->
<div class="grid" id="grid"></div>

const DATA = {
  outside: {
    hero: {
      bg: 'linear-gradient(135deg,#fce4ec,#f8bbd0,#fce4ec)',
      emoji: '🙋', title: '🙋 ಹೊರ ಭಾಗಗಳು', sub: 'Outside Body Parts',
      hf: ['👁️','✋','🦶'], color: '#880e4f'
    },
    items: [
      { kn:'ತಲೆ',      en:'Head',      emoji:'🙂', fn:'ಮೆದುಳು ಇಲ್ಲಿದೆ',           bg:'#fce4ec', border:'#e91e63', pill:'#c2185b', count:'೧' },
      { kn:'ಕಣ್ಣು',    en:'Eyes',      emoji:'👁️',  fn:'ನೋಡಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ',   bg:'#ede7f6', border:'#673ab7', pill:'#4527a0', count:'೨' },
      { kn:'ಮೂಗು',     en:'Nose',      emoji:'👃',  fn:'ವಾಸನೆ ಮತ್ತು ಉಸಿರು',       bg:'#fff3e0', border:'#f57c00', pill:'#e65100', count:'೧' },
      { kn:'ಕಿವಿ',     en:'Ears',      emoji:'👂',  fn:'ಕೇಳಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ',   bg:'#fff8e1', border:'#f9a825', pill:'#f57f17', count:'೨' },
      { kn:'ಬಾಯಿ',     en:'Mouth',     emoji:'👄',  fn:'ತಿನ್ನಲು ಮತ್ತು ಮಾತಾಡಲು',   bg:'#fce4ec', border:'#e53935', pill:'#b71c1c', count:'೧' },
      { kn:'ಕೈ',       en:'Hands',     emoji:'✋',  fn:'ಹಿಡಿಯಲು ಮತ್ತು ಬರೆಯಲು',   bg:'#fff8e1', border:'#ffb300', pill:'#e65100', count:'೨' },
      { kn:'ಕಾಲು',     en:'Legs',      emoji:'🦵',  fn:'ನಡೆಯಲು ಮತ್ತು ಓಡಲು',      bg:'#fff3e0', border:'#ff8f00', pill:'#bf360c', count:'೨' },
      { kn:'ಬೆರಳು',    en:'Fingers',   emoji:'🖐️', fn:'ಮುಟ್ಟಲು ಮತ್ತು ಎಣಿಸಲು',   bg:'#fce4ec', border:'#e91e63', pill:'#880e4f', count:'೧೦' },
      { kn:'ಕೂದಲು',    en:'Hair',      emoji:'🧑',  fn:'ತಲೆ ರಕ್ಷಿಸುತ್ತದೆ',         bg:'#efebe9', border:'#795548', pill:'#4e342e', count:'ಹಲವು' },
      { kn:'ಚರ್ಮ',     en:'Skin',      emoji:'🤲',  fn:'ದೇಹ ರಕ್ಷಿಸುತ್ತದೆ',         bg:'#fff3e0', border:'#ff7043', pill:'#bf360c', count:'ಇಡೀ ದೇಹ' },
      { kn:'ಹಲ್ಲು',    en:'Teeth',     emoji:'🦷',  fn:'ಆಹಾರ ಅಗಿಯಲು',             bg:'#e3f2fd', border:'#90caf9', pill:'#1565c0', count:'೨೦' },
      { kn:'ನಾಲಿಗೆ',   en:'Tongue',    emoji:'👅',  fn:'ರುಚಿ ತಿಳಿಸುತ್ತದೆ',          bg:'#fce4ec', border:'#e91e63', pill:'#880e4f', count:'೧' },
      { kn:'ಭುಜ',      en:'Shoulders', emoji:'🤸', fn:'ಕೈ ಜೋಡಣೆ',               bg:'#e3f2fd', border:'#1e88e5', pill:'#0d47a1', count:'೨' },
      { kn:'ಪಾದ',      en:'Feet',      emoji:'🦶',  fn:'ನಿಲ್ಲಲು ಮತ್ತು ನಡೆಯಲು',   bg:'#ede7f6', border:'#9c27b0', pill:'#6a1b9a', count:'೨' },
      { kn:'ಮೊಣಕಾಲು',  en:'Knee',      emoji:'🦵',  fn:'ಕಾಲು ಮಡಿಸಲು',            bg:'#e8f5e9', border:'#43a047', pill:'#1b5e20', count:'೨' },
      { kn:'ಮಣಿಕಟ್ಟು', en:'Wrist',     emoji:'🦾', fn:'ಕೈ ತಿರುಗಿಸಲು',            bg:'#e1f5fe', border:'#0288d1', pill:'#01579b', count:'೨' },
    ]
  },
  inside: {
    hero: {
      bg: 'linear-gradient(135deg,#ede7f6,#d1c4e9,#e8eaf6)',
      emoji: '🫀', title: '🫀 ಒಳ ಭಾಗಗಳು', sub: 'Inside Body Parts',
      hf: ['🧠','🦴','💉'], color: '#4527a0'
    },
    items: [
      { kn:'ಮೆದುಳು',   en:'Brain',    emoji:'🧠', fn:'ಯೋಚಿಸಲು ಮತ್ತು ನಿಯಂತ್ರಿಸಲು', bg:'#fce4ec', border:'#e91e63', pill:'#880e4f', count:'೧' },
      { kn:'ಹೃದಯ',     en:'Heart',    emoji:'🫀', fn:'ರಕ್ತ ಪಂಪ್ ಮಾಡುತ್ತದೆ',       bg:'#ffebee', border:'#e53935', pill:'#b71c1c', count:'೧' },
      { kn:'ಶ್ವಾಸಕೋಶ', en:'Lungs',    emoji:'🫁', fn:'ಉಸಿರಾಡಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ', bg:'#e3f2fd', border:'#1e88e5', pill:'#0d47a1', count:'೨' },
      { kn:'ಹೊಟ್ಟೆ',   en:'Stomach',  emoji:'🍽️', fn:'ಆಹಾರ ಜೀರ್ಣಿಸುತ್ತದೆ',        bg:'#e8f5e9', border:'#43a047', pill:'#1b5e20', count:'೧' },
      { kn:'ಯಕೃತ್ತು',  en:'Liver',    emoji:'🧡', fn:'ರಕ್ತ ಶುದ್ಧ ಮಾಡುತ್ತದೆ',      bg:'#fff3e0', border:'#ff8f00', pill:'#e65100', count:'೧' },
      { kn:'ಮೂತ್ರಪಿಂಡ', en:'Kidneys', emoji:'🫘', fn:'ತ್ಯಾಜ್ಯ ತೆಗೆಯುತ್ತದೆ',        bg:'#fce4ec', border:'#f06292', pill:'#c2185b', count:'೨' },
      { kn:'ಮೂಳೆ',     en:'Bones',    emoji:'🦴', fn:'ದೇಹಕ್ಕೆ ಆಕಾರ ನೀಡುತ್ತದೆ',    bg:'#f5f5f5', border:'#9e9e9e', pill:'#424242', count:'೨೦೬' },
      { kn:'ಸ್ನಾಯು',   en:'Muscles',  emoji:'💪', fn:'ಚಲಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ',    bg:'#fce4ec', border:'#e91e63', pill:'#6a1b9a', count:'೬೦೦+' },
      { kn:'ರಕ್ತ',     en:'Blood',    emoji:'🩸', fn:'ಪೋಷಕಾಂಶ ಹೊತ್ತೊಯ್ಯುತ್ತದೆ',  bg:'#ffebee', border:'#e53935', pill:'#b71c1c', count:'೫ ಲೀ.' },
      { kn:'ನರ',       en:'Nerves',   emoji:'🕸️', fn:'ಸಂದೇಶ ರವಾನಿಸುತ್ತದೆ',       bg:'#fffde7', border:'#f9a825', pill:'#f57f17', count:'ಹಲವು' },
    ]
  }
};

const TOTAL = DATA.outside.items.length + DATA.inside.items.length;
let soundOn = true;
let activeTab = 'outside';
const learned = { outside: new Set(), inside: new Set() };

function switchTab(tid, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTab = tid;
  renderHero();
  buildGrid();
}

function toggleSound() {
  soundOn = !soundOn;
  const b = document.getElementById('soundBtn');
  b.textContent = soundOn ? '🔊' : '🔇';
  b.classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN'; u.rate = 0.82; u.pitch = 1.1;
  const v = window.speechSynthesis.getVoices().find(x => x.lang === 'kn-IN' || x.lang.startsWith('kn'));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

function updateScore() {
  const tot = learned.outside.size + learned.inside.size;
  document.getElementById('scorePill').textContent = `⭐ ${tot} / ${TOTAL}`;
}

function updateCnt(tid) {
  const total = DATA[tid].items.length;
  document.getElementById(`cnt-${tid}`).textContent = `${learned[tid].size}/${total}`;
}

const CC = ['#FFD93D','#FF6B35','#06D6A0','#FF6B9D','#9B5DE5','#118AB2','#43e97b'];
function confetti(x, y) {
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'cf';
    el.style.cssText = `left:${x+(Math.random()-.5)*160}px;background:${CC[i%CC.length]};animation-duration:${.9+Math.random()*.9}s;animation-delay:${Math.random()*.2}s;width:${6+Math.random()*10}px;height:${8+Math.random()*14}px;transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }
}

function renderHero() {
  const h = DATA[activeTab].hero;
  const hero = document.getElementById('panelHero');
  hero.style.background = h.bg;
  hero.innerHTML = `
    ${h.hf.map((e,i) => `<span class="hf" style="top:${8+i*12}px;${i%2===0?'left:4%':'right:6%'};animation-delay:-${i*1.3}s;">${e}</span>`).join('')}
    <h2 style="color:${h.color};">${h.title}</h2>
    <p style="color:${h.color};">${h.sub}</p>
    <span class="tap-hint" style="color:${h.color};">👆 ಕಾರ್ಡ್ ಒತ್ತಿ ಹೆಸರು ಕೇಳಿ!</span>`;
}

let di = 0;
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  di = 0;
  const items = DATA[activeTab].items;
  items.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (di++ * 0.045) + 's';
    card.style.borderColor = p.border;
    card.innerHTML = `
      <div class="card-face" style="background:${p.bg};">
        <span class="star-pop">⭐</span>
        <span style="filter:drop-shadow(0 6px 14px rgba(0,0,0,0.15));line-height:1;">${p.emoji}</span>
        <div class="fn-pill">⚙️ ${p.fn}</div>
      </div>
      <div class="card-info">
        <div class="kn-word">${p.kn}</div>
        <div class="en-word">${p.en}</div>
        <div class="count-pill" style="background:${p.pill};">ಸಂಖ್ಯೆ: ${p.count}</div>
      </div>`;

    card.addEventListener('click', () => {
      card.classList.remove('playing');
      void card.offsetWidth;
      card.classList.add('playing');
      speak(`${p.kn}. ${p.fn}`);
      setTimeout(() => card.classList.remove('playing'), 520);
      if (!learned[activeTab].has(p.kn)) {
        learned[activeTab].add(p.kn);
        card.classList.add('learned');
        updateScore(); updateCnt(activeTab);
        const r = card.getBoundingClientRect();
        confetti(r.left + r.width / 2, r.top + r.height / 2);
      }
    });
    grid.appendChild(card);
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
renderHero();
buildGrid();

// === AUTO-INJECTED: Server progress save ===
async function saveLessonCompletion(){
  try{
    await fetch('/api/lesson_progress/save', {
