<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Body Parts! 🫀</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD600; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka One', cursive;
            overflow: hidden; height: 100vh; width: 100vw;
            user-select: none; background: #e63946;
        }

        /* ── SCREEN ── */
        .screen {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            transition: background 0.7s ease;
            position: relative; overflow: hidden; cursor: pointer;
        }

        .bg-blob {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.10); pointer-events: none;
            animation: floatBlob 7s ease-in-out infinite alternate;
        }
        .bg-blob:nth-child(1) { width:180px;height:180px;top:-40px;left:-40px;animation-delay:0s; }
        .bg-blob:nth-child(2) { width:120px;height:120px;bottom:60px;right:-20px;animation-delay:2s; }
        .bg-blob:nth-child(3) { width:80px;height:80px;top:40%;left:5%;animation-delay:4s; }
        @keyframes floatBlob { from{transform:translateY(0) scale(1);} to{transform:translateY(20px) scale(1.1);} }

        /* ── TOP BAR ── */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; flex-shrink: 0; z-index: 10; position: relative;
        }
        .topbar-btn {
            background: rgba(255,255,255,0.28); border: 3px solid rgba(255,255,255,0.5);
            color: white; padding: 8px 18px; border-radius: 50px; font-size: 15px;
            font-family: 'Fredoka One', cursive; cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 5px;
            transition: transform 0.15s, background 0.15s;
        }
        .topbar-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.45); }
        .stars-display {
            background: rgba(255,215,0,0.35); border: 3px solid rgba(255,215,0,0.65);
            color: white; padding: 8px 18px; border-radius: 50px;
            font-size: 16px; font-family: 'Fredoka One', cursive; letter-spacing: 1px;
            transition: transform 0.2s;
        }
        .sound-pill {
            background: rgba(255,255,255,0.28); border: 3px solid rgba(255,255,255,0.5);
            color: white; padding: 8px 16px; border-radius: 50px; font-size: 15px;
            font-family: 'Fredoka One', cursive; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            transition: transform 0.15s, background 0.2s; white-space: nowrap;
        }
        .sound-pill:active { transform: scale(0.92); background: rgba(255,255,255,0.45); }
        .sound-pill.muted {
            background: rgba(0,0,0,0.25); border-color: rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.55); text-decoration: line-through;
        }

        /* ── PROGRESS DOTS ── */
        .dots-row {
            display: flex; justify-content: center; gap: 5px;
            padding: 6px 16px; flex-wrap: wrap; flex-shrink: 0;
        }
        .dot { width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.28);transition:all 0.3s;flex-shrink:0; }
        .dot.done    { background: rgba(255,255,255,0.7); }
        .dot.current { background: var(--gold); transform: scale(1.6); box-shadow: 0 0 10px var(--gold); }

        /* ── MAIN CONTENT — animals split layout ── */
        .main-content {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 6px 20px 0; gap: 20px; min-height: 0; position: relative; z-index: 2;
        }

        /* LEFT — big emoji of the body part */
        .emoji-half {
            flex: 0 0 auto; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }
        .big-emoji {
            font-size: min(30vw, 44vh); line-height: 1;
            position: relative; z-index: 1;
            filter: drop-shadow(0 6px 20px rgba(0,0,0,0.20));
            animation: popIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4) both;
            cursor: pointer; transition: transform 0.1s;
        }
        .big-emoji:active { transform: scale(0.9) rotate(-5deg); }

        .emoji-ring {
            position: absolute; width: min(30vw, 44vh); height: min(30vw, 44vh);
            border-radius: 50%; border: 5px solid rgba(255,255,255,0.5);
            pointer-events: none; opacity: 0;
        }
        .emoji-ring.pulse { animation: ringPulse 0.6s ease-out forwards; }
        @keyframes ringPulse { 0%{transform:scale(0.6);opacity:0.9;} 100%{transform:scale(1.5);opacity:0;} }

        /* chip below emoji — shows body part category */
        .part-chip {
            background: rgba(255,255,255,0.22); border: 3px solid rgba(255,255,255,0.45);
            color: white; border-radius: 16px; padding: 4px 16px;
            font-size: min(4.5vw, 6.5vh); font-family: 'Fredoka One', cursive;
            animation: slideUp 0.4s ease 0.25s both; margin-top: 6px;
            display: flex; align-items: center; gap: 6px;
        }

        /* RIGHT — image frame, IDENTICAL measurements to animals */
        .image-half {
            flex: 0 0 auto; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 10px;
        }
        .image-frame {
            width:  min(34vw, 46vh);
            height: min(34vw, 46vh);
            border-radius: 30px; overflow: hidden;
            box-shadow: 0 14px 44px rgba(0,0,0,0.35), 0 0 0 5px rgba(255,255,255,0.4);
            position: relative;
            animation: bounceIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4) 0.1s both;
            cursor: pointer; flex-shrink: 0;
        }
        .image-frame:active { transform: scale(0.95); }

        /* Emoji fallback — always visible behind the photo */
        .frame-fallback {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: min(16vw, 22vh);
            background: rgba(255,255,255,0.18);
        }

        /* Photo sits on top; starts opacity:0, shows via onload */
        #mainImage {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease;
            opacity: 0;
        }

        .image-glow {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.25));
            border-radius: 26px; pointer-events: none; z-index: 2;
        }

        /* word label + fact chip — identical to animals */
        .word-label {
            font-size: min(7vw, 9vh); font-family: 'Fredoka One', cursive;
            color: white; text-shadow: 0 3px 12px rgba(0,0,0,0.22);
            animation: slideUp 0.4s ease 0.2s both; line-height: 1; letter-spacing: 1px;
        }
        .fun-fact-chip {
            font-size: min(3.4vw, 4.5vh); color: rgba(255,255,255,0.9);
            font-family: 'Nunito', sans-serif; font-weight: 900;
            animation: slideUp 0.4s ease 0.3s both;
            background: rgba(0,0,0,0.15); padding: 4px 14px; border-radius: 20px;
            text-align: center; max-width: 46vw;
        }

        /* ── BOTTOM BAR ── */
        .bottom-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px 18px; flex-shrink: 0;
            position: relative; z-index: 2; gap: 10px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.25); border: 3px solid rgba(255,255,255,0.5);
            color: white; padding: 14px 20px; border-radius: 50px; font-size: 22px;
            font-family: 'Fredoka One', cursive; cursor: pointer; transition: all 0.15s;
            min-width: 70px; text-align: center;
        }
        .nav-btn:hover  { background: rgba(255,255,255,0.4); transform: scale(1.06); }
        .nav-btn:active { transform: scale(0.92); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .next-btn {
            background: white; color: #333; border: none;
            padding: 16px 36px; border-radius: 50px; font-size: 18px;
            font-family: 'Fredoka One', cursive; cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.22), 0 0 0 4px rgba(255,255,255,0.4);
            transition: all 0.18s;
        }
        .next-btn:hover  { transform: scale(1.06) translateY(-3px); }
        .next-btn:active { transform: scale(0.94); }
        .bottom-center { text-align: center; flex: 1; }
        .tap-hint {
            font-size: 15px; color: rgba(255,255,255,0.85);
            font-family: 'Nunito', sans-serif; font-weight: 700;
            animation: tapWiggle 1.8s ease-in-out infinite;
        }
        @keyframes tapWiggle { 0%,100%{transform:scale(1);} 50%{transform:scale(1.07);} }
        .autoplay-pill {
            display: none; background: var(--gold); color: #333;
            padding: 5px 14px; border-radius: 20px; font-size: 13px;
            font-family: 'Nunito', sans-serif; font-weight: 800; margin-top: 4px;
        }
        .autoplay-pill.show { display: inline-block; }

        /* ── SPEAK FAB ── */
        .speak-fab {
            position: absolute; bottom: 90px; right: 18px;
            width: 56px; height: 56px; border-radius: 50%;
            background: rgba(255,255,255,0.28); border: 3px solid rgba(255,255,255,0.55);
            color: white; font-size: 26px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s; z-index: 5; box-shadow: 0 4px 14px rgba(0,0,0,0.2);
        }
        .speak-fab:active { transform: scale(0.88); }
        .speak-fab.speaking { animation: speakPulse 0.5s ease infinite alternate; }
        @keyframes speakPulse { from{box-shadow:0 0 0 0 rgba(255,255,255,0.4);} to{box-shadow:0 0 0 14px rgba(255,255,255,0);} }

        /* ── MOBILE ── */
        @media (max-width: 540px) {
            .main-content  { flex-direction: column; gap: 8px; padding: 4px 14px 0; }
            .emoji-half    { order: 1; }
            .image-half    { order: 2; }
            .big-emoji     { font-size: min(32vw, 20vh); }
            .emoji-ring    { width: min(32vw, 20vh); height: min(32vw, 20vh); }
            .image-frame   { width: min(52vw, 26vh); height: min(52vw, 26vh); }
            .word-label    { font-size: min(9vw, 6vh); }
            .part-chip     { font-size: min(5vw, 5vh); }
            .fun-fact-chip { font-size: min(3.5vw, 3.5vh); max-width: 80vw; }
            .speak-fab     { bottom: 82px; right: 12px; width: 50px; height: 50px; font-size: 22px; }
            .sound-pill    { font-size: 13px; padding: 6px 12px; }
        }

        /* ── FLOAT EMOJI ── */
        .float-emoji {
            position: fixed; font-size: 36px; pointer-events: none; z-index: 50;
            animation: floatUp 1.1s ease forwards;
        }
        @keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:1;} 100%{transform:translateY(-80px) scale(1.4);opacity:0;} }

        /* ── PARENT PANEL ── */
        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
            z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(6px);
        }
        .overlay.show { display: flex; }
        .panel {
            background: white; border-radius: 30px; padding: 26px;
            width: 92%; max-width: 400px; max-height: 88vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        .panel h2 { font-size:20px;color:#e63946;margin-bottom:6px;text-align:center;font-family:'Fredoka One',cursive; }
        .panel-progress { text-align:center;font-size:13px;color:#666;background:#fde8ea;padding:8px;border-radius:12px;margin-bottom:18px;font-family:'Nunito',sans-serif;font-weight:700; }
        .panel-row { display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #f0f0f0; }
        .panel-label { font-size:14px;font-weight:700;color:#333;font-family:'Nunito',sans-serif; }
        .panel-sub   { font-size:12px;color:#999;margin-top:2px;font-family:'Nunito',sans-serif; }
        .toggle { width:52px;height:28px;background:#ddd;border-radius:14px;cursor:pointer;position:relative;transition:background 0.3s;border:none;flex-shrink:0; }
        .toggle.on { background:#e63946; }
        .toggle::after { content:'';position:absolute;width:22px;height:22px;background:white;border-radius:50%;top:3px;left:3px;transition:left 0.3s;box-shadow:0 2px 6px rgba(0,0,0,0.25); }
        .toggle.on::after { left:27px; }
        .speed-row { display:flex;gap:7px; }
        .speed-btn { padding:7px 14px;border:2px solid #e5e7eb;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;background:white;transition:all 0.2s;font-family:'Nunito',sans-serif; }
        .speed-btn.active { border-color:#e63946;background:#fde8ea;color:#e63946; }
        .jump-section { margin-top:14px; }
        .jump-section h4 { font-size:12px;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;font-family:'Nunito',sans-serif;font-weight:700; }
        .jump-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:6px; }
        .jump-btn { border:2px solid #e5e7eb;border-radius:10px;font-size:11px;font-weight:800;cursor:pointer;background:white;color:#e63946;transition:all 0.2s;padding:8px 4px;font-family:'Nunito',sans-serif;text-align:center; }
        .jump-btn:hover { background:#e63946;color:white;border-color:#e63946; }
        .jump-btn.done  { background:#d1fae5;color:#059669;border-color:#a7f3d0; }
        .jump-btn.cur   { background:#e63946;color:white;border-color:#e63946; }
        .close-panel-btn { width:100%;padding:15px;background:#e63946;color:white;border:none;border-radius:20px;font-size:16px;font-family:'Fredoka One',cursive;cursor:pointer;margin-top:18px;transition:transform 0.15s; }
        .close-panel-btn:active { transform:scale(0.96); }

        /* ── CELEBRATION ── */
        .celeb-overlay { display:none;position:fixed;inset:0;background:linear-gradient(135deg,#e63946 0%,#ff8fa3 100%);z-index:200;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px; }
        .celeb-overlay.show { display:flex; }
        .celeb-stars { display:flex;gap:14px;margin-bottom:14px; }
        .celeb-star  { font-size:44px;animation:starPop 0.5s cubic-bezier(0.175,0.885,0.32,1.4) both; }
        .celeb-star:nth-child(2){ animation-delay:0.15s; }
        .celeb-star:nth-child(3){ animation-delay:0.30s; }
        @keyframes starPop { 0%{transform:scale(0) rotate(-30deg);opacity:0;} 100%{transform:scale(1) rotate(0);opacity:1;} }
        .celeb-big   { font-size:90px;margin-bottom:10px;animation:popIn 0.6s cubic-bezier(0.175,0.885,0.32,1.4) both; }
        .celeb-title { font-size:36px;color:white;margin-bottom:8px;font-family:'Fredoka One',cursive;text-shadow:0 3px 12px rgba(0,0,0,0.2); }
        .celeb-sub   { font-size:17px;color:rgba(255,255,255,0.92);white-space:pre-line;margin-bottom:28px;font-family:'Nunito',sans-serif;font-weight:700; }
        .celeb-btn   { background:white;color:#e63946;border:none;padding:18px 44px;border-radius:50px;font-size:19px;font-family:'Fredoka One',cursive;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,0.22);transition:transform 0.15s; }
        .celeb-btn:active { transform:scale(0.94); }

        @keyframes popIn    { 0%{transform:scale(0) rotate(-10deg);opacity:0;} 80%{transform:scale(1.12) rotate(4deg);} 100%{transform:scale(1) rotate(0);opacity:1;} }
        @keyframes bounceIn { 0%{transform:scale(0.5);opacity:0;} 70%{transform:scale(1.08);} 100%{transform:scale(1);opacity:1;} }
        @keyframes slideUp  { from{transform:translateY(28px);opacity:0;} to{transform:translateY(0);opacity:1;} }
        @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0);opacity:1;} 100%{transform:translateY(110vh) rotate(720deg);opacity:0;} }
    

/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.celeb-title{font-size:clamp(24px,3.5vw,54px);}
.celeb-sub{font-size:clamp(14px,1.8vw,26px);}
.celeb-stars{font-size:clamp(36px,5vw,72px);}
.celeb-btn{font-size:clamp(16px,2vw,28px);padding:clamp(14px,1.8vw,22px) clamp(36px,4vw,60px);border-radius:clamp(40px,5vw,60px);}
.card{border-radius:clamp(16px,2vw,28px);}
</style>
</head>
<body>

<div class="screen" id="mainScreen" onclick="handleTap(event)">

    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <!-- Top Bar -->
    <div class="topbar" onclick="event.stopPropagation()">
        <a href="/dashboard" class="topbar-btn">🏠 Home</a>
        <div class="stars-display" id="starsDisplay">⭐ 0</div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="sound-pill" id="soundFab" onclick="event.stopPropagation();toggleSound();">🔊 Sound</button>
            <button class="topbar-btn" onclick="openPanel(event)">⚙️ Parent</button>
        </div>
    </div>

    <!-- Progress Dots -->
    <div class="dots-row" id="dotsRow"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- LEFT: Big body part emoji -->
        <div class="emoji-half">
            <div class="big-emoji" id="bigEmoji" onclick="tapEmoji(event)">🗣️</div>
            <div class="emoji-ring" id="emojiRing"></div>
            <div class="part-chip" id="partChip">👆 Tap me!</div>
        </div>

        <!-- RIGHT: Photo frame — animals style -->
        <div class="image-half">
            <div class="image-frame" onclick="tapImage(event)">
                <!-- emoji fallback — always shown if photo missing -->
                <div class="frame-fallback" id="frameFallback">🗣️</div>
                <!-- photo fades in on top when it loads -->
                <img id="mainImage" src="" alt=""
                     onload="this.style.opacity='1'"
                     onerror="this.style.opacity='0'"/>
                <div class="image-glow" id="imageGlow"></div>
            </div>
            <div class="word-label"    id="wordLabel">Head</div>
            <div class="fun-fact-chip" id="funFactChip">My brain lives inside!</div>
        </div>

    </div>

    <!-- Speak FAB -->
    <button class="speak-fab" id="speakFab" onclick="event.stopPropagation();tapSpeak();">🔊</button>

    <!-- Bottom Bar -->
    <div class="bottom-bar" onclick="event.stopPropagation()">
        <button class="nav-btn" id="prevBtn" onclick="prevPart(event)" disabled>◀</button>
        <div class="bottom-center">
            <div class="tap-hint" id="tapHint">👆 Tap to see next!</div>
            <div class="autoplay-pill" id="autoplayPill">▶ Playing…</div>
        </div>
        <button class="next-btn" onclick="nextPart(event)">Next ▶</button>
    </div>
</div>

<!-- Parent Panel -->
<div class="overlay" id="parentOverlay">
    <div class="panel">
        <h2>🫀 Parent Controls</h2>
        <div class="panel-progress" id="panelProgress">0 of 20 body parts seen</div>
        <div class="panel-row">
            <div><div class="panel-label">🔊 Voice Sound</div><div class="panel-sub">Speaks body part name aloud</div></div>
            <button class="toggle on" id="soundToggle" onclick="toggleSound()"></button>
        </div>
        <div class="panel-row">
            <div><div class="panel-label">▶️ Auto Play</div><div class="panel-sub">Changes card automatically</div></div>
            <button class="toggle" id="autoToggle" onclick="toggleAuto()"></button>
        </div>
        <div class="panel-row" style="border:none">
            <div><div class="panel-label">⏱️ Speed</div><div class="panel-sub">Seconds per card</div></div>
            <div class="speed-row">
                <button class="speed-btn"        onclick="setSpeed(3,this)">3s</button>
                <button class="speed-btn active" onclick="setSpeed(5,this)">5s</button>
                <button class="speed-btn"        onclick="setSpeed(8,this)">8s</button>
            </div>
        </div>
        <div class="jump-section">
            <h4>Jump to any body part</h4>
            <div class="jump-grid" id="jumpGrid"></div>
        </div>
        <button class="close-panel-btn" onclick="closePanel()">✅ Keep Learning!</button>
    </div>
</div>

<!-- Celebration -->
<div class="celeb-overlay" id="celebOverlay">
    <div class="celeb-stars">
        <span class="celeb-star">⭐</span><span class="celeb-star">⭐</span><span class="celeb-star">⭐</span>
    </div>
    <div class="celeb-big"   id="celebBig">🎉</div>
    <div class="celeb-title" id="celebTitle">Amazing!</div>
    <div class="celeb-sub"   id="celebSub">Great job!</div>
    <button class="celeb-btn" onclick="closeCelebration()">Keep Going! 🚀</button>
</div>

<script>
/* ══════════════════════════════════════════════════
   DATA
   Photos go in:  body_parts/<name>.jpg
   emoji is ALWAYS shown as fallback if photo missing
   chip = short label shown below the big emoji
══════════════════════════════════════════════════ */
const parts = [
    { name:'Head',      emoji:'🙂', chip:'Touch your head!',      image:'/static/images/body_parts/head.jpg',      color:['#e63946','#a4162a'], fact:'My brain lives inside my head!' },
    { name:'Hair',      emoji:'💇', chip:'Soft & silky!',         image:'/static/images/body_parts/hair.jpg',      color:['#c77dff','#7b00cc'], fact:'Hair grows on top of my head!' },
    { name:'Eyes',      emoji:'👀', chip:'I can see you!',        image:'/static/images/body_parts/eyes.jpg',      color:['#4895ef','#1a68c0'], fact:'My eyes help me see the world!' },
    { name:'Ears',      emoji:'👂', chip:'Can you hear me?',      image:'/static/images/body_parts/ears.jpg',      color:['#f77f00','#c05500'], fact:'My ears help me hear sounds!' },
    { name:'Nose',      emoji:'👃', chip:'Sniff sniff!',          image:'/static/images/body_parts/nose.jpg',      color:['#fb923c','#c05020'], fact:'My nose helps me smell flowers!' },
    { name:'Mouth',     emoji:'👄', chip:'Eat, talk, smile!',     image:'/static/images/body_parts/mouth.jpg',     color:['#e85d04','#aa3a00'], fact:'My mouth helps me eat and talk!' },
    { name:'Teeth',     emoji:'🦷', chip:'Brush me twice a day!', image:'/static/images/body_parts/teeth.jpg',     color:['#118ab2','#0a5c7a'], fact:'Brush your teeth every morning!' },
    { name:'Tongue',    emoji:'👅', chip:'Yummy taste!',          image:'/static/images/body_parts/tongue.jpg',    color:['#d62246','#9a1030'], fact:'My tongue helps me taste food!' },
    { name:'Neck',      emoji:'🧣', chip:'Holds my head up!',     image:'/static/images/body_parts/neck.jpg',      color:['#f4844c','#c05020'], fact:'My neck holds up my head!' },
    { name:'Shoulders', emoji:'🙆', chip:'So strong!',            image:'/static/images/body_parts/shoulders.jpg', color:['#2d6a4f','#1a3d30'], fact:'My shoulders help me carry things!' },
    { name:'Chest',     emoji:'❤️', chip:'My heart is here!',     image:'/static/images/body_parts/chest.jpg',     color:['#e63946','#a4162a'], fact:'My heart beats inside my chest!' },
    { name:'Tummy',     emoji:'😋', chip:'Feed me!',               image:'/static/images/body_parts/tummy.jpg',    color:['#f9c74f','#c99a00'], fact:'Food goes to my tummy to digest!' },
    { name:'Arms',      emoji:'💪', chip:'Hug time!',             image:'/static/images/body_parts/arms.jpg',      color:['#43aa8b','#2a7a60'], fact:'My arms help me hug and lift!' },
    { name:'Elbow',     emoji:'💪', chip:'Bend and flex!',        image:'/static/images/body_parts/elbow.jpg',     color:['#00b4d8','#007aaa'], fact:'My elbow helps my arm bend!' },
    { name:'Hands',     emoji:'🤚', chip:'Draw, write, wave!',    image:'/static/images/body_parts/hands.jpg',     color:['#7209b7','#4a0880'], fact:'My hands help me draw and write!' },
    { name:'Fingers',   emoji:'🖐️', chip:'1, 2, 3, 4, 5!',       image:'/static/images/body_parts/fingers.jpg',  color:['#e9c46a','#b08800'], fact:'I have five fingers on each hand!' },
    { name:'Legs',      emoji:'🦵', chip:'Run, jump, kick!',      image:'/static/images/body_parts/legs.jpg',      color:['#27ae60','#1a7a40'], fact:'My legs help me run and jump!' },
    { name:'Knee',      emoji:'🦵', chip:'Bend your knee!',       image:'/static/images/body_parts/knee.jpg',      color:['#1b998b','#0d6e62'], fact:'My knee helps my leg bend!' },
    { name:'Feet',      emoji:'🦶', chip:'Walk, run, dance!',     image:'/static/images/body_parts/feet.jpg',      color:['#ff6b6b','#cc3333'], fact:'My feet help me walk and stand!' },
    { name:'Toes',      emoji:'🦶', chip:'Wiggle your toes!',     image:'/static/images/body_parts/toes.jpg',      color:['#f77f00','#c05500'], fact:'I have five toes on each foot!' },
];

let current=0, stars=0, soundOn=true, autoPlay=false, autoSpeed=5000, autoTimer=null;
let learned = new Set();

/* ── UPDATE SCREEN ── */
function updateScreen(animate = true) {
    const a = parts[current];

    document.getElementById('mainScreen').style.background =
        `linear-gradient(135deg, ${a.color[0]} 0%, ${a.color[1]} 100%)`;

    // Left: big emoji + chip
    document.getElementById('bigEmoji').textContent     = a.emoji;
    document.getElementById('partChip').textContent     = a.chip;
    document.getElementById('frameFallback').textContent = a.emoji;

    // Right: photo (emoji fallback always visible behind)
    const img = document.getElementById('mainImage');
    img.style.opacity = '0';
    img.src = a.image;
    img.alt = a.name;
    // onload / onerror are inline in the HTML — just reset opacity here

    document.getElementById('imageGlow').style.background =
        `linear-gradient(to bottom, transparent 50%, ${a.color[1]}99)`;

    document.getElementById('wordLabel').textContent    = a.name;
    document.getElementById('funFactChip').textContent  = a.fact;
    document.getElementById('prevBtn').disabled = current === 0;

    if (animate) {
        reAnimate('bigEmoji',    'popIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4)');
        reAnimate('wordLabel',   'slideUp 0.4s ease both');
        reAnimate('funFactChip', 'slideUp 0.4s ease 0.1s both');
    }
    updateDots();
    if (soundOn) setTimeout(speakPart, 450);
}

function reAnimate(id, anim) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.animation = 'none'; void el.offsetWidth; el.style.animation = anim;
}

/* ── SPEAK ── */
function speakPart() {
    if (!soundOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const a = parts[current];
    const u = new SpeechSynthesisUtterance(`${a.name}! ... This is your ... ${a.name}! ... ${a.fact}`);
    u.rate = 0.68; u.pitch = 1.4; u.volume = 1;
    const fab = document.getElementById('speakFab');
    fab.classList.add('speaking');
    u.onend = () => fab.classList.remove('speaking');
    window.speechSynthesis.speak(u);
}
function tapSpeak() { speakPart(); }

/* ── TAP EMOJI ── */
function tapEmoji(e) {
    e.stopPropagation();
    const ring = document.getElementById('emojiRing');
    ring.classList.remove('pulse'); void ring.offsetWidth; ring.classList.add('pulse');
    floatEmoji(parts[current].emoji, e.clientX, e.clientY);
    speakPart();
}
function tapImage(e) {
    e.stopPropagation();
    floatEmoji(parts[current].emoji, e.clientX, e.clientY);
    speakPart();
}

function floatEmoji(emoji, x, y) {
    const el = document.createElement('div');
    el.className = 'float-emoji'; el.textContent = emoji;
    el.style.left = `${x-18}px`; el.style.top = `${y-18}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
}

/* ── NAVIGATION ── */
function handleTap(e) {
    floatEmoji(parts[current].emoji, e.clientX, e.clientY);
    nextPart(e);
}

function nextPart(e) {
    if (e) e.stopPropagation();
    learned.add(current); addStars(1);
    if (learned.size % 5 === 0 && current < parts.length - 1) {
        showCelebration('🌟', 'Great Job!', `You learned ${learned.size} body parts!\nKeep going! 🚀`);
        return;
    }
    if (current >= parts.length - 1) {
        learned.add(parts.length - 1);
        showCelebration('🏆', 'You Did It!', `WOW! You know ALL ${parts.length} body parts!\nYou are a SUPERSTAR! ⭐⭐⭐`);
        return;
    }
    current++; updateScreen();
    if (autoPlay) resetAutoTimer();
}
function prevPart(e) { if (e) e.stopPropagation(); if (current > 0) { current--; updateScreen(); } }

/* ── STARS ── */
function addStars(n) {
    stars += n;
    const el = document.getElementById('starsDisplay');
    el.textContent = `⭐ ${stars}`; el.style.transform = 'scale(1.35)';
    setTimeout(() => el.style.transform = '', 200);
}

/* ── DOTS ── */
function updateDots() {
    const row = document.getElementById('dotsRow'); row.innerHTML = '';
    parts.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = `dot ${i===current?'current':learned.has(i)?'done':''}`;
        row.appendChild(d);
    });
}

/* ── AUTO PLAY ── */
function toggleAuto() {
    autoPlay = !autoPlay;
    document.getElementById('autoToggle').classList.toggle('on', autoPlay);
    document.getElementById('autoplayPill').classList.toggle('show', autoPlay);
    document.getElementById('tapHint').style.display = autoPlay ? 'none' : 'block';
    autoPlay ? resetAutoTimer() : clearInterval(autoTimer);
}
function resetAutoTimer() {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => {
        learned.add(current);
        if (current < parts.length-1) { current++; updateScreen(); }
        else { clearInterval(autoTimer); showCelebration('🏆','You Did It!',`ALL ${parts.length} body parts learned!`); }
    }, autoSpeed);
}
function setSpeed(s, btn) {
    autoSpeed = s*1000;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (autoPlay) resetAutoTimer();
}

/* ── SOUND ── */
function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('soundToggle').classList.toggle('on', soundOn);
    document.getElementById('speakFab').style.opacity = soundOn ? '1' : '0.45';
    const pill = document.getElementById('soundFab');
    pill.textContent = soundOn ? '🔊 Sound' : '🔇 Muted';
    pill.classList.toggle('muted', !soundOn);
    if (!soundOn) window.speechSynthesis.cancel();
}

/* ── PARENT PANEL ── */
function openPanel(e) {
    if (e) e.stopPropagation(); clearInterval(autoTimer);
    document.getElementById('panelProgress').textContent = `${learned.size} of ${parts.length} body parts seen ✅`;
    buildJumpGrid();
    document.getElementById('parentOverlay').classList.add('show');
}
function closePanel() { document.getElementById('parentOverlay').classList.remove('show'); if (autoPlay) resetAutoTimer(); }
function buildJumpGrid() {
    const grid = document.getElementById('jumpGrid'); grid.innerHTML = '';
    parts.forEach((a, i) => {
        const btn = document.createElement('button');
        btn.className = `jump-btn ${i===current?'cur':learned.has(i)?'done':''}`;
        btn.textContent = a.emoji + ' ' + a.name;
        btn.onclick = () => { current=i; updateScreen(); closePanel(); };
        grid.appendChild(btn);
    });
}

/* ── CELEBRATION ── */
function showCelebration(icon, title, sub) {
    clearInterval(autoTimer);
    document.getElementById('celebBig').textContent   = icon;
    document.getElementById('celebTitle').textContent = title;
    document.getElementById('celebSub').textContent   = sub;
    document.getElementById('celebOverlay').classList.add('show');
    if (soundOn) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance('Amazing! Well done! You are a superstar!');
        u.pitch = 1.4; u.rate = 0.8; window.speechSynthesis.speak(u);
    }
    launchConfetti();
}
function closeCelebration() {
    document.getElementById('celebOverlay').classList.remove('show');
    if (current < parts.length-1) { current++; updateScreen(); }
    if (autoPlay) resetAutoTimer();
}

/* ── CONFETTI ── */
function launchConfetti() {
    const cols = ['#FF6B6B','#FFC300','#2ECC71','#3498DB','#9B59B6','#fff','#fbbf24','#f472b6','#FB923C'];
    for (let i=0; i<80; i++) {
        const c = document.createElement('div'); const sz = Math.random()*16+7;
        c.style.cssText = `position:fixed;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'4px'};left:${Math.random()*100}vw;top:-24px;z-index:300;animation:confettiFall ${Math.random()*2.2+1.8}s ease ${Math.random()*.8}s forwards;pointer-events:none;`;
        document.body.appendChild(c); setTimeout(() => c.remove(), 5000);
    }
}

/* ── INIT ── */
updateDots();
updateScreen(false);
setTimeout(speakPart, 900);
</script>
</body>
</html>
