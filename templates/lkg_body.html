<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Body Parts!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD600; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka One', cursive;
            overflow: hidden;
            height: 100vh; width: 100vw;
            user-select: none;
            background: #222;
        }

        .screen {
            width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
            cursor: pointer;
        }

        #bgPhoto {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: opacity 0.45s ease;
            z-index: 0;
        }

        #colorOverlay {
            position: absolute; inset: 0;
            z-index: 1;
            transition: background 0.6s ease;
            pointer-events: none;
        }

        .grad-top {
            position: absolute; top: 0; left: 0; right: 0;
            height: 200px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.60), transparent);
            z-index: 2; pointer-events: none;
        }
        .grad-bottom {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 280px;
            background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
            z-index: 2; pointer-events: none;
        }

        .bg-blob {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.07);
            pointer-events: none;
            animation: floatBlob 7s ease-in-out infinite alternate;
            z-index: 3;
        }
        .bg-blob:nth-child(1){ width:200px;height:200px;top:-50px;left:-50px;animation-delay:0s; }
        .bg-blob:nth-child(2){ width:130px;height:130px;bottom:70px;right:-20px;animation-delay:2s; }
        @keyframes floatBlob {
            from { transform: translateY(0) scale(1); }
            to   { transform: translateY(18px) scale(1.1); }
        }

        /* ── TOP BAR ── */
        .topbar {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 12px 16px; z-index: 10;
        }
        .topbar-btn {
            background: rgba(255,255,255,0.22);
            border: 2.5px solid rgba(255,255,255,0.45);
            color: white; padding: 8px 18px;
            border-radius: 50px; font-size: 15px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 5px;
            transition: transform 0.15s, background 0.15s;
            backdrop-filter: blur(6px);
        }
        .topbar-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.38); }
        .stars-display {
            background: rgba(255,215,0,0.3);
            border: 2.5px solid rgba(255,215,0,0.6);
            color: white; padding: 8px 18px;
            border-radius: 50px; font-size: 16px;
            font-family: 'Fredoka One', cursive;
            backdrop-filter: blur(6px);
        }

        /* ── PROGRESS DOTS ── */
        .dots-row {
            position: absolute; top: 62px; left: 0; right: 0;
            display: flex; justify-content: center;
            gap: 5px; flex-wrap: wrap; padding: 0 20px;
            z-index: 10;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s; flex-shrink: 0;
        }
        .dot.done    { background: rgba(255,255,255,0.65); }
        .dot.current {
            background: var(--gold); transform: scale(1.7);
            box-shadow: 0 0 8px var(--gold);
        }

        /* ── NAME + FACT ── */
        .name-card {
            position: absolute; bottom: 96px; left: 0; right: 0;
            display: flex; flex-direction: column;
            align-items: center; gap: 10px;
            z-index: 10; pointer-events: none;
        }
        .word-label {
            font-size: clamp(38px, 10vw, 70px);
            font-family: 'Fredoka One', cursive;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.55);
            animation: slideUp 0.4s ease both;
            line-height: 1; letter-spacing: 1px;
        }
        .fun-fact-chip {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.38);
            backdrop-filter: blur(8px);
            color: white; border-radius: 50px;
            padding: 7px 22px;
            font-size: clamp(13px, 3.5vw, 18px);
            font-family: 'Nunito', sans-serif; font-weight: 900;
            animation: slideUp 0.4s ease 0.12s both;
            text-align: center; max-width: 85vw;
        }

        /* ── BOTTOM BAR ── */
        .bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 10px 20px 22px;
            z-index: 10; gap: 10px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.2);
            border: 2.5px solid rgba(255,255,255,0.45);
            color: white; padding: 14px 20px;
            border-radius: 50px; font-size: 22px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer; transition: all 0.15s;
            min-width: 70px; text-align: center;
            backdrop-filter: blur(6px);
        }
        .nav-btn:hover  { background: rgba(255,255,255,0.35); transform: scale(1.06); }
        .nav-btn:active { transform: scale(0.92); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .next-btn {
            background: white; color: #333; border: none;
            padding: 16px 38px; border-radius: 50px;
            font-size: 18px; font-family: 'Fredoka One', cursive;
            cursor: pointer;
            box-shadow: 0 6px 22px rgba(0,0,0,0.3), 0 0 0 4px rgba(255,255,255,0.3);
            transition: all 0.18s;
        }
        .next-btn:hover  { transform: scale(1.06) translateY(-3px); }
        .next-btn:active { transform: scale(0.94); }
        .bottom-center { text-align: center; flex: 1; }
        .tap-hint {
            font-size: 14px; color: rgba(255,255,255,0.82);
            font-family: 'Nunito', sans-serif; font-weight: 700;
            animation: tapWiggle 1.8s ease-in-out infinite;
        }
        @keyframes tapWiggle { 0%,100%{transform:scale(1);} 50%{transform:scale(1.07);} }
        .autoplay-pill {
            display: none; background: var(--gold); color: #333;
            padding: 4px 14px; border-radius: 20px;
            font-size: 13px; font-family: 'Nunito', sans-serif;
            font-weight: 800; margin-top: 4px;
        }
        .autoplay-pill.show { display: inline-block; }

        /* ── SPEAK FAB ── */
        /* ── SOUND PILL (top bar) ── */
        .sound-pill {
            background: rgba(255,255,255,0.22);
            border: 2.5px solid rgba(255,255,255,0.45);
            color: white; padding: 8px 16px;
            border-radius: 50px; font-size: 15px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            transition: transform 0.15s, background 0.2s;
            backdrop-filter: blur(6px);
            white-space: nowrap;
        }
        .sound-pill:active { transform: scale(0.92); background: rgba(255,255,255,0.4); }
        .sound-pill.muted {
            background: rgba(0,0,0,0.25);
            border-color: rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.5);
            text-decoration: line-through;
        }

        .speak-fab {
            position: absolute; bottom: 96px; right: 18px;
            width: 54px; height: 54px; border-radius: 50%;
            background: rgba(255,255,255,0.22);
            border: 2.5px solid rgba(255,255,255,0.5);
            color: white; font-size: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s;
            z-index: 11; backdrop-filter: blur(6px);
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }
        .speak-fab:active { transform: scale(0.88); }
        .speak-fab.speaking { animation: speakPulse 0.5s ease infinite alternate; }
        @keyframes speakPulse {
            from { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            to   { box-shadow: 0 0 0 14px rgba(255,255,255,0); }
        }

        .float-star {
            position: fixed; font-size: 32px;
            pointer-events: none; z-index: 50;
            animation: floatUp 1.1s ease forwards;
        }
        @keyframes floatUp {
            0%  { transform: translateY(0) scale(1); opacity: 1; }
            100%{ transform: translateY(-90px) scale(1.5); opacity: 0; }
        }

        /* ── PARENT PANEL ── */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.55); z-index: 100;
            align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }
        .overlay.show { display: flex; }
        .panel {
            background: white; border-radius: 30px;
            padding: 26px; width: 92%; max-width: 400px;
            max-height: 88vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        .panel h2 { font-size:20px; color:#e63946; margin-bottom:6px; text-align:center; font-family:'Fredoka One',cursive; }
        .panel-progress { text-align:center; font-size:13px; color:#666; background:#fde8ea; padding:8px; border-radius:12px; margin-bottom:18px; font-family:'Nunito',sans-serif; font-weight:700; }
        .panel-row { display:flex; align-items:center; justify-content:space-between; padding:13px 0; border-bottom:1px solid #f0f0f0; }
        .panel-label { font-size:14px; font-weight:700; color:#333; font-family:'Nunito',sans-serif; }
        .panel-sub   { font-size:12px; color:#999; margin-top:2px; font-family:'Nunito',sans-serif; }
        .toggle { width:52px; height:28px; background:#ddd; border-radius:14px; cursor:pointer; position:relative; transition:background 0.3s; border:none; flex-shrink:0; }
        .toggle.on { background:#e63946; }
        .toggle::after { content:''; position:absolute; width:22px; height:22px; background:white; border-radius:50%; top:3px; left:3px; transition:left 0.3s; box-shadow:0 2px 6px rgba(0,0,0,0.25); }
        .toggle.on::after { left:27px; }
        .speed-row { display:flex; gap:7px; }
        .speed-btn { padding:7px 14px; border:2px solid #e5e7eb; border-radius:20px; font-size:13px; font-weight:700; cursor:pointer; background:white; transition:all 0.2s; font-family:'Nunito',sans-serif; }
        .speed-btn.active { border-color:#e63946; background:#fde8ea; color:#e63946; }
        .jump-section { margin-top:14px; }
        .jump-section h4 { font-size:12px; color:#888; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; font-family:'Nunito',sans-serif; font-weight:700; }
        .jump-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
        .jump-btn { border:2px solid #e5e7eb; border-radius:10px; font-size:11px; font-weight:800; cursor:pointer; background:white; color:#e63946; transition:all 0.2s; padding:8px 4px; font-family:'Nunito',sans-serif; text-align:center; }
        .jump-btn:hover { background:#e63946; color:white; border-color:#e63946; }
        .jump-btn.done  { background:#d1fae5; color:#059669; border-color:#a7f3d0; }
        .jump-btn.cur   { background:#e63946; color:white; border-color:#e63946; }
        .close-panel-btn { width:100%; padding:15px; background:#e63946; color:white; border:none; border-radius:20px; font-size:16px; font-family:'Fredoka One',cursive; cursor:pointer; margin-top:18px; transition:transform 0.15s; }
        .close-panel-btn:active { transform:scale(0.96); }

        /* ── CELEBRATION ── */
        .celeb-overlay { display:none; position:fixed; inset:0; background:linear-gradient(135deg,#e63946 0%,#ff8fa3 100%); z-index:200; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; }
        .celeb-overlay.show { display:flex; }
        .celeb-stars { display:flex; gap:14px; margin-bottom:14px; }
        .celeb-star  { font-size:44px; animation:starPop 0.5s cubic-bezier(0.175,0.885,0.32,1.4) both; }
        .celeb-star:nth-child(2){ animation-delay:0.15s; }
        .celeb-star:nth-child(3){ animation-delay:0.30s; }
        @keyframes starPop { 0%{transform:scale(0) rotate(-30deg);opacity:0;} 100%{transform:scale(1) rotate(0deg);opacity:1;} }
        .celeb-big   { font-size:90px; margin-bottom:10px; animation:popIn 0.6s cubic-bezier(0.175,0.885,0.32,1.4) both; }
        .celeb-title { font-size:36px; color:white; margin-bottom:8px; font-family:'Fredoka One',cursive; text-shadow:0 3px 12px rgba(0,0,0,0.2); }
        .celeb-sub   { font-size:17px; color:rgba(255,255,255,0.92); white-space:pre-line; margin-bottom:28px; font-family:'Nunito',sans-serif; font-weight:700; }
        .celeb-btn   { background:white; color:#e63946; border:none; padding:18px 44px; border-radius:50px; font-size:19px; font-family:'Fredoka One',cursive; cursor:pointer; box-shadow:0 8px 24px rgba(0,0,0,0.22); transition:transform 0.15s; }
        .celeb-btn:active { transform:scale(0.94); }

        @keyframes popIn   { 0%{transform:scale(0) rotate(-10deg);opacity:0;} 80%{transform:scale(1.12) rotate(4deg);} 100%{transform:scale(1) rotate(0deg);opacity:1;} }
        @keyframes slideUp { from{transform:translateY(28px);opacity:0;} to{transform:translateY(0);opacity:1;} }
        @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;} 100%{transform:translateY(110vh) rotate(720deg);opacity:0;} }
    </style>
</head>
<body>

<div class="screen" id="mainScreen" onclick="handleTap(event)">

    <img id="bgPhoto" src="" alt=""/>
    <div id="colorOverlay"></div>
    <div class="grad-top"></div>
    <div class="grad-bottom"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <!-- Top bar -->
    <div class="topbar" onclick="event.stopPropagation()">
        <a href="/dashboard" class="topbar-btn">🏠 Home</a>
        <div class="stars-display" id="starsDisplay">⭐ 0</div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="sound-pill" id="soundFab" onclick="event.stopPropagation(); toggleSound();">🔊 Sound</button>
            <button class="topbar-btn" onclick="openPanel(event)">⚙️ Parent</button>
        </div>
    </div>

    <!-- Dots -->
    <div class="dots-row" id="dotsRow"></div>

    <!-- Name + fact -->
    <div class="name-card">
        <div class="word-label"    id="wordLabel">Head</div>
        <div class="fun-fact-chip" id="funFactChip">My brain lives inside!</div>
    </div>

    <button class="speak-fab" id="speakFab" onclick="event.stopPropagation(); tapSpeak();">🔊</button>

    <div class="bottom-bar" onclick="event.stopPropagation()">
        <button class="nav-btn" id="prevBtn" onclick="prevPart(event)" disabled>◀</button>
        <div class="bottom-center">
            <div class="tap-hint" id="tapHint">👆 Tap to see next!</div>
            <div class="autoplay-pill" id="autoplayPill">▶ Playing…</div>
        </div>
        <button class="next-btn" onclick="nextPart(event)">Next ▶</button>
    </div>
</div>

<!-- Parent Panel -->
<div class="overlay" id="parentOverlay">
    <div class="panel">
        <h2>🫀 Parent Controls</h2>
        <div class="panel-progress" id="panelProgress">0 of 20 body parts seen</div>
        <div class="panel-row">
            <div><div class="panel-label">🔊 Voice Sound</div><div class="panel-sub">Speaks body part name aloud</div></div>
            <button class="toggle on" id="soundToggle" onclick="toggleSound()"></button>
        </div>
        <div class="panel-row">
            <div><div class="panel-label">▶️ Auto Play</div><div class="panel-sub">Changes card automatically</div></div>
            <button class="toggle" id="autoToggle" onclick="toggleAuto()"></button>
        </div>
        <div class="panel-row" style="border:none">
            <div><div class="panel-label">⏱️ Speed</div><div class="panel-sub">Seconds per card</div></div>
            <div class="speed-row">
                <button class="speed-btn"        onclick="setSpeed(3,this)">3s</button>
                <button class="speed-btn active" onclick="setSpeed(5,this)">5s</button>
                <button class="speed-btn"        onclick="setSpeed(8,this)">8s</button>
            </div>
        </div>
        <div class="jump-section">
            <h4>Jump to any body part</h4>
            <div class="jump-grid" id="jumpGrid"></div>
        </div>
        <button class="close-panel-btn" onclick="closePanel()">✅ Keep Learning!</button>
    </div>
</div>

<!-- Celebration -->
<div class="celeb-overlay" id="celebOverlay">
    <div class="celeb-stars"><span class="celeb-star">⭐</span><span class="celeb-star">⭐</span><span class="celeb-star">⭐</span></div>
    <div class="celeb-big"   id="celebBig">🎉</div>
    <div class="celeb-title" id="celebTitle">Amazing!</div>
    <div class="celeb-sub"   id="celebSub">Great job!</div>
    <button class="celeb-btn" onclick="closeCelebration()">Keep Going! 🚀</button>
</div>

<script>
/* ══════════════════════════════════════
   DATA
   Photos go in a folder called "body_parts" next to this file.
   e.g.  body_parts/head.jpg
══════════════════════════════════════ */
const parts = [
    { name:'Head',      image:'body_parts/head.jpg',      fact:'My brain lives inside!',              color:['#e63946','#a4162a'] },
    { name:'Hair',      image:'body_parts/hair.jpg',      fact:'I grow on top of the head!',          color:['#c77dff','#7b00cc'] },
    { name:'Eyes',      image:'body_parts/eyes.jpg',      fact:'I help you see the world!',           color:['#4895ef','#1a68c0'] },
    { name:'Ears',      image:'body_parts/ears.jpg',      fact:'I help you hear sounds!',             color:['#f77f00','#c05500'] },
    { name:'Nose',      image:'body_parts/nose.jpg',      fact:'I help you smell flowers!',           color:['#fb923c','#c05020'] },
    { name:'Mouth',     image:'body_parts/mouth.jpg',     fact:'I help you eat and talk!',            color:['#e85d04','#aa3a00'] },
    { name:'Teeth',     image:'body_parts/teeth.jpg',     fact:'Brush me twice a day!',              color:['#118ab2','#0a5c7a'] },
    { name:'Tongue',    image:'body_parts/tongue.jpg',    fact:'I help you taste food!',              color:['#d62246','#9a1030'] },
    { name:'Neck',      image:'body_parts/neck.jpg',      fact:'I hold up your head!',               color:['#f4844c','#c05020'] },
    { name:'Shoulders', image:'body_parts/shoulders.jpg', fact:'I help you carry things!',            color:['#2d6a4f','#1a3d30'] },
    { name:'Chest',     image:'body_parts/chest.jpg',     fact:'My heart beats inside!',             color:['#e63946','#a4162a'] },
    { name:'Tummy',     image:'body_parts/tummy.jpg',     fact:'Food goes here to digest!',           color:['#f9c74f','#c99a00'] },
    { name:'Arms',      image:'body_parts/arms.jpg',      fact:'I help you hug and lift!',           color:['#43aa8b','#2a7a60'] },
    { name:'Elbow',     image:'body_parts/elbow.jpg',     fact:'I help your arm bend!',              color:['#00b4d8','#007aaa'] },
    { name:'Hands',     image:'body_parts/hands.jpg',     fact:'I help you draw and write!',         color:['#7209b7','#4a0880'] },
    { name:'Fingers',   image:'body_parts/fingers.jpg',   fact:'I have five on each hand!',          color:['#e9c46a','#b08800'] },
    { name:'Legs',      image:'body_parts/legs.jpg',      fact:'I help you run and jump!',           color:['#27ae60','#1a7a40'] },
    { name:'Knee',      image:'body_parts/knee.jpg',      fact:'I help your leg bend!',              color:['#1b998b','#0d6e62'] },
    { name:'Feet',      image:'body_parts/feet.jpg',      fact:'I help you walk and stand!',         color:['#ff6b6b','#cc3333'] },
    { name:'Toes',      image:'body_parts/toes.jpg',      fact:'I have five on each foot!',          color:['#f77f00','#c05500'] },
];

let current   = 0;
let stars     = 0;
let soundOn   = true;
let autoPlay  = false;
let autoSpeed = 5000;
let autoTimer = null;
let learned   = new Set();

function updateScreen(animate = true) {
    const a = parts[current];

    const photo = document.getElementById('bgPhoto');
    photo.style.opacity = '0';
    photo.src = a.image; photo.alt = a.name;
    photo.onload  = () => { photo.style.opacity = '1'; };
    photo.onerror = () => { photo.style.opacity = '0'; };

    document.getElementById('colorOverlay').style.background =
        `linear-gradient(135deg, ${a.color[0]} 0%, ${a.color[1]} 100%)`;

    document.getElementById('wordLabel').textContent   = a.name;
    document.getElementById('funFactChip').textContent = a.fact;
    document.getElementById('prevBtn').disabled = current === 0;

    if (animate) {
        reAnimate('wordLabel',   'slideUp 0.4s ease both');
        reAnimate('funFactChip', 'slideUp 0.4s ease 0.12s both');
    }
    updateDots();
    if (soundOn) setTimeout(speakPart, 450);
}

function reAnimate(id, anim) {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = anim;
}

function speakPart() {
    if (!soundOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const a = parts[current];
    const u = new SpeechSynthesisUtterance(`${a.name}! ... This is your ... ${a.name}!`);
    u.rate = 0.68; u.pitch = 1.4; u.volume = 1;
    const fab = document.getElementById('speakFab');
    fab.classList.add('speaking');
    u.onend = () => fab.classList.remove('speaking');
    window.speechSynthesis.speak(u);
}
function tapSpeak() { speakPart(); }

function handleTap(e) {
    burstStar(e.clientX, e.clientY);
    nextPart(e);
}

function burstStar(x, y) {
    const el = document.createElement('div');
    el.className = 'float-star';
    el.textContent = ['⭐','✨','🌟'][Math.floor(Math.random()*3)];
    el.style.left = `${x - 16}px`;
    el.style.top  = `${y - 16}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
}

function nextPart(e) {
    if (e) e.stopPropagation();
    learned.add(current);
    addStars(1);
    if (learned.size % 5 === 0 && current < parts.length - 1) {
        showCelebration('🌟', 'Great Job!', `You learned ${learned.size} body parts!\nKeep going! 🚀`);
        return;
    }
    if (current >= parts.length - 1) {
        learned.add(parts.length - 1);
        showCelebration('🏆', 'You Did It!', `WOW! You know ALL ${parts.length} body parts!\nYou are a SUPERSTAR! ⭐⭐⭐`);
        return;
    }
    current++;
    updateScreen();
    if (autoPlay) resetAutoTimer();
}

function prevPart(e) {
    if (e) e.stopPropagation();
    if (current > 0) { current--; updateScreen(); }
}

function addStars(n) {
    stars += n;
    const el = document.getElementById('starsDisplay');
    el.textContent = `⭐ ${stars}`;
    el.style.transform = 'scale(1.35)';
    setTimeout(() => el.style.transform = '', 200);
}

function toggleAuto() {
    autoPlay = !autoPlay;
    syncAutoUI();
    autoPlay ? resetAutoTimer() : clearInterval(autoTimer);
}
function syncAutoUI() {
    document.getElementById('autoToggle').classList.toggle('on', autoPlay);
    document.getElementById('autoplayPill').classList.toggle('show', autoPlay);
    document.getElementById('tapHint').style.display = autoPlay ? 'none' : 'block';
}
function resetAutoTimer() {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => {
        learned.add(current);
        if (current < parts.length - 1) { current++; updateScreen(); }
        else { clearInterval(autoTimer); showCelebration('🏆','You Did It!',`ALL ${parts.length} body parts learned!`); }
    }, autoSpeed);
}
function setSpeed(s, btn) {
    autoSpeed = s * 1000;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (autoPlay) resetAutoTimer();
}

function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('soundToggle').classList.toggle('on', soundOn);
    document.getElementById('speakFab').style.opacity = soundOn ? '1' : '0.45';

    const pill = document.getElementById('soundFab');
    pill.textContent = soundOn ? '🔊 Sound' : '🔇 Muted';
    pill.classList.toggle('muted', !soundOn);

    if (!soundOn) window.speechSynthesis.cancel();
}

function updateDots() {
    const row = document.getElementById('dotsRow');
    row.innerHTML = '';
    parts.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = `dot ${i === current ? 'current' : learned.has(i) ? 'done' : ''}`;
        row.appendChild(d);
    });
}

function openPanel(e) {
    if (e) e.stopPropagation();
    clearInterval(autoTimer);
    document.getElementById('panelProgress').textContent =
        `${learned.size} of ${parts.length} body parts seen ✅`;
    buildJumpGrid();
    document.getElementById('parentOverlay').classList.add('show');
}
function closePanel() {
    document.getElementById('parentOverlay').classList.remove('show');
    if (autoPlay) resetAutoTimer();
}
function buildJumpGrid() {
    const grid = document.getElementById('jumpGrid');
    grid.innerHTML = '';
    parts.forEach((a, i) => {
        const btn = document.createElement('button');
        btn.className = `jump-btn ${i === current ? 'cur' : learned.has(i) ? 'done' : ''}`;
        btn.textContent = a.name;
        btn.onclick = () => { current = i; updateScreen(); closePanel(); };
        grid.appendChild(btn);
    });
}

function showCelebration(icon, title, sub) {
    clearInterval(autoTimer);
    document.getElementById('celebBig').textContent   = icon;
    document.getElementById('celebTitle').textContent = title;
    document.getElementById('celebSub').textContent   = sub;
    document.getElementById('celebOverlay').classList.add('show');
    if (soundOn) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance('Amazing! Well done! You are a superstar!');
        u.pitch = 1.4; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }
    launchConfetti();
}
function closeCelebration() {
    document.getElementById('celebOverlay').classList.remove('show');
    if (current < parts.length - 1) { current++; updateScreen(); }
    if (autoPlay) resetAutoTimer();
}

function launchConfetti() {
    const cols = ['#FF6B6B','#FFC300','#2ECC71','#3498DB','#9B59B6','#fff','#fbbf24','#f472b6','#FB923C'];
    for (let i = 0; i < 80; i++) {
        const c = document.createElement('div');
        const size = Math.random() * 16 + 7;
        c.style.cssText = `position:fixed;width:${size}px;height:${size}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'4px'};left:${Math.random()*100}vw;top:-24px;z-index:300;animation:confettiFall ${Math.random()*2.2+1.8}s ease ${Math.random()*.8}s forwards;pointer-events:none;`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
    }
}

updateDots();
updateScreen(false);
setTimeout(speakPart, 900);
</script>
</body>
</html>
