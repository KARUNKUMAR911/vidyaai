<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಸಂಖ್ಯೆಗಳು - LKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&family=Poppins:wght@600;700&display=swap');

  :root {
    --bg: #0d0d2b;
    --topbar: #1a1a40;
    --card-glow: rgba(255,255,255,0.06);
    --accent1: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --accent4: #4d96ff;
    --accent5: #ff6fd8;
    --accent6: #a29bfe;
    --text-light: #f0f0ff;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text-light);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(77,150,255,0.12) 0%, transparent 50%),
      radial-gradient(circle at 85% 75%, rgba(255,107,216,0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(107,203,119,0.06) 0%, transparent 60%);
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--topbar);
    border-bottom: 2px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 10px;
    color: white;
    padding: 8px 14px;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }

  .topbar-title {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ffd93d, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sound-btn {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: white;
    padding: 8px 16px;
    font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.55; }
  .sound-icon { font-size: 1.1rem; }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 36px 20px 20px;
  }
  .hero-emoji { font-size: 3.2rem; animation: bounce 2s infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .hero h1 {
    font-size: 2.4rem;
    font-weight: 800;
    margin-top: 8px;
    background: linear-gradient(135deg, #ffd93d 30%, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    font-size: 1rem;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 18px;
    padding: 24px 24px 48px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* 20 color combos cycling */
  .card { --c1: #ff6b6b; --c2: #ff9e6b; }
  .card:nth-child(2)  { --c1: #ffd93d; --c2: #ffb347; }
  .card:nth-child(3)  { --c1: #6bcb77; --c2: #00c9a7; }
  .card:nth-child(4)  { --c1: #4d96ff; --c2: #6bb5ff; }
  .card:nth-child(5)  { --c1: #ff6fd8; --c2: #c77dff; }
  .card:nth-child(6)  { --c1: #a29bfe; --c2: #74b9ff; }
  .card:nth-child(7)  { --c1: #fd79a8; --c2: #ff6b6b; }
  .card:nth-child(8)  { --c1: #00cec9; --c2: #6bcb77; }
  .card:nth-child(9)  { --c1: #fdcb6e; --c2: #e17055; }
  .card:nth-child(10) { --c1: #55efc4; --c2: #00b894; }
  .card:nth-child(11) { --c1: #ff7675; --c2: #fd79a8; }
  .card:nth-child(12) { --c1: #a29bfe; --c2: #6c5ce7; }
  .card:nth-child(13) { --c1: #74b9ff; --c2: #0984e3; }
  .card:nth-child(14) { --c1: #ffeaa7; --c2: #fdcb6e; }
  .card:nth-child(15) { --c1: #81ecec; --c2: #00cec9; }
  .card:nth-child(16) { --c1: #fab1a0; --c2: #e17055; }
  .card:nth-child(17) { --c1: #dfe6e9; --c2: #b2bec3; }
  .card:nth-child(18) { --c1: #fd79a8; --c2: #e84393; }
  .card:nth-child(19) { --c1: #55efc4; --c2: #00b894; }
  .card:nth-child(20) { --c1: #ffd93d; --c2: #ff6b6b; }

  .card {
    background: linear-gradient(145deg, var(--c1), var(--c2));
    border-radius: 20px;
    padding: 22px 12px 18px;
    text-align: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    transition: transform 0.18s, box-shadow 0.18s;
    animation: popIn 0.4s both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  .card:nth-child(1)  { animation-delay: 0.02s; }
  .card:nth-child(2)  { animation-delay: 0.04s; }
  .card:nth-child(3)  { animation-delay: 0.06s; }
  .card:nth-child(4)  { animation-delay: 0.08s; }
  .card:nth-child(5)  { animation-delay: 0.10s; }
  .card:nth-child(6)  { animation-delay: 0.12s; }
  .card:nth-child(7)  { animation-delay: 0.14s; }
  .card:nth-child(8)  { animation-delay: 0.16s; }
  .card:nth-child(9)  { animation-delay: 0.18s; }
  .card:nth-child(10) { animation-delay: 0.20s; }
  .card:nth-child(11) { animation-delay: 0.22s; }
  .card:nth-child(12) { animation-delay: 0.24s; }
  .card:nth-child(13) { animation-delay: 0.26s; }
  .card:nth-child(14) { animation-delay: 0.28s; }
  .card:nth-child(15) { animation-delay: 0.30s; }
  .card:nth-child(16) { animation-delay: 0.32s; }
  .card:nth-child(17) { animation-delay: 0.34s; }
  .card:nth-child(18) { animation-delay: 0.36s; }
  .card:nth-child(19) { animation-delay: 0.38s; }
  .card:nth-child(20) { animation-delay: 0.40s; }

  .card::before {
    content: '';
    position: absolute;
    top: -30%; left: -30%;
    width: 60%; height: 60%;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    pointer-events: none;
  }

  .card:hover {
    transform: translateY(-6px) scale(1.04);
    box-shadow: 0 16px 40px rgba(0,0,0,0.45);
  }

  .card:active { transform: scale(0.96); }

  .card.playing {
    animation: pulse 0.5s ease;
  }
  @keyframes pulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  .card-numeral {
    font-size: 2.8rem;
    font-weight: 800;
    color: rgba(0,0,0,0.75);
    line-height: 1;
    text-shadow: 0 2px 6px rgba(255,255,255,0.3);
  }

  .card-divider {
    width: 40px;
    height: 3px;
    background: rgba(0,0,0,0.2);
    border-radius: 2px;
    margin: 8px auto;
  }

  .card-word {
    font-size: 1.05rem;
    font-weight: 700;
    color: rgba(0,0,0,0.8);
    line-height: 1.2;
  }

  .card-arabic {
    font-size: 0.78rem;
    font-weight: 600;
    color: rgba(0,0,0,0.5);
    margin-top: 4px;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 16px;
    color: rgba(255,255,255,0.25);
    font-size: 0.8rem;
  }

  /* ── ANDROID TTS NOTICE ── */
  .tts-notice {
    background: rgba(255,209,61,0.12);
    border: 1px solid rgba(255,209,61,0.3);
    border-radius: 14px;
    margin: 0 24px 8px;
    padding: 12px 18px;
    font-size: 0.82rem;
    color: rgba(255,209,61,0.85);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }
  .tts-notice span { flex-shrink: 0; font-size: 1.1rem; }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px 14px 40px; }
    .card-numeral { font-size: 2rem; }
    .card-word { font-size: 0.9rem; }
    .hero h1 { font-size: 1.8rem; }
    .topbar-title { font-size: 1.05rem; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="/class/lkg/kannada" class="back-btn">←</a>
    <span class="topbar-title">ಸಂಖ್ಯೆಗಳು</span>
  </div>
  <div class="topbar-right">
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
      <span class="sound-icon" id="soundIcon">🔊</span>
      <span id="soundLabel">ಧ್ವನಿ ಆನ್</span>
    </button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-emoji">🔢</div>
  <h1>ಸಂಖ್ಯೆಗಳು</h1>
  <p>Numbers ೧ – ೨೦ • ಕಾರ್ಡ್ ಒತ್ತಿ ಕೇಳಿ!</p>
</div>

<!-- TTS NOTICE -->
<div class="tts-notice">
  <span>📱</span>
  <span>ಧ್ವನಿ ಕೇಳಲು Android Text-to-Speech ಮತ್ತು Kannada ಭಾಷೆ ಅನ್ನು Settings → Accessibility → TTS ನಲ್ಲಿ ಸ್ಥಾಪಿಸಿ.</span>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<div class="footer">VidyaAI • LKG ಕನ್ನಡ</div>

<script>
const numbers = [
  { numeral: '೧', word: 'ಒಂದು',    arabic: '1' },
  { numeral: '೨', word: 'ಎರಡು',    arabic: '2' },
  { numeral: '೩', word: 'ಮೂರು',    arabic: '3' },
  { numeral: '೪', word: 'ನಾಲ್ಕು',   arabic: '4' },
  { numeral: '೫', word: 'ಐದು',     arabic: '5' },
  { numeral: '೬', word: 'ಆರು',     arabic: '6' },
  { numeral: '೭', word: 'ಏಳು',     arabic: '7' },
  { numeral: '೮', word: 'ಎಂಟು',    arabic: '8' },
  { numeral: '೯', word: 'ಒಂಬತ್ತು', arabic: '9' },
  { numeral: '೧೦', word: 'ಹತ್ತು',   arabic: '10' },
  { numeral: '೧೧', word: 'ಹನ್ನೊಂದು', arabic: '11' },
  { numeral: '೧೨', word: 'ಹನ್ನೆರಡು', arabic: '12' },
  { numeral: '೧೩', word: 'ಹದಿಮೂರು', arabic: '13' },
  { numeral: '೧೪', word: 'ಹದಿನಾಲ್ಕು', arabic: '14' },
  { numeral: '೧೫', word: 'ಹದಿನೈದು', arabic: '15' },
  { numeral: '೧೬', word: 'ಹದಿನಾರು', arabic: '16' },
  { numeral: '೧೭', word: 'ಹದಿನೇಳು', arabic: '17' },
  { numeral: '೧೮', word: 'ಹದಿನೆಂಟು', arabic: '18' },
  { numeral: '೧೯', word: 'ಹತ್ತೊಂಬತ್ತು', arabic: '19' },
  { numeral: '೨೦', word: 'ಇಪ್ಪತ್ತು', arabic: '20' },
];

let soundOn = true;

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? 'ಧ್ವನಿ ಆನ್' : 'ಧ್ವನಿ ಆಫ್';
  document.getElementById('soundToggle').classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN';
  u.rate = 0.85;
  u.pitch = 1.1;
  // No English fallback
  const voices = window.speechSynthesis.getVoices();
  const knVoice = voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn'));
  if (knVoice) u.voice = knVoice;
  else { return; } // no fallback — Kannada only
  window.speechSynthesis.speak(u);
}

function buildGrid() {
  const grid = document.getElementById('grid');
  numbers.forEach((n, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-numeral">${n.numeral}</div>
      <div class="card-divider"></div>
      <div class="card-word">${n.word}</div>
      <div class="card-arabic">${n.arabic}</div>
    `;
    card.addEventListener('click', () => {
      card.classList.remove('playing');
      void card.offsetWidth;
      card.classList.add('playing');
      speak(n.word);
      setTimeout(() => card.classList.remove('playing'), 500);
    });
    grid.appendChild(card);
  });
}

// Load voices on mobile (async)
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}

buildGrid();
</script>
</body>
</html>
