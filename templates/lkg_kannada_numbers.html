<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಸಂಖ್ಯೆಗಳು - LKG ಕನ್ನಡ</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@500;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --radius: 28px; --top-h: 70px; }

body {
  font-family: 'Baloo Tamma 2', cursive;
  background: #f0f4ff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--top-h);
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 300;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
.topbar-title {
  font-size: 1.55rem; font-weight: 900;
  background: linear-gradient(90deg, #FFD93D, #FF6B35, #FF6B9D);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.top-right { display: flex; align-items: center; gap: 10px; }
.score-pill {
  background: #FFD93D; color: #1a1a2e;
  font-weight: 900; font-size: 1rem;
  padding: 7px 18px; border-radius: 50px;
  box-shadow: 0 4px 14px rgba(255,217,61,0.45);
  white-space: nowrap;
}
.sound-btn {
  background: rgba(255,255,255,0.13);
  border: 2px solid rgba(255,255,255,0.22);
  color: white; border-radius: 12px;
  padding: 8px 14px; font-size: 1.2rem;
  cursor: pointer; font-family: inherit;
  transition: background 0.2s;
}
.sound-btn:hover { background: rgba(255,255,255,0.22); }
.sound-btn.off { opacity: 0.4; }

/* ── HERO ── */
.panel-hero {
  padding: 30px 24px 18px; text-align: center; position: relative; overflow: hidden;
  background: linear-gradient(135deg, #fff9db, #e8f4ff);
}
.panel-hero h2 { font-size: 2.8rem; font-weight: 900; color: #1a1a2e; line-height: 1.1; margin-bottom: 5px; }
.panel-hero p  { font-size: 1.05rem; font-weight: 700; color: #555; opacity: 0.7; margin-bottom: 13px; }
.tap-hint {
  display: inline-flex; align-items: center; gap: 7px;
  border: 2.5px dashed #1a1a2e; border-radius: 50px;
  padding: 7px 20px; font-size: 0.98rem; font-weight: 800; opacity: 0.6; color: #1a1a2e;
  animation: wag 2s ease-in-out infinite;
}
@keyframes wag { 0%,100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
.hf {
  position: absolute; font-size: 3.5rem;
  animation: fy 4s ease-in-out infinite; pointer-events: none; opacity: 0.12;
}
@keyframes fy { 0%,100%{transform:translateY(0) rotate(-8deg);} 50%{transform:translateY(-18px) rotate(8deg);} }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px; padding: 22px 26px 60px;
  max-width: 1300px; margin: 0 auto;
}

/* ── CARD ── */
.card {
  border-radius: var(--radius); background: white;
  box-shadow: 0 6px 28px rgba(0,0,0,0.09);
  cursor: pointer; overflow: hidden;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  border: 3.5px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.5) rotate(-6deg); }
  to   { opacity:1; transform:scale(1); }
}
.card:hover { transform:translateY(-12px) scale(1.04) rotate(.8deg); box-shadow:0 24px 56px rgba(0,0,0,0.15); }
.card:active { transform:scale(0.91); }
.card.playing { animation: cb .5s cubic-bezier(.34,1.56,.64,1) !important; }
@keyframes cb { 0%{transform:scale(1);} 30%{transform:scale(1.22) rotate(-4deg);} 65%{transform:scale(.94) rotate(2deg);} 100%{transform:scale(1);} }

/* face: big numeral on coloured bg */
.card-face {
  height: 150px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px; position: relative;
}
.card-kannada-num {
  font-size: 3.8rem; font-weight: 900;
  color: rgba(0,0,0,0.75); line-height: 1;
  text-shadow: 0 3px 10px rgba(255,255,255,0.5);
}
.card-arabic-num {
  font-size: 1.1rem; font-weight: 800;
  color: rgba(0,0,0,0.35); line-height: 1;
}
.star-pop {
  position: absolute; top: 8px; right: 12px;
  font-size: 1.6rem; transform: scale(0); opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1); pointer-events: none;
}
.card.playing .star-pop { transform: scale(1) rotate(25deg); opacity: 1; }
.card.learned .star-pop { transform: scale(0.85); opacity: 0.55; }

/* info: Kannada word */
.card-info {
  padding: 14px 12px 18px; text-align: center;
  border-top: 3px solid rgba(0,0,0,0.05);
}
.kn-word { font-size: 1.5rem; font-weight: 900; color: #1a1a2e; line-height: 1.1; }
.en-word { font-size: 0.75rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1.5px; margin-top: 3px; opacity: 0.35; }

/* ── CONFETTI ── */
.cf { position:fixed; border-radius:3px; top:-20px; pointer-events:none; z-index:9999; animation:cff 1.4s ease-in forwards; }
@keyframes cff { to { transform: translateY(110vh) rotate(600deg); opacity:0; } }

/* ── RESPONSIVE ── */
@media (max-width: 580px) {
  .grid { grid-template-columns: repeat(3,1fr); gap:11px; padding:12px 12px 44px; }
  .card-face { height:105px; }
  .card-kannada-num { font-size: 2.6rem; }
  .kn-word { font-size:1.1rem; }
  .panel-hero h2 { font-size:2rem; }
}
@media (min-width:900px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(175px,1fr)); }
  .card-face { height:165px; }
  .card-kannada-num { font-size: 4.4rem; }
  .kn-word { font-size:1.7rem; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">🔢 ಸಂಖ್ಯೆಗಳು</div>
  <div class="top-right">
    <div class="score-pill" id="scorePill">⭐ 0 / 20</div>
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
  </div>
</div>

<!-- HERO -->
<div class="panel-hero">
  <span class="hf" style="top:8px;left:4%;">➕</span>
  <span class="hf" style="top:18px;right:6%;animation-delay:-2s;">🔢</span>
  <h2>🔢 ಸಂಖ್ಯೆಗಳು</h2>
  <p>Numbers ೧ – ೨೦</p>
  <span class="tap-hint">👆 ಕಾರ್ಡ್ ಒತ್ತಿ ಹೆಸರು ಕೇಳಿ!</span>
</div>

<div class="grid" id="grid"></div>

<script>
// 20 distinct pastel bg + vivid border + pill color combos
const COLORS = [
  { bg:'#fff8e1', border:'#FFC107', pill:'#F57F17' },  //  1 warm yellow
  { bg:'#fce4ec', border:'#E91E63', pill:'#880E4F' },  //  2 pink
  { bg:'#e8f5e9', border:'#4CAF50', pill:'#1B5E20' },  //  3 green
  { bg:'#e3f2fd', border:'#2196F3', pill:'#0D47A1' },  //  4 blue
  { bg:'#f3e5f5', border:'#9C27B0', pill:'#6A1B9A' },  //  5 purple
  { bg:'#e0f7fa', border:'#00BCD4', pill:'#006064' },  //  6 cyan
  { bg:'#fff3e0', border:'#FF9800', pill:'#E65100' },  //  7 orange
  { bg:'#fbe9e7', border:'#FF5722', pill:'#BF360C' },  //  8 deep orange
  { bg:'#f1f8e9', border:'#8BC34A', pill:'#33691E' },  //  9 light green
  { bg:'#e8eaf6', border:'#3F51B5', pill:'#1A237E' },  // 10 indigo
  { bg:'#fff9c4', border:'#F9A825', pill:'#E65100' },  // 11 amber
  { bg:'#fce4ec', border:'#F06292', pill:'#880E4F' },  // 12 light pink
  { bg:'#e1f5fe', border:'#03A9F4', pill:'#01579B' },  // 13 light blue
  { bg:'#e8f5e9', border:'#66BB6A', pill:'#2E7D32' },  // 14 medium green
  { bg:'#ede7f6', border:'#7E57C2', pill:'#311B92' },  // 15 deep purple
  { bg:'#efebe9', border:'#795548', pill:'#4E342E' },  // 16 brown
  { bg:'#f8bbd0', border:'#E91E63', pill:'#880E4F' },  // 17 rose
  { bg:'#b3e5fc', border:'#0288D1', pill:'#01579B' },  // 18 sky blue
  { bg:'#dcedc8', border:'#7CB342', pill:'#33691E' },  // 19 pale green
  { bg:'#ffe0b2', border:'#FB8C00', pill:'#E65100' },  // 20 peach
];

const numbers = [
  { numeral:'೧',  word:'ಒಂದು',       arabic:'1'  },
  { numeral:'೨',  word:'ಎರಡು',       arabic:'2'  },
  { numeral:'೩',  word:'ಮೂರು',       arabic:'3'  },
  { numeral:'೪',  word:'ನಾಲ್ಕು',      arabic:'4'  },
  { numeral:'೫',  word:'ಐದು',        arabic:'5'  },
  { numeral:'೬',  word:'ಆರು',        arabic:'6'  },
  { numeral:'೭',  word:'ಏಳು',        arabic:'7'  },
  { numeral:'೮',  word:'ಎಂಟು',       arabic:'8'  },
  { numeral:'೯',  word:'ಒಂಬತ್ತು',    arabic:'9'  },
  { numeral:'೧೦', word:'ಹತ್ತು',      arabic:'10' },
  { numeral:'೧೧', word:'ಹನ್ನೊಂದು',   arabic:'11' },
  { numeral:'೧೨', word:'ಹನ್ನೆರಡು',   arabic:'12' },
  { numeral:'೧೩', word:'ಹದಿಮೂರು',   arabic:'13' },
  { numeral:'೧೪', word:'ಹದಿನಾಲ್ಕು',  arabic:'14' },
  { numeral:'೧೫', word:'ಹದಿನೈದು',   arabic:'15' },
  { numeral:'೧೬', word:'ಹದಿನಾರು',   arabic:'16' },
  { numeral:'೧೭', word:'ಹದಿನೇಳು',   arabic:'17' },
  { numeral:'೧೮', word:'ಹದಿನೆಂಟು',  arabic:'18' },
  { numeral:'೧೯', word:'ಹತ್ತೊಂಬತ್ತು',arabic:'19' },
  { numeral:'೨೦', word:'ಇಪ್ಪತ್ತು',   arabic:'20' },
];

const TOTAL = numbers.length;
let soundOn = true;
const learned = new Set();

function toggleSound() {
  soundOn = !soundOn;
  const b = document.getElementById('soundBtn');
  b.textContent = soundOn ? '🔊' : '🔇';
  b.classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='kn-IN'; u.rate=0.82; u.pitch=1.1;
  const v = window.speechSynthesis.getVoices().find(x=>x.lang==='kn-IN'||x.lang.startsWith('kn'));
  if (!v) return;
  u.voice = v;
  window.speechSynthesis.speak(u);
}

const CC = ['#FFD93D','#FF6B35','#06D6A0','#FF6B9D','#9B5DE5','#118AB2','#43e97b'];
function confetti(x,y) {
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='cf';
    el.style.cssText=`left:${x+(Math.random()-.5)*160}px;background:${CC[i%CC.length]};animation-duration:${.9+Math.random()*.9}s;animation-delay:${Math.random()*.2}s;width:${6+Math.random()*10}px;height:${8+Math.random()*14}px;transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2200);
  }
}

function buildGrid() {
  const grid = document.getElementById('grid');
  numbers.forEach((n, i) => {
    const c = COLORS[i];
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i * 0.05) + 's';
    card.style.borderColor = c.border;
    card.innerHTML = `
      <div class="card-face" style="background:${c.bg};">
        <span class="star-pop">⭐</span>
        <div class="card-kannada-num">${n.numeral}</div>
        <div class="card-arabic-num">${n.arabic}</div>
      </div>
      <div class="card-info">
        <div class="kn-word">${n.word}</div>
        <div class="en-word" style="color:${c.border};">${n.arabic} &nbsp;·&nbsp; ${n.numeral}</div>
      </div>`;
    card.addEventListener('click', e => {
      card.classList.remove('playing');
      void card.offsetWidth;
      card.classList.add('playing');
      speak(n.word);
      setTimeout(() => card.classList.remove('playing'), 520);
      if (!learned.has(n.word)) {
        learned.add(n.word);
        card.classList.add('learned');
        document.getElementById('scorePill').textContent = `⭐ ${learned.size} / ${TOTAL}`;
        const r = card.getBoundingClientRect();
        confetti(r.left + r.width/2, r.top + r.height/2);
      }
    });
    grid.appendChild(card);
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
buildGrid();
</script>
</body>
</html>
