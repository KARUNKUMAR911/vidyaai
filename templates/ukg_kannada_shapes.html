<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಆಕಾರಗಳು - UKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&display=swap');

  :root { --bg: #0f1923; --topbar: #141e2b; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg); min-height: 100vh; color: #f0f0ff;
    background-image:
      radial-gradient(circle at 10% 30%, rgba(77,150,255,0.1) 0%, transparent 50%),
      radial-gradient(circle at 90% 70%, rgba(162,155,254,0.1) 0%, transparent 50%);
  }

  /* TOPBAR */
  .topbar {
    background: var(--topbar); border-bottom: 2px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 64px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    background: rgba(255,255,255,0.1); border: none; border-radius: 10px;
    color: white; padding: 8px 14px; font-size: 18px; cursor: pointer;
    text-decoration: none; transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .topbar-title {
    font-size: 1.3rem; font-weight: 800;
    background: linear-gradient(90deg, #a29bfe, #6bcb77);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sound-btn {
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: white; padding: 8px 16px; font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.5; }

  /* HERO */
  .hero { text-align: center; padding: 28px 20px 12px; }
  .hero-emoji { font-size: 3rem; display: inline-block; animation: float 2.5s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-12px) rotate(15deg)} }
  .hero h1 {
    font-size: 2.2rem; font-weight: 800; margin-top: 8px;
    background: linear-gradient(135deg, #a29bfe, #4d96ff, #6bcb77);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero p { font-size: 0.92rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

  /* TABS */
  .tabs {
    display: flex; gap: 10px; justify-content: center;
    padding: 12px 20px 4px; max-width: 1000px; margin: 0 auto;
  }
  .tab {
    flex: 1; max-width: 220px; padding: 10px 0;
    border-radius: 14px; font-family: 'Baloo Tamma 2', cursive;
    font-size: 0.92rem; font-weight: 700; cursor: pointer;
    border: none; transition: all 0.2s; text-align: center;
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5);
  }
  .tab.active-2d {
    background: linear-gradient(135deg, #a29bfe, #6c5ce7);
    color: white; box-shadow: 0 4px 18px rgba(162,155,254,0.4);
  }
  .tab.active-3d {
    background: linear-gradient(135deg, #4d96ff, #0984e3);
    color: white; box-shadow: 0 4px 18px rgba(77,150,255,0.4);
  }
  .tab:hover:not(.active-2d):not(.active-3d) { background: rgba(255,255,255,0.13); color: white; }

  /* TTS NOTICE */
  .tts-notice {
    background: rgba(255,209,61,0.1); border: 1px solid rgba(255,209,61,0.28);
    border-radius: 14px; padding: 10px 16px; font-size: 0.8rem;
    color: rgba(255,209,61,0.85); display: flex; gap: 8px;
    max-width: 1000px; margin: 12px auto 4px;
  }

  /* GRID */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 18px; padding: 16px 24px 52px; max-width: 1000px; margin: 0 auto;
  }

  .card {
    background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.08);
    border-radius: 24px; padding: 24px 14px 18px; text-align: center;
    cursor: pointer; overflow: hidden; position: relative;
    box-shadow: 0 8px 28px rgba(0,0,0,0.4);
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    animation: popIn 0.45s both;
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.65) rotate(-5deg)} to{opacity:1;transform:scale(1) rotate(0)} }
  .card:hover { transform: translateY(-8px) scale(1.04); box-shadow: 0 20px 48px rgba(0,0,0,0.5); border-color: var(--accent,rgba(255,255,255,0.3)); }
  .card:active { transform: scale(0.94); }
  .card.playing { animation: spulse 0.5s ease !important; }
  @keyframes spulse { 0%{transform:scale(1)} 40%{transform:scale(1.13)} 100%{transform:scale(1)} }

  .card:nth-child(1)  { animation-delay:0.02s; --accent:#ff6b6b; }
  .card:nth-child(2)  { animation-delay:0.05s; --accent:#4d96ff; }
  .card:nth-child(3)  { animation-delay:0.08s; --accent:#ffd93d; }
  .card:nth-child(4)  { animation-delay:0.11s; --accent:#6bcb77; }
  .card:nth-child(5)  { animation-delay:0.14s; --accent:#ff6fd8; }
  .card:nth-child(6)  { animation-delay:0.17s; --accent:#a29bfe; }
  .card:nth-child(7)  { animation-delay:0.20s; --accent:#00cec9; }
  .card:nth-child(8)  { animation-delay:0.23s; --accent:#fdcb6e; }
  .card:nth-child(9)  { animation-delay:0.26s; --accent:#fd79a8; }
  .card:nth-child(10) { animation-delay:0.29s; --accent:#55efc4; }
  .card:nth-child(11) { animation-delay:0.32s; --accent:#e17055; }
  .card:nth-child(12) { animation-delay:0.35s; --accent:#74b9ff; }

  .shape-wrap { width: 86px; height: 86px; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
  .shape-wrap svg { width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)); }

  .card-kn { font-size: 1.1rem; font-weight: 800; color: #fff; line-height: 1.2; }
  .card-en { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.42); margin-top: 2px; font-style: italic; }
  .card-fact { font-size: 0.7rem; color: rgba(255,255,255,0.28); margin-top: 5px; line-height: 1.3; }

  .footer { text-align: center; padding: 14px; color: rgba(255,255,255,0.18); font-size: 0.78rem; }

  @media(max-width:480px){
    .grid { grid-template-columns: repeat(2,1fr); gap: 14px; padding: 12px 14px 40px; }
    .shape-wrap { width: 68px; height: 68px; }
    .card-kn { font-size: 0.95rem; }
    .hero h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/class/ukg/kannada" class="back-btn">←</a>
    <span class="topbar-title">ಆಕಾರಗಳು</span>
  </div>
  <div class="topbar-right">
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
      <span id="soundIcon">🔊</span>
      <span id="soundLabel">ಧ್ವನಿ ಆನ್</span>
    </button>
  </div>
</div>

<div class="hero">
  <div class="hero-emoji">🔷</div>
  <h1>ಆಕಾರಗಳು</h1>
  <p>2D ಮತ್ತು 3D ಆಕಾರಗಳು • ಕಾರ್ಡ್ ಒತ್ತಿ ಕೇಳಿ!</p>
</div>

<div class="tabs">
  <button class="tab active-2d" id="tab-2d" onclick="switchTab('2d')">⬛ 2D ಆಕಾರಗಳು</button>
  <button class="tab" id="tab-3d" onclick="switchTab('3d')">📦 3D ಆಕಾರಗಳು</button>
</div>

<div class="tts-notice">
  <span>📱</span>
  <span>ಧ್ವನಿ ಕೇಳಲು Android TTS ನಲ್ಲಿ Kannada ಭಾಷೆ ಸ್ಥಾಪಿಸಿ.</span>
</div>

<div class="grid" id="grid"></div>
<div class="footer">VidyaAI • UKG ಕನ್ನಡ</div>

<script>
const shapes2d = [
  { kn:'ವೃತ್ತ',      en:'Circle',    fact:'ಯಾವುದೇ ಕೋನವಿಲ್ಲ', color:'#ff6b6b',
    svg:`<circle cx="45" cy="45" r="38" fill="#ff6b6b" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>` },
  { kn:'ಚೌಕ',        en:'Square',    fact:'4 ಸಮ ಬದಿಗಳು, 4 ಕೋನಗಳು', color:'#4d96ff',
    svg:`<rect x="8" y="8" width="74" height="74" rx="5" fill="#4d96ff" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>` },
  { kn:'ತ್ರಿಕೋಣ',    en:'Triangle',  fact:'3 ಬದಿಗಳು, 3 ಕೋನಗಳು', color:'#ffd93d',
    svg:`<polygon points="45,5 88,82 2,82" fill="#ffd93d" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>` },
  { kn:'ಆಯತ',        en:'Rectangle', fact:'2 ಉದ್ದ, 2 ಅಗಲ ಬದಿಗಳು', color:'#6bcb77',
    svg:`<rect x="4" y="20" width="82" height="50" rx="5" fill="#6bcb77" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>` },
  { kn:'ರೊಂಬಸ್',     en:'Diamond',   fact:'4 ಸಮ ಬದಿಗಳು', color:'#ff6fd8',
    svg:`<polygon points="45,4 86,45 45,86 4,45" fill="#ff6fd8" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>` },
  { kn:'ಅಂಡಾಕಾರ',   en:'Oval',      fact:'ವೃತ್ತದ ಉದ್ದ ರೂಪ', color:'#a29bfe',
    svg:`<ellipse cx="45" cy="45" rx="42" ry="26" fill="#a29bfe" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>` },
  { kn:'ಐದು ಕೋನ',   en:'Pentagon',  fact:'5 ಬದಿಗಳು, 5 ಕೋನಗಳು', color:'#00cec9',
    svg:`<polygon points="45,4 86,34 70,82 20,82 4,34" fill="#00cec9" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>` },
  { kn:'ಆರು ಕೋನ',   en:'Hexagon',   fact:'6 ಬದಿಗಳು, 6 ಕೋನಗಳು', color:'#fdcb6e',
    svg:`<polygon points="45,4 82,24 82,66 45,86 8,66 8,24" fill="#fdcb6e" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>` },
  { kn:'ಅಷ್ಟಕೋನ',   en:'Octagon',   fact:'8 ಬದಿಗಳು, 8 ಕೋನಗಳು', color:'#fd79a8',
    svg:`<polygon points="28,4 62,4 86,28 86,62 62,86 28,86 4,62 4,28" fill="#fd79a8" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>` },
  { kn:'ನಕ್ಷತ್ರ',     en:'Star',      fact:'5 ಚೂಪು ತುದಿಗಳು', color:'#e17055',
    svg:`<polygon points="45,4 54,34 86,34 61,54 70,84 45,66 20,84 29,54 4,34 36,34" fill="#e17055" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/>` },
  { kn:'ಹೃದಯ',       en:'Heart',     fact:'ಪ್ರೀತಿಯ ಸಂಕೇತ', color:'#e84393',
    svg:`<path d="M45 80 C10 55 5 20 25 12 C35 8 45 18 45 18 C45 18 55 8 65 12 C85 20 80 55 45 80Z" fill="#e84393" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/>` },
  { kn:'ಅರ್ಧ ವೃತ್ತ',  en:'Semicircle',fact:'ವೃತ್ತದ ಅರ್ಧ ಭಾಗ', color:'#55efc4',
    svg:`<path d="M7 45 A38 38 0 0 1 83 45 Z" fill="#55efc4" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/><line x1="7" y1="45" x2="83" y2="45" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>` },
];

const shapes3d = [
  { kn:'ಗೋಳ',        en:'Sphere',    fact:'ಚೆಂಡಿನ ಆಕಾರ', color:'#ff6b6b',
    svg:`<defs><radialGradient id="g1" cx="35%" cy="35%"><stop offset="0%" stop-color="#ff9e9e"/><stop offset="100%" stop-color="#c0392b"/></radialGradient></defs><circle cx="45" cy="45" r="38" fill="url(#g1)" stroke="#fff" stroke-width="2" stroke-opacity="0.2"/><ellipse cx="38" cy="34" rx="10" ry="6" fill="rgba(255,255,255,0.25)" transform="rotate(-30 38 34)"/>` },
  { kn:'ಘನ',         en:'Cube',      fact:'6 ಚೌಕ ಮುಖಗಳು', color:'#4d96ff',
    svg:`<polygon points="20,60 20,20 55,8 55,48" fill="#2980b9" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/><polygon points="20,60 55,48 80,60 45,72" fill="#4d96ff" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/><polygon points="55,8 80,20 80,60 55,48" fill="#1a6fa0" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/>` },
  { kn:'ಶಂಕು',       en:'Cone',      fact:'ತ್ರಿಕೋಣ + ವೃತ್ತ', color:'#ffd93d',
    svg:`<defs><radialGradient id="g2" cx="50%" cy="100%"><stop offset="0%" stop-color="#ffe566"/><stop offset="100%" stop-color="#e6a800"/></radialGradient></defs><ellipse cx="45" cy="72" rx="32" ry="10" fill="#c8a000" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/><polygon points="45,5 13,72 77,72" fill="url(#g2)" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/>` },
  { kn:'ಸಿಲಿಂಡರ್',   en:'Cylinder',  fact:'2 ವೃತ್ತ + 1 ಆಯತ', color:'#6bcb77',
    svg:`<defs><linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#1e8449"/><stop offset="50%" stop-color="#6bcb77"/><stop offset="100%" stop-color="#1e8449"/></linearGradient></defs><rect x="12" y="28" width="66" height="44" fill="url(#g3)" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/><ellipse cx="45" cy="28" rx="33" ry="10" fill="#27ae60" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/><ellipse cx="45" cy="72" rx="33" ry="10" fill="#1e8449" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/>` },
  { kn:'ಆಯತಾಕಾರ ಘನ',en:'Cuboid',    fact:'6 ಆಯತ ಮುಖಗಳು', color:'#a29bfe',
    svg:`<polygon points="14,65 14,28 50,15 50,52" fill="#6c5ce7" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/><polygon points="14,65 50,52 82,65 46,78" fill="#a29bfe" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/><polygon points="50,15 82,28 82,65 50,52" fill="#5a4fcf" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/>` },
  { kn:'ಪಿರಮಿಡ್',    en:'Pyramid',   fact:'4 ತ್ರಿಕೋಣ ಮುಖಗಳು', color:'#fdcb6e',
    svg:`<polygon points="45,5 82,75 8,75" fill="#fdcb6e" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/><polygon points="45,5 82,75 68,85 32,85 8,75" fill="#e0a800" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/>` },
];

let soundOn = true;
let activeTab = '2d';

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? 'ಧ್ವನಿ ಆನ್' : 'ಧ್ವನಿ ಆಫ್';
  document.getElementById('soundToggle').classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN'; u.rate = 0.85; u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const kn = voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn'));
  if (!kn) return;
  u.voice = kn;
  window.speechSynthesis.speak(u);
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-2d').className = 'tab' + (tab==='2d' ? ' active-2d' : '');
  document.getElementById('tab-3d').className = 'tab' + (tab==='3d' ? ' active-3d' : '');
  buildGrid();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const data = activeTab === '2d' ? shapes2d : shapes3d;
  data.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--accent', s.color);
    card.style.animationDelay = (i * 0.03 + 0.02) + 's';
    card.innerHTML = `
      <div class="shape-wrap"><svg viewBox="0 0 90 90">${s.svg}</svg></div>
      <div class="card-kn">${s.kn}</div>
      <div class="card-en">${s.en}</div>
      <div class="card-fact">${s.fact}</div>
    `;
    card.addEventListener('click', () => {
      card.classList.remove('playing'); void card.offsetWidth; card.classList.add('playing');
      speak(s.kn);
      setTimeout(() => card.classList.remove('playing'), 500);
    });
    grid.appendChild(card);
  });
}

if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = () => {}; window.speechSynthesis.getVoices(); }
buildGrid();
</script>
</body>
</html>
