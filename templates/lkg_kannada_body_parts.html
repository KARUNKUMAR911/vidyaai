<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ದೇಹದ ಭಾಗಗಳು - LKG ಕನ್ನಡ</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@500;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --radius: 30px; --top-h: 70px; }

body {
  font-family: 'Baloo Tamma 2', cursive;
  background: #f0f4ff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--top-h);
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 300;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
.topbar-title {
  font-size: 1.55rem; font-weight: 900;
  background: linear-gradient(90deg, #FF6B9D, #a29bfe, #FFD93D);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.top-right { display: flex; align-items: center; gap: 10px; }
.score-pill {
  background: #FFD93D; color: #1a1a2e;
  font-weight: 900; font-size: 1rem;
  padding: 7px 18px; border-radius: 50px;
  box-shadow: 0 4px 14px rgba(255,217,61,0.45);
  white-space: nowrap;
}
.sound-btn {
  background: rgba(255,255,255,0.13);
  border: 2px solid rgba(255,255,255,0.22);
  color: white; border-radius: 12px;
  padding: 8px 14px; font-size: 1.2rem;
  cursor: pointer; font-family: inherit;
  transition: background 0.2s;
}
.sound-btn:hover { background: rgba(255,255,255,0.22); }
.sound-btn.off { opacity: 0.4; }

/* ── TAB NAV ── */
.tab-nav {
  display: flex;
  background: #1a1a2e;
  padding: 0 12px 14px;
  gap: 8px;
  overflow-x: auto; scrollbar-width: none;
  position: sticky; top: var(--top-h); z-index: 200;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 10px 20px; border-radius: 18px; border: none;
  cursor: pointer; font-family: 'Baloo Tamma 2', cursive;
  font-weight: 800; color: rgba(255,255,255,0.45);
  background: rgba(255,255,255,0.07);
  transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; position: relative;
}
.tab-btn .t-icon { font-size: 1.7rem; line-height: 1; }
.tab-btn .t-kn   { font-size: 0.95rem; }
.tab-btn .t-en   { font-size: 0.68rem; opacity: 0.55; font-weight: 600; }
.tab-btn.active  { color: #1a1a2e; transform: translateY(-3px) scale(1.06); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
.tab-btn[data-t="face"].active   { background: linear-gradient(135deg,#ff9a9e,#fecfef); }
.tab-btn[data-t="upper"].active  { background: linear-gradient(135deg,#a1c4fd,#c2e9fb); }
.tab-btn[data-t="torso"].active  { background: linear-gradient(135deg,#f9d423,#f83600); color:white; }
.tab-btn[data-t="lower"].active  { background: linear-gradient(135deg,#43e97b,#38f9d7); }
.tab-count {
  position: absolute; top: 5px; right: 7px;
  background: rgba(255,255,255,0.22); border-radius: 50px;
  padding: 1px 6px; font-size: 0.62rem; font-weight: 900;
}
.tab-btn.active .tab-count { background: rgba(0,0,0,0.12); }

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── PANEL HERO ── */
.panel-hero {
  padding: 30px 24px 18px; text-align: center; position: relative; overflow: hidden;
}
.panel-hero h2 { font-size: 2.8rem; font-weight: 900; line-height: 1.1; margin-bottom: 5px; }
.panel-hero p  { font-size: 1.05rem; font-weight: 700; opacity: 0.6; margin-bottom: 13px; }
.tap-hint {
  display: inline-flex; align-items: center; gap: 7px;
  border: 2.5px dashed currentColor; border-radius: 50px;
  padding: 7px 20px; font-size: 0.98rem; font-weight: 800; opacity: 0.7;
  animation: wag 2s ease-in-out infinite;
}
@keyframes wag { 0%,100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
.hf {
  position: absolute; font-size: 3.5rem;
  animation: fy 4s ease-in-out infinite; pointer-events: none; opacity: 0.16;
}
@keyframes fy { 0%,100%{transform:translateY(0) rotate(-8deg);} 50%{transform:translateY(-18px) rotate(8deg);} }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 22px; padding: 14px 26px 60px;
  max-width: 1300px; margin: 0 auto;
}

/* ── CARD ── */
.card {
  border-radius: var(--radius); background: white;
  box-shadow: 0 6px 28px rgba(0,0,0,0.09);
  cursor: pointer; overflow: hidden;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  border: 3.5px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.5) rotate(-6deg); }
  to   { opacity:1; transform:scale(1); }
}
.card:hover { transform:translateY(-12px) scale(1.04) rotate(.8deg); box-shadow:0 24px 56px rgba(0,0,0,0.15); }
.card:active { transform:scale(0.91); }
.card.playing { animation: cb .5s cubic-bezier(.34,1.56,.64,1) !important; }
@keyframes cb { 0%{transform:scale(1);} 30%{transform:scale(1.22) rotate(-4deg);} 65%{transform:scale(.94) rotate(2deg);} 100%{transform:scale(1);} }

.card-face {
  height: 160px;
  display: flex; align-items: center; justify-content: center;
  font-size: 5.5rem; position: relative;
}
.star-pop {
  position: absolute; top: 8px; right: 12px;
  font-size: 1.6rem; transform: scale(0); opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1); pointer-events: none;
}
.card.playing .star-pop { transform: scale(1) rotate(25deg); opacity: 1; }
.card.learned .star-pop { transform: scale(0.85); opacity: 0.55; }

.card-info { padding: 15px 12px 20px; text-align: center; border-top: 3px solid rgba(0,0,0,0.05); }
.kn-word { font-size: 1.85rem; font-weight: 900; color: #1a1a2e; line-height: 1.1; }
.en-word { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; opacity: 0.4; }
.sound-pill {
  display: inline-block; margin-top: 9px; border-radius: 50px;
  padding: 5px 16px; font-size: 0.88rem; font-weight: 800; color: white;
}

/* ── CONFETTI ── */
.cf { position:fixed; border-radius:3px; top:-20px; pointer-events:none; z-index:9999; animation:cff 1.4s ease-in forwards; }
@keyframes cff { to { transform: translateY(110vh) rotate(600deg); opacity:0; } }

/* ── RESPONSIVE ── */
@media (max-width: 580px) {
  .grid { grid-template-columns: repeat(2,1fr); gap:13px; padding:10px 12px 44px; }
  .card-face { height:115px; font-size:3.8rem; }
  .kn-word { font-size:1.35rem; }
  .panel-hero h2 { font-size:2rem; }
}
@media (min-width:900px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); }
  .card-face { height:175px; font-size:6rem; }
  .kn-word { font-size:2.1rem; }
}

/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.topbar-title{font-size:clamp(15px,2vw,28px);}
.hero h1{font-size:clamp(22px,3.5vw,52px);}
.hero h2{font-size:clamp(22px,3.5vw,52px);}
.hero p{font-size:clamp(13px,1.6vw,22px);}
.hero{padding:clamp(18px,3vw,48px) clamp(20px,5vw,80px) clamp(44px,6vw,80px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.card{border-radius:clamp(16px,2vw,28px);}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">🫀 ದೇಹದ ಭಾಗಗಳು</div>
  <div class="top-right">
    <div class="score-pill" id="scorePill">⭐ 0 / 18</div>
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
  </div>
</div>

<!-- TAB NAV -->
<nav class="tab-nav">
  <button class="tab-btn active" data-t="face" onclick="switchTab('face',this)">
    <span class="t-icon">😊</span><span class="t-kn">ಮುಖ</span><span class="t-en">Face</span>
    <span class="tab-count" id="cnt-face">0/7</span>
  </button>
  <button class="tab-btn" data-t="upper" onclick="switchTab('upper',this)">
    <span class="t-icon">💪</span><span class="t-kn">ಮೇಲ್ಭಾಗ</span><span class="t-en">Upper Body</span>
    <span class="tab-count" id="cnt-upper">0/5</span>
  </button>
  <button class="tab-btn" data-t="torso" onclick="switchTab('torso',this)">
    <span class="t-icon">🫁</span><span class="t-kn">ಮಧ್ಯಭಾಗ</span><span class="t-en">Torso</span>
    <span class="tab-count" id="cnt-torso">0/3</span>
  </button>
  <button class="tab-btn" data-t="lower" onclick="switchTab('lower',this)">
    <span class="t-icon">🦵</span><span class="t-kn">ಕೆಳಭಾಗ</span><span class="t-en">Lower Body</span>
    <span class="tab-count" id="cnt-lower">0/3</span>
  </button>
</nav>

<!-- PANELS -->
<div class="panel active" id="panel-face">
  <div class="panel-hero" style="background:linear-gradient(135deg,#fce4ec,#ffecd2);">
    <span class="hf" style="top:8px;left:4%;">✨</span>
    <span class="hf" style="top:18px;right:6%;animation-delay:-2s;">💫</span>
    <h2 style="color:#880e4f;">😊 ಮುಖದ ಭಾಗಗಳು</h2>
    <p style="color:#ad1457;">Face Parts</p>
    <span class="tap-hint" style="color:#880e4f;">👆 ಕಾರ್ಡ್ ಒತ್ತಿ ಹೆಸರು ಕೇಳಿ!</span>
  </div>
  <div class="grid" id="grid-face"></div>
</div>

<div class="panel" id="panel-upper">
  <div class="panel-hero" style="background:linear-gradient(135deg,#e3f2fd,#e8eaf6);">
    <span class="hf" style="top:8px;left:4%;">💪</span>
    <span class="hf" style="top:18px;right:6%;animation-delay:-2s;">✋</span>
    <h2 style="color:#1a237e;">💪 ಮೇಲ್ಭಾಗದ ಭಾಗಗಳು</h2>
    <p style="color:#283593;">Upper Body Parts</p>
    <span class="tap-hint" style="color:#1a237e;">👆 ಕಾರ್ಡ್ ಒತ್ತಿ ಹೆಸರು ಕೇಳಿ!</span>
  </div>
  <div class="grid" id="grid-upper"></div>
</div>

<div class="panel" id="panel-torso">
  <div class="panel-hero" style="background:linear-gradient(135deg,#fff3e0,#fbe9e7);">
    <span class="hf" style="top:8px;left:4%;">🫀</span>
    <span class="hf" style="top:18px;right:6%;animation-delay:-2s;">🫁</span>
    <h2 style="color:#bf360c;">🫀 ಮಧ್ಯಭಾಗದ ಭಾಗಗಳು</h2>
    <p style="color:#d84315;">Torso Parts</p>
    <span class="tap-hint" style="color:#bf360c;">👆 ಕಾರ್ಡ್ ಒತ್ತಿ ಹೆಸರು ಕೇಳಿ!</span>
  </div>
  <div class="grid" id="grid-torso"></div>
</div>

<div class="panel" id="panel-lower">
  <div class="panel-hero" style="background:linear-gradient(135deg,#e8f5e9,#f1f8e9);">
    <span class="hf" style="top:8px;left:4%;">🦵</span>
    <span class="hf" style="top:18px;right:6%;animation-delay:-2s;">🦶</span>
    <h2 style="color:#1b5e20;">🦵 ಕೆಳಭಾಗದ ಭಾಗಗಳು</h2>
    <p style="color:#2e7d32;">Lower Body Parts</p>
    <span class="tap-hint" style="color:#1b5e20;">👆 ಕಾರ್ಡ್ ಒತ್ತಿ ಹೆಸರು ಕೇಳಿ!</span>
  </div>
  <div class="grid" id="grid-lower"></div>
</div>

<script>
const DATA = {
  face: [
    { kn:'ತಲೆ',    en:'Head',   emoji:'🧑',  sound:'ತಲೆ ✨',    bg:'#fce4ec', border:'#E91E63', pill:'#880E4F' },
    { kn:'ಕಣ್ಣು',  en:'Eyes',   emoji:'👁️',  sound:'ಕಣ್ಣು 👀',  bg:'#e8eaf6', border:'#5C6BC0', pill:'#283593' },
    { kn:'ಮೂಗು',   en:'Nose',   emoji:'👃',  sound:'ಮೂಗು 👃',  bg:'#fff3e0', border:'#FF9800', pill:'#E65100' },
    { kn:'ಬಾಯಿ',   en:'Mouth',  emoji:'👄',  sound:'ಬಾಯಿ 💋',  bg:'#ffebee', border:'#F44336', pill:'#B71C1C' },
    { kn:'ಕಿವಿ',   en:'Ear',    emoji:'👂',  sound:'ಕಿವಿ 👂',  bg:'#fff8e1', border:'#FFC107', pill:'#F57F17' },
    { kn:'ಹಲ್ಲು',  en:'Teeth',  emoji:'🦷',  sound:'ಹಲ್ಲು 😁',  bg:'#e3f2fd', border:'#2196F3', pill:'#0D47A1' },
    { kn:'ಕೂದಲು',  en:'Hair',   emoji:'💇',  sound:'ಕೂದಲು ✨',  bg:'#f3e5f5', border:'#9C27B0', pill:'#4A148C' },
  ],
  upper: [
    { kn:'ಕೊರಳು',  en:'Neck',     svg:'neck',    sound:'ಕೊರಳು ✨',   bg:'#e8f5e9', border:'#4CAF50', pill:'#1B5E20' },
    { kn:'ಭುಜ',    en:'Shoulder', svg:'shoulder', sound:'ಭುಜ 💪',    bg:'#e3f2fd', border:'#2196F3', pill:'#0D47A1' },
    { kn:'ಕೈ',     en:'Hand',     emoji:'✋',     sound:'ಕೈ ✋',     bg:'#fff8e1', border:'#FFC107', pill:'#F57F17' },
    { kn:'ಬೆರಳು',  en:'Finger',   emoji:'☝️',    sound:'ಬೆರಳು ☝️',  bg:'#fce4ec', border:'#E91E63', pill:'#880E4F' },
    { kn:'ಉಗುರು',  en:'Nail',     emoji:'💅',    sound:'ಉಗುರು 💅',  bg:'#f3e5f5', border:'#9C27B0', pill:'#6A1B9A' },
  ],
  torso: [
    { kn:'ಎದೆ',    en:'Chest',   svg:'chest',   sound:'ಎದೆ ❤️',    bg:'#ffebee', border:'#F44336', pill:'#B71C1C' },
    { kn:'ಹೊಟ್ಟೆ', en:'Stomach', emoji:'🫃',    sound:'ಹೊಟ್ಟೆ 🍽️', bg:'#e8f5e9', border:'#4CAF50', pill:'#1B5E20' },
    { kn:'ಬೆನ್ನು', en:'Back',    svg:'back',    sound:'ಬೆನ್ನು ✨',  bg:'#e3f2fd', border:'#2196F3', pill:'#0D47A1' },
  ],
  lower: [
    { kn:'ಕಾಲು',    en:'Leg',  emoji:'🦵',  sound:'ಕಾಲು 🦵',     bg:'#fff8e1', border:'#FFC107', pill:'#F57F17' },
    { kn:'ಮೊಣಕಾಲು', en:'Knee', svg:'knee',  sound:'ಮೊಣಕಾಲು ✨',  bg:'#f1f8e9', border:'#8BC34A', pill:'#33691E' },
    { kn:'ಪಾದ',     en:'Foot', emoji:'🦶',  sound:'ಪಾದ 🦶',      bg:'#e8eaf6', border:'#5C6BC0', pill:'#283593' },
  ],
};

const TOTAL = Object.values(DATA).reduce((s,a)=>s+a.length,0);
document.getElementById('scorePill').textContent = `⭐ 0 / ${TOTAL}`;

let soundOn = true;
const learned = {};
Object.keys(DATA).forEach(k => learned[k] = new Set());

function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

function toggleSound() {
  soundOn = !soundOn;
  const b = document.getElementById('soundBtn');
  b.textContent = soundOn ? '🔊' : '🔇';
  b.classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='kn-IN'; u.rate=0.82; u.pitch=1.1;
  const v = window.speechSynthesis.getVoices().find(x=>x.lang==='kn-IN'||x.lang.startsWith('kn'));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

function updateScore() {
  const tot = Object.values(learned).reduce((s,st)=>s+st.size,0);
  document.getElementById('scorePill').textContent = `⭐ ${tot} / ${TOTAL}`;
}

function updateCnt(tid) {
  document.getElementById('cnt-'+tid).textContent = `${learned[tid].size}/${DATA[tid].length}`;
}

const CC = ['#FFD93D','#FF6B35','#06D6A0','#FF6B9D','#9B5DE5','#118AB2','#43e97b'];
function confetti(x,y) {
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='cf';
    el.style.cssText=`left:${x+(Math.random()-.5)*160}px;background:${CC[i%CC.length]};animation-duration:${.9+Math.random()*.9}s;animation-delay:${Math.random()*.2}s;width:${6+Math.random()*10}px;height:${8+Math.random()*14}px;transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2200);
  }
}

/* ── SVG ILLUSTRATIONS for tricky body parts ── */
const SVGS = {
  neck: `<svg viewBox="0 0 100 120" width="90" height="108" xmlns="http://www.w3.org/2000/svg">
    <!-- head -->
    <ellipse cx="50" cy="28" rx="26" ry="28" fill="#FDDBB4" stroke="#e0956a" stroke-width="2.5"/>
    <!-- ears -->
    <ellipse cx="24" cy="30" rx="5" ry="7" fill="#FDDBB4" stroke="#e0956a" stroke-width="2"/>
    <ellipse cx="76" cy="30" rx="5" ry="7" fill="#FDDBB4" stroke="#e0956a" stroke-width="2"/>
    <!-- neck -->
    <rect x="38" y="54" width="24" height="30" rx="8" fill="#FDDBB4" stroke="#e0956a" stroke-width="2.5"/>
    <!-- neck lines -->
    <path d="M41 64 Q50 68 59 64" stroke="#e0956a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M41 72 Q50 76 59 72" stroke="#e0956a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- highlight arrow -->
    <ellipse cx="50" cy="69" rx="13" ry="16" fill="none" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,3"/>
    <!-- smiley -->
    <circle cx="41" cy="24" r="3.5" fill="#333"/>
    <circle cx="59" cy="24" r="3.5" fill="#333"/>
    <path d="M41 38 Q50 46 59 38" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </svg>`,

  shoulder: `<svg viewBox="0 0 120 110" width="108" height="98" xmlns="http://www.w3.org/2000/svg">
    <!-- torso -->
    <rect x="30" y="50" width="60" height="50" rx="12" fill="#FDDBB4" stroke="#e0956a" stroke-width="2.5"/>
    <!-- left shoulder bump -->
    <ellipse cx="20" cy="55" rx="18" ry="14" fill="#FDDBB4" stroke="#e0956a" stroke-width="2.5"/>
    <!-- right shoulder bump -->
    <ellipse cx="100" cy="55" rx="18" ry="14" fill="#FDDBB4" stroke="#e0956a" stroke-width="2.5"/>
    <!-- head -->
    <ellipse cx="60" cy="28" rx="22" ry="24" fill="#FDDBB4" stroke="#e0956a" stroke-width="2.5"/>
    <!-- highlight circles on shoulders -->
    <ellipse cx="20" cy="55" rx="11" ry="8" fill="none" stroke="#2196F3" stroke-width="3" stroke-dasharray="5,3"/>
    <ellipse cx="100" cy="55" rx="11" ry="8" fill="none" stroke="#2196F3" stroke-width="3" stroke-dasharray="5,3"/>
    <!-- face dots -->
    <circle cx="53" cy="24" r="3" fill="#333"/>
    <circle cx="67" cy="24" r="3" fill="#333"/>
    <path d="M53 35 Q60 41 67 35" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </svg>`,

  chest: `<svg viewBox="0 0 110 120" width="99" height="108" xmlns="http://www.w3.org/2000/svg">
    <!-- torso body -->
    <rect x="18" y="38" width="74" height="70" rx="14" fill="#FDDBB4" stroke="#e0956a" stroke-width="2.5"/>
    <!-- shoulders -->
    <ellipse cx="14" cy="48" rx="14" ry="12" fill="#FDDBB4" stroke="#e0956a" stroke-width="2"/>

let di=0;
function makeCard(a, tid) {
  const card = document.createElement('div');
  card.className='card';
  card.style.animationDelay=(di++*0.045)+'s';
  card.style.borderColor=a.border;
  const inner = a.svg
    ? `<div style="filter:drop-shadow(0 4px 10px rgba(0,0,0,0.15));display:flex;align-items:center;justify-content:center;">${SVGS[a.svg]}</div>`
    : `<span style="filter:drop-shadow(0 6px 14px rgba(0,0,0,0.2));line-height:1;">${a.emoji}</span>`;
  card.innerHTML=`
    <div class="card-face" style="background:${a.bg};">
      <span class="star-pop">⭐</span>
      ${inner}
    </div>
    <div class="card-info">
      <div class="kn-word">${a.kn}</div>
      <div class="en-word">${a.en}</div>
      <div class="sound-pill" style="background:${a.pill};">${a.sound}</div>
    </div>`;
  card.addEventListener('click', e=>{
    card.classList.remove('playing');
    void card.offsetWidth;
    card.classList.add('playing');
    speak(a.kn);
    setTimeout(()=>card.classList.remove('playing'),520);
    if(!learned[tid].has(a.kn)){
      learned[tid].add(a.kn);
      card.classList.add('learned');
      updateScore(); updateCnt(tid);
      const r=card.getBoundingClientRect();
      confetti(r.left+r.width/2, r.top+r.height/2);
    }
  });
  return card;
}

Object.entries(DATA).forEach(([tid,parts])=>{
  const grid=document.getElementById('grid-'+tid);
  parts.forEach(a=>grid.appendChild(makeCard(a,tid)));
  updateCnt(tid);
});

if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}
