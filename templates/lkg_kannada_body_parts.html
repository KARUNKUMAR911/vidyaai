<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ದೇಹದ ಭಾಗಗಳು - LKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&display=swap');

  :root {
    --bg: #1a0a1e;
    --topbar: #200d26;
    --text-light: #fff0ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text-light);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(232,67,147,0.13) 0%, transparent 50%),
      radial-gradient(circle at 85% 75%, rgba(108,92,231,0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(253,203,110,0.06) 0%, transparent 40%);
  }

  /* TOPBAR */
  .topbar {
    background: var(--topbar);
    border-bottom: 2px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    background: rgba(255,255,255,0.1);
    border: none; border-radius: 10px;
    color: white; padding: 8px 14px;
    font-size: 18px; cursor: pointer;
    text-decoration: none; transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .topbar-title {
    font-size: 1.3rem; font-weight: 800;
    background: linear-gradient(90deg, #e84393, #a29bfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sound-btn {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: white;
    padding: 8px 16px; font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive;
    font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.5; }

  /* HERO */
  .hero { text-align: center; padding: 30px 20px 14px; }
  .hero-emoji {
    font-size: 3.2rem; display: inline-block;
    animation: pulse-hero 2s ease-in-out infinite;
  }
  @keyframes pulse-hero {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.15); }
  }
  .hero h1 {
    font-size: 2.3rem; font-weight: 800; margin-top: 8px;
    background: linear-gradient(135deg, #e84393, #a29bfe, #fdcb6e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p { font-size: 0.92rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

  /* TTS NOTICE */
  .tts-notice {
    background: rgba(255,209,61,0.1);
    border: 1px solid rgba(255,209,61,0.28);
    border-radius: 14px; padding: 10px 16px;
    font-size: 0.8rem; color: rgba(255,209,61,0.85);
    display: flex; align-items: flex-start; gap: 8px;
    max-width: 1100px; margin: 0 auto 8px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 16px;
    padding: 12px 24px 52px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    border-radius: 22px; overflow: hidden; cursor: pointer;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    transition: transform 0.18s, box-shadow 0.18s;
    animation: popIn 0.4s both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.65); }
    to   { opacity: 1; transform: scale(1); }
  }
  .card:nth-child(1)  { animation-delay: 0.02s; }
  .card:nth-child(2)  { animation-delay: 0.04s; }
  .card:nth-child(3)  { animation-delay: 0.06s; }
  .card:nth-child(4)  { animation-delay: 0.08s; }
  .card:nth-child(5)  { animation-delay: 0.10s; }
  .card:nth-child(6)  { animation-delay: 0.12s; }
  .card:nth-child(7)  { animation-delay: 0.14s; }
  .card:nth-child(8)  { animation-delay: 0.16s; }
  .card:nth-child(9)  { animation-delay: 0.18s; }
  .card:nth-child(10) { animation-delay: 0.20s; }
  .card:nth-child(11) { animation-delay: 0.22s; }
  .card:nth-child(12) { animation-delay: 0.24s; }
  .card:nth-child(13) { animation-delay: 0.26s; }
  .card:nth-child(14) { animation-delay: 0.28s; }
  .card:nth-child(15) { animation-delay: 0.30s; }
  .card:nth-child(16) { animation-delay: 0.32s; }
  .card:nth-child(17) { animation-delay: 0.34s; }
  .card:nth-child(18) { animation-delay: 0.36s; }

  .card:hover { transform: translateY(-8px) scale(1.05); box-shadow: 0 20px 48px rgba(0,0,0,0.55); }
  .card:active { transform: scale(0.94); }
  .card.playing { animation: bpulse 0.5s ease !important; }
  @keyframes bpulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.13); }
    100% { transform: scale(1); }
  }

  .item-face {
    height: 108px;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.6rem; position: relative;
  }
  .card-info {
    padding: 11px 10px 15px; text-align: center;
    background: rgba(0,0,0,0.38); backdrop-filter: blur(4px);
  }
  .card-kn { font-size: 1.1rem; font-weight: 800; color: #fff; line-height: 1.2; }
  .card-en { font-size: 0.73rem; font-weight: 600; color: rgba(255,255,255,0.42); margin-top: 2px; font-style: italic; }

  .footer { text-align: center; padding: 14px; color: rgba(255,255,255,0.18); font-size: 0.78rem; }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 11px; padding: 10px 13px 40px; }
    .item-face { height: 82px; font-size: 2.8rem; }
    .card-kn { font-size: 0.9rem; }
    .hero h1 { font-size: 1.75rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/class/lkg/kannada" class="back-btn">←</a>
    <span class="topbar-title">ದೇಹದ ಭಾಗಗಳು</span>
  </div>
  <div class="topbar-right">
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
      <span id="soundIcon">🔊</span>
      <span id="soundLabel">ಧ್ವನಿ ಆನ್</span>
    </button>
  </div>
</div>

<div class="hero">
  <div class="hero-emoji">👁️</div>
  <h1>ದೇಹದ ಭಾಗಗಳು</h1>
  <p>ನಿಮ್ಮ ದೇಹವನ್ನು ತಿಳಿಯಿರಿ! • ಕಾರ್ಡ್ ಒತ್ತಿ ಕೇಳಿ!</p>
</div>

<div class="tts-notice">
  <span>📱</span>
  <span>ಧ್ವನಿ ಕೇಳಲು Android TTS ನಲ್ಲಿ Kannada ಭಾಷೆ ಸ್ಥಾಪಿಸಿ.</span>
</div>

<div class="grid" id="grid"></div>
<div class="footer">VidyaAI • LKG ಕನ್ನಡ</div>

<script>
const parts = [
  { kn: 'ತಲೆ',       en: 'Head',      emoji: '🗣️', bg: 'linear-gradient(145deg,#e84393,#c0336f)' },
  { kn: 'ಕಣ್ಣು',     en: 'Eyes',      emoji: '👁️', bg: 'linear-gradient(145deg,#6c5ce7,#4834d4)' },
  { kn: 'ಮೂಗು',      en: 'Nose',      emoji: '👃', bg: 'linear-gradient(145deg,#e17055,#c0392b)' },
  { kn: 'ಬಾಯಿ',      en: 'Mouth',     emoji: '👄', bg: 'linear-gradient(145deg,#d63031,#a93226)' },
  { kn: 'ಕಿವಿ',      en: 'Ear',       emoji: '👂', bg: 'linear-gradient(145deg,#e67e22,#ca6f1e)' },
  { kn: 'ಕೂದಲು',     en: 'Hair',      emoji: '💇', bg: 'linear-gradient(145deg,#2d3436,#1a1a2e)' },
  { kn: 'ಹಲ್ಲು',     en: 'Teeth',     emoji: '🦷', bg: 'linear-gradient(145deg,#dfe6e9,#b2bec3)' },
  { kn: 'ನಾಲಿಗೆ',    en: 'Tongue',    emoji: '👅', bg: 'linear-gradient(145deg,#e84393,#b03070)' },
  { kn: 'ಕೊರಳು',     en: 'Neck',      emoji: '🧣', bg: 'linear-gradient(145deg,#a29bfe,#6c5ce7)' },
  { kn: 'ಭುಜ',       en: 'Shoulder',  emoji: '🫲', bg: 'linear-gradient(145deg,#0984e3,#2980b9)' },
  { kn: 'ಕೈ',        en: 'Hand',      emoji: '✋', bg: 'linear-gradient(145deg,#fdcb6e,#e17055)' },
  { kn: 'ಬೆರಳು',     en: 'Finger',    emoji: '☝️', bg: 'linear-gradient(145deg,#fd79a8,#e84393)' },
  { kn: 'ಉಗುರು',     en: 'Nail',      emoji: '💅', bg: 'linear-gradient(145deg,#ff7675,#d63031)' },
  { kn: 'ಎದೆ',       en: 'Chest',     emoji: '🫀', bg: 'linear-gradient(145deg,#e84393,#922b6e)' },
  { kn: 'ಹೊಟ್ಟೆ',    en: 'Stomach',   emoji: '🫃', bg: 'linear-gradient(145deg,#55efc4,#00b894)' },
  { kn: 'ಬೆನ್ನು',    en: 'Back',      emoji: '🔙', bg: 'linear-gradient(145deg,#74b9ff,#0984e3)' },
  { kn: 'ಕಾಲು',      en: 'Leg',       emoji: '🦵', bg: 'linear-gradient(145deg,#fdcb6e,#d4ac0d)' },
  { kn: 'ಪಾದ',       en: 'Foot',      emoji: '🦶', bg: 'linear-gradient(145deg,#a29bfe,#8e44ad)' },
];

let soundOn = true;

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? 'ಧ್ವನಿ ಆನ್' : 'ಧ್ವನಿ ಆಫ್';
  document.getElementById('soundToggle').classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN'; u.rate = 0.85; u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const knVoice = voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn'));
  if (!knVoice) return;
  u.voice = knVoice;
  window.speechSynthesis.speak(u);
}

function buildGrid() {
  const grid = document.getElementById('grid');
  parts.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="item-face" style="background:${p.bg};">${p.emoji}</div>
      <div class="card-info">
        <div class="card-kn">${p.kn}</div>
        <div class="card-en">${p.en}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      card.classList.remove('playing');
      void card.offsetWidth;
      card.classList.add('playing');
      speak(p.kn);
      setTimeout(() => card.classList.remove('playing'), 500);
    });
    grid.appendChild(card);
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}
buildGrid();
</script>
</body>
</html>
