<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಹಣ್ಣು ತರಕಾರಿ - UKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&display=swap');

  :root { --bg: #1a0f00; --topbar: #201200; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg); min-height: 100vh; color: #fff8f0;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,107,107,0.12) 0%, transparent 50%),
      radial-gradient(circle at 90% 60%, rgba(107,203,119,0.12) 0%, transparent 50%);
  }

  .topbar {
    background: var(--topbar); border-bottom: 2px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 64px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    background: rgba(255,255,255,0.1); border: none; border-radius: 10px;
    color: white; padding: 8px 14px; font-size: 18px; cursor: pointer;
    text-decoration: none; transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .topbar-title {
    font-size: 1.2rem; font-weight: 800;
    background: linear-gradient(90deg, #ff6b6b, #fdcb6e, #6bcb77);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sound-btn {
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: white; padding: 8px 16px; font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.5; }

  .hero { text-align: center; padding: 26px 20px 10px; }
  .hero-emoji { font-size: 3rem; display: inline-block; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .hero h1 {
    font-size: 2.1rem; font-weight: 800; margin-top: 8px;
    background: linear-gradient(135deg, #ff6b6b, #fdcb6e, #6bcb77);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero p { font-size: 0.9rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

  .tabs {
    display: flex; gap: 10px; justify-content: center;
    padding: 12px 20px 4px; max-width: 1100px; margin: 0 auto;
  }
  .tab {
    flex: 1; max-width: 220px; padding: 10px 0; border-radius: 14px;
    font-family: 'Baloo Tamma 2', cursive; font-size: 0.92rem; font-weight: 700;
    cursor: pointer; border: none; transition: all 0.2s; text-align: center;
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5);
  }
  .tab.active-fruits { background: linear-gradient(135deg,#ff6b6b,#e17055); color:white; box-shadow:0 4px 18px rgba(255,107,107,0.4); }
  .tab.active-vegs   { background: linear-gradient(135deg,#6bcb77,#00b894); color:white; box-shadow:0 4px 18px rgba(107,203,119,0.4); }
  .tab:hover:not(.active-fruits):not(.active-vegs) { background: rgba(255,255,255,0.13); color:white; }

  .tts-notice {
    background: rgba(255,209,61,0.1); border: 1px solid rgba(255,209,61,0.28);
    border-radius: 14px; padding: 10px 16px; font-size: 0.8rem;
    color: rgba(255,209,61,0.85); display: flex; gap: 8px;
    max-width: 1100px; margin: 12px auto 4px;
  }

  /* GRID - wider cards to fit benefit */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
    gap: 16px; padding: 16px 24px 52px; max-width: 1100px; margin: 0 auto;
  }

  .card {
    border-radius: 22px; overflow: hidden; cursor: pointer;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    transition: transform 0.18s, box-shadow 0.18s;
    animation: popIn 0.4s both;
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.65)} to{opacity:1;transform:scale(1)} }
  .card:nth-child(1){animation-delay:0.02s} .card:nth-child(2){animation-delay:0.04s}
  .card:nth-child(3){animation-delay:0.06s} .card:nth-child(4){animation-delay:0.08s}
  .card:nth-child(5){animation-delay:0.10s} .card:nth-child(6){animation-delay:0.12s}
  .card:nth-child(7){animation-delay:0.14s} .card:nth-child(8){animation-delay:0.16s}
  .card:nth-child(9){animation-delay:0.18s} .card:nth-child(10){animation-delay:0.20s}
  .card:nth-child(11){animation-delay:0.22s} .card:nth-child(12){animation-delay:0.24s}

  .card:hover { transform: translateY(-7px) scale(1.04); box-shadow: 0 18px 44px rgba(0,0,0,0.55); }
  .card:active { transform: scale(0.94); }
  .card.playing { animation: fpulse 0.5s ease !important; }
  @keyframes fpulse { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 100%{transform:scale(1)} }

  .item-face {
    height: 108px; display: flex; align-items: center; justify-content: center;
    font-size: 3.8rem; position: relative;
  }
  /* benefit badge */
  .benefit-pill {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.8);
    padding: 3px 6px; text-align: center; line-height: 1.3;
  }

  .card-info {
    padding: 11px 10px 14px; text-align: center;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
  }
  .card-kn { font-size: 1.05rem; font-weight: 800; color: #fff; line-height: 1.2; }
  .card-en { font-size: 0.72rem; font-weight: 600; color: rgba(255,255,255,0.42); margin-top: 2px; font-style: italic; }
  .card-color {
    font-size: 0.68rem; color: rgba(255,255,255,0.3);
    margin-top: 4px;
  }

  .footer { text-align: center; padding: 14px; color: rgba(255,255,255,0.18); font-size: 0.78rem; }

  @media(max-width:480px){
    .grid { grid-template-columns: repeat(2,1fr); gap: 12px; padding: 12px 13px 40px; }
    .item-face { height: 90px; font-size: 3rem; }
    .card-kn { font-size: 0.9rem; }
    .hero h1 { font-size: 1.75rem; }
    .topbar-title { font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/class/ukg/kannada" class="back-btn">←</a>
    <span class="topbar-title">ಹಣ್ಣು ತರಕಾರಿ</span>
  </div>
  <div class="topbar-right">
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
      <span id="soundIcon">🔊</span>
      <span id="soundLabel">ಧ್ವನಿ ಆನ್</span>
    </button>
  </div>
</div>

<div class="hero">
  <div class="hero-emoji">🍱</div>
  <h1>ಹಣ್ಣು ತರಕಾರಿ</h1>
  <p>ಹೆಸರು + ಪ್ರಯೋಜನಗಳು • ಕಾರ್ಡ್ ಒತ್ತಿ ಕೇಳಿ!</p>
</div>

<div class="tabs">
  <button class="tab active-fruits" id="tab-fruits" onclick="switchTab('fruits')">🍎 ಹಣ್ಣುಗಳು</button>
  <button class="tab" id="tab-vegs" onclick="switchTab('vegs')">🥦 ತರಕಾರಿಗಳು</button>
</div>

<div class="tts-notice">
  <span>📱</span>
  <span>ಧ್ವನಿ ಕೇಳಲು Android TTS ನಲ್ಲಿ Kannada ಭಾಷೆ ಸ್ಥಾಪಿಸಿ.</span>
</div>

<div class="grid" id="grid"></div>
<div class="footer">VidyaAI • UKG ಕನ್ನಡ</div>

<script>
const fruits = [
  { kn:'ಸೇಬು',        en:'Apple',       emoji:'🍎', bg:'linear-gradient(145deg,#c0392b,#922b21)', benefit:'🦷 ಹಲ್ಲು ಮತ್ತು ಮೂಳೆ ಗಟ್ಟಿ ಮಾಡುತ್ತದೆ', color:'ಕೆಂಪು' },
  { kn:'ಬಾಳೆಹಣ್ಣು',   en:'Banana',      emoji:'🍌', bg:'linear-gradient(145deg,#d4ac0d,#b7950b)', benefit:'💪 ಶಕ್ತಿ ನೀಡುತ್ತದೆ', color:'ಹಳದಿ' },
  { kn:'ಮಾವಿನಹಣ್ಣು',  en:'Mango',       emoji:'🥭', bg:'linear-gradient(145deg,#e67e22,#ca6f1e)', benefit:'👁️ ಕಣ್ಣಿಗೆ ಒಳ್ಳೆಯದು', color:'ಕಿತ್ತಳೆ' },
  { kn:'ದ್ರಾಕ್ಷಿ',    en:'Grapes',      emoji:'🍇', bg:'linear-gradient(145deg,#7d3c98,#6c3483)', benefit:'❤️ ರಕ್ತ ಶುದ್ಧ ಮಾಡುತ್ತದೆ', color:'ನೇರಳೆ' },
  { kn:'ಕಿತ್ತಳೆ',     en:'Orange',      emoji:'🍊', bg:'linear-gradient(145deg,#e67e22,#d35400)', benefit:'🛡️ ರೋಗ ನಿರೋಧಕ ಶಕ್ತಿ ಹೆಚ್ಚಿಸುತ್ತದೆ', color:'ಕಿತ್ತಳೆ' },
  { kn:'ತರಬೂಜ',       en:'Watermelon',  emoji:'🍉', bg:'linear-gradient(145deg,#1e8449,#196f3d)', benefit:'💧 ದೇಹಕ್ಕೆ ನೀರು ನೀಡುತ್ತದೆ', color:'ಕೆಂಪು/ಹಸಿರು' },
  { kn:'ಅನಾನಸ್',      en:'Pineapple',   emoji:'🍍', bg:'linear-gradient(145deg,#d4ac0d,#b7950b)', benefit:'🤒 ಜ್ವರ ಕಡಿಮೆ ಮಾಡುತ್ತದೆ', color:'ಹಳದಿ' },
  { kn:'ಸ್ಟ್ರಾಬೆರಿ',   en:'Strawberry',  emoji:'🍓', bg:'linear-gradient(145deg,#cb4335,#a93226)', benefit:'🧠 ಮೆದುಳಿಗೆ ಒಳ್ಳೆಯದು', color:'ಕೆಂಪು' },
  { kn:'ನಿಂಬೆ',       en:'Lemon',       emoji:'🍋', bg:'linear-gradient(145deg,#d4e157,#afb42b)', benefit:'🤧 ಶೀತ ಗುಣಪಡಿಸುತ್ತದೆ', color:'ಹಳದಿ' },
  { kn:'ಪೇರಲ',        en:'Guava',       emoji:'🍏', bg:'linear-gradient(145deg,#27ae60,#1e8449)', benefit:'🦠 ರೋಗಾಣು ನಾಶ ಮಾಡುತ್ತದೆ', color:'ಹಸಿರು' },
  { kn:'ಪಪ್ಪಾಯ',      en:'Papaya',      emoji:'🧡', bg:'linear-gradient(145deg,#e59866,#ca6f1e)', benefit:'🫃 ಜೀರ್ಣಕ್ರಿಯೆ ಸುಧಾರಿಸುತ್ತದೆ', color:'ಕಿತ್ತಳೆ' },
  { kn:'ಚಿಕ್ಕು',      en:'Chickoo',     emoji:'🟤', bg:'linear-gradient(145deg,#784212,#6e2f1a)', benefit:'🦴 ಮೂಳೆ ಗಟ್ಟಿ ಮಾಡುತ್ತದೆ', color:'ಕಂದು' },
];

const vegetables = [
  { kn:'ಟೊಮಾಟೊ',      en:'Tomato',      emoji:'🍅', bg:'linear-gradient(145deg,#c0392b,#922b21)', benefit:'❤️ ಹೃದಯಕ್ಕೆ ಒಳ್ಳೆಯದು', color:'ಕೆಂಪು' },
  { kn:'ಆಲೂಗಡ್ಡೆ',    en:'Potato',      emoji:'🥔', bg:'linear-gradient(145deg,#d4ac0d,#a07818)', benefit:'💪 ಶಕ್ತಿ ನೀಡುತ್ತದೆ', color:'ಹಳದಿ ಕಂದು' },
  { kn:'ಕ್ಯಾರೆಟ್',    en:'Carrot',      emoji:'🥕', bg:'linear-gradient(145deg,#e67e22,#ca6f1e)', benefit:'👁️ ಕಣ್ಣಿನ ದೃಷ್ಟಿ ಸುಧಾರಿಸುತ್ತದೆ', color:'ಕಿತ್ತಳೆ' },
  { kn:'ಈರುಳ್ಳಿ',     en:'Onion',       emoji:'🧅', bg:'linear-gradient(145deg,#8e44ad,#7d3c98)', benefit:'🛡️ ರೋಗ ನಿರೋಧಕ ಶಕ್ತಿ ಹೆಚ್ಚಿಸುತ್ತದೆ', color:'ನೇರಳೆ/ಬಿಳಿ' },
  { kn:'ಬದನೆಕಾಯಿ',    en:'Brinjal',     emoji:'🍆', bg:'linear-gradient(145deg,#6c3483,#5b2c6f)', benefit:'🧠 ಮೆದುಳಿನ ಆರೋಗ್ಯಕ್ಕೆ ಒಳ್ಳೆಯದು', color:'ನೇರಳೆ' },
  { kn:'ಮೆಣಸಿನಕಾಯಿ',  en:'Chilli',      emoji:'🌶️', bg:'linear-gradient(145deg,#c0392b,#a93226)', benefit:'🔥 ಚಯಾಪಚಯ ಹೆಚ್ಚಿಸುತ್ತದೆ', color:'ಕೆಂಪು/ಹಸಿರು' },
  { kn:'ಹೂಕೋಸು',      en:'Cauliflower', emoji:'🥦', bg:'linear-gradient(145deg,#7f8c8d,#616a6b)', benefit:'🦴 ಮೂಳೆ ಗಟ್ಟಿ ಮಾಡುತ್ತದೆ', color:'ಬಿಳಿ' },
  { kn:'ಎಲೆಕೋಸು',     en:'Cabbage',     emoji:'🥬', bg:'linear-gradient(145deg,#1e8449,#196f3d)', benefit:'🫃 ಜೀರ್ಣಕ್ರಿಯೆ ಸುಧಾರಿಸುತ್ತದೆ', color:'ಹಸಿರು' },
  { kn:'ಕುಂಬಳಕಾಯಿ',   en:'Pumpkin',     emoji:'🎃', bg:'linear-gradient(145deg,#e67e22,#d35400)', benefit:'👁️ ಕಣ್ಣಿಗೆ ಒಳ್ಳೆಯದು', color:'ಕಿತ್ತಳೆ' },
  { kn:'ಬೀನ್ಸ್',      en:'Beans',       emoji:'🫘', bg:'linear-gradient(145deg,#27ae60,#239b56)', benefit:'💪 ಪ್ರೋಟೀನ್ ನೀಡುತ್ತದೆ', color:'ಹಸಿರು' },
  { kn:'ಬೆಳ್ಳುಳ್ಳಿ',   en:'Garlic',      emoji:'🧄', bg:'linear-gradient(145deg,#aab7b8,#808b96)', benefit:'🦠 ಸೋಂಕು ನಿರೋಧಿಸುತ್ತದೆ', color:'ಬಿಳಿ' },
  { kn:'ಪಾಲಕ',        en:'Spinach',     emoji:'🌿', bg:'linear-gradient(145deg,#1e8449,#145a32)', benefit:'🩸 ರಕ್ತ ವೃದ್ಧಿಸುತ್ತದೆ', color:'ಹಸಿರು' },
];

let soundOn = true;
let activeTab = 'fruits';

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? 'ಧ್ವನಿ ಆನ್' : 'ಧ್ವನಿ ಆಫ್';
  document.getElementById('soundToggle').classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN'; u.rate = 0.85; u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const kn = voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn'));
  if (!kn) return;
  u.voice = kn;
  window.speechSynthesis.speak(u);
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-fruits').className = 'tab' + (tab==='fruits' ? ' active-fruits' : '');
  document.getElementById('tab-vegs').className   = 'tab' + (tab==='vegs'   ? ' active-vegs'   : '');
  buildGrid();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const data = activeTab === 'fruits' ? fruits : vegetables;
  data.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="item-face" style="background:${item.bg};">
        ${item.emoji}
        <div class="benefit-pill">${item.benefit}</div>
      </div>
      <div class="card-info">
        <div class="card-kn">${item.kn}</div>
        <div class="card-en">${item.en}</div>
        <div class="card-color">🎨 ${item.color}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      card.classList.remove('playing'); void card.offsetWidth; card.classList.add('playing');
      speak(`${item.kn}. ${item.benefit.replace(/[^\u0C00-\u0C7F\s]/g,'').trim()}`);
      setTimeout(() => card.classList.remove('playing'), 500);
    });
    grid.appendChild(card);
  });
}

if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = () => {}; window.speechSynthesis.getVoices(); }
buildGrid();
</script>
</body>
</html>
