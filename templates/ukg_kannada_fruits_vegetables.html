<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಹಣ್ಣು ತರಕಾರಿ - UKG ಕನ್ನಡ</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@500;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --radius: 30px; --top-h: 70px; }

body {
  font-family: 'Baloo Tamma 2', cursive;
  background: #f6fff4;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--top-h);
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 300;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
.topbar-title {
  font-size: 1.55rem; font-weight: 900;
  background: linear-gradient(90deg, #ff6b6b, #fdcb6e, #6bcb77);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.top-right { display: flex; align-items: center; gap: 10px; }
.score-pill {
  background: #fdcb6e; color: #1a1a2e;
  font-weight: 900; font-size: 1rem;
  padding: 7px 18px; border-radius: 50px;
  box-shadow: 0 4px 14px rgba(253,203,110,0.5);
  white-space: nowrap;
}
.sound-btn {
  background: rgba(255,255,255,0.13);
  border: 2px solid rgba(255,255,255,0.22);
  color: white; border-radius: 12px;
  padding: 8px 14px; font-size: 1.2rem;
  cursor: pointer; font-family: inherit;
  transition: background 0.2s;
}
.sound-btn:hover { background: rgba(255,255,255,0.22); }
.sound-btn.off { opacity: 0.4; }

/* ── TAB NAV ── */
.tab-nav {
  display: flex;
  background: #1a1a2e;
  padding: 0 12px 14px;
  gap: 8px;
  overflow-x: auto; scrollbar-width: none;
  position: sticky; top: var(--top-h); z-index: 200;
}
.tab-nav::-webkit-scrollbar { display: none; }

.tab-btn {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 24px; border-radius: 18px; border: none;
  cursor: pointer; font-family: 'Baloo Tamma 2', cursive;
  font-weight: 800; color: rgba(255,255,255,0.45);
  background: rgba(255,255,255,0.07);
  transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; position: relative;
}
.tab-btn .t-icon { font-size: 1.7rem; line-height: 1; }
.tab-btn .t-kn   { font-size: 0.95rem; }
.tab-btn .t-en   { font-size: 0.68rem; opacity: 0.55; font-weight: 600; }
.tab-btn.active  { color: #1a1a2e; transform: translateY(-3px) scale(1.06); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }

.tab-btn[data-t="fruits"].active  { background: linear-gradient(135deg,#ff6b6b,#e17055); color:white; }
.tab-btn[data-t="vegs"].active    { background: linear-gradient(135deg,#6bcb77,#00b894); }
.tab-btn[data-t="benefits"].active{ background: linear-gradient(135deg,#fdcb6e,#e17055); }

.tab-count {
  position: absolute; top: 5px; right: 7px;
  background: rgba(255,255,255,0.22); border-radius: 50px;
  padding: 1px 6px; font-size: 0.62rem; font-weight: 900;
}
.tab-btn.active .tab-count { background: rgba(0,0,0,0.12); }

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── PANEL HERO ── */
.panel-hero {
  padding: 28px 24px 18px; text-align: center; position: relative; overflow: hidden;
}
.panel-hero h2 { font-size: 2.6rem; font-weight: 900; line-height: 1.1; margin-bottom: 5px; }
.panel-hero p  { font-size: 1.05rem; font-weight: 700; opacity: 0.65; margin-bottom: 13px; }
.tap-hint {
  display: inline-flex; align-items: center; gap: 7px;
  border: 2.5px dashed currentColor; border-radius: 50px;
  padding: 7px 20px; font-size: 0.98rem; font-weight: 800; opacity: 0.75;
  animation: wag 2s ease-in-out infinite;
}
@keyframes wag { 0%,100%{transform:rotate(-1.5deg);} 50%{transform:rotate(1.5deg);} }
.hf {
  position: absolute; font-size: 3.5rem;
  animation: fy 4s ease-in-out infinite; pointer-events: none; opacity: 0.14;
}
@keyframes fy { 0%,100%{transform:translateY(0) rotate(-8deg);} 50%{transform:translateY(-18px) rotate(8deg);} }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 22px; padding: 14px 26px 60px;
  max-width: 1300px; margin: 0 auto;
}

/* ── CARD ── */
.card {
  border-radius: var(--radius); background: white;
  box-shadow: 0 6px 28px rgba(0,0,0,0.09);
  cursor: pointer; overflow: hidden;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  border: 3.5px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.5) rotate(-6deg); }
  to   { opacity:1; transform:scale(1); }
}
.card:hover { transform:translateY(-12px) scale(1.04) rotate(.8deg); box-shadow:0 24px 56px rgba(0,0,0,0.14); }
.card:active { transform:scale(0.91); }
.card.playing { animation: cb .5s cubic-bezier(.34,1.56,.64,1) !important; }
@keyframes cb { 0%{transform:scale(1);} 30%{transform:scale(1.22) rotate(-4deg);} 65%{transform:scale(.94) rotate(2deg);} 100%{transform:scale(1);} }

.card-face {
  height: 155px;
  display: flex; align-items: center; justify-content: center;
  font-size: 5rem; position: relative;
}
.star-pop {
  position: absolute; top: 8px; right: 12px;
  font-size: 1.5rem; transform: scale(0); opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1); pointer-events: none;
}
.card.playing .star-pop { transform: scale(1) rotate(20deg); opacity: 1; }
.card.learned .star-pop { transform: scale(0.85); opacity: 0.5; }

/* colour dot top-left */
.color-dot {
  position: absolute; top: 10px; left: 10px;
  width: 22px; height: 22px; border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.6);
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.card-info { padding: 14px 12px 8px; text-align: center; border-top: 3px solid rgba(0,0,0,0.05); }
.kn-word { font-size: 1.75rem; font-weight: 900; color: #1a1a2e; line-height: 1.1; }
.en-word { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; opacity: 0.38; }

/* benefit strip at bottom of card */
.benefit-strip {
  margin: 10px 10px 14px;
  background: #f8f9fa;
  border-radius: 14px;
  padding: 8px 12px;
  font-size: 0.82rem; font-weight: 800;
  color: #444;
  display: flex; align-items: center; gap: 6px;
  border: 2px solid rgba(0,0,0,0.06);
  line-height: 1.3;
}
.benefit-icon { font-size: 1.1rem; flex-shrink: 0; }

/* ── BENEFITS PANEL (grid of benefit cards) ── */
.benefits-wrap {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px; padding: 14px 26px 60px;
  max-width: 1300px; margin: 0 auto;
}

.benefit-card {
  background: white; border-radius: 22px;
  box-shadow: 0 6px 22px rgba(0,0,0,0.08);
  padding: 20px 20px 22px;
  display: flex; align-items: flex-start; gap: 16px;
  animation: popIn 0.45s cubic-bezier(.34,1.56,.64,1) both;
  border: 3px solid transparent;
  cursor: pointer;
  transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.benefit-card:hover { transform: translateX(8px) scale(1.01); box-shadow: 0 12px 34px rgba(0,0,0,0.12); }
.benefit-card:active { transform: scale(0.97); }
.benefit-card.playing { border-color: #fdcb6e; background: #fffbee; }

.bc-emoji {
  font-size: 2.8rem; flex-shrink: 0;
  background: #f5f5f5; border-radius: 16px;
  width: 64px; height: 64px;
  display: flex; align-items: center; justify-content: center;
}
.bc-body { flex: 1; }
.bc-kn { font-size: 1.15rem; font-weight: 900; color: #1a1a2e; }
.bc-en { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.38; margin-top: 2px; }
.bc-benefit {
  margin-top: 8px;
  font-size: 0.88rem; font-weight: 800; color: #555;
  display: flex; align-items: center; gap: 6px;
}

/* ── CONFETTI ── */
.cf { position:fixed; border-radius:3px; top:-20px; pointer-events:none; z-index:9999; animation:cff 1.4s ease-in forwards; }
@keyframes cff { to { transform: translateY(110vh) rotate(600deg); opacity:0; } }

/* ── RESPONSIVE ── */
@media (max-width: 580px) {
  .grid { grid-template-columns: repeat(2,1fr); gap:13px; padding:10px 12px 44px; }
  .card-face { height:115px; font-size:3.6rem; }
  .kn-word { font-size:1.35rem; }
  .panel-hero h2 { font-size:2rem; }
  .benefits-wrap { grid-template-columns: 1fr; padding: 10px 14px 44px; }
}
@media (min-width:900px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); }
  .card-face { height:172px; font-size:5.8rem; }
  .kn-word { font-size:2rem; }
}
</style>
</head>

// ══ TABS ══
function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

// ══ SOUND ══
function toggleSound() {
  soundOn = !soundOn;
  const b = document.getElementById('soundBtn');
  b.textContent = soundOn ? '🔊' : '🔇';
  b.classList.toggle('off', !soundOn);
}
function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='kn-IN'; u.rate=0.82; u.pitch=1.1;
  const v = window.speechSynthesis.getVoices().find(x=>x.lang==='kn-IN'||x.lang.startsWith('kn'));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

// ══ SCORE ══
function updateScore() {
  const tot = learned.fruits.size + learned.vegs.size;
  document.getElementById('scorePill').textContent = `⭐ ${tot} / ${TOTAL}`;
}
function updateCnt(tid) {
  const el = document.getElementById('cnt-'+tid);
  if (el) el.textContent = `${learned[tid].size}/${tid==='fruits'?FRUITS.length:VEGS.length}`;
}

// ══ CONFETTI ══
const CC = ['#ff6b6b','#fdcb6e','#6bcb77','#FF6B9D','#a29bfe','#74b9ff','#55efc4'];
function confetti(x,y) {
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='cf';
    el.style.cssText=`left:${x+(Math.random()-.5)*160}px;background:${CC[i%CC.length]};animation-duration:${.9+Math.random()*.9}s;animation-delay:${Math.random()*.2}s;width:${6+Math.random()*10}px;height:${8+Math.random()*14}px;transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2200);
  }
}

// ══ BUILD ITEM CARDS ══
let di = 0;
function makeCard(item, tid) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = (di++ * 0.05) + 's';
  card.style.borderColor = item.border;

  card.innerHTML = `
    <div class="card-face" style="background:${item.bg};">
      <span class="star-pop">⭐</span>
      <div class="color-dot" style="background:${item.color};"></div>
      <span style="filter:drop-shadow(0 6px 14px rgba(0,0,0,0.18));line-height:1;">${item.emoji}</span>
    </div>
    <div class="card-info">
      <div class="kn-word">${item.kn}</div>
      <div class="en-word">${item.en}</div>
    </div>
    <div class="benefit-strip">
      <span class="benefit-icon">${item.bicon}</span>
      <span>${item.benefit.replace(/^.\s*/,'')}</span>
    </div>`;

  card.addEventListener('click', e => {
    card.classList.remove('playing'); void card.offsetWidth; card.classList.add('playing');
    speak(item.kn);
    setTimeout(() => card.classList.remove('playing'), 520);
    if (!learned[tid].has(item.kn)) {
      learned[tid].add(item.kn);
      card.classList.add('learned');
      updateScore(); updateCnt(tid);
      const r = card.getBoundingClientRect();
      confetti(r.left + r.width/2, r.top + r.height/2);
    }
  });
  return card;
}

// ══ BUILD BENEFITS PANEL ══
function buildBenefits() {
  const wrap = document.getElementById('benefitsWrap');
  wrap.innerHTML = '';
  const all = [...FRUITS, ...VEGS];
  all.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'benefit-card';
    card.style.animationDelay = (i * 0.04) + 's';
    card.style.borderColor = item.border + '55';
    card.innerHTML = `
      <div class="bc-emoji" style="background:${item.bg};">${item.emoji}</div>
      <div class="bc-body">
        <div class="bc-kn">${item.kn}</div>
        <div class="bc-en">${item.en}</div>
        <div class="bc-benefit">${item.benefit}</div>
      </div>`;
    card.addEventListener('click', () => {
      card.classList.add('playing');
      speak(`${item.kn}. ${item.benefit.replace(/^.\s*/,'')}`);
      setTimeout(() => card.classList.remove('playing'), 3000);
    });
    wrap.appendChild(card);
  });
}

// ══ INIT ══
FRUITS.forEach(f => document.getElementById('grid-fruits').appendChild(makeCard(f,'fruits')));
VEGS.forEach(v   => document.getElementById('grid-vegs').appendChild(makeCard(v,'vegs')));
buildBenefits();

if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}
</script>
