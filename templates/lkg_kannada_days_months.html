<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ವಾರ ಮತ್ತು ತಿಂಗಳು - LKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a1a0a;
    --topbar: #0d200d;
    --text-light: #f0fff0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text-light);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(107,203,119,0.13) 0%, transparent 50%),
      radial-gradient(circle at 85% 70%, rgba(77,150,255,0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 95%, rgba(253,203,110,0.08) 0%, transparent 40%);
  }

  /* TOPBAR */
  .topbar {
    background: var(--topbar);
    border-bottom: 2px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 64px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    background: rgba(255,255,255,0.1); border: none; border-radius: 10px;
    color: white; padding: 8px 14px; font-size: 18px; cursor: pointer;
    text-decoration: none; transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .topbar-title {
    font-size: 1.2rem; font-weight: 800;
    background: linear-gradient(90deg, #6bcb77, #4d96ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sound-btn {
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: white; padding: 8px 16px; font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.5; }

  /* HERO */
  .hero { text-align: center; padding: 28px 20px 12px; }
  .hero-emoji {
    font-size: 3.2rem; display: inline-block;
    animation: flip 3s ease-in-out infinite;
  }
  @keyframes flip {
    0%,100% { transform: rotateY(0deg); }
    50%      { transform: rotateY(180deg); }
  }
  .hero h1 {
    font-size: 2.1rem; font-weight: 800; margin-top: 8px;
    background: linear-gradient(135deg, #6bcb77, #4d96ff, #fdcb6e);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero p { font-size: 0.92rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

  /* TABS */
  .tabs {
    display: flex; gap: 10px; justify-content: center;
    padding: 14px 20px 4px; max-width: 900px; margin: 0 auto;
  }
  .tab {
    flex: 1; max-width: 200px; padding: 10px 0;
    border-radius: 14px; font-family: 'Baloo Tamma 2', cursive;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
    border: 2px solid transparent; transition: all 0.2s;
    text-align: center; background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.5);
  }
  .tab.active-days {
    background: linear-gradient(135deg, #6bcb77, #00b894);
    color: white; box-shadow: 0 4px 18px rgba(107,203,119,0.4);
  }
  .tab.active-months {
    background: linear-gradient(135deg, #4d96ff, #0984e3);
    color: white; box-shadow: 0 4px 18px rgba(77,150,255,0.4);
  }
  .tab:hover:not(.active-days):not(.active-months) {
    background: rgba(255,255,255,0.13); color: white;
  }

  /* TTS NOTICE */
  .tts-notice {
    background: rgba(255,209,61,0.1); border: 1px solid rgba(255,209,61,0.28);
    border-radius: 14px; padding: 10px 16px; font-size: 0.8rem;
    color: rgba(255,209,61,0.85); display: flex; align-items: flex-start; gap: 8px;
    max-width: 900px; margin: 12px auto 4px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 16px;
    padding: 16px 24px 52px;
    max-width: 900px;
    margin: 0 auto;
  }

  .card {
    border-radius: 22px; overflow: hidden; cursor: pointer;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    transition: transform 0.18s, box-shadow 0.18s;
    animation: popIn 0.4s both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.65); }
    to   { opacity: 1; transform: scale(1); }
  }
  .card:nth-child(1)  { animation-delay: 0.02s; }
  .card:nth-child(2)  { animation-delay: 0.05s; }
  .card:nth-child(3)  { animation-delay: 0.08s; }
  .card:nth-child(4)  { animation-delay: 0.11s; }
  .card:nth-child(5)  { animation-delay: 0.14s; }
  .card:nth-child(6)  { animation-delay: 0.17s; }
  .card:nth-child(7)  { animation-delay: 0.20s; }
  .card:nth-child(8)  { animation-delay: 0.23s; }
  .card:nth-child(9)  { animation-delay: 0.26s; }
  .card:nth-child(10) { animation-delay: 0.29s; }
  .card:nth-child(11) { animation-delay: 0.32s; }
  .card:nth-child(12) { animation-delay: 0.35s; }

  .card:hover { transform: translateY(-8px) scale(1.05); box-shadow: 0 20px 48px rgba(0,0,0,0.55); }
  .card:active { transform: scale(0.94); }
  .card.playing { animation: dpulse 0.5s ease !important; }
  @keyframes dpulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.13); }
    100% { transform: scale(1); }
  }

  .item-face {
    height: 100px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    position: relative;
  }
  .item-number {
    font-size: 2rem; font-weight: 800; color: rgba(255,255,255,0.9);
    line-height: 1;
  }
  .item-emoji { font-size: 1.4rem; }

  .card-info {
    padding: 10px 10px 14px; text-align: center;
    background: rgba(0,0,0,0.38); backdrop-filter: blur(4px);
  }
  .card-kn { font-size: 1.05rem; font-weight: 800; color: #fff; line-height: 1.2; }
  .card-en { font-size: 0.72rem; font-weight: 600; color: rgba(255,255,255,0.42); margin-top: 2px; font-style: italic; }

  .footer { text-align: center; padding: 14px; color: rgba(255,255,255,0.18); font-size: 0.78rem; }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 11px; padding: 12px 13px 40px; }
    .item-face { height: 80px; }
    .item-number { font-size: 1.6rem; }
    .card-kn { font-size: 0.88rem; }
    .hero h1 { font-size: 1.75rem; }
    .topbar-title { font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/class/lkg/kannada" class="back-btn">←</a>
    <span class="topbar-title">ವಾರ ಮತ್ತು ತಿಂಗಳು</span>
  </div>
  <div class="topbar-right">
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
      <span id="soundIcon">🔊</span>
      <span id="soundLabel">ಧ್ವನಿ ಆನ್</span>
    </button>
  </div>
</div>

<div class="hero">
  <div class="hero-emoji">📅</div>
  <h1>ವಾರ ಮತ್ತು ತಿಂಗಳು</h1>
  <p>7 ದಿನಗಳು • 12 ತಿಂಗಳು • ಕಾರ್ಡ್ ಒತ್ತಿ ಕೇಳಿ!</p>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active-days" id="tab-days"   onclick="switchTab('days')">📆 ವಾರದ ದಿನಗಳು</button>
  <button class="tab"             id="tab-months" onclick="switchTab('months')">🗓️ ತಿಂಗಳುಗಳು</button>
</div>

<div class="tts-notice">
  <span>📱</span>
  <span>ಧ್ವನಿ ಕೇಳಲು Android TTS ನಲ್ಲಿ Kannada ಭಾಷೆ ಸ್ಥಾಪಿಸಿ.</span>
</div>

<div class="grid" id="grid"></div>
<div class="footer">VidyaAI • LKG ಕನ್ನಡ</div>

<script>
const days = [
  { kn: 'ಭಾನುವಾರ',  en: 'Sunday',    num: '1', emoji: '☀️', bg: 'linear-gradient(145deg,#e67e22,#ca6f1e)' },
  { kn: 'ಸೋಮವಾರ',   en: 'Monday',    num: '2', emoji: '🌙', bg: 'linear-gradient(145deg,#2980b9,#1f618d)' },
  { kn: 'ಮಂಗಳವಾರ',  en: 'Tuesday',   num: '3', emoji: '🔴', bg: 'linear-gradient(145deg,#c0392b,#922b21)' },
  { kn: 'ಬುಧವಾರ',   en: 'Wednesday', num: '4', emoji: '💚', bg: 'linear-gradient(145deg,#27ae60,#1e8449)' },
  { kn: 'ಗುರುವಾರ',  en: 'Thursday',  num: '5', emoji: '🟡', bg: 'linear-gradient(145deg,#d4ac0d,#b7950b)' },
  { kn: 'ಶುಕ್ರವಾರ', en: 'Friday',    num: '6', emoji: '⚪', bg: 'linear-gradient(145deg,#7f8c8d,#616a6b)' },
  { kn: 'ಶನಿವಾರ',   en: 'Saturday',  num: '7', emoji: '🟣', bg: 'linear-gradient(145deg,#8e44ad,#6c3483)' },
];

const months = [
  { kn: 'ಜನವರಿ',    en: 'January',   num: '೧',  emoji: '❄️', bg: 'linear-gradient(145deg,#2980b9,#1f618d)' },
  { kn: 'ಫೆಬ್ರವರಿ', en: 'February',  num: '೨',  emoji: '💝', bg: 'linear-gradient(145deg,#e84393,#a0205e)' },
  { kn: 'ಮಾರ್ಚ್',   en: 'March',     num: '೩',  emoji: '🌸', bg: 'linear-gradient(145deg,#27ae60,#1e8449)' },
  { kn: 'ಏಪ್ರಿಲ್',  en: 'April',     num: '೪',  emoji: '🌧️', bg: 'linear-gradient(145deg,#2980b9,#1a6fa0)' },
  { kn: 'ಮೇ',       en: 'May',       num: '೫',  emoji: '🌺', bg: 'linear-gradient(145deg,#e67e22,#ca6f1e)' },
  { kn: 'ಜೂನ್',     en: 'June',      num: '೬',  emoji: '⛈️', bg: 'linear-gradient(145deg,#1a5276,#154360)' },
  { kn: 'ಜುಲೈ',     en: 'July',      num: '೭',  emoji: '🌈', bg: 'linear-gradient(145deg,#117a65,#0e6655)' },
  { kn: 'ಆಗಸ್ಟ್',   en: 'August',    num: '೮',  emoji: '🏳️', bg: 'linear-gradient(145deg,#e74c3c,#c0392b)' },
  { kn: 'ಸೆಪ್ಟೆಂಬರ್',en: 'September', num: '೯',  emoji: '🍂', bg: 'linear-gradient(145deg,#d35400,#b7460e)' },
  { kn: 'ಅಕ್ಟೋಬರ್', en: 'October',   num: '೧೦', emoji: '🎃', bg: 'linear-gradient(145deg,#e67e22,#b7460e)' },
  { kn: 'ನವೆಂಬರ್',  en: 'November',  num: '೧೧', emoji: '🍁', bg: 'linear-gradient(145deg,#8e44ad,#6c3483)' },
  { kn: 'ಡಿಸೆಂಬರ್', en: 'December',  num: '೧೨', emoji: '🎄', bg: 'linear-gradient(145deg,#27ae60,#1a7a40)' },
];

let soundOn = true;
let activeTab = 'days';

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? 'ಧ್ವನಿ ಆನ್' : 'ಧ್ವನಿ ಆಫ್';
  document.getElementById('soundToggle').classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN'; u.rate = 0.85; u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const knVoice = voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn'));
  if (!knVoice) return;
  u.voice = knVoice;
  window.speechSynthesis.speak(u);
}

function switchTab(tab) {
  activeTab = tab;
  const td = document.getElementById('tab-days');
  const tm = document.getElementById('tab-months');
  td.className = 'tab' + (tab === 'days'   ? ' active-days'   : '');
  tm.className = 'tab' + (tab === 'months' ? ' active-months' : '');
  buildGrid();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const data = activeTab === 'days' ? days : months;
  data.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="item-face" style="background:${item.bg};">
        <div class="item-number">${item.num}</div>
        <div class="item-emoji">${item.emoji}</div>
      </div>
      <div class="card-info">
        <div class="card-kn">${item.kn}</div>
        <div class="card-en">${item.en}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      card.classList.remove('playing');
      void card.offsetWidth;
      card.classList.add('playing');
      speak(item.kn);
      setTimeout(() => card.classList.remove('playing'), 500);
    });
    grid.appendChild(card);
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}
buildGrid();
</script>
</body>
</html>
