<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidyaAI - Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 28px; color: #7c3aed; }
        .logo p { color: #888; font-size: 13px; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
            background: white;
        }
        .form-group input:focus,
        .form-group select:focus { border-color: #7c3aed; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
        }
        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }
        .link a { color: #7c3aed; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>📚 Join VidyaAI</h1>
            <p>Create your free student account</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/signup">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Grade</label>
                    <select name="grade" required>
                        <option value="">Select Grade</option>
                        <option value="LKG">LKG</option>
                        <option value="UKG">UKG</option>
                        <option value="1">1st Standard</option>
                        <option value="2">2nd Standard</option>
                        <option value="3">3rd Standard</option>
                        <option value="4">4th Standard</option>
                        <option value="5">5th Standard</option>
                        <option value="6">6th Standard</option>
                        <option value="7">7th Standard</option>
                        <option value="8">8th Standard</option>
                        <option value="9">9th Standard</option>
                        <option value="10">10th Standard</option>
                        <option value="11">11th Standard</option>
                        <option value="12">12th Standard</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Language</label>
                    <select name="language" required>
                        <option value="english">English</option>
                        <option value="kannada">ಕನ್ನಡ</option>
                        <option value="hindi">हिंदी</option>
                        <option value="tamil">தமிழ்</option>
                        <option value="telugu">తెలుగు</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>School Name</label>
                <input type="text" name="school" placeholder="Your school name">
            </div>
            <button type="submit" class="btn">Create Account 🎓</button>
        </form>
        <div class="link">
            Already have account? <a href="/login">Login</a>
        </div>
    </div>
</body>
</html>
