<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UKG Transport! 🚗</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD600; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka One', cursive;
            overflow: hidden; height: 100vh; width: 100vw;
            user-select: none; background: #222;
        }

        /* ── SCREEN ── */
        .screen {
            width: 100vw; height: 100vh;
            position: relative; overflow: hidden; cursor: pointer;
        }

        /* ── PHOTO BG + FALLBACK OVERLAY ── */
        #bgPhoto {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; transition: opacity 0.45s ease; z-index: 0;
        }
        #colorOverlay {
            position: absolute; inset: 0; z-index: 1;
            transition: background 0.6s ease; pointer-events: none;
        }
        /* emoji fallback — always behind photo */
        #bgEmoji {
            position: absolute; inset: 0; z-index: 1;
            display: flex; align-items: center; justify-content: center;
            font-size: min(55vw, 55vh); pointer-events: none;
            filter: drop-shadow(0 8px 32px rgba(0,0,0,0.25));
            animation: floatEmoji 4s ease-in-out infinite alternate;
        }
        @keyframes floatEmoji { from{transform:translateY(0) scale(1);} to{transform:translateY(-14px) scale(1.04);} }

        .grad-top {
            position: absolute; top: 0; left: 0; right: 0; height: 210px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
            z-index: 2; pointer-events: none;
        }
        .grad-bottom {
            position: absolute; bottom: 0; left: 0; right: 0; height: 300px;
            background: linear-gradient(to top, rgba(0,0,0,0.80), transparent);
            z-index: 2; pointer-events: none;
        }
        .bg-blob {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.07); pointer-events: none;
            animation: floatBlob 7s ease-in-out infinite alternate; z-index: 3;
        }
        .bg-blob:nth-child(1){ width:200px;height:200px;top:-50px;left:-50px;animation-delay:0s; }
        .bg-blob:nth-child(2){ width:130px;height:130px;bottom:70px;right:-20px;animation-delay:2s; }
        @keyframes floatBlob { from{transform:translateY(0) scale(1);} to{transform:translateY(18px) scale(1.1);} }

        /* ── TOP BAR ── */
        .topbar {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; z-index: 10;
        }
        .topbar-btn {
            background: rgba(255,255,255,0.22); border: 2.5px solid rgba(255,255,255,0.45);
            color: white; padding: 8px 18px; border-radius: 50px; font-size: 15px;
            font-family: 'Fredoka One', cursive; cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 5px;
            transition: transform 0.15s, background 0.15s; backdrop-filter: blur(6px);
        }
        .topbar-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.38); }
        .stars-display {
            background: rgba(255,215,0,0.3); border: 2.5px solid rgba(255,215,0,0.6);
            color: white; padding: 8px 18px; border-radius: 50px;
            font-size: 16px; font-family: 'Fredoka One', cursive; backdrop-filter: blur(6px);
        }
        .sound-pill {
            background: rgba(255,255,255,0.22); border: 2.5px solid rgba(255,255,255,0.45);
            color: white; padding: 8px 16px; border-radius: 50px; font-size: 15px;
            font-family: 'Fredoka One', cursive; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            transition: transform 0.15s, background 0.2s; backdrop-filter: blur(6px); white-space: nowrap;
        }
        .sound-pill:active { transform: scale(0.92); }
        .sound-pill.muted {
            background: rgba(0,0,0,0.25); border-color: rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.5); text-decoration: line-through;
        }

        /* ── PROGRESS DOTS ── */
        .dots-row {
            position: absolute; top: 62px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 5px; flex-wrap: wrap;
            padding: 0 20px; z-index: 10;
        }
        .dot { width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);transition:all 0.3s;flex-shrink:0; }
        .dot.done    { background: rgba(255,255,255,0.65); }
        .dot.current { background: var(--gold); transform: scale(1.7); box-shadow: 0 0 8px var(--gold); }

        /* ── UKG INFO CHIPS — transport flavour ── */
        .info-row {
            position: absolute; bottom: 170px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 10px; padding: 0 16px;
            z-index: 10; pointer-events: none;
            animation: slideUp 0.4s ease 0.25s both;
            flex-wrap: wrap;
        }
        .info-chip {
            display: flex; align-items: center; gap: 6px;
            background: rgba(0,0,0,0.38); backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255,255,255,0.22);
            border-radius: 50px; padding: 6px 14px;
            font-size: clamp(11px, 2.8vw, 14px);
            font-family: 'Nunito', sans-serif; font-weight: 900; color: white;
        }
        .info-chip .chip-icon { font-size: 16px; }

        /* ── NAME + FACT ── */
        .name-card {
            position: absolute; bottom: 100px; left: 0; right: 0;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            z-index: 10; pointer-events: none;
        }
        .word-label {
            font-size: clamp(36px, 9vw, 66px);
            font-family: 'Fredoka One', cursive; color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.55);
            animation: slideUp 0.4s ease both; line-height: 1; letter-spacing: 1px;
        }
        .fun-fact-chip {
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.38);
            backdrop-filter: blur(8px); color: white; border-radius: 50px;
            padding: 6px 20px; font-size: clamp(12px, 3.2vw, 17px);
            font-family: 'Nunito', sans-serif; font-weight: 900;
            animation: slideUp 0.4s ease 0.12s both; text-align: center; max-width: 88vw;
        }

        /* ── BOTTOM BAR ── */
        .bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px 22px; z-index: 10; gap: 10px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.2); border: 2.5px solid rgba(255,255,255,0.45);
            color: white; padding: 14px 20px; border-radius: 50px; font-size: 22px;
            font-family: 'Fredoka One', cursive; cursor: pointer; transition: all 0.15s;
            min-width: 70px; text-align: center; backdrop-filter: blur(6px);
        }
        .nav-btn:hover  { background: rgba(255,255,255,0.35); transform: scale(1.06); }
        .nav-btn:active { transform: scale(0.92); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .next-btn {
            background: white; color: #333; border: none; padding: 16px 38px;
            border-radius: 50px; font-size: 18px; font-family: 'Fredoka One', cursive;
            cursor: pointer; box-shadow: 0 6px 22px rgba(0,0,0,0.3), 0 0 0 4px rgba(255,255,255,0.3);
            transition: all 0.18s;
        }
        .next-btn:hover  { transform: scale(1.06) translateY(-3px); }
        .next-btn:active { transform: scale(0.94); }
        .bottom-center { text-align: center; flex: 1; }
        .tap-hint { font-size: 14px; color: rgba(255,255,255,0.82); font-family: 'Nunito', sans-serif; font-weight: 700; animation: tapWiggle 1.8s ease-in-out infinite; }
        @keyframes tapWiggle { 0%,100%{transform:scale(1);} 50%{transform:scale(1.07);} }
        .autoplay-pill { display: none; background: var(--gold); color: #333; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-family: 'Nunito', sans-serif; font-weight: 800; margin-top: 4px; }
        .autoplay-pill.show { display: inline-block; }

        /* ── SPEAK FAB ── */
        .speak-fab {
            position: absolute; bottom: 96px; right: 18px;
            width: 54px; height: 54px; border-radius: 50%;
            background: rgba(255,255,255,0.22); border: 2.5px solid rgba(255,255,255,0.5);
            color: white; font-size: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s; z-index: 11; backdrop-filter: blur(6px);
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }
        .speak-fab:active { transform: scale(0.88); }
        .speak-fab.speaking { animation: speakPulse 0.5s ease infinite alternate; }
        @keyframes speakPulse { from{box-shadow:0 0 0 0 rgba(255,255,255,0.4);} to{box-shadow:0 0 0 14px rgba(255,255,255,0);} }

        .float-star { position: fixed; font-size: 32px; pointer-events: none; z-index: 50; animation: floatUp 1.1s ease forwards; }
        @keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:1;} 100%{transform:translateY(-90px) scale(1.5);opacity:0;} }

        /* ── PARENT PANEL ── */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
        .overlay.show { display: flex; }
        .panel { background: white; border-radius: 30px; padding: 26px; width: 92%; max-width: 400px; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
        .panel h2 { font-size:20px;color:#1d4ed8;margin-bottom:6px;text-align:center;font-family:'Fredoka One',cursive; }
        .panel-progress { text-align:center;font-size:13px;color:#666;background:#eff6ff;padding:8px;border-radius:12px;margin-bottom:18px;font-family:'Nunito',sans-serif;font-weight:700; }
        .panel-row { display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #f0f0f0; }
        .panel-label { font-size:14px;font-weight:700;color:#333;font-family:'Nunito',sans-serif; }
        .panel-sub   { font-size:12px;color:#999;margin-top:2px;font-family:'Nunito',sans-serif; }
        .toggle { width:52px;height:28px;background:#ddd;border-radius:14px;cursor:pointer;position:relative;transition:background 0.3s;border:none;flex-shrink:0; }
        .toggle.on { background:#1d4ed8; }
        .toggle::after { content:'';position:absolute;width:22px;height:22px;background:white;border-radius:50%;top:3px;left:3px;transition:left 0.3s;box-shadow:0 2px 6px rgba(0,0,0,0.25); }
        .toggle.on::after { left:27px; }
        .speed-row { display:flex;gap:7px; }
        .speed-btn { padding:7px 14px;border:2px solid #e5e7eb;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;background:white;transition:all 0.2s;font-family:'Nunito',sans-serif; }
        .speed-btn.active { border-color:#1d4ed8;background:#eff6ff;color:#1d4ed8; }
        .jump-section { margin-top:14px; }
        .jump-section h4 { font-size:12px;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;font-family:'Nunito',sans-serif;font-weight:700; }
        .jump-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:6px; }
        .jump-btn { border:2px solid #e5e7eb;border-radius:10px;font-size:11px;font-weight:800;cursor:pointer;background:white;color:#1d4ed8;transition:all 0.2s;padding:8px 4px;font-family:'Nunito',sans-serif;text-align:center; }
        .jump-btn:hover { background:#1d4ed8;color:white;border-color:#1d4ed8; }
        .jump-btn.done  { background:#dbeafe;color:#1e40af;border-color:#93c5fd; }
        .jump-btn.cur   { background:#1d4ed8;color:white;border-color:#1d4ed8; }
        .close-panel-btn { width:100%;padding:15px;background:#1d4ed8;color:white;border:none;border-radius:20px;font-size:16px;font-family:'Fredoka One',cursive;cursor:pointer;margin-top:18px;transition:transform 0.15s; }
        .close-panel-btn:active { transform:scale(0.96); }

        /* ── QUIZ ── */
        .quiz-overlay {
            display: none; position: fixed; inset: 0; z-index: 150;
            background: rgba(0,0,0,0.72); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; padding: 20px;
        }
        .quiz-overlay.show { display: flex; }
        .quiz-box {
            background: white; border-radius: 28px; padding: 28px;
            width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 24px 70px rgba(0,0,0,0.4);
        }
        .quiz-progress { font-size: 13px; color: #888; font-family: 'Nunito', sans-serif; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .quiz-track { height: 8px; background: #e5e7eb; border-radius: 6px; overflow: hidden; margin-bottom: 18px; }
        .quiz-fill  { height: 100%; background: linear-gradient(90deg,#1d4ed8,#60a5fa); border-radius: 6px; transition: width 0.4s; }
        .quiz-q { font-size: 18px; font-weight: 900; color: #1e293b; margin-bottom: 16px; font-family: 'Fredoka One', cursive; text-align: center; line-height: 1.3; }
        .quiz-img { width: 100%; height: 140px; object-fit: cover; border-radius: 16px; margin-bottom: 16px; }
        .quiz-emoji { font-size: 80px; text-align: center; display: block; margin-bottom: 16px; }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .quiz-opt {
            padding: 14px 10px; border: 3px solid #e5e7eb; border-radius: 16px;
            font-size: 15px; font-weight: 800; cursor: pointer; background: white;
            color: #1e293b; transition: all 0.18s; font-family: 'Nunito', sans-serif;
            text-align: center;
        }
        .quiz-opt:hover   { border-color: #1d4ed8; background: #eff6ff; }
        .quiz-opt.correct { border-color: #059669 !important; background: #d1fae5 !important; color: #059669; }
        .quiz-opt.wrong   { border-color: #dc2626 !important; background: #fee2e2 !important; color: #dc2626; }
        .quiz-feedback { text-align: center; font-size: 15px; font-weight: 800; min-height: 24px; margin-top: 14px; font-family: 'Nunito', sans-serif; }
        .quiz-feedback.ok  { color: #059669; }
        .quiz-feedback.bad { color: #dc2626; }
        .quiz-next { width: 100%; margin-top: 14px; padding: 14px; background: #1d4ed8; color: white; border: none; border-radius: 18px; font-size: 16px; font-family: 'Fredoka One', cursive; cursor: pointer; display: none; transition: transform 0.15s; }
        .quiz-next.show { display: block; }
        .quiz-next:active { transform: scale(0.96); }
        .quiz-score-screen { text-align: center; }
        .quiz-score-icon  { font-size: 70px; margin-bottom: 10px; }
        .quiz-score-title { font-size: 26px; font-weight: 900; color: #333; font-family: 'Fredoka One', cursive; margin-bottom: 6px; }
        .quiz-score-val   { font-size: 40px; font-weight: 900; color: #1d4ed8; font-family: 'Fredoka One', cursive; margin-bottom: 8px; }
        .quiz-score-sub   { font-size: 14px; color: #666; font-family: 'Nunito', sans-serif; font-weight: 700; margin-bottom: 20px; }
        .quiz-retry { padding: 13px 32px; background: #1d4ed8; color: white; border: none; border-radius: 50px; font-size: 16px; font-family: 'Fredoka One', cursive; cursor: pointer; margin: 4px; }

        /* ── CELEBRATION ── */
        .celeb-overlay { display:none;position:fixed;inset:0;background:linear-gradient(135deg,#1d4ed8 0%,#60a5fa 100%);z-index:200;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px; }
        .celeb-overlay.show { display:flex; }
        .celeb-stars { display:flex;gap:14px;margin-bottom:14px; }
        .celeb-star  { font-size:44px;animation:starPop 0.5s cubic-bezier(0.175,0.885,0.32,1.4) both; }
        .celeb-star:nth-child(2){ animation-delay:0.15s; }
        .celeb-star:nth-child(3){ animation-delay:0.30s; }
        @keyframes starPop { 0%{transform:scale(0) rotate(-30deg);opacity:0;} 100%{transform:scale(1) rotate(0);opacity:1;} }
        .celeb-big   { font-size:90px;margin-bottom:10px;animation:popIn 0.6s cubic-bezier(0.175,0.885,0.32,1.4) both; }
        @keyframes popIn { 0%{transform:scale(0) rotate(-10deg);opacity:0;} 80%{transform:scale(1.12) rotate(4deg);} 100%{transform:scale(1) rotate(0);opacity:1;} }
        .celeb-title { font-size:36px;color:white;margin-bottom:8px;font-family:'Fredoka One',cursive;text-shadow:0 3px 12px rgba(0,0,0,0.2); }
        .celeb-sub   { font-size:17px;color:rgba(255,255,255,0.92);white-space:pre-line;margin-bottom:20px;font-family:'Nunito',sans-serif;font-weight:700; }
        .celeb-row   { display:flex;gap:12px;flex-wrap:wrap;justify-content:center; }
        .celeb-btn { background:white;color:#1d4ed8;border:none;padding:16px 36px;border-radius:50px;font-size:18px;font-family:'Fredoka One',cursive;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,0.22);transition:transform 0.15s; }
        .celeb-btn.quiz-trigger { background:#FFD600;color:#333; }
        .celeb-btn:active { transform:scale(0.94); }

        @keyframes slideUp { from{transform:translateY(28px);opacity:0;} to{transform:translateY(0);opacity:1;} }
        @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0);opacity:1;} 100%{transform:translateY(110vh) rotate(720deg);opacity:0;} }
    </style>
</head>
<body>

<!-- ═══ MAIN SCREEN ═══ -->
<div class="screen" id="mainScreen" onclick="handleTap(event)">

    <img id="bgPhoto" src="" alt=""/>
    <div id="colorOverlay"></div>
    <div id="bgEmoji">🚗</div>
    <div class="grad-top"></div>
    <div class="grad-bottom"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <!-- Top Bar -->
    <div class="topbar" onclick="event.stopPropagation()">
        <a href="/dashboard" class="topbar-btn">🏠 Home</a>
        <div class="stars-display" id="starsDisplay">⭐ 0</div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="sound-pill" id="soundFab" onclick="event.stopPropagation();toggleSound();">🔊 Sound</button>
            <button class="topbar-btn" onclick="openPanel(event)">⚙️ Parent</button>
        </div>
    </div>

    <!-- Dots -->
    <div class="dots-row" id="dotsRow"></div>

    <!-- UKG info chips: Type · Fuel · Carries -->
    <div class="info-row" id="infoRow">
        <div class="info-chip"><span class="chip-icon">🚦</span><span id="infoType">–</span></div>
        <div class="info-chip"><span class="chip-icon">⛽</span><span id="infoFuel">–</span></div>
        <div class="info-chip"><span class="chip-icon">👥</span><span id="infoCarries">–</span></div>
    </div>

    <!-- Name + fact -->
    <div class="name-card">
        <div class="word-label"    id="wordLabel">Car</div>
        <div class="fun-fact-chip" id="funFactChip">I ride on roads!</div>
    </div>

    <button class="speak-fab" id="speakFab" onclick="event.stopPropagation();tapSpeak();">🔊</button>

    <div class="bottom-bar" onclick="event.stopPropagation()">
        <button class="nav-btn" id="prevBtn" onclick="prevTransport(event)" disabled>◀</button>
        <div class="bottom-center">
            <div class="tap-hint" id="tapHint">👆 Tap to see next!</div>
            <div class="autoplay-pill" id="autoplayPill">▶ Playing…</div>
        </div>
        <button class="next-btn" onclick="nextTransport(event)">Next ▶</button>
    </div>
</div>

<!-- ═══ PARENT PANEL ═══ -->
<div class="overlay" id="parentOverlay">
    <div class="panel">
        <h2>🚗 Parent Controls</h2>
        <div class="panel-progress" id="panelProgress">0 of 20 vehicles seen</div>
        <div class="panel-row">
            <div><div class="panel-label">🔊 Voice Sound</div><div class="panel-sub">Speaks vehicle name aloud</div></div>
            <button class="toggle on" id="soundToggle" onclick="toggleSound()"></button>
        </div>
        <div class="panel-row">
            <div><div class="panel-label">▶️ Auto Play</div><div class="panel-sub">Changes vehicle automatically</div></div>
            <button class="toggle" id="autoToggle" onclick="toggleAuto()"></button>
        </div>
        <div class="panel-row" style="border:none">
            <div><div class="panel-label">⏱️ Speed</div><div class="panel-sub">Seconds per vehicle</div></div>
            <div class="speed-row">
                <button class="speed-btn"        onclick="setSpeed(3,this)">3s</button>
                <button class="speed-btn active" onclick="setSpeed(5,this)">5s</button>
                <button class="speed-btn"        onclick="setSpeed(8,this)">8s</button>
            </div>
        </div>
        <div class="jump-section">
            <h4>Jump to any vehicle</h4>
            <div class="jump-grid" id="jumpGrid"></div>
        </div>
        <button class="close-panel-btn" onclick="closePanel()">✅ Keep Exploring!</button>
    </div>
</div>

<!-- ═══ QUIZ ═══ -->
<div class="quiz-overlay" id="quizOverlay">
    <div class="quiz-box" id="quizBox"></div>
</div>

<!-- ═══ CELEBRATION ═══ -->
<div class="celeb-overlay" id="celebOverlay">
    <div class="celeb-stars">
        <span class="celeb-star">⭐</span>
        <span class="celeb-star">⭐</span>
        <span class="celeb-star">⭐</span>
    </div>
    <div class="celeb-big"   id="celebBig">🎉</div>
    <div class="celeb-title" id="celebTitle">Amazing!</div>
    <div class="celeb-sub"   id="celebSub">You learned a new vehicle!</div>
    <div class="celeb-row">
        <button class="celeb-btn" onclick="closeCelebration()">Keep Going! 🚀</button>
        <button class="celeb-btn quiz-trigger" id="startQuizBtn" onclick="startQuiz()" style="display:none;">🧠 Take Quiz!</button>
    </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   UKG TRANSPORT DATA  — 20 vehicles
   Each entry:
     name      – vehicle name
     emoji     – always visible fallback
     image     – photo path (transport/<name>.jpg)

/* ── STATE ── */
let current   = 0;
let stars     = 0;
let soundOn   = true;
let autoPlay  = false;
let autoSpeed = 5000;
let autoTimer = null;
let learned   = new Set();

/* ══════════════════════
   UPDATE SCREEN
══════════════════════ */
function updateScreen(animate = true) {
    const t = transport[current];

    /* photo — hidden; onload reveals, onerror keeps hidden → emoji shows through */
    const photo = document.getElementById('bgPhoto');
    photo.style.opacity = '0';
    photo.src = t.image; photo.alt = t.name;
    photo.onload  = () => { photo.style.opacity = '1'; };
    photo.onerror = () => { photo.style.opacity = '0'; };

    /* colour overlay (always on, photo fades on top) */
    document.getElementById('colorOverlay').style.background =
        `linear-gradient(135deg, ${t.color[0]}cc 0%, ${t.color[1]}cc 100%)`;

    /* big background emoji fallback */
    document.getElementById('bgEmoji').textContent = t.emoji;

    /* info chips */
    document.getElementById('infoType').textContent    = t.type;
    document.getElementById('infoFuel').textContent    = t.fuel;
    document.getElementById('infoCarries').textContent = t.carries;

    /* name + fact */
    document.getElementById('wordLabel').textContent    = t.name;
    document.getElementById('funFactChip').textContent  = t.fact;

    document.getElementById('prevBtn').disabled = current === 0;

    if (animate) {
        reAnimate('wordLabel',   'slideUp 0.4s ease both');
        reAnimate('funFactChip', 'slideUp 0.4s ease 0.12s both');
        reAnimate('infoRow',     'slideUp 0.4s ease 0.22s both');
        reAnimate('bgEmoji',     'floatEmoji 4s ease-in-out infinite alternate');
    }
    updateDots();
    if (soundOn) setTimeout(speakTransport, 450);
}

function reAnimate(id, anim) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.animation = 'none'; void el.offsetWidth; el.style.animation = anim;
}

/* ══════════════════════
   SPEECH
══════════════════════ */
function speakTransport() {
    if (!soundOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const t = transport[current];
    const msg = `${t.name}! This is a ${t.name}. It travels by ${t.type}. It runs on ${t.fuel}. ${t.name} says ${t.sound}!`;
    const u = new SpeechSynthesisUtterance(msg);
    u.rate = 0.72; u.pitch = 1.35; u.volume = 1;
    const fab = document.getElementById('speakFab');
    fab.classList.add('speaking');
    u.onend = () => fab.classList.remove('speaking');
    window.speechSynthesis.speak(u);
}
function tapSpeak() { speakTransport(); }

/* ══════════════════════
   NAVIGATION
══════════════════════ */
function handleTap(e) { burstStar(e.clientX, e.clientY); nextTransport(e); }

function burstStar(x, y) {
    const el = document.createElement('div');
    el.className = 'float-star';
    el.textContent = ['⭐','✨','🌟'][Math.floor(Math.random()*3)];
    el.style.left = `${x-16}px`; el.style.top = `${y-16}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
}

function nextTransport(e) {
    if (e) e.stopPropagation();
    learned.add(current); addStars(1);
    if (learned.size % 5 === 0 && current < transport.length - 1) {
        showCelebration('🌟','Great Job!',`You learned ${learned.size} vehicles!\nKeep going! 🚀`);
        return;
    }
    if (current >= transport.length - 1) {
        learned.add(transport.length - 1);
        showCelebration('🏆','You Did It!',`WOW! You learned ALL ${transport.length} vehicles!\nTime for a Quiz! 🧠`);
        document.getElementById('startQuizBtn').style.display = 'inline-block';
        return;
    }
    current++; updateScreen();
    if (autoPlay) resetAutoTimer();
}

function prevTransport(e) {
    if (e) e.stopPropagation();
    if (current > 0) { current--; updateScreen(); }
}

function addStars(n) {
    stars += n;
    const el = document.getElementById('starsDisplay');
    el.textContent = `⭐ ${stars}`; el.style.transform = 'scale(1.35)';
    setTimeout(() => el.style.transform = '', 200);
}

/* ══════════════════════
   DOTS
══════════════════════ */
function updateDots() {
    const row = document.getElementById('dotsRow'); row.innerHTML = '';
    transport.forEach((_,i) => {
        const d = document.createElement('div');
        d.className = `dot ${i===current?'current':learned.has(i)?'done':''}`;
        row.appendChild(d);
    });
}

/* ══════════════════════
   AUTO PLAY
══════════════════════ */
function toggleAuto() {
    autoPlay = !autoPlay;
    document.getElementById('autoToggle').classList.toggle('on', autoPlay);
    document.getElementById('autoplayPill').classList.toggle('show', autoPlay);
    document.getElementById('tapHint').style.display = autoPlay ? 'none' : 'block';
    autoPlay ? resetAutoTimer() : clearInterval(autoTimer);
}
function resetAutoTimer() {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => {
        learned.add(current);
        if (current < transport.length - 1) { current++; updateScreen(); }
        else { clearInterval(autoTimer); showCelebration('🏆','You Did It!',`ALL ${transport.length} vehicles explored!`); }
    }, autoSpeed);
}
function setSpeed(s, btn) {
    autoSpeed = s * 1000;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (autoPlay) resetAutoTimer();
}

/* ══════════════════════
   SOUND
══════════════════════ */
function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('soundToggle').classList.toggle('on', soundOn);
    document.getElementById('speakFab').style.opacity = soundOn ? '1' : '0.45';
    const pill = document.getElementById('soundFab');
    pill.textContent = soundOn ? '🔊 Sound' : '🔇 Muted';
    pill.classList.toggle('muted', !soundOn);
    if (!soundOn) window.speechSynthesis.cancel();
}

/* ══════════════════════
   PARENT PANEL
══════════════════════ */
function openPanel(e) {
    if (e) e.stopPropagation(); clearInterval(autoTimer);
    document.getElementById('panelProgress').textContent =
        `${learned.size} of ${transport.length} vehicles seen ✅`;
    buildJumpGrid();
    document.getElementById('parentOverlay').classList.add('show');
}
function closePanel() {
    document.getElementById('parentOverlay').classList.remove('show');
    if (autoPlay) resetAutoTimer();
}
function buildJumpGrid() {
    const grid = document.getElementById('jumpGrid'); grid.innerHTML = '';
    transport.forEach((t,i) => {
        const btn = document.createElement('button');
        btn.className = `jump-btn ${i===current?'cur':learned.has(i)?'done':''}`;
        btn.textContent = t.emoji + ' ' + t.name;
        btn.onclick = () => { current=i; updateScreen(); closePanel(); };
        grid.appendChild(btn);
    });
}

/* ══════════════════════
   CELEBRATION
══════════════════════ */
function showCelebration(icon, title, sub) {
    clearInterval(autoTimer);
    document.getElementById('celebBig').textContent   = icon;
    document.getElementById('celebTitle').textContent = title;
    document.getElementById('celebSub').textContent   = sub;
    document.getElementById('celebOverlay').classList.add('show');
    if (soundOn) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance('Amazing! Well done! You are a superstar!');
        u.pitch = 1.4; u.rate = 0.8; window.speechSynthesis.speak(u);
    }
    launchConfetti();
}
function closeCelebration() {
    document.getElementById('celebOverlay').classList.remove('show');
    document.getElementById('startQuizBtn').style.display = 'none';
    if (current < transport.length - 1) { current++; updateScreen(); }
    if (autoPlay) resetAutoTimer();
}

/* ══════════════════════
   QUIZ  (UKG exclusive)
   4 question types:
   0 — What sound does X make?
   1 — How does X travel? (type)
   2 — What fuel does X use?
   3 — Which vehicle says Y?
══════════════════════ */
const QUIZ_COUNT = 8;
let quizQs = [], quizIdx = 0, quizScore = 0;

function buildQuiz() {
    const pool = [];
    const shuffled = [...transport].sort(() => Math.random() - 0.5);

    shuffled.slice(0, QUIZ_COUNT).forEach(t => {
        const type = Math.floor(Math.random() * 4);

        if (type === 0) {
            const wrongs = transport.filter(x => x.name !== t.name)
                .sort(() => Math.random() - 0.5).slice(0,3).map(x => x.sound);
            pool.push({
                q: `What sound does a ${t.name} make?`,
                emoji: t.emoji, img: t.image,
                answer: t.sound, opts: shuffle([t.sound, ...wrongs])
            });
        } else if (type === 1) {
            const wrongs = [...new Set(transport.filter(x => x.type !== t.type).map(x => x.type))]
                .sort(() => Math.random() - 0.5).slice(0,3);
            pool.push({
                q: `How does a ${t.name} travel?`,
                emoji: t.emoji, img: t.image,
                answer: t.type, opts: shuffle([t.type, ...wrongs])
            });
        } else if (type === 2) {
            const wrongs = [...new Set(transport.filter(x => x.fuel !== t.fuel).map(x => x.fuel))]
                .sort(() => Math.random() - 0.5).slice(0,3);
            pool.push({
                q: `What fuel does a ${t.name} use?`,
                emoji: t.emoji, img: t.image,
                answer: t.fuel, opts: shuffle([t.fuel, ...wrongs])
            });
        } else {
            const wrongs = transport.filter(x => x.name !== t.name)
                .sort(() => Math.random() - 0.5).slice(0,3).map(x => x.name);
            pool.push({
                q: `Which vehicle says "${t.sound}"?`,
                emoji: null, img: null,
                answer: t.name, opts: shuffle([t.name, ...wrongs])
            });
        }
    });
    return pool.slice(0, QUIZ_COUNT);
}

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function startQuiz() {
    document.getElementById('celebOverlay').classList.remove('show');
    document.getElementById('startQuizBtn').style.display = 'none';
    quizQs = buildQuiz(); quizIdx = 0; quizScore = 0;
    document.getElementById('quizOverlay').classList.add('show');
    renderQuestion();
}

function renderQuestion() {
    const box = document.getElementById('quizBox');
    if (quizIdx >= quizQs.length) { renderScore(box); return; }
    const q   = quizQs[quizIdx];
    const pct = Math.round((quizIdx / quizQs.length) * 100);

    box.innerHTML = `
        <div class="quiz-progress">Question ${quizIdx+1} / ${quizQs.length}</div>
        <div class="quiz-track"><div class="quiz-fill" style="width:${pct}%"></div></div>
        <div class="quiz-q">${q.q}</div>
        ${q.emoji ? `<span class="quiz-emoji">${q.emoji}</span>` : ''}
        ${q.img   ? `<img class="quiz-img" src="${q.img}" onerror="this.style.display='none'">` : ''}
        <div class="quiz-options">
            ${q.opts.map(o => `<button class="quiz-opt" onclick="checkAnswer(this,'${esc(o)}','${esc(q.answer)}')">${o}</button>`).join('')}
        </div>
        <div class="quiz-feedback" id="qFeedback"></div>
        <button class="quiz-next" id="qNext" onclick="nextQuestion()">Next ➜</button>
    `;
}

function esc(s) { return s.replace(/'/g,"\\'"); }

function checkAnswer(btn, chosen, correct) {
    document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
    const fb = document.getElementById('qFeedback');
    if (chosen === correct) {
        btn.classList.add('correct');
        fb.className = 'quiz-feedback ok';
        fb.textContent = '✅ Correct! Well done!';
        quizScore++; addStars(3);
    } else {
        btn.classList.add('wrong');
        document.querySelectorAll('.quiz-opt').forEach(b => {
            if (b.textContent.trim() === correct) b.classList.add('correct');
        });
        fb.className = 'quiz-feedback bad';
        fb.textContent = `❌ Answer: ${correct}`;
    }
    document.getElementById('qNext').classList.add('show');
}

function nextQuestion() { quizIdx++; renderQuestion(); }

function renderScore(box) {
    const pct  = Math.round((quizScore / quizQs.length) * 100);
    const icon = pct >= 80 ? '🏆' : pct >= 50 ? '🌟' : '💪';
    const msg  = pct >= 80 ? 'Excellent! You are a Transport Expert!' : pct >= 50 ? 'Good effort! Keep learning!' : 'Keep practising — you can do it!';
    addStars(quizScore * 2);
    box.innerHTML = `
        <div class="quiz-score-screen">
            <div class="quiz-score-icon">${icon}</div>
            <div class="quiz-score-title">Quiz Done!</div>
            <div class="quiz-score-val">${quizScore}/${quizQs.length}</div>
            <div class="quiz-score-sub">${msg} You scored ${pct}%</div>
            <button class="quiz-retry" onclick="retryQuiz()">🔄 Try Again</button>
            <button class="quiz-retry" style="background:#E63946;" onclick="closeQuiz()">✅ Done</button>
        </div>
    `;
}

function retryQuiz() { quizQs=buildQuiz(); quizIdx=0; quizScore=0; renderQuestion(); }
function closeQuiz()  { document.getElementById('quizOverlay').classList.remove('show'); }

/* ── CONFETTI ── */
function launchConfetti() {
    const cols = ['#FF6B6B','#FFC300','#2ECC71','#3498DB','#9B59B6','#fff','#fbbf24','#f472b6','#FB923C'];
    for (let i=0;i<80;i++) {
        const c = document.createElement('div');
        const sz = Math.random()*16+7;
        c.style.cssText = `position:fixed;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'4px'};left:${Math.random()*100}vw;top:-24px;z-index:300;animation:confettiFall ${Math.random()*2.2+1.8}s ease ${Math.random()*.8}s forwards;pointer-events:none;`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
    }
}
