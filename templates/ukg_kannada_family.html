<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ನನ್ನ ಕುಟುಂಬ - UKG ಕನ್ನಡ</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@500;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --radius: 30px; --top-h: 70px; }

body {
  font-family: 'Baloo Tamma 2', cursive;
  background: #fff5fb;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--top-h);
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 300;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
.topbar-title {
  font-size: 1.55rem; font-weight: 900;
  background: linear-gradient(90deg, #fda73c, #e84393, #a29bfe);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.top-right { display: flex; align-items: center; gap: 10px; }
.score-pill {
  background: #fda73c; color: #1a1a2e;
  font-weight: 900; font-size: 1rem;
  padding: 7px 18px; border-radius: 50px;
  box-shadow: 0 4px 14px rgba(253,167,60,0.45);
  white-space: nowrap;
}
.sound-btn {
  background: rgba(255,255,255,0.13);
  border: 2px solid rgba(255,255,255,0.22);
  color: white; border-radius: 12px;
  padding: 8px 14px; font-size: 1.2rem;
  cursor: pointer; font-family: inherit;
  transition: background 0.2s;
}
.sound-btn:hover { background: rgba(255,255,255,0.22); }
.sound-btn.off { opacity: 0.4; }

/* ── TAB NAV ── */
.tab-nav {
  display: flex;
  background: #1a1a2e;
  padding: 0 12px 14px;
  gap: 8px;
  overflow-x: auto; scrollbar-width: none;
  position: sticky; top: var(--top-h); z-index: 200;
}
.tab-nav::-webkit-scrollbar { display: none; }

.tab-btn {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 22px; border-radius: 18px; border: none;
  cursor: pointer; font-family: 'Baloo Tamma 2', cursive;
  font-weight: 800; color: rgba(255,255,255,0.45);
  background: rgba(255,255,255,0.07);
  transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; position: relative;
}
.tab-btn .t-icon { font-size: 1.7rem; line-height: 1; }
.tab-btn .t-kn   { font-size: 0.95rem; }
.tab-btn .t-en   { font-size: 0.68rem; opacity: 0.55; font-weight: 600; }
.tab-btn.active  { color: #1a1a2e; transform: translateY(-3px) scale(1.06); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }

.tab-btn[data-t="nuclear"].active   { background: linear-gradient(135deg,#fda73c,#e17055); }
.tab-btn[data-t="extended"].active  { background: linear-gradient(135deg,#e84393,#c0336f); color: white; }
.tab-btn[data-t="sentences"].active { background: linear-gradient(135deg,#a29bfe,#6c5ce7); color: white; }

.tab-count {
  position: absolute; top: 5px; right: 7px;
  background: rgba(255,255,255,0.22); border-radius: 50px;
  padding: 1px 6px; font-size: 0.62rem; font-weight: 900;
}
.tab-btn.active .tab-count { background: rgba(0,0,0,0.12); }

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── PANEL HERO ── */
.panel-hero {
  padding: 30px 24px 20px; text-align: center; position: relative; overflow: hidden;
}
.panel-hero h2 { font-size: 2.6rem; font-weight: 900; line-height: 1.1; margin-bottom: 6px; }
.panel-hero p  { font-size: 1.05rem; font-weight: 700; opacity: 0.65; margin-bottom: 14px; }
.tap-hint {
  display: inline-flex; align-items: center; gap: 7px;
  border: 2.5px dashed currentColor; border-radius: 50px;
  padding: 7px 20px; font-size: 0.98rem; font-weight: 800; opacity: 0.75;
  animation: wag 2s ease-in-out infinite;
}
@keyframes wag { 0%,100%{transform:rotate(-1.5deg);} 50%{transform:rotate(1.5deg);} }
.hf {
  position: absolute; font-size: 3.5rem;
  animation: fy 4s ease-in-out infinite; pointer-events: none; opacity: 0.14;
}
@keyframes fy { 0%,100%{transform:translateY(0) rotate(-8deg);} 50%{transform:translateY(-18px) rotate(8deg);} }

/* ── CARD GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 22px; padding: 14px 26px 60px;
  max-width: 1300px; margin: 0 auto;
}

/* ── CARD ── */
.card {
  border-radius: var(--radius); background: white;
  box-shadow: 0 6px 28px rgba(0,0,0,0.09);
  cursor: pointer; overflow: hidden;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  border: 3.5px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.5) rotate(-6deg); }
  to   { opacity:1; transform:scale(1); }
}
.card:hover { transform:translateY(-12px) scale(1.04) rotate(.8deg); box-shadow:0 24px 56px rgba(0,0,0,0.14); }
.card:active { transform:scale(0.91); }
.card.playing { animation: cb .5s cubic-bezier(.34,1.56,.64,1) !important; }
@keyframes cb { 0%{transform:scale(1);} 30%{transform:scale(1.22) rotate(-4deg);} 65%{transform:scale(.94) rotate(2deg);} 100%{transform:scale(1);} }

.card-face {
  height: 155px;
  display: flex; align-items: center; justify-content: center;
  font-size: 5.2rem; position: relative;
}
.heart-pop {
  position: absolute; top: 8px; right: 12px;
  font-size: 1.5rem; transform: scale(0); opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1); pointer-events: none;
}
.card.playing .heart-pop { transform: scale(1) rotate(15deg); opacity: 1; }
.card.learned .heart-pop { transform: scale(0.85); opacity: 0.5; }

/* side badge top-left */
.side-badge {
  position: absolute; top: 10px; left: 10px;
  font-size: 0.65rem; font-weight: 900;
  padding: 3px 9px; border-radius: 50px;
  letter-spacing: 0.3px;
}
.side-p { background: #dbeafe; color: #1d4ed8; }
.side-m { background: #fce7f3; color: #9d174d; }

.card-info { padding: 14px 12px 20px; text-align: center; border-top: 3px solid rgba(0,0,0,0.05); }
.kn-word { font-size: 1.75rem; font-weight: 900; color: #1a1a2e; line-height: 1.1; }
.en-word { font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; opacity: 0.38; }
.relation-pill {
  display: inline-block; margin-top: 9px; border-radius: 50px;
  padding: 5px 14px; font-size: 0.82rem; font-weight: 800; color: white;
}

/* ── SENTENCES PANEL ── */
.sentences-wrap {
  max-width: 920px; margin: 0 auto;
  padding: 14px 26px 60px;
}

.sent-group { margin-bottom: 28px; }

.sent-group-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 1.2rem; font-weight: 900;
  background: white;
  border-radius: 50px;
  padding: 10px 22px;
  margin-bottom: 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  width: fit-content;
}

.sent-card {
  background: white;
  border: 3px solid transparent;
  border-radius: 22px;
  padding: 18px 20px;
  margin-bottom: 12px;
  cursor: pointer;
  display: flex; align-items: flex-start; gap: 16px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.07);
  transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
  animation: popIn 0.45s cubic-bezier(.34,1.56,.64,1) both;
  -webkit-tap-highlight-color: transparent;
}
.sent-card:hover { transform: translateX(8px) scale(1.01); box-shadow: 0 10px 32px rgba(0,0,0,0.12); }
.sent-card:active { transform: scale(0.97); }
.sent-card.playing { border-color: #fda73c; background: #fff8ee; }

.sent-emoji {
  font-size: 2.6rem; flex-shrink: 0;
  background: #fff5e6; border-radius: 16px;
  width: 60px; height: 60px;
  display: flex; align-items: center; justify-content: center;
}
.sent-body { flex: 1; }
.sent-kn {
  font-size: 1.15rem; font-weight: 800; color: #1a1a2e;
  line-height: 1.5;
}
.sent-en {
  font-size: 0.8rem; font-weight: 700;
  color: #aaa; margin-top: 4px; font-style: italic;
}
.sent-play {
  flex-shrink: 0; font-size: 1.4rem;
  background: #f3f4f6; border-radius: 50%;
  width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
  align-self: center;
}
.sent-card:hover .sent-play { background: #fda73c; }
.sent-card.playing .sent-play { background: #fda73c; animation: spinPop 0.4s ease; }
@keyframes spinPop { 0%{transform:scale(0.8) rotate(-20deg);} 100%{transform:scale(1) rotate(0);} }

/* ── CONFETTI ── */
.cf { position:fixed; border-radius:3px; top:-20px; pointer-events:none; z-index:9999; animation:cff 1.4s ease-in forwards; }
@keyframes cff { to { transform: translateY(110vh) rotate(600deg); opacity:0; } }

/* ── RESPONSIVE ── */
@media (max-width: 580px) {
  .grid { grid-template-columns: repeat(2,1fr); gap:13px; padding:10px 12px 44px; }
  .card-face { height:115px; font-size:3.8rem; }
  .kn-word { font-size:1.35rem; }
  .panel-hero h2 { font-size:2rem; }
  .sentences-wrap { padding: 10px 14px 44px; }
  .sent-kn { font-size: 1rem; }
}
@media (min-width:900px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); }
  .card-face { height:172px; font-size:5.8rem; }
  .kn-word { font-size:2rem; }
}


/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.topbar-title{font-size:clamp(15px,2vw,28px);}
.hero h1{font-size:clamp(22px,3.5vw,52px);}
.hero h2{font-size:clamp(22px,3.5vw,52px);}
.hero p{font-size:clamp(13px,1.6vw,22px);}
.hero{padding:clamp(18px,3vw,48px) clamp(20px,5vw,80px) clamp(44px,6vw,80px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.card{border-radius:clamp(16px,2vw,28px);}
</style>
</head>
<body>

      {emoji:'👴', kn:'ಇವರು ನನ್ನ ತಾತ. ಅವರು ನನಗೆ ಕಥೆ ಹೇಳುತ್ತಾರೆ.', en:'This is my grandfather. He tells me stories.'},
      {emoji:'👵', kn:'ಇವರು ನನ್ನ ಅಜ್ಜಿ. ಅವರು ನನಗೆ ತಿಂಡಿ ಮಾಡಿ ಕೊಡುತ್ತಾರೆ.', en:'This is my grandmother. She makes snacks for me.'},
      {emoji:'🏡', kn:'ನಾನು ರಜೆಯಲ್ಲಿ ತಾತ ಅಜ್ಜಿ ಮನೆಗೆ ಹೋಗುತ್ತೇನೆ.', en:'I visit my grandparents during holidays.'},
    ]
  },
  {
    title:'❤️ ಕುಟುಂಬ ಮೌಲ್ಯಗಳು', color:'#4a148c', bg:'#ede7f6',
    items:[
      {emoji:'🙏', kn:'ನಾನು ಹಿರಿಯರಿಗೆ ನಮಸ್ಕಾರ ಮಾಡುತ್ತೇನೆ.', en:'I bow to elders with respect.'},
      {emoji:'🤝', kn:'ಕುಟುಂಬದಲ್ಲಿ ಎಲ್ಲರೂ ಒಟ್ಟಿಗೆ ಇರುತ್ತೇವೆ.', en:'In family, we all stay together.'},
      {emoji:'💝', kn:'ಕುಟುಂಬ ದೇವರ ಕೊಡುಗೆ.', en:'Family is a gift from God.'},
    ]
  },
];

// ══════════ STATE ══════════
const TOTAL_CARDS = NUCLEAR.length + EXTENDED.length;
let soundOn = true;
const learned = { nuclear: new Set(), extended: new Set() };

document.getElementById('scorePill').textContent = `⭐ 0 / ${TOTAL_CARDS}`;

// ══════════ TABS ══════════
function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

// ══════════ SOUND ══════════
function toggleSound() {
  soundOn = !soundOn;
  const b = document.getElementById('soundBtn');
  b.textContent = soundOn ? '🔊' : '🔇';
  b.classList.toggle('off', !soundOn);
}
function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='kn-IN'; u.rate=0.82; u.pitch=1.1;
  const v = window.speechSynthesis.getVoices().find(x=>x.lang==='kn-IN'||x.lang.startsWith('kn'));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

// ══════════ SCORE ══════════
function updateScore() {
  const tot = learned.nuclear.size + learned.extended.size;
  document.getElementById('scorePill').textContent = `⭐ ${tot} / ${TOTAL_CARDS}`;
}
function updateCnt(tid) {
  const el = document.getElementById('cnt-'+tid);
  if (el) el.textContent = `${learned[tid].size}/${tid==='nuclear'?NUCLEAR.length:EXTENDED.length}`;
}

// ══════════ CONFETTI ══════════
const CC = ['#fda73c','#e84393','#a29bfe','#06D6A0','#FF6B9D','#FFD93D','#43e97b'];
function confetti(x,y) {
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='cf';
    el.style.cssText=`left:${x+(Math.random()-.5)*160}px;background:${CC[i%CC.length]};animation-duration:${.9+Math.random()*.9}s;animation-delay:${Math.random()*.2}s;width:${6+Math.random()*10}px;height:${8+Math.random()*14}px;transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2200);
  }
}

// ══════════ BUILD FAMILY CARDS ══════════
let di = 0;
function makeCard(f, tid) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = (di++ * 0.05) + 's';
  card.style.borderColor = f.border;

  const sideBadge = f.side==='p'
    ? `<span class="side-badge side-p">🔵 ಅಪ್ಪನ ಕಡೆ</span>`
    : f.side==='m'
    ? `<span class="side-badge side-m">🩷 ಅಮ್ಮನ ಕಡೆ</span>`
    : '';

  card.innerHTML = `
    <div class="card-face" style="background:${f.bg};">
      <span class="heart-pop">❤️</span>
      ${sideBadge}
      <span style="filter:drop-shadow(0 6px 14px rgba(0,0,0,0.18));line-height:1;">${f.emoji}</span>
    </div>
    <div class="card-info">
      <div class="kn-word">${f.kn}</div>
      <div class="en-word">${f.en}</div>
      <div class="relation-pill" style="background:${f.pill};">${f.relation}</div>
    </div>`;

  card.addEventListener('click', e => {
    card.classList.remove('playing'); void card.offsetWidth; card.classList.add('playing');
    speak(f.kn);
    setTimeout(() => card.classList.remove('playing'), 520);
    if (learned[tid] && !learned[tid].has(f.kn)) {
      learned[tid].add(f.kn);
      card.classList.add('learned');
      updateScore(); updateCnt(tid);
      const r = card.getBoundingClientRect();
      confetti(r.left + r.width/2, r.top + r.height/2);
    }
  });
  return card;
}

// ══════════ BUILD SENTENCE CARDS ══════════
function buildSentences() {
  const wrap = document.getElementById('sentWrap');
  wrap.innerHTML = '';
  let sd = 0;
  SENTENCES.forEach(group => {
    const grp = document.createElement('div');
    grp.className = 'sent-group';

    const title = document.createElement('div');
    title.className = 'sent-group-title';
    title.style.color = group.color;
    title.style.border = `2.5px solid ${group.color}22`;
    title.textContent = group.title;
    grp.appendChild(title);

    group.items.forEach(s => {
      const card = document.createElement('div');
      card.className = 'sent-card';
      card.style.animationDelay = (sd++ * 0.06) + 's';
      card.style.borderColor = group.color + '33';
      card.innerHTML = `
        <div class="sent-emoji" style="background:${group.bg};">${s.emoji}</div>
        <div class="sent-body">
          <div class="sent-kn">${s.kn}</div>
          <div class="sent-en">${s.en}</div>
        </div>
        <div class="sent-play">🔊</div>`;
      card.addEventListener('click', () => {
        card.classList.add('playing');
        speak(s.kn);
        setTimeout(() => card.classList.remove('playing'), 3000);
      });
      grp.appendChild(card);
    });
    wrap.appendChild(grp);
  });
}

// ══════════ INIT ══════════
const gnuc = document.getElementById('grid-nuclear');
NUCLEAR.forEach(f => gnuc.appendChild(makeCard(f,'nuclear')));

const gext = document.getElementById('grid-extended');
EXTENDED.forEach(f => gext.appendChild(makeCard(f,'extended')));

buildSentences();

if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}
</script>
