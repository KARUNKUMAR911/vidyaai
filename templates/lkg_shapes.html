<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shapes Fun! 🔷</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka One', cursive;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        .screen {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.7s ease;
            position: relative;
            overflow: hidden;
        }

        /* Floating blobs */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.10);
            pointer-events: none;
            animation: floatBlob 7s ease-in-out infinite alternate;
        }
        .bg-blob:nth-child(1) { width: 220px; height: 220px; top: -60px; left: -60px; animation-delay: 0s; }
        .bg-blob:nth-child(2) { width: 140px; height: 140px; bottom: 80px; right: -30px; animation-delay: 2.2s; }
        .bg-blob:nth-child(3) { width: 90px;  height: 90px;  top: 38%;    left: 3%;    animation-delay: 4s; }
        .bg-blob:nth-child(4) { width: 65px;  height: 65px;  top: 18%;    right: 6%;   animation-delay: 1.5s; }
        @keyframes floatBlob {
            from { transform: translateY(0) scale(1); }
            to   { transform: translateY(22px) scale(1.1); }
        }

        /* ── TOP BAR ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            flex-shrink: 0;
            z-index: 10;
            position: relative;
        }
        .topbar-btn {
            background: rgba(255,255,255,0.28);
            border: 3px solid rgba(255,255,255,0.5);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 15px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.15s, background 0.15s;
        }
        .topbar-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.45); }
        .stars-display {
            background: rgba(255,215,0,0.35);
            border: 3px solid rgba(255,215,0,0.65);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Fredoka One', cursive;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }

        /* ── PROGRESS DOTS ── */
        .dots-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 6px 16px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.30);
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .dot.done    { background: rgba(255,255,255,0.72); }
        .dot.current {
            background: #FFD600;
            transform: scale(1.7);
            box-shadow: 0 0 10px #FFD600;
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 24px 0;
            gap: 24px;
            min-height: 0;
            position: relative;
            z-index: 2;
        }

        /* ── LEFT: SHAPE DISPLAY ── */
        .shape-half {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .shape-stage {
            position: relative;
            width:  min(34vw, 46vh);
            height: min(34vw, 46vh);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        /* SVG fills the stage */
        .shape-stage svg {
            width: 100%;
            height: 100%;
            overflow: visible;
            animation: popIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4) both;
            filter: drop-shadow(0 10px 28px rgba(0,0,0,0.28));
        }
        .shape-stage:active svg { transform: scale(0.9) rotate(-4deg); transition: transform 0.1s; }

        /* Ring pulse on tap */
        .shape-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.55);
            pointer-events: none;
            opacity: 0;
        }
        .shape-ring.pulse { animation: ringPulse 0.65s ease-out forwards; }
        @keyframes ringPulse {
            0%   { transform: scale(0.7); opacity: 0.9; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* Sides badge */
        .sides-badge {
            background: rgba(255,255,255,0.25);
            border: 3px solid rgba(255,255,255,0.5);
            color: white;
            padding: 5px 18px;
            border-radius: 50px;
            font-size: min(3.2vw, 4.5vh);
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            animation: slideUp 0.4s ease 0.3s both;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shape-name {
            font-size: min(9vw, 12vh);
            font-family: 'Fredoka One', cursive;
            color: white;
            text-shadow: 0 4px 16px rgba(0,0,0,0.22);
            animation: slideUp 0.4s ease 0.18s both;
            line-height: 1;
            letter-spacing: 1px;
        }

        /* ── RIGHT: THINGS WITH THAT SHAPE ── */
        .things-half {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .things-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            animation: bounceIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4) 0.1s both;
        }
        .thing-card {
            width:  min(16vw, 20vh);
            height: min(16vw, 20vh);
            border-radius: 22px;
            background: rgba(255,255,255,0.22);
            border: 3px solid rgba(255,255,255,0.45);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
            box-shadow: 0 6px 18px rgba(0,0,0,0.18);
        }
        .thing-card:active { transform: scale(0.88); background: rgba(255,255,255,0.4); }
        .thing-card:hover  { transform: scale(1.05); background: rgba(255,255,255,0.32); }
        .thing-emoji {
            font-size: min(7vw, 9vh);
            line-height: 1;
            transition: transform 0.2s;
        }
        .thing-card:hover .thing-emoji { transform: scale(1.15) rotate(-5deg); }
        .thing-name {
            font-size: min(2.4vw, 3vh);
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            color: rgba(255,255,255,0.92);
            text-align: center;
            line-height: 1;
        }

        /* ── BOTTOM BAR ── */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px 18px;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
            gap: 10px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.25);
            border: 3px solid rgba(255,255,255,0.5);
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 22px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            transition: all 0.15s;
            min-width: 70px;
            text-align: center;
        }
        .nav-btn:hover   { background: rgba(255,255,255,0.4); transform: scale(1.06); }
        .nav-btn:active  { transform: scale(0.92); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .next-btn {
            background: white;
            color: #333;
            border: none;
            padding: 16px 36px;
            border-radius: 50px;
            font-size: 18px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.22), 0 0 0 4px rgba(255,255,255,0.4);
            transition: all 0.18s;
        }
        .next-btn:hover  { transform: scale(1.06) translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.28); }
        .next-btn:active { transform: scale(0.94); }
        .bottom-center { text-align: center; flex: 1; }
        .tap-hint {
            font-size: 15px;
            color: rgba(255,255,255,0.88);
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            animation: tapWiggle 1.8s ease-in-out infinite;
        }
        @keyframes tapWiggle {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.07); }
        }
        .autoplay-pill {
            display: none;
            background: #FFD600;
            color: #333;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            margin-top: 4px;
        }
        .autoplay-pill.show { display: inline-block; }

        /* ── SPEAK FAB ── */
        /* ── SOUND PILL (top bar) ── */
        .sound-pill {
            background: rgba(255,255,255,0.22);
            border: 2.5px solid rgba(255,255,255,0.45);
            color: white; padding: 8px 16px;
            border-radius: 50px; font-size: 15px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            transition: transform 0.15s, background 0.2s;
            backdrop-filter: blur(6px);
            white-space: nowrap;
        }
        .sound-pill:active { transform: scale(0.92); background: rgba(255,255,255,0.4); }
        .sound-pill.muted {
            background: rgba(0,0,0,0.25);
            border-color: rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.5);
            text-decoration: line-through;
        }

        .speak-fab {
            position: absolute;
            bottom: 90px; right: 18px;
            width: 56px; height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.28);
            border: 3px solid rgba(255,255,255,0.55);
            color: white; font-size: 26px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, background 0.15s;
            z-index: 5;
            box-shadow: 0 4px 14px rgba(0,0,0,0.2);
        }
        .speak-fab:active { transform: scale(0.88); background: rgba(255,255,255,0.5); }
        .speak-fab.speaking { animation: speakPulse 0.5s ease infinite alternate; }
        @keyframes speakPulse {
            from { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            to   { box-shadow: 0 0 0 14px rgba(255,255,255,0); }
        }

        /* ── MOBILE ── */
        @media (max-width: 540px) {
            .main-content  { flex-direction: column; gap: 6px; padding: 2px 14px 0; }
            .shape-half    { order: 1; gap: 6px; }
            .things-half   { order: 2; }
            .shape-stage   { width: min(38vw, 22vh); height: min(38vw, 22vh); }
            .shape-name    { font-size: min(11vw, 7vh); }
            .sides-badge   { font-size: min(3.5vw, 3vh); padding: 4px 12px; }
            .thing-card    { width: min(18vw, 12vh); height: min(18vw, 12vh); border-radius: 16px; }
            .thing-emoji   { font-size: min(8vw, 6vh); }
            .thing-name    { font-size: min(2.8vw, 2.2vh); }
            .speak-fab     { bottom: 82px; right: 12px; width: 50px; height: 50px; font-size: 22px; }
        }

        /* ── PARENT PANEL ── */
        .overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 100;
            align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }
        .overlay.show { display: flex; }
        .panel {
            background: white;
            border-radius: 30px;
            padding: 26px;
            width: 92%; max-width: 400px;
            max-height: 88vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        .panel h2 { font-size: 20px; color: #0077b6; margin-bottom: 6px; text-align: center; font-family: 'Fredoka One', cursive; }
        .panel-progress {
            text-align: center; font-size: 13px; color: #666;
            background: #e0f4ff; padding: 8px; border-radius: 12px; margin-bottom: 18px;
            font-family: 'Nunito', sans-serif; font-weight: 700;
        }
        .panel-row {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 13px 0; border-bottom: 1px solid #f0f0f0;
        }
        .panel-label { font-size: 14px; font-weight: 700; color: #333; font-family: 'Nunito', sans-serif; }
        .panel-sub   { font-size: 12px; color: #999; margin-top: 2px; font-family: 'Nunito', sans-serif; }
        .toggle {
            width: 52px; height: 28px; background: #ddd;
            border-radius: 14px; cursor: pointer;
            position: relative; transition: background 0.3s; border: none; flex-shrink: 0;
        }
        .toggle.on { background: #0077b6; }
        .toggle::after {
            content: ''; position: absolute;
            width: 22px; height: 22px; background: white;
            border-radius: 50%; top: 3px; left: 3px;
            transition: left 0.3s; box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }
        .toggle.on::after { left: 27px; }
        .speed-row { display: flex; gap: 7px; }
        .speed-btn {
            padding: 7px 14px; border: 2px solid #e5e7eb;
            border-radius: 20px; font-size: 13px; font-weight: 700;
            cursor: pointer; background: white; transition: all 0.2s;
            font-family: 'Nunito', sans-serif;
        }
        .speed-btn.active { border-color: #0077b6; background: #e0f4ff; color: #0077b6; }
        .jump-section { margin-top: 14px; }
        .jump-section h4 {
            font-size: 12px; color: #888; margin-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
            font-family: 'Nunito', sans-serif; font-weight: 700;
        }
        .jump-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .jump-btn {
            aspect-ratio: 1;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            background: white;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            font-size: 28px;
        }
        .jump-btn:hover   { background: #e0f4ff; border-color: #0077b6; transform: scale(1.08); }
        .jump-btn.done    { background: #d1fae5; border-color: #a7f3d0; }
        .jump-btn.cur     { background: #0077b6; border-color: #0077b6; box-shadow: 0 0 0 3px #FFD600; }
        .close-panel-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg,#0077b6,#005a8a);
            color: white; border: none; border-radius: 16px;
            font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 18px;
            font-family: 'Fredoka One', cursive; letter-spacing: 0.5px;
            transition: transform 0.15s;
        }
        .close-panel-btn:active { transform: scale(0.97); }

        /* ── CELEBRATION ── */
        .celeb-overlay {
            display: none;
            position: fixed; inset: 0;
            background: linear-gradient(135deg,rgba(0,119,182,.97),rgba(0,76,130,.97));
            z-index: 200;
            align-items: center; justify-content: center;
            flex-direction: column; text-align: center; padding: 30px;
        }
        .celeb-overlay.show { display: flex; }
        .celeb-emoji  { font-size: 100px; animation: bounce 0.55s ease infinite alternate; line-height: 1; }
        .celeb-title  {
            font-size: 52px; font-family: 'Fredoka One', cursive;
            color: white; margin: 16px 0 8px;
            text-shadow: 0 4px 20px rgba(0,0,0,.3);
            animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.3) both;
        }
        .celeb-sub {
            font-size: 18px; color: rgba(255,255,255,.92);
            margin-bottom: 32px; line-height: 1.5;
            font-family: 'Nunito', sans-serif; font-weight: 800;
            white-space: pre-line;
        }
        .celeb-btn {
            padding: 20px 56px; background: white; color: #0077b6;
            border: none; border-radius: 50px; font-size: 22px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,.22);
            transition: transform 0.18s; letter-spacing: 0.5px;
        }
        .celeb-btn:hover  { transform: scale(1.06) translateY(-3px); }
        .celeb-btn:active { transform: scale(0.95); }
        .celeb-stars { display: flex; gap: 12px; margin-bottom: 10px; }
        .celeb-star { font-size: 44px; animation: starSpin 0.6s ease both; }
        .celeb-star:nth-child(2) { animation-delay: 0.12s; }
        .celeb-star:nth-child(3) { animation-delay: 0.24s; }
        @keyframes starSpin {
            from { transform: scale(0) rotate(-180deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg);    opacity: 1; }
        }

        /* ── ANIMATIONS ── */
        @keyframes popIn {
            0%   { transform: scale(0.3) rotate(-12deg); opacity: 0; }
            65%  { transform: scale(1.15) rotate(3deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        @keyframes bounceIn {
            0%   { transform: scale(0.4) translateY(40px); opacity: 0; }
            65%  { transform: scale(1.08) translateY(-8px); }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(28px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        @keyframes bounce {
            from { transform: translateY(0) scale(1); }
            to   { transform: translateY(-18px) scale(1.08); }
        }
        @keyframes confettiFall {
            0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .float-emoji {
            position: fixed;
            font-size: 38px;
            pointer-events: none;
            z-index: 50;
            animation: floatUp 1.1s ease forwards;
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1);       opacity: 1; }
            100% { transform: translateY(-90px) scale(1.5); opacity: 0; }
        }

        /* Shape wobble on tap */
        @keyframes shapeWobble {
            0%   { transform: scale(1) rotate(0deg); }
            25%  { transform: scale(1.12) rotate(-6deg); }
            50%  { transform: scale(1.08) rotate(5deg); }
            75%  { transform: scale(1.05) rotate(-3deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .wobble svg { animation: shapeWobble 0.55s ease both !important; }
    

/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.celeb-emoji{font-size:clamp(70px,10vw,140px);}
.celeb-title{font-size:clamp(24px,3.5vw,54px);}
.celeb-sub{font-size:clamp(14px,1.8vw,26px);}
.celeb-stars{font-size:clamp(36px,5vw,72px);}
.celeb-btn{font-size:clamp(16px,2vw,28px);padding:clamp(14px,1.8vw,22px) clamp(36px,4vw,60px);border-radius:clamp(40px,5vw,60px);}
.card{border-radius:clamp(16px,2vw,28px);}
</style>
</head>
<body>

<div class="screen" id="mainScreen" onclick="handleTap(event)">

    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <!-- Top Bar -->
    <div class="topbar">
        <a href="/dashboard" class="topbar-btn" onclick="event.stopPropagation()">🏠 Home</a>
        <div class="stars-display" id="starsDisplay">⭐ 0</div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="sound-pill" id="soundFab" onclick="event.stopPropagation(); toggleSound();">🔊 Sound</button>
            <button class="topbar-btn" onclick="openPanel(event)">⚙️ Parent</button>
        </div>
    </div>

    <!-- Progress Dots -->
    <div class="dots-row" id="dotsRow"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Left: Shape -->
        <div class="shape-half">
            <div class="shape-stage" id="shapeStage" onclick="tapShape(event)">
                <svg id="shapeSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
                <div class="shape-ring" id="shapeRing"></div>
            </div>
            <div class="shape-name" id="shapeName">Circle</div>
            <div class="sides-badge" id="sidesBadge">⭕ 0 sides</div>
        </div>

        <!-- Right: Things -->
        <div class="things-half">
            <div class="things-grid" id="thingsGrid"></div>
        </div>

    </div>

    <button class="speak-fab" id="speakFab" onclick="event.stopPropagation(); tapSpeak();">🔊</button>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <button class="nav-btn" id="prevBtn" onclick="prevShape(event)" disabled>◀</button>
        <div class="bottom-center">
            <div class="tap-hint" id="tapHint">👆 Tap anywhere!</div>
            <div class="autoplay-pill" id="autoplayPill">▶ Playing…</div>
        </div>
        <button class="next-btn" onclick="nextShape(event)">Next ▶</button>
    </div>
</div>

<!-- Parent Panel -->
<div class="overlay" id="parentOverlay">
    <div class="panel">
        <h2>⚙️ Parent Controls</h2>
        <div class="panel-progress" id="panelProgress">0 of 10 shapes completed</div>
        <div class="panel-row">
            <div>
                <div class="panel-label">🔊 Voice Sound</div>
                <div class="panel-sub">Speaks shape name aloud</div>
            </div>
            <button class="toggle on" id="soundToggle" onclick="toggleSound()"></button>
        </div>
        <div class="panel-row">
            <div>
                <div class="panel-label">▶️ Auto Play</div>
                <div class="panel-sub">Changes shape automatically</div>
            </div>
            <button class="toggle" id="autoToggle" onclick="toggleAuto()"></button>
        </div>
        <div class="panel-row" style="border:none">
            <div>
                <div class="panel-label">⏱️ Speed</div>
                <div class="panel-sub">Seconds per shape</div>
            </div>
            <div class="speed-row">
                <button class="speed-btn"        onclick="setSpeed(3,this)">3s</button>
                <button class="speed-btn active" onclick="setSpeed(5,this)">5s</button>
                <button class="speed-btn"        onclick="setSpeed(8,this)">8s</button>
            </div>
        </div>
        <div class="jump-section">
            <h4>Jump to any shape</h4>
            <div class="jump-grid" id="jumpGrid"></div>
        </div>
        <button class="close-panel-btn" onclick="closePanel()">✅ Continue Learning!</button>
    </div>
</div>

<!-- Celebration -->
<div class="celeb-overlay" id="celebOverlay">
    <div class="celeb-stars">
        <span class="celeb-star">⭐</span>
        <span class="celeb-star">⭐</span>
        <span class="celeb-star">⭐</span>
    </div>
    <div class="celeb-emoji" id="celebEmoji">🎉</div>
    <div class="celeb-title" id="celebTitle">Amazing!</div>
    <div class="celeb-sub"   id="celebSub">You learned a shape!</div>
    <button class="celeb-btn" onclick="closeCelebration()">Keep Going! 🚀</button>
</div>

<script>
/* ─────────────────────────────────────────
   SHAPE DATA
   Each shape has:
   - name, sides label, emoji (for float), bg gradient
   - drawSvg(color): returns SVG inner markup
   - things: 4 real-world examples
───────────────────────────────────────── */
const shapes = [
    {
        name: 'Circle',
        sides: '0 corners',
        icon: '⭕',
        emoji: '🔵',
        bg: ['#0096c7', '#023e8a'],
        drawSvg: (c) => `
            <defs>
              <radialGradient id="cg" cx="38%" cy="32%" r="65%">
                <stop offset="0%" stop-color="${lighten(c,.38)}"/>
                <stop offset="100%" stop-color="${c}"/>
              </radialGradient>
            </defs>
            <circle cx="100" cy="100" r="88" fill="url(#cg)" stroke="rgba(255,255,255,.45)" stroke-width="5"/>

        things: [
            { emoji:'🌕', name:'Moon'   },

    },
    {

        sides: '4 equal sides',

        emoji: '🟧',
        bg: ['#e63946', '#9d0208'],
        drawSvg: (c) => `
            <defs>
              <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="${lighten(c,.35)}"/>
                <stop offset="100%" stop-color="${c}"/>
              </linearGradient>
            </defs>
            <rect x="16" y="16" width="168" height="168" rx="18" ry="18"
                  fill="url(#sg)" stroke="rgba(255,255,255,.45)" stroke-width="5"/>
            <rect x="28" y="28" width="55" height="30" rx="10" fill="rgba(255,255,255,.18)"/>`,
        things: [
            { emoji:'🪟', name:'Window'   },
            { emoji:'📦', name:'Box'      },
            { emoji:'🧇', name:'Waffle'   },
            { emoji:'🎲', name:'Dice'     },
        ]
    },
    {
        name: 'Rectangle',
        sides: '4 sides',
        icon: '▬',
        emoji: '📱',
        bg: ['#7b2d8b', '#3d0057'],
        drawSvg: (c) => `
            <defs>
              <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="${lighten(c,.38)}"/>
                <stop offset="100%" stop-color="${c}"/>
              </linearGradient>
            </defs>
            <rect x="14" y="42" width="172" height="116" rx="18" ry="18"
                  fill="url(#rg)" stroke="rgba(255,255,255,.45)" stroke-width="5"/>
            <rect x="26" y="54" width="60" height="28" rx="10" fill="rgba(255,255,255,.2)"/>`,
        things: [
            { emoji:'📱', name:'Phone'   },
            { emoji:'🚪', name:'Door'    },
            { emoji:'📺', name:'TV'      },
            { emoji:'📚', name:'Book'    },
        ]
    },
    {
        name: 'Triangle',
        sides: '3 sides',
        icon: '🔺',
        emoji: '🔺',
        bg: ['#f4a261', '#c05c00'],
        drawSvg: (c) => `
            <defs>
              <linearGradient id="tg" x1="50%" y1="0%" x2="50%" y2="100%">
                <stop offset="0%" stop-color="${lighten(c,.4)}"/>
                <stop offset="100%" stop-color="${c}"/>
              </linearGradient>
            </defs>
            <polygon points="100,12 192,188 8,188"
                     fill="url(#tg)" stroke="rgba(255,255,255,.45)" stroke-width="5"
                     stroke-linejoin="round"/>
            <polygon points="100,30 130,80 70,80" fill="rgba(255,255,255,.18)"/>`,
        things: [
            { emoji:'⛰️', name:'Mountain' },
            { emoji:'🍕', name:'Pizza Slice'},
            { emoji:'🎄', name:'Xmas Tree' },
            { emoji:'🔺', name:'Arrow'     },
        ]
    },
    {
        name: 'Oval',
        sides: '0 corners',
        icon: '🥚',
        emoji: '🥚',
        bg: ['#43aa8b', '#1a5c44'],
        drawSvg: (c) => `
            <defs>
              <radialGradient id="og" cx="38%" cy="30%" r="70%">
                <stop offset="0%" stop-color="${lighten(c,.4)}"/>
                <stop offset="100%" stop-color="${c}"/>
              </radialGradient>
            </defs>
            <ellipse cx="100" cy="100" rx="90" ry="60"
                     fill="url(#og)" stroke="rgba(255,255,255,.45)" stroke-width="5"/>
            <ellipse cx="72" cy="70" rx="20" ry="10" fill="rgba(255,255,255,.22)" transform="rotate(-20,72,70)"/>`,
        things: [
            { emoji:'🥚', name:'Egg'      },
            { emoji:'🏈', name:'Football' },
            { emoji:'🫒', name:'Olive'    },
            { emoji:'🪞', name:'Mirror'   },
        ]
    },
    {
        name: 'Diamond',
        sides: '4 sides',
        icon: '💎',
        emoji: '💎',
        bg: ['#00b4d8', '#005f73'],
        drawSvg: (c) => `
            <defs>
              <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="${lighten(c,.42)}"/>
                <stop offset="100%" stop-color="${c}"/>
              </linearGradient>
            </defs>
            <polygon points="100,8 192,100 100,192 8,100"
                     fill="url(#dg)" stroke="rgba(255,255,255,.45)" stroke-width="5"
                     stroke-linejoin="round"/>
            <polygon points="100,24 130,60 100,72 70,60" fill="rgba(255,255,255,.25)"/>`,
        things: [
            { emoji:'💎', name:'Gem'      },
            { emoji:'🪁', name:'Kite'     },
            { emoji:'♦️', name:'Card'     },
            { emoji:'🔷', name:'Diamond'  },
        ]
    },
    {
        name: 'Star',
        sides: '5 points',
        icon: '⭐',
        emoji: '⭐',
        bg: ['#f9c74f', '#c99a00'],
        drawSvg: (c) => `
            <defs>
              <linearGradient id="stg" x1="30%" y1="0%" x2="70%" y2="100%">
                <stop offset="0%" stop-color="${lighten(c,.38)}"/>
                <stop offset="100%" stop-color="${c}"/>
              </linearGradient>
            </defs>
            <polygon points="100,8 122,72 192,72 136,112 158,178 100,138 42,178 64,112 8,72 78,72"
                     fill="url(#stg)" stroke="rgba(255,255,255,.45)" stroke-width="4"
                     stroke-linejoin="round"/>
            <polygon points="100,24 114,60 130,60 118,76 122,96 100,82 78,96 82,76 70,60 86,60"
                     fill="rgba(255,255,255,.2)"/>`,
        things: [
            { emoji:'⭐', name:'Star'      },
            { emoji:'🌟', name:'Sparkle'   },
            { emoji:'🪄', name:'Wand'      },
            { emoji:'🎖️', name:'Medal'     },
        ]
    },
    {
        name: 'Heart',
        sides: '0 corners',
        icon: '❤️',
        emoji: '❤️',
        bg: ['#e63946', '#7d0020'],
        drawSvg: (c) => `
            <defs>
              <radialGradient id="hg" cx="40%" cy="30%" r="70%">
                <stop offset="0%" stop-color="${lighten(c,.42)}"/>
                <stop offset="100%" stop-color="${c}"/>
              </radialGradient>
            </defs>
            <path d="M100 170 C100 170 14 112 14 58 C14 28 36 10 62 10 C78 10 92 20 100 34
                     C108 20 122 10 138 10 C164 10 186 28 186 58 C186 112 100 170 100 170Z"
                  fill="url(#hg)" stroke="rgba(255,255,255,.45)" stroke-width="5"/>
            <path d="M58 26 C50 36 48 50 52 62" stroke="rgba(255,255,255,.35)" stroke-width="8"
                  stroke-linecap="round" fill="none"/>`,
        things: [
            { emoji:'❤️', name:'Love'      },
            { emoji:'🫀', name:'Heart'     },
            { emoji:'🍓', name:'Strawberry'},
            { emoji:'💝', name:'Gift'      },
        ]
    },
    {
        name: 'Pentagon',
        sides: '5 sides',
        icon: '⬠',
        emoji: '🏠',
        bg: ['#2d6a4f', '#1b4332'],
        drawSvg: (c) => {
            const pts = pentPoints(100,108,88,5,-90);
            return `
            <defs>
              <linearGradient id="pg" x1="50%" y1="0%" x2="50%" y2="100%">
                <stop offset="0%" stop-color="${lighten(c,.38)}"/>
                <stop offset="100%" stop-color="${c}"/>
              </linearGradient>
            </defs>
            <polygon points="${pts}" fill="url(#pg)" stroke="rgba(255,255,255,.45)" stroke-width="5" stroke-linejoin="round"/>
            <polygon points="${pentPoints(100,95,36,5,-90)}" fill="rgba(255,255,255,.18)"/>`;
        },
        things: [
            { emoji:'🏠', name:'House'    },
            { emoji:'⚽', name:'Patch'    },
            { emoji:'🛡️', name:'Shield'   },
            { emoji:'🖐️', name:'Hand'     },
        ]
    },
    {
        name: 'Hexagon',
        sides: '6 sides',
        icon: '⬡',
        emoji: '🐝',
        bg: ['#f4a261', '#8b3a00'],
        drawSvg: (c) => {
            const pts = pentPoints(100,100,88,6,0);
            return `
            <defs>
              <linearGradient id="hxg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="${lighten(c,.4)}"/>
                <stop offset="100%" stop-color="${c}"/>
              </linearGradient>
            </defs>
            <polygon points="${pts}" fill="url(#hxg)" stroke="rgba(255,255,255,.45)" stroke-width="5" stroke-linejoin="round"/>
            <polygon points="${pentPoints(100,88,36,6,0)}" fill="rgba(255,255,255,.2)"/>`;
        },
        things: [
            { emoji:'🐝', name:'Honeycomb'},
            { emoji:'⬡', name:'Tile'     },
            { emoji:'🔩', name:'Bolt'     },
            { emoji:'🌸', name:'Flower'   },
        ]
    },
];

/* helpers */
function pentPoints(cx, cy, r, n, startDeg) {
    return Array.from({length:n}, (_,i) => {
        const a = (startDeg + i * 360/n) * Math.PI / 180;
        return `${(cx + r*Math.cos(a)).toFixed(2)},${(cy + r*Math.sin(a)).toFixed(2)}`;
    }).join(' ');
}
function lighten(hex, amt) {
    // simple lighten: blend toward white
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const lr = Math.round(r + (255-r)*amt), lg = Math.round(g + (255-g)*amt), lb = Math.round(b + (255-b)*amt);
    return `rgb(${lr},${lg},${lb})`;
}

/* ── STATE ── */
let current   = 0;
let stars     = 0;
let soundOn   = true;
let autoPlay  = false;
let autoSpeed = 5000;
let autoTimer = null;
let learned   = new Set();

/* ── UPDATE SCREEN ── */
function updateScreen(animate = true) {
    const s = shapes[current];

    document.getElementById('mainScreen').style.background =
        `linear-gradient(135deg, ${s.bg[0]} 0%, ${s.bg[1]} 100%)`;

    // Draw shape SVG
    const svgEl = document.getElementById('shapeSvg');
    svgEl.innerHTML = s.drawSvg(s.bg[0]);

    document.getElementById('shapeName').textContent  = s.name;
    document.getElementById('sidesBadge').textContent = `${s.icon}  ${s.sides}`;

    document.getElementById('prevBtn').disabled = current === 0;

    buildThingsGrid(s.things, animate);

    if (animate) {
        reAnimate('shapeSvg',    'popIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4) both');
        reAnimate('shapeName',   'slideUp 0.4s ease both');
        reAnimate('sidesBadge',  'slideUp 0.4s ease 0.12s both');
    }

    updateDots();
    if (soundOn) setTimeout(speakShape, 450);
}

function buildThingsGrid(things, animate) {
    const grid = document.getElementById('thingsGrid');
    grid.innerHTML = '';
    if (animate) {
        grid.style.animation = 'none';
        void grid.offsetWidth;
        grid.style.animation = 'bounceIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4) 0.12s both';
    }
    things.forEach((t, i) => {
        const card = document.createElement('div');
        card.className = 'thing-card';
        card.style.animationDelay = `${0.08 + i * 0.07}s`;
        card.innerHTML = `<div class="thing-emoji">${t.emoji}</div><div class="thing-name">${t.name}</div>`;
        card.onclick = (e) => {
            e.stopPropagation();
            floatEmoji(t.emoji, e.clientX, e.clientY);
            speakWord(t.name);
        };
        grid.appendChild(card);
    });
}

function reAnimate(id, anim) {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = anim;
}

/* ── SPEAK ── */
function speakShape() {
    if (!soundOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const s = shapes[current];
    const msg = `${s.name}! ... A ${s.name} has ${s.sides}!`;
    const u = new SpeechSynthesisUtterance(msg);
    u.rate = 0.68; u.pitch = 1.4; u.volume = 1;
    const fab = document.getElementById('speakFab');
    fab.classList.add('speaking');
    u.onend = () => fab.classList.remove('speaking');
    window.speechSynthesis.speak(u);
}

function speakWord(word) {
    if (!soundOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.rate = 0.72; u.pitch = 1.4; u.volume = 1;
    window.speechSynthesis.speak(u);
}

function tapSpeak() { speakShape(); }

/* ── TAP SHAPE ── */
function tapShape(e) {
    e.stopPropagation();
    // wobble
    const stage = document.getElementById('shapeStage');
    stage.classList.remove('wobble');
    void stage.offsetWidth;
    stage.classList.add('wobble');
    setTimeout(() => stage.classList.remove('wobble'), 600);
    // ring
    const ring = document.getElementById('shapeRing');
    ring.classList.remove('pulse');
    void ring.offsetWidth;
    ring.classList.add('pulse');
    floatEmoji(shapes[current].emoji, e.clientX, e.clientY);
    speakShape();
}

/* ── FLOAT EMOJI ── */
function floatEmoji(emoji, x, y) {
    const el = document.createElement('div');
    el.className = 'float-emoji';
    el.textContent = emoji;
    el.style.left = `${x - 19}px`;
    el.style.top  = `${y - 19}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
}

/* ── DOTS ── */
function updateDots() {
    const row = document.getElementById('dotsRow');
    row.innerHTML = '';
    shapes.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = `dot ${i === current ? 'current' : learned.has(i) ? 'done' : ''}`;
        row.appendChild(d);
    });
}

/* ── NAVIGATION ── */
function handleTap(e) { nextShape(e); }

function nextShape(e) {
    if (e) e.stopPropagation();
    learned.add(current);
    addStars(1);
    if (learned.size % 5 === 0 && current < shapes.length - 1) {
        showCelebration('🔷', 'Wow!', `You know ${learned.size} shapes!\nKeep going! 🚀`);
        return;
    }
    if (current >= shapes.length - 1) {
        learned.add(shapes.length - 1);
        showCelebration('🏆', 'You Did It!', `WOW! You know ALL ${shapes.length} shapes!\nYou are a SUPERSTAR! ⭐⭐⭐`);
        return;
    }
    current++;
    updateScreen();
    if (autoPlay) resetAutoTimer();
}

function prevShape(e) {
    if (e) e.stopPropagation();
    if (current > 0) { current--; updateScreen(); }
}

function addStars(n) {
    stars += n;
    const el = document.getElementById('starsDisplay');
    el.textContent = `⭐ ${stars}`;
    el.style.transform = 'scale(1.35)';
    setTimeout(() => el.style.transform = '', 200);
}

/* ── AUTO PLAY ── */
function toggleAuto() {
    autoPlay = !autoPlay;
    document.getElementById('autoToggle').classList.toggle('on', autoPlay);
    document.getElementById('autoplayPill').classList.toggle('show', autoPlay);
    document.getElementById('tapHint').style.display = autoPlay ? 'none' : 'block';
    autoPlay ? resetAutoTimer() : clearInterval(autoTimer);
}

function resetAutoTimer() {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => {
        learned.add(current);
        if (current < shapes.length - 1) { current++; updateScreen(); }
        else { clearInterval(autoTimer); showCelebration('🏆','You Did It!',`ALL ${shapes.length} shapes learned!`); }
    }, autoSpeed);
}

function setSpeed(s, btn) {
    autoSpeed = s * 1000;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (autoPlay) resetAutoTimer();
}

/* ── SOUND ── */
function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('soundToggle').classList.toggle('on', soundOn);
    document.getElementById('speakFab').style.opacity = soundOn ? '1' : '0.45';

    const pill = document.getElementById('soundFab');
    pill.textContent = soundOn ? '🔊 Sound' : '🔇 Muted';
    pill.classList.toggle('muted', !soundOn);

    if (!soundOn) window.speechSynthesis.cancel();
}

/* ── PARENT PANEL ── */
function openPanel(e) {
    if (e) e.stopPropagation();
    clearInterval(autoTimer);
    document.getElementById('panelProgress').textContent =
        `${learned.size} of ${shapes.length} shapes completed ✅`;
    buildJumpGrid();
    document.getElementById('parentOverlay').classList.add('show');
}

function closePanel() {
    document.getElementById('parentOverlay').classList.remove('show');
    if (autoPlay) resetAutoTimer();
}

function buildJumpGrid() {
    const grid = document.getElementById('jumpGrid');
    grid.innerHTML = '';
    shapes.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.className = `jump-btn ${i === current ? 'cur' : learned.has(i) ? 'done' : ''}`;
        btn.title = s.name;
        // mini inline SVG thumbnail
        const mini = document.createElementNS('http://www.w3.org/2000/svg','svg');
        mini.setAttribute('viewBox','0 0 200 200');
        mini.style.cssText = 'width:32px;height:32px;pointer-events:none';
        mini.innerHTML = s.drawSvg(s.bg[0]);
        btn.appendChild(mini);
        btn.onclick = () => { current = i; updateScreen(); closePanel(); };
        grid.appendChild(btn);
    });
}

/* ── CELEBRATION ── */
function showCelebration(emoji, title, sub) {
    clearInterval(autoTimer);
    document.getElementById('celebEmoji').textContent = emoji;
    document.getElementById('celebTitle').textContent = title;
    document.getElementById('celebSub').textContent   = sub;
    document.getElementById('celebOverlay').classList.add('show');
    if (soundOn) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance('Amazing! Well done! You are a superstar!');
        u.pitch = 1.4; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }
    launchConfetti();
}

function closeCelebration() {
    document.getElementById('celebOverlay').classList.remove('show');
    if (current < shapes.length - 1) { current++; updateScreen(); }
    if (autoPlay) resetAutoTimer();
}

/* ── CONFETTI ── */
function launchConfetti() {
    const cols = ['#FF6B6B','#FFC300','#2ECC71','#3498DB','#9B59B6','#fff','#fbbf24','#f472b6','#FB923C'];
    for (let i = 0; i < 85; i++) {
        const c = document.createElement('div');
        const size = Math.random() * 16 + 7;
        c.style.cssText = `
            position:fixed;width:${size}px;height:${size}px;
            background:${cols[Math.floor(Math.random()*cols.length)]};
            border-radius:${Math.random()>0.5?'50%':'4px'};
            left:${Math.random()*100}vw;top:-24px;z-index:300;
            animation:confettiFall ${Math.random()*2.2+1.8}s ease ${Math.random()*0.8}s forwards;
            pointer-events:none;`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
    }
}

/* ── INIT ── */
updateDots();
updateScreen(false);
setTimeout(speakShape, 900);
</script>
