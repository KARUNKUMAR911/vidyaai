<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಕನ್ನಡ ಪದ್ಯಗಳು - LKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a1628;
    --topbar: #0d1f3c;
    --text-light: #f0f4ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text-light);
    background-image:
      radial-gradient(circle at 10% 20%, rgba(77,150,255,0.13) 0%, transparent 50%),
      radial-gradient(circle at 90% 70%, rgba(253,203,110,0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(107,203,119,0.06) 0%, transparent 40%);
  }

  /* TOPBAR */
  .topbar {
    background: var(--topbar);
    border-bottom: 2px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 64px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    background: rgba(255,255,255,0.1); border: none; border-radius: 10px;
    color: white; padding: 8px 14px; font-size: 18px; cursor: pointer;
    text-decoration: none; transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .topbar-title {
    font-size: 1.3rem; font-weight: 800;
    background: linear-gradient(90deg, #fdcb6e, #e17055);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sound-btn {
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: white; padding: 8px 16px; font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.5; }

  /* HERO */
  .hero { text-align: center; padding: 28px 20px 14px; }
  .hero-emoji {
    font-size: 3.2rem; display: inline-block;
    animation: notes 2s ease-in-out infinite;
  }
  @keyframes notes {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-10px) rotate(5deg); }
  }
  .hero h1 {
    font-size: 2.2rem; font-weight: 800; margin-top: 8px;
    background: linear-gradient(135deg, #fdcb6e, #e17055, #ff6fd8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero p { font-size: 0.92rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

  /* TTS NOTICE */
  .tts-notice {
    background: rgba(255,209,61,0.1); border: 1px solid rgba(255,209,61,0.28);
    border-radius: 14px; padding: 10px 16px; font-size: 0.8rem;
    color: rgba(255,209,61,0.85); display: flex; align-items: flex-start; gap: 8px;
    max-width: 900px; margin: 0 auto 16px;
  }

  /* RHYME CARDS LIST */
  .rhymes-list {
    display: flex; flex-direction: column; gap: 20px;
    padding: 4px 24px 52px; max-width: 900px; margin: 0 auto;
  }

  .rhyme-card {
    border-radius: 24px; overflow: hidden; cursor: pointer;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    transition: transform 0.18s, box-shadow 0.18s;
    animation: popIn 0.45s both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .rhyme-card:nth-child(1) { animation-delay: 0.05s; }
  .rhyme-card:nth-child(2) { animation-delay: 0.12s; }
  .rhyme-card:nth-child(3) { animation-delay: 0.19s; }
  .rhyme-card:nth-child(4) { animation-delay: 0.26s; }
  .rhyme-card:nth-child(5) { animation-delay: 0.33s; }
  .rhyme-card:hover { transform: translateY(-5px); box-shadow: 0 18px 48px rgba(0,0,0,0.55); }

  /* Card header */
  .rhyme-header {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 20px 16px;
  }
  .rhyme-emoji { font-size: 2.8rem; flex-shrink: 0; }
  .rhyme-meta { flex: 1; }
  .rhyme-title { font-size: 1.25rem; font-weight: 800; color: #fff; line-height: 1.2; }
  .rhyme-subtitle { font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-top: 2px; font-style: italic; }

  /* Play button */
  .play-btn {
    background: rgba(255,255,255,0.18); border: none; border-radius: 50%;
    width: 46px; height: 46px; font-size: 1.4rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s; color: white;
  }
  .play-btn:hover { background: rgba(255,255,255,0.32); transform: scale(1.1); }
  .play-btn.playing-btn { background: rgba(255,255,255,0.35); }

  /* Lyrics section */
  .rhyme-lyrics {
    background: rgba(0,0,0,0.3); padding: 16px 20px 20px;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: none;
  }
  .rhyme-lyrics.open { display: block; animation: slideDown 0.3s ease; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .lyrics-line {
    font-size: 1.05rem; font-weight: 600; color: rgba(255,255,255,0.88);
    line-height: 1.9; letter-spacing: 0.3px;
  }
  .lyrics-line.highlight {
    color: #fdcb6e;
    font-weight: 800;
  }

  /* Toggle lyrics btn */
  .toggle-lyrics {
    background: none; border: none; color: rgba(255,255,255,0.45);
    font-family: 'Baloo Tamma 2', cursive; font-size: 0.8rem;
    cursor: pointer; padding: 0 20px 14px; display: flex;
    align-items: center; gap: 5px; transition: color 0.2s;
  }
  .toggle-lyrics:hover { color: rgba(255,255,255,0.75); }

  .footer { text-align: center; padding: 14px; color: rgba(255,255,255,0.18); font-size: 0.78rem; }

  @media (max-width: 480px) {
    .rhymes-list { padding: 4px 14px 40px; gap: 16px; }
    .rhyme-title { font-size: 1.1rem; }
    .rhyme-emoji { font-size: 2.2rem; }
    .lyrics-line { font-size: 0.95rem; }
    .hero h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/class/lkg/kannada" class="back-btn">←</a>
    <span class="topbar-title">ಕನ್ನಡ ಪದ್ಯಗಳು</span>
  </div>
  <div class="topbar-right">
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
      <span id="soundIcon">🔊</span>
      <span id="soundLabel">ಧ್ವನಿ ಆನ್</span>
    </button>
  </div>
</div>

<div class="hero">
  <div class="hero-emoji">🎵</div>
  <h1>ಕನ್ನಡ ಪದ್ಯಗಳು</h1>
  <p>ಸುಂದರ ಹಾಡುಗಳು • ▶ ಒತ್ತಿ ಕೇಳಿ!</p>
</div>

<div class="tts-notice">
  <span>📱</span>
  <span>ಧ್ವನಿ ಕೇಳಲು Android TTS ನಲ್ಲಿ Kannada ಭಾಷೆ ಸ್ಥಾಪಿಸಿ.</span>
</div>

<div class="rhymes-list" id="rhymesList"></div>
<div class="footer">VidyaAI • LKG ಕನ್ನಡ</div>

<script>
const rhymes = [
  {
    title: 'ಚಂದಮಾಮ',
    subtitle: 'Chandamama – Moon Rhyme',
    emoji: '🌙',
    bg: 'linear-gradient(135deg,#1a1a4e,#2d2d8e)',
    lines: [
      'ಚಂದಮಾಮ ಬಾ ಬಾ',
      'ಜೋಳದ ರೊಟ್ಟಿ ತಾ ತಾ',
      'ತುಪ್ಪದಲ್ಲಿ ಅದ್ದಿ ತಾ',
      'ಬಾಯಲ್ಲಿ ತುರುಕಿಸು',
      'ಚಂದಮಾಮ ಬಾ ಬಾ',
    ]
  },
  {
    title: 'ಮಳೆ ಬಾ ಮಳೆ ಬಾ',
    subtitle: 'Maḷe Bā – Rain Rhyme',
    emoji: '🌧️',
    bg: 'linear-gradient(135deg,#1a3a5e,#0d2a4e)',
    lines: [
      'ಮಳೆ ಬಾ ಮಳೆ ಬಾ',
      'ಮಲ್ಲಿಗೆ ಹೂ ತಾ',
      'ಮನೆ ತುಂಬ ಬಾ',
      'ಮನಸ್ಸು ತಣಿಸಿ ಬಾ',
      'ಮಳೆ ಬಾ ಮಳೆ ಬಾ',
    ]
  },
  {
    title: 'ಚಿಟ್ಟೆ ಚಿಟ್ಟೆ',
    subtitle: 'Chiṭṭe – Butterfly Rhyme',
    emoji: '🦋',
    bg: 'linear-gradient(135deg,#3a1a5e,#5a2a8e)',
    lines: [
      'ಚಿಟ್ಟೆ ಚಿಟ್ಟೆ ಬಣ್ಣದ ಚಿಟ್ಟೆ',
      'ಹೂವಿನ ಮೇಲೆ ಕುಳಿತ ಚಿಟ್ಟೆ',
      'ಹಾರಿ ಹಾರಿ ಬರುವ ಚಿಟ್ಟೆ',
      'ಮಕ್ಕಳ ಮನ ಗೆಲ್ಲುವ ಚಿಟ್ಟೆ',
    ]
  },
  {
    title: 'ಆನೆ ಬಂತು',
    subtitle: 'Āne Bantu – Elephant Rhyme',
    emoji: '🐘',
    bg: 'linear-gradient(135deg,#1e3a2a,#2e5a3e)',
    lines: [
      'ಆನೆ ಬಂತು ಆನೆ ಬಂತು',
      'ದೊಡ್ಡ ಕಿವಿಯ ಆನೆ ಬಂತು',
      'ಸೊಂಡಿಲನ್ನು ಆಡಿಸುತ್ತ',
      'ನಿಧಾನವಾಗಿ ನಡೆದು ಬಂತು',
    ]
  },
  {
    title: 'ಕಾಗೆ ಕಾಗೆ',
    subtitle: 'Kāge Kāge – Crow Rhyme',
    emoji: '🐦‍⬛',
    bg: 'linear-gradient(135deg,#2a2a2a,#1a1a3a)',
    lines: [
      'ಕಾಗೆ ಕಾಗೆ ಕಾ ಕಾ',
      'ಅಜ್ಜಿ ಮನೆಗೆ ಹೋಗೋ',
      'ಅಕ್ಕಿ ಮೆಕ್ಕಿ ತಿನ್ನೋ',
      'ಬಾಯಿ ತಣಿಸಿ ಬಾ ಬಾ',
    ]
  },
];

let soundOn = true;
let currentUtterance = null;
let currentPlayBtn = null;

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? 'ಧ್ವನಿ ಆನ್' : 'ಧ್ವನಿ ಆಫ್';
  document.getElementById('soundToggle').classList.toggle('off', !soundOn);
  if (!soundOn && window.speechSynthesis) window.speechSynthesis.cancel();
}

function getKnVoice() {
  const voices = window.speechSynthesis.getVoices();
  return voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn')) || null;
}

function speakRhyme(lines, btn) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  // Reset previous play button
  if (currentPlayBtn && currentPlayBtn !== btn) {
    currentPlayBtn.textContent = '▶';
    currentPlayBtn.classList.remove('playing-btn');
  }

  const knVoice = getKnVoice();
  if (!knVoice) return;

  btn.textContent = '⏹';
  btn.classList.add('playing-btn');
  currentPlayBtn = btn;

  const fullText = lines.join(' । ');
  const u = new SpeechSynthesisUtterance(fullText);
  u.lang = 'kn-IN'; u.rate = 0.78; u.pitch = 1.15;
  u.voice = knVoice;
  u.onend = () => {
    btn.textContent = '▶';
    btn.classList.remove('playing-btn');
    currentPlayBtn = null;
  };
  window.speechSynthesis.speak(u);
}

function stopSpeech(btn) {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  btn.textContent = '▶';
  btn.classList.remove('playing-btn');
  currentPlayBtn = null;
}

function buildRhymes() {
  const list = document.getElementById('rhymesList');
  rhymes.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'rhyme-card';

    const lyricsId = `lyrics-${i}`;
    const lyricsHTML = r.lines.map((l, li) =>
      `<div class="lyrics-line ${li % 2 === 0 ? 'highlight' : ''}">${l}</div>`
    ).join('');

    card.innerHTML = `
      <div class="rhyme-header" style="background:${r.bg};">
        <div class="rhyme-emoji">${r.emoji}</div>
        <div class="rhyme-meta">
          <div class="rhyme-title">${r.title}</div>
          <div class="rhyme-subtitle">${r.subtitle}</div>
        </div>
        <button class="play-btn" id="playbtn-${i}" onclick="handlePlay(event,${i})">▶</button>
      </div>
      <button class="toggle-lyrics" onclick="toggleLyrics('${lyricsId}', this)">
        📖 ಸಾಲುಗಳು ತೋರಿಸು ▾
      </button>
      <div class="rhyme-lyrics" id="${lyricsId}">
        ${lyricsHTML}
      </div>
    `;
    list.appendChild(card);
  });
}

function handlePlay(e, i) {
  e.stopPropagation();
  const btn = document.getElementById(`playbtn-${i}`);
  if (btn.classList.contains('playing-btn')) {
    stopSpeech(btn);
  } else {
    speakRhyme(rhymes[i].lines, btn);
  }
}

function toggleLyrics(id, btn) {
  const el = document.getElementById(id);
  const open = el.classList.toggle('open');
  btn.textContent = open ? '📖 ಸಾಲುಗಳು ಮುಚ್ಚು ▴' : '📖 ಸಾಲುಗಳು ತೋರಿಸು ▾';
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}
buildRhymes();
</script>
</body>
</html>
