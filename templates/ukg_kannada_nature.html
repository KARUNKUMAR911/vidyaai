<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ನನ್ನ ಪರಿಸರ - UKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&display=swap');

  :root { --bg: #071a0e; --topbar: #0a2012; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg); min-height: 100vh; color: #f0fff4;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(39,174,96,0.15) 0%, transparent 50%),
      radial-gradient(circle at 90% 70%, rgba(41,128,185,0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 95%, rgba(253,203,110,0.08) 0%, transparent 40%);
  }

  .topbar {
    background: var(--topbar); border-bottom: 2px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 64px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    background: rgba(255,255,255,0.1); border: none; border-radius: 10px;
    color: white; padding: 8px 14px; font-size: 18px; cursor: pointer;
    text-decoration: none; transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .topbar-title {
    font-size: 1.3rem; font-weight: 800;
    background: linear-gradient(90deg, #6bcb77, #fdcb6e, #4d96ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sound-btn {
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: white; padding: 8px 16px; font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.5; }

  .hero { text-align: center; padding: 26px 20px 10px; }
  .hero-emoji { font-size: 3.2rem; display: inline-block; animation: spin 4s linear infinite; }
  @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
  .hero h1 {
    font-size: 2.2rem; font-weight: 800; margin-top: 8px;
    background: linear-gradient(135deg, #6bcb77, #4d96ff, #fdcb6e);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero p { font-size: 0.9rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

  /* TABS */
  .tabs {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    padding: 12px 20px 4px; max-width: 1100px; margin: 0 auto;
  }
  .tab {
    padding: 9px 16px; border-radius: 14px;
    font-family: 'Baloo Tamma 2', cursive; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; border: none; transition: all 0.2s;
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5);
  }
  .tab.active-sky    { background: linear-gradient(135deg,#4d96ff,#2980b9); color:white; box-shadow:0 4px 14px rgba(77,150,255,0.4); }
  .tab.active-land   { background: linear-gradient(135deg,#6bcb77,#27ae60); color:white; box-shadow:0 4px 14px rgba(107,203,119,0.4); }
  .tab.active-water  { background: linear-gradient(135deg,#00cec9,#0984e3); color:white; box-shadow:0 4px 14px rgba(0,206,201,0.4); }
  .tab.active-plants { background: linear-gradient(135deg,#fdcb6e,#e17055); color:white; box-shadow:0 4px 14px rgba(253,203,110,0.4); }
  .tab.active-care   { background: linear-gradient(135deg,#e84393,#c0336f); color:white; box-shadow:0 4px 14px rgba(232,67,147,0.4); }
  .tab:hover:not([class*='active']) { background: rgba(255,255,255,0.13); color:white; }

  .tts-notice {
    background: rgba(255,209,61,0.1); border: 1px solid rgba(255,209,61,0.28);
    border-radius: 14px; padding: 10px 16px; font-size: 0.8rem;
    color: rgba(255,209,61,0.85); display: flex; gap: 8px;
    max-width: 1100px; margin: 12px auto 4px;
  }

  /* GRID */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px; padding: 16px 24px 52px; max-width: 1100px; margin: 0 auto;
  }

  .card {
    border-radius: 22px; overflow: hidden; cursor: pointer;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    transition: transform 0.18s, box-shadow 0.18s;
    animation: popIn 0.4s both;
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.65)} to{opacity:1;transform:scale(1)} }
  .card:nth-child(1){animation-delay:0.02s} .card:nth-child(2){animation-delay:0.05s}
  .card:nth-child(3){animation-delay:0.08s} .card:nth-child(4){animation-delay:0.11s}
  .card:nth-child(5){animation-delay:0.14s} .card:nth-child(6){animation-delay:0.17s}
  .card:nth-child(7){animation-delay:0.20s} .card:nth-child(8){animation-delay:0.23s}
  .card:nth-child(9){animation-delay:0.26s} .card:nth-child(10){animation-delay:0.29s}
  .card:nth-child(11){animation-delay:0.32s} .card:nth-child(12){animation-delay:0.35s}

  .card:hover { transform: translateY(-8px) scale(1.05); box-shadow: 0 20px 48px rgba(0,0,0,0.55); }
  .card:active { transform: scale(0.94); }
  .card.playing { animation: npulse 0.5s ease !important; }
  @keyframes npulse { 0%{transform:scale(1)} 40%{transform:scale(1.13)} 100%{transform:scale(1)} }

  .item-face {
    height: 106px; display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem; position: relative;
  }
  .fact-pill {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    font-size: 0.62rem; font-weight: 700; color: rgba(255,255,255,0.8);
    padding: 3px 6px; text-align: center; line-height: 1.3;
  }

  .card-info {
    padding: 10px 10px 14px; text-align: center;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
  }
  .card-kn { font-size: 1.05rem; font-weight: 800; color: #fff; line-height: 1.2; }
  .card-en { font-size: 0.72rem; font-weight: 600; color: rgba(255,255,255,0.42); margin-top: 2px; font-style: italic; }

  /* CARE tab — special card layout */
  .care-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px; padding: 16px 24px 52px; max-width: 1100px; margin: 0 auto;
  }
  .care-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 20px; cursor: pointer;
    transition: all 0.18s; animation: popIn 0.4s both;
    display: flex; gap: 14px; align-items: flex-start;
  }
  .care-card:nth-child(1){animation-delay:0.03s} .care-card:nth-child(2){animation-delay:0.07s}
  .care-card:nth-child(3){animation-delay:0.11s} .care-card:nth-child(4){animation-delay:0.15s}
  .care-card:nth-child(5){animation-delay:0.19s} .care-card:nth-child(6){animation-delay:0.23s}
  .care-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-4px); }
  .care-card.playing { background: rgba(107,203,119,0.12); border-color: rgba(107,203,119,0.3); }
  .care-emoji { font-size: 2.2rem; flex-shrink: 0; }
  .care-kn   { font-size: 1rem; font-weight: 800; color: #fff; line-height: 1.3; }
  .care-en   { font-size: 0.72rem; color: rgba(255,255,255,0.4); font-style: italic; margin-top: 2px; }
  .care-desc { font-size: 0.78rem; color: rgba(255,255,255,0.55); margin-top: 5px; line-height: 1.5; }

  .footer { text-align: center; padding: 14px; color: rgba(255,255,255,0.18); font-size: 0.78rem; }

  @media(max-width:480px){
    .grid { grid-template-columns: repeat(3,1fr); gap: 11px; padding: 10px 13px 32px; }
    .item-face { height: 82px; font-size: 2.8rem; }
    .card-kn { font-size: 0.88rem; }
    .hero h1 { font-size: 1.75rem; }
    .care-grid { grid-template-columns: 1fr; padding: 12px 14px 40px; }
  }
</style>
</head>

let soundOn = true;

function toggleSound() {

}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN'; u.rate = 0.85; u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const kn = voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn'));
  if (!kn) return;
  u.voice = kn;
  window.speechSynthesis.speak(u);
}

function switchTab(tab) {
  activeTab = tab;
  ['sky','land','water','plants','care'].forEach(t => {
    document.getElementById('tab-'+t).className = 'tab' + (t===tab ? ' active-'+t : '');
  });
  const grid = document.getElementById('grid');
  const cg   = document.getElementById('careGrid');
  if (tab === 'care') {
    grid.style.display = 'none'; cg.style.display = 'grid'; buildCare();
  } else {
    grid.style.display = 'grid'; cg.style.display = 'none'; buildGrid();
  }
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  tabData[activeTab].forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="item-face" style="background:${item.bg};">
        ${item.emoji}
        <div class="fact-pill">💡 ${item.fact}</div>
      </div>
      <div class="card-info">
        <div class="card-kn">${item.kn}</div>
        <div class="card-en">${item.en}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      card.classList.remove('playing'); void card.offsetWidth; card.classList.add('playing');
      speak(`${item.kn}. ${item.fact}`);
      setTimeout(() => card.classList.remove('playing'), 600);
    });
    grid.appendChild(card);
  });
}

function buildCare() {
  const cg = document.getElementById('careGrid');
  cg.innerHTML = '';
  care.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'care-card';
    div.style.animationDelay = (i * 0.06) + 's';
    div.innerHTML = `
      <div class="care-emoji">${c.emoji}</div>
      <div>
        <div class="care-kn">${c.kn}</div>
        <div class="care-en">${c.en}</div>
        <div class="care-desc">${c.desc}</div>
      </div>
    `;
    div.addEventListener('click', () => {
      div.classList.add('playing');
      speak(`${c.kn}. ${c.desc}`);
      setTimeout(() => div.classList.remove('playing'), 2500);
    });
    cg.appendChild(div);
  });
}

if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = () => {}; window.speechSynthesis.getVoices(); }
buildGrid();
</script>
</body>
</html>
