<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಸಾರಿಗೆ ವಾಹನಗಳು - UKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&display=swap');

  :root { --bg: #0d0d1a; --topbar: #12122a; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg); min-height: 100vh; color: #f0f0ff;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(77,150,255,0.13) 0%, transparent 50%),
      radial-gradient(circle at 90% 70%, rgba(253,203,110,0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 95%, rgba(107,203,119,0.07) 0%, transparent 40%);
  }

  .topbar {
    background: var(--topbar); border-bottom: 2px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 64px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    background: rgba(255,255,255,0.1); border: none; border-radius: 10px;
    color: white; padding: 8px 14px; font-size: 18px; cursor: pointer;
    text-decoration: none; transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .topbar-title {
    font-size: 1.2rem; font-weight: 800;
    background: linear-gradient(90deg, #fdcb6e, #4d96ff, #6bcb77);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sound-btn {
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: white; padding: 8px 16px; font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.5; }

  .hero { text-align: center; padding: 26px 20px 10px; }
  .hero-emoji { font-size: 3.2rem; display: inline-block; animation: drive 2s ease-in-out infinite; }
  @keyframes drive { 0%,100%{transform:translateX(-8px)} 50%{transform:translateX(8px)} }
  .hero h1 {
    font-size: 2.2rem; font-weight: 800; margin-top: 8px;
    background: linear-gradient(135deg, #fdcb6e, #4d96ff, #6bcb77);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero p { font-size: 0.9rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

  /* TABS */
  .tabs {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    padding: 12px 20px 4px; max-width: 1100px; margin: 0 auto;
  }
  .tab {
    padding: 9px 16px; border-radius: 14px;
    font-family: 'Baloo Tamma 2', cursive; font-size: 0.86rem; font-weight: 700;
    cursor: pointer; border: none; transition: all 0.2s;
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5);
  }
  .tab.active-road  { background: linear-gradient(135deg,#fdcb6e,#e17055); color:white; box-shadow:0 4px 14px rgba(253,203,110,0.4); }
  .tab.active-rail  { background: linear-gradient(135deg,#4d96ff,#2980b9); color:white; box-shadow:0 4px 14px rgba(77,150,255,0.4); }
  .tab.active-air   { background: linear-gradient(135deg,#a29bfe,#6c5ce7); color:white; box-shadow:0 4px 14px rgba(162,155,254,0.4); }
  .tab.active-water { background: linear-gradient(135deg,#00cec9,#0984e3); color:white; box-shadow:0 4px 14px rgba(0,206,201,0.4); }
  .tab.active-rules { background: linear-gradient(135deg,#e84393,#c0336f); color:white; box-shadow:0 4px 14px rgba(232,67,147,0.4); }
  .tab:hover:not([class*='active']) { background: rgba(255,255,255,0.13); color:white; }

  .tts-notice {
    background: rgba(255,209,61,0.1); border: 1px solid rgba(255,209,61,0.28);
    border-radius: 14px; padding: 10px 16px; font-size: 0.8rem;
    color: rgba(255,209,61,0.85); display: flex; gap: 8px;
    max-width: 1100px; margin: 12px auto 4px;
  }

  /* GRID */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px; padding: 16px 24px 52px; max-width: 1100px; margin: 0 auto;
  }

  .card {
    border-radius: 22px; overflow: hidden; cursor: pointer;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    transition: transform 0.18s, box-shadow 0.18s;
    animation: popIn 0.4s both;
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.65)} to{opacity:1;transform:scale(1)} }
  .card:nth-child(1){animation-delay:0.02s} .card:nth-child(2){animation-delay:0.05s}
  .card:nth-child(3){animation-delay:0.08s} .card:nth-child(4){animation-delay:0.11s}
  .card:nth-child(5){animation-delay:0.14s} .card:nth-child(6){animation-delay:0.17s}
  .card:nth-child(7){animation-delay:0.20s} .card:nth-child(8){animation-delay:0.23s}
  .card:nth-child(9){animation-delay:0.26s} .card:nth-child(10){animation-delay:0.29s}

  .card:hover { transform: translateY(-8px) scale(1.05); box-shadow: 0 20px 48px rgba(0,0,0,0.55); }
  .card:active { transform: scale(0.94); }
  .card.playing { animation: vpulse 0.5s ease !important; }
  @keyframes vpulse { 0%{transform:scale(1)} 40%{transform:scale(1.13)} 100%{transform:scale(1)} }

  .item-face {
    height: 108px; display: flex; align-items: center; justify-content: center;
    font-size: 3.8rem; position: relative;
  }
  /* road dashes animation for road vehicles */
  .road-anim::after {
    content: ''; position: absolute; bottom: 4px; left: 0; right: 0; height: 3px;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.5) 0px, rgba(255,255,255,0.5) 12px, transparent 12px, transparent 20px);
    animation: roadMove 0.8s linear infinite;
  }
  @keyframes roadMove { from{background-position:0 0} to{background-position:20px 0} }

  .fact-pill {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    font-size: 0.62rem; font-weight: 700; color: rgba(255,255,255,0.8);
    padding: 3px 6px; text-align: center; line-height: 1.3;
  }
  .card-info {
    padding: 10px 10px 14px; text-align: center;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
  }
  .card-kn { font-size: 1.05rem; font-weight: 800; color: #fff; line-height: 1.2; }
  .card-en { font-size: 0.72rem; font-weight: 600; color: rgba(255,255,255,0.42); margin-top: 2px; font-style: italic; }
  .card-use { font-size: 0.65rem; color: rgba(255,255,255,0.28); margin-top: 3px; }

  /* RULES tab */
  .rules-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
    gap: 16px; padding: 16px 24px 52px; max-width: 1100px; margin: 0 auto;
    display: none;
  }
  .rule-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 18px; cursor: pointer; transition: all 0.18s;
    display: flex; gap: 14px; align-items: flex-start;
    animation: popIn 0.4s both;
  }
  .rule-card:nth-child(1){animation-delay:0.03s} .rule-card:nth-child(2){animation-delay:0.07s}
  .rule-card:nth-child(3){animation-delay:0.11s} .rule-card:nth-child(4){animation-delay:0.15s}
  .rule-card:nth-child(5){animation-delay:0.19s} .rule-card:nth-child(6){animation-delay:0.23s}
  .rule-card:nth-child(7){animation-delay:0.27s} .rule-card:nth-child(8){animation-delay:0.31s}
  .rule-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-4px); }
  .rule-card.playing { background: rgba(232,67,147,0.12); border-color: rgba(232,67,147,0.3); }
  .rule-emoji { font-size: 2rem; flex-shrink: 0; }
  .rule-kn  { font-size: 1rem; font-weight: 800; color: #fff; line-height: 1.3; }
  .rule-en  { font-size: 0.72rem; color: rgba(255,255,255,0.4); font-style: italic; margin-top: 2px; }
  .rule-desc{ font-size: 0.78rem; color: rgba(255,255,255,0.55); margin-top: 5px; line-height: 1.5; }

  .footer { text-align: center; padding: 14px; color: rgba(255,255,255,0.18); font-size: 0.78rem; }

  @media(max-width:480px){
    .grid { grid-template-columns: repeat(3,1fr); gap: 11px; padding: 10px 13px 32px; }
    .item-face { height: 84px; font-size: 2.9rem; }
    .card-kn { font-size: 0.88rem; }
    .hero h1 { font-size: 1.75rem; }
    .rules-grid { padding: 12px 14px 40px; }
    .topbar-title { font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/class/ukg/kannada" class="back-btn">←</a>
    <span class="topbar-title">ಸಾರಿಗೆ ವಾಹನಗಳು</span>
  </div>
  <div class="topbar-right">
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
      <span id="soundIcon">🔊</span>
      <span id="soundLabel">ಧ್ವನಿ ಆನ್</span>
    </button>
  </div>
</div>

<div class="hero">
  <div class="hero-emoji">🚗</div>
  <h1>ಸಾರಿಗೆ ವಾಹನಗಳು</h1>
  <p>ವಾಹನಗಳು ಮತ್ತು ಪ್ರಯಾಣ • ಕಾರ್ಡ್ ಒತ್ತಿ ಕೇಳಿ!</p>
</div>

<div class="tabs">
  <button class="tab active-road" id="tab-road"  onclick="switchTab('road')">🛣️ ರಸ್ತೆ</button>
  <button class="tab" id="tab-rail"  onclick="switchTab('rail')">🚂 ರೈಲು</button>
  <button class="tab" id="tab-air"   onclick="switchTab('air')">✈️ ಆಕಾಶ</button>
  <button class="tab" id="tab-water" onclick="switchTab('water')">🚢 ನೀರು</button>
  <button class="tab" id="tab-rules" onclick="switchTab('rules')">🚦 ನಿಯಮಗಳು</button>
</div>

<div class="tts-notice">
  <span>📱</span>
  <span>ಧ್ವನಿ ಕೇಳಲು Android TTS ನಲ್ಲಿ Kannada ಭಾಷೆ ಸ್ಥಾಪಿಸಿ.</span>
</div>

<div class="grid" id="grid"></div>
<div class="rules-grid" id="rulesGrid"></div>
<div class="footer">VidyaAI • UKG ಕನ್ನಡ</div>

<script>
const road = [
  { kn:'ಕಾರು',          en:'Car',           emoji:'🚗', use:'ಕುಟುಂಬ ಪ್ರಯಾಣ',     road:true,  bg:'linear-gradient(145deg,#e74c3c,#c0392b)' },
  { kn:'ಬಸ್',           en:'Bus',           emoji:'🚌', use:'ಸಾರ್ವಜನಿಕ ಸಾರಿಗೆ', road:true,  bg:'linear-gradient(145deg,#e67e22,#ca6f1e)' },
  { kn:'ಟ್ರಕ್',         en:'Truck',         emoji:'🚚', use:'ಸಾಮಾನು ಸಾಗಿಸುತ್ತದೆ', road:true, bg:'linear-gradient(145deg,#7f8c8d,#5d6d7e)' },
  { kn:'ಆಟೋ',           en:'Auto Rickshaw', emoji:'🛺', use:'ನಗರ ಪ್ರಯಾಣ',        road:true,  bg:'linear-gradient(145deg,#f1c40f,#d4ac0d)' },
  { kn:'ದ್ವಿಚಕ್ರ ವಾಹನ', en:'Motorcycle',    emoji:'🏍️', use:'ವೇಗದ ಪ್ರಯಾಣ',      road:true,  bg:'linear-gradient(145deg,#2980b9,#1f618d)' },
  { kn:'ಸೈಕಲ್',         en:'Bicycle',       emoji:'🚲', use:'ಪರಿಸರ ಸ್ನೇಹಿ',      road:true,  bg:'linear-gradient(145deg,#27ae60,#1e8449)' },
  { kn:'ಆಂಬ್ಯುಲೆನ್ಸ್',  en:'Ambulance',     emoji:'🚑', use:'ರೋಗಿ ಸಾಗಿಸುತ್ತದೆ',  road:true,  bg:'linear-gradient(145deg,#e74c3c,#c0392b)' },
  { kn:'ಅಗ್ನಿಶಾಮಕ',     en:'Fire Engine',   emoji:'🚒', use:'ಬೆಂಕಿ ನಂದಿಸುತ್ತದೆ', road:true,  bg:'linear-gradient(145deg,#e74c3c,#922b21)' },
  { kn:'ಪೊಲೀಸ್ ವಾಹನ',  en:'Police Car',    emoji:'🚓', use:'ಕಾನೂನು ರಕ್ಷಣೆ',      road:true,  bg:'linear-gradient(145deg,#2980b9,#1a5276)' },
  { kn:'ಶಾಲೆ ಬಸ್',      en:'School Bus',    emoji:'🚐', use:'ಮಕ್ಕಳ ಸಾರಿಗೆ',       road:true,  bg:'linear-gradient(145deg,#f39c12,#d68910)' },
];

const rail = [
  { kn:'ರೈಲು',           en:'Train',          emoji:'🚂', use:'ದೂರ ಪ್ರಯಾಣ',        road:false, bg:'linear-gradient(145deg,#2c3e50,#1a252f)' },
  { kn:'ಮೆಟ್ರೋ',         en:'Metro',          emoji:'🚇', use:'ನಗರ ರೈಲು',           road:false, bg:'linear-gradient(145deg,#2980b9,#1f618d)' },
  { kn:'ಟ್ರಾಮ್',         en:'Tram',           emoji:'🚋', use:'ನಗರ ಸಾರಿಗೆ',         road:false, bg:'linear-gradient(145deg,#27ae60,#1e8449)' },
  { kn:'ಸರಕು ರೈಲು',      en:'Freight Train',  emoji:'🚃', use:'ಸಾಮಾನು ಸಾಗಿಸುತ್ತದೆ', road:false, bg:'linear-gradient(145deg,#7f8c8d,#5d6d7e)' },
  { kn:'ಬುಲೆಟ್ ಟ್ರೈನ್',  en:'Bullet Train',   emoji:'🚄', use:'ಅತ್ಯಂತ ವೇಗದ ರೈಲು',   road:false, bg:'linear-gradient(145deg,#e74c3c,#c0392b)' },
  { kn:'ಮೋನೋರೈಲ್',       en:'Monorail',       emoji:'🚝', use:'ಒಂದು ಹಳಿ ರೈಲು',      road:false, bg:'linear-gradient(145deg,#8e44ad,#6c3483)' },
];

const air = [
  { kn:'ವಿಮಾನ',         en:'Aeroplane',   emoji:'✈️', use:'ದೂರ ವೇಗ ಪ್ರಯಾಣ',     road:false, bg:'linear-gradient(145deg,#2980b9,#1a5276)' },
  { kn:'ಹೆಲಿಕಾಪ್ಟರ್',   en:'Helicopter',  emoji:'🚁', use:'ತುರ್ತು ಸೇವೆ',          road:false, bg:'linear-gradient(145deg,#e67e22,#ca6f1e)' },
  { kn:'ರಾಕೆಟ್',        en:'Rocket',      emoji:'🚀', use:'ಬಾಹ್ಯಾಕಾಶ ಪ್ರಯಾಣ',    road:false, bg:'linear-gradient(145deg,#8e44ad,#6c3483)' },
  { kn:'ಹಾರುವ ತಟ್ಟೆ',   en:'UFO',         emoji:'🛸', use:'ಕಾಲ್ಪನಿಕ ವಾಹನ',       road:false, bg:'linear-gradient(145deg,#1a1a4e,#2d2d8e)' },
  { kn:'ಪ್ಯಾರಾಚೂಟ್',    en:'Parachute',   emoji:'🪂', use:'ಆಕಾಶದಿಂದ ಇಳಿಯಲು',    road:false, bg:'linear-gradient(145deg,#e84393,#c0336f)' },
  { kn:'ಬಲೂನ್',         en:'Hot Air Balloon',emoji:'🎈',use:'ಹವ್ಯಾಸ ಪ್ರಯಾಣ',    road:false, bg:'linear-gradient(145deg,#f39c12,#d68910)' },
];

const water = [
  { kn:'ಹಡಗು',          en:'Ship',        emoji:'🚢', use:'ಸಮುದ್ರ ಪ್ರಯಾಣ',      road:false, bg:'linear-gradient(145deg,#1a5276,#0d3b8e)' },
  { kn:'ದೋಣಿ',          en:'Boat',        emoji:'⛵', use:'ನದಿ ಪ್ರಯಾಣ',          road:false, bg:'linear-gradient(145deg,#2980b9,#1f618d)' },
  { kn:'ಮೀನು ದೋಣಿ',    en:'Fishing Boat',emoji:'🚤', use:'ಮೀನು ಹಿಡಿಯಲು',       road:false, bg:'linear-gradient(145deg,#117a65,#0e6655)' },
  { kn:'ಜಲಾಂತರ್ಗಾಮಿ',   en:'Submarine',   emoji:'🤿', use:'ನೀರಿನ ಅಡಿ ಪ್ರಯಾಣ',  road:false, bg:'linear-gradient(145deg,#1a3a5e,#0d2040)' },
  { kn:'ಫೆರ್ರಿ',        en:'Ferry',       emoji:'⛴️', use:'ನದಿ ದಾಟಲು',          road:false, bg:'linear-gradient(145deg,#e67e22,#ca6f1e)' },
  { kn:'ಕ್ರೂಸ್ ಹಡಗು',  en:'Cruise Ship', emoji:'🛳️', use:'ಸಮುದ್ರ ಪ್ರವಾಸ',      road:false, bg:'linear-gradient(145deg,#2c3e50,#1a252f)' },
];

const rules = [
  { emoji:'🔴', kn:'ಕೆಂಪು ಬಣ್ಣ — ನಿಲ್ಲು',    en:'Red light — Stop',       desc:'ಕೆಂಪು ದೀಪ ಕಂಡಾಗ ವಾಹನ ನಿಲ್ಲಿಸಬೇಕು.' },
  { emoji:'🟡', kn:'ಹಳದಿ ಬಣ್ಣ — ಜಾಗ್ರತೆ',   en:'Yellow light — Caution', desc:'ಹಳದಿ ದೀಪ ಕಂಡಾಗ ನಿಧಾನ ಆಗಬೇಕು.' },
  { emoji:'🟢', kn:'ಹಸಿರು ಬಣ್ಣ — ಹೋಗು',    en:'Green light — Go',       desc:'ಹಸಿರು ದೀಪ ಕಂಡಾಗ ಹೋಗಬಹುದು.' },
  { emoji:'🚶', kn:'ಜೀಬ್ರಾ ಕ್ರಾಸಿಂಗ್',      en:'Zebra Crossing',         desc:'ಬಿಳಿ ಗೆರೆ ಮೇಲೆ ರಸ್ತೆ ದಾಟಬೇಕು.' },
  { emoji:'⛑️', kn:'ಹೆಲ್ಮೆಟ್ ಹಾಕಿ',         en:'Wear helmet',            desc:'ದ್ವಿಚಕ್ರ ವಾಹನ ಸವಾರಿ ಮಾಡಲು ಹೆಲ್ಮೆಟ್ ಬೇಕು.' },
  { emoji:'🔇', kn:'ಹಾರ್ನ್ ಕಡಿಮೆ ಮಾಡಿ',    en:'Avoid honking',          desc:'ಶಾಲೆ ಮತ್ತು ಆಸ್ಪತ್ರೆ ಸಮೀಪ ಹಾರ್ನ್ ಬಾರಿಸಬೇಡಿ.' },
  { emoji:'🏎️', kn:'ವೇಗ ನಿಯಂತ್ರಣ',         en:'Speed limit',            desc:'ನಿಗದಿತ ವೇಗ ಮೀರಿ ವಾಹನ ಓಡಿಸಬಾರದು.' },
  { emoji:'👮', kn:'ಸಂಚಾರ ಪೊಲೀಸ್',         en:'Traffic Police',         desc:'ಸಂಚಾರ ಪೊಲೀಸ್ ರಸ್ತೆ ನಿಯಮ ಜಾರಿ ಮಾಡುತ್ತಾರೆ.' },
];

const tabData = { road, rail, air, water };
let soundOn = true;
let activeTab = 'road';

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? 'ಧ್ವನಿ ಆನ್' : 'ಧ್ವನಿ ಆಫ್';
  document.getElementById('soundToggle').classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN'; u.rate = 0.85; u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const kn = voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn'));
  if (!kn) return;
  u.voice = kn;
  window.speechSynthesis.speak(u);
}

function switchTab(tab) {
  activeTab = tab;
  ['road','rail','air','water','rules'].forEach(t => {
    document.getElementById('tab-'+t).className = 'tab' + (t===tab ? ' active-'+t : '');
  });
  const grid = document.getElementById('grid');
  const rg   = document.getElementById('rulesGrid');
  if (tab === 'rules') {
    grid.style.display = 'none'; rg.style.display = 'grid'; buildRules();
  } else {
    grid.style.display = 'grid'; rg.style.display = 'none'; buildGrid();
  }
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  tabData[activeTab].forEach(v => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="item-face ${v.road ? 'road-anim' : ''}" style="background:${v.bg};">
        ${v.emoji}
        <div class="fact-pill">🛤️ ${v.use}</div>
      </div>
      <div class="card-info">
        <div class="card-kn">${v.kn}</div>
        <div class="card-en">${v.en}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      card.classList.remove('playing'); void card.offsetWidth; card.classList.add('playing');
      speak(`${v.kn}. ${v.use}`);
      setTimeout(() => card.classList.remove('playing'), 500);
    });
    grid.appendChild(card);
  });
}

function buildRules() {
  const rg = document.getElementById('rulesGrid');
  rg.innerHTML = '';
  rules.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'rule-card';
    div.style.animationDelay = (i * 0.06) + 's';
    div.innerHTML = `
      <div class="rule-emoji">${r.emoji}</div>
      <div>
        <div class="rule-kn">${r.kn}</div>
        <div class="rule-en">${r.en}</div>
        <div class="rule-desc">${r.desc}</div>
      </div>
    `;
    div.addEventListener('click', () => {
      div.classList.add('playing');
      speak(`${r.kn}. ${r.desc}`);
      setTimeout(() => div.classList.remove('playing'), 2500);
    });
    rg.appendChild(div);
  });
}

if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = () => {}; window.speechSynthesis.getVoices(); }
buildGrid();
</script>
</body>
</html>
