<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ನನ್ನ ಕುಟುಂಬ - LKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&display=swap');

  :root {
    --bg: #1a0a00;
    --topbar: #231000;
    --text-light: #fff8f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text-light);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(253,167,60,0.13) 0%, transparent 50%),
      radial-gradient(circle at 85% 75%, rgba(232,67,147,0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 95%, rgba(255,107,107,0.07) 0%, transparent 40%);
  }

  /* TOPBAR */
  .topbar {
    background: var(--topbar);
    border-bottom: 2px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 64px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    background: rgba(255,255,255,0.1); border: none; border-radius: 10px;
    color: white; padding: 8px 14px; font-size: 18px; cursor: pointer;
    text-decoration: none; transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .topbar-title {
    font-size: 1.3rem; font-weight: 800;
    background: linear-gradient(90deg, #fda73c, #e84393);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sound-btn {
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: white; padding: 8px 16px; font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.5; }

  /* HERO */
  .hero { text-align: center; padding: 28px 20px 12px; }
  .hero-emoji {
    font-size: 3.2rem; display: inline-block;
    animation: heartbeat 1.8s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    14%      { transform: scale(1.18); }
    28%      { transform: scale(1); }
    42%      { transform: scale(1.12); }
    56%      { transform: scale(1); }
  }
  .hero h1 {
    font-size: 2.2rem; font-weight: 800; margin-top: 8px;
    background: linear-gradient(135deg, #fda73c, #e84393, #ff6b6b);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero p { font-size: 0.92rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

  /* TTS NOTICE */
  .tts-notice {
    background: rgba(255,209,61,0.1); border: 1px solid rgba(255,209,61,0.28);
    border-radius: 14px; padding: 10px 16px; font-size: 0.8rem;
    color: rgba(255,209,61,0.85); display: flex; align-items: flex-start; gap: 8px;
    max-width: 1100px; margin: 0 auto 12px;
  }

  /* FAMILY TREE SECTION */
  .section-title {
    text-align: center; font-size: 1rem; font-weight: 700;
    color: rgba(255,255,255,0.4); letter-spacing: 1px;
    text-transform: uppercase; margin: 4px 0 14px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 16px;
    padding: 4px 24px 52px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    border-radius: 24px; overflow: hidden; cursor: pointer;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    transition: transform 0.18s, box-shadow 0.18s;
    animation: popIn 0.42s both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.65); }
    to   { opacity: 1; transform: scale(1); }
  }
  .card:nth-child(1)  { animation-delay: 0.03s; }
  .card:nth-child(2)  { animation-delay: 0.06s; }
  .card:nth-child(3)  { animation-delay: 0.09s; }
  .card:nth-child(4)  { animation-delay: 0.12s; }
  .card:nth-child(5)  { animation-delay: 0.15s; }
  .card:nth-child(6)  { animation-delay: 0.18s; }
  .card:nth-child(7)  { animation-delay: 0.21s; }
  .card:nth-child(8)  { animation-delay: 0.24s; }
  .card:nth-child(9)  { animation-delay: 0.27s; }
  .card:nth-child(10) { animation-delay: 0.30s; }
  .card:nth-child(11) { animation-delay: 0.33s; }
  .card:nth-child(12) { animation-delay: 0.36s; }

  .card:hover { transform: translateY(-8px) scale(1.05); box-shadow: 0 20px 48px rgba(0,0,0,0.55); }
  .card:active { transform: scale(0.94); }
  .card.playing { animation: fpulse 0.5s ease !important; }
  @keyframes fpulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.13); }
    100% { transform: scale(1); }
  }

  .item-face {
    height: 112px; display: flex; align-items: center; justify-content: center;
    font-size: 3.8rem; position: relative;
  }
  /* heart deco */
  .item-face::after {
    content: '❤️';
    position: absolute; bottom: 6px; right: 10px;
    font-size: 0.9rem; opacity: 0.6;
  }

  .card-info {
    padding: 12px 10px 16px; text-align: center;
    background: rgba(0,0,0,0.38); backdrop-filter: blur(4px);
  }
  .card-kn { font-size: 1.1rem; font-weight: 800; color: #fff; line-height: 1.2; }
  .card-en { font-size: 0.73rem; font-weight: 600; color: rgba(255,255,255,0.42); margin-top: 2px; font-style: italic; }
  .card-relation {
    font-size: 0.72rem; color: rgba(255,255,255,0.28);
    margin-top: 4px; letter-spacing: 0.2px;
  }

  /* SENTENCE SECTION */
  .sentence-section {
    max-width: 1100px; margin: 0 auto 52px;
    padding: 0 24px;
  }
  .sentence-title {
    font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.38);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px;
    text-align: center;
  }
  .sentence-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px; padding: 16px 20px; margin-bottom: 12px;
    cursor: pointer; transition: all 0.18s;
    display: flex; align-items: center; gap: 14px;
    animation: popIn 0.4s both;
  }
  .sentence-card:hover { background: rgba(255,255,255,0.1); transform: translateX(6px); }
  .sentence-card:nth-child(1) { animation-delay: 0.4s; }
  .sentence-card:nth-child(2) { animation-delay: 0.46s; }
  .sentence-card:nth-child(3) { animation-delay: 0.52s; }
  .sentence-card:nth-child(4) { animation-delay: 0.58s; }
  .sentence-card:nth-child(5) { animation-delay: 0.64s; }
  .sentence-card.playing { background: rgba(255,200,100,0.15); border-color: rgba(255,200,100,0.3); }
  .sentence-emoji { font-size: 1.8rem; flex-shrink: 0; }
  .sentence-text { font-size: 1.05rem; font-weight: 700; color: #fff; line-height: 1.5; }
  .sentence-meaning { font-size: 0.75rem; color: rgba(255,255,255,0.38); font-style: italic; }

  .footer { text-align: center; padding: 14px; color: rgba(255,255,255,0.18); font-size: 0.78rem; }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 11px; padding: 4px 13px 32px; }
    .item-face { height: 84px; font-size: 2.8rem; }
    .card-kn { font-size: 0.9rem; }
    .hero h1 { font-size: 1.75rem; }
    .sentence-section { padding: 0 14px; }
    .sentence-text { font-size: 0.92rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/class/lkg/kannada" class="back-btn">←</a>
    <span class="topbar-title">ನನ್ನ ಕುಟುಂಬ</span>
  </div>
  <div class="topbar-right">
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
      <span id="soundIcon">🔊</span>
      <span id="soundLabel">ಧ್ವನಿ ಆನ್</span>
    </button>
  </div>
</div>

<div class="hero">
  <div class="hero-emoji">👨‍👩‍👧‍👦</div>
  <h1>ನನ್ನ ಕುಟುಂಬ</h1>
  <p>ನಾನು ಪ್ರೀತಿಸುವ ಜನರು! • ಕಾರ್ಡ್ ಒತ್ತಿ ಕೇಳಿ!</p>
</div>

<div class="tts-notice">
  <span>📱</span>
  <span>ಧ್ವನಿ ಕೇಳಲು Android TTS ನಲ್ಲಿ Kannada ಭಾಷೆ ಸ್ಥಾಪಿಸಿ.</span>
</div>

<div class="grid" id="grid"></div>

<div class="sentence-section">
  <div class="sentence-title">📝 ವಾಕ್ಯಗಳು</div>
  <div id="sentences"></div>
</div>

<div class="footer">VidyaAI • LKG ಕನ್ನಡ</div>

<script>
const family = [
  { kn: 'ಅಪ್ಪ',       en: 'Father',       emoji: '👨', relation: 'ತಂದೆ',   bg: 'linear-gradient(145deg,#1a5276,#1a3a5e)' },
  { kn: 'ಅಮ್ಮ',       en: 'Mother',       emoji: '👩', relation: 'ತಾಯಿ',   bg: 'linear-gradient(145deg,#e84393,#a0205e)' },
  { kn: 'ಅಣ್ಣ',       en: 'Elder Brother',emoji: '👦', relation: 'ಹಿರಿಯ ಸಹೋದರ', bg: 'linear-gradient(145deg,#2874a6,#1a5276)' },
  { kn: 'ಅಕ್ಕ',       en: 'Elder Sister', emoji: '👧', relation: 'ಹಿರಿಯ ಸಹೋದರಿ', bg: 'linear-gradient(145deg,#c0396b,#922b51)' },
  { kn: 'ತಮ್ಮ',       en: 'Younger Brother',emoji:'🧒',relation:'ಕಿರಿಯ ಸಹೋದರ', bg: 'linear-gradient(145deg,#117a65,#0e6655)' },
  { kn: 'ತಂಗಿ',       en: 'Younger Sister',emoji: '👶',relation:'ಕಿರಿಯ ಸಹೋದರಿ', bg: 'linear-gradient(145deg,#d4619a,#a0397a)' },
  { kn: 'ತಾತ',        en: 'Grandfather',  emoji: '👴', relation: 'ಅಜ್ಜ',   bg: 'linear-gradient(145deg,#6e4a2a,#4e2a0a)' },
  { kn: 'ಅಜ್ಜಿ',      en: 'Grandmother',  emoji: '👵', relation: 'ಅಜ್ಜಿ',   bg: 'linear-gradient(145deg,#8e5a3a,#6e3a1a)' },
  { kn: 'ಚಿಕ್ಕಪ್ಪ',   en: 'Uncle',        emoji: '🧔', relation: 'ತಂದೆಯ ತಮ್ಮ', bg: 'linear-gradient(145deg,#1f618d,#17496e)' },
  { kn: 'ಚಿಕ್ಕಮ್ಮ',   en: 'Aunt',         emoji: '👩‍🦱',relation: 'ಚಿಕ್ಕಪ್ಪನ ಹೆಂಡತಿ', bg: 'linear-gradient(145deg,#a93277,#7d1f57)' },
  { kn: 'ಮಗ',         en: 'Son',          emoji: '👦', relation: 'ಗಂಡು ಮಗು', bg: 'linear-gradient(145deg,#1e8bc3,#1a6fa0)' },
  { kn: 'ಮಗಳು',       en: 'Daughter',     emoji: '👧', relation: 'ಹೆಣ್ಣು ಮಗು', bg: 'linear-gradient(145deg,#e8407a,#c0305a)' },
];

const sentences = [
  { emoji: '👨', text: 'ಇವರು ನನ್ನ ಅಪ್ಪ.', meaning: 'This is my father.' },
  { emoji: '👩', text: 'ಇವರು ನನ್ನ ಅಮ್ಮ.', meaning: 'This is my mother.' },
  { emoji: '👴', text: 'ಇವರು ನನ್ನ ತಾತ.', meaning: 'This is my grandfather.' },
  { emoji: '👵', text: 'ಇವರು ನನ್ನ ಅಜ್ಜಿ.', meaning: 'This is my grandmother.' },
  { emoji: '👨‍👩‍👧‍👦', text: 'ನಾವು ಒಂದು ಕುಟುಂಬ.', meaning: 'We are one family.' },
];

let soundOn = true;

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? 'ಧ್ವನಿ ಆನ್' : 'ಧ್ವನಿ ಆಫ್';
  document.getElementById('soundToggle').classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN'; u.rate = 0.85; u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const knVoice = voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn'));
  if (!knVoice) return;
  u.voice = knVoice;
  window.speechSynthesis.speak(u);
}

function buildGrid() {
  const grid = document.getElementById('grid');
  family.forEach(f => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="item-face" style="background:${f.bg};">${f.emoji}</div>
      <div class="card-info">
        <div class="card-kn">${f.kn}</div>
        <div class="card-en">${f.en}</div>
        <div class="card-relation">${f.relation}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      card.classList.remove('playing');
      void card.offsetWidth;
      card.classList.add('playing');
      speak(f.kn);
      setTimeout(() => card.classList.remove('playing'), 500);
    });
    grid.appendChild(card);
  });
}

function buildSentences() {
  const container = document.getElementById('sentences');
  sentences.forEach(s => {
    const div = document.createElement('div');
    div.className = 'sentence-card';
    div.innerHTML = `
      <div class="sentence-emoji">${s.emoji}</div>
      <div>
        <div class="sentence-text">${s.text}</div>
        <div class="sentence-meaning">${s.meaning}</div>
      </div>
    `;
    div.addEventListener('click', () => {
      div.classList.add('playing');
      speak(s.text);
      setTimeout(() => div.classList.remove('playing'), 1800);
    });
    container.appendChild(div);
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}
buildGrid();
buildSentences();
</script>
</body>
</html>
