<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ನನ್ನ ಕುಟುಂಬ - LKG ಕನ್ನಡ</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@500;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --radius: 30px; --top-h: 70px; }

body {
  font-family: 'Baloo Tamma 2', cursive;
  background: #f0f4ff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--top-h);
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 300;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
.topbar-title {
  font-size: 1.55rem; font-weight: 900;
  background: linear-gradient(90deg, #FFD93D, #FF6B35, #FF6B9D);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.top-right { display: flex; align-items: center; gap: 10px; }
.score-pill {
  background: #FFD93D; color: #1a1a2e;
  font-weight: 900; font-size: 1rem;
  padding: 7px 18px; border-radius: 50px;
  box-shadow: 0 4px 14px rgba(255,217,61,0.45);
  white-space: nowrap;
}
.sound-btn {
  background: rgba(255,255,255,0.13);
  border: 2px solid rgba(255,255,255,0.22);
  color: white; border-radius: 12px;
  padding: 8px 14px; font-size: 1.2rem;
  cursor: pointer; font-family: inherit;
  transition: background 0.2s;
}
.sound-btn:hover { background: rgba(255,255,255,0.22); }
.sound-btn.off { opacity: 0.4; }

/* ── PANEL HERO ── */
.panel-hero {
  padding: 30px 24px 18px; text-align: center; position: relative; overflow: hidden;
  background: linear-gradient(135deg, #fde8f5, #ffe5d0);
}
.panel-hero h2 { font-size: 2.8rem; font-weight: 900; line-height: 1.1; margin-bottom: 5px; color: #7a1040; }
.panel-hero p  { font-size: 1.05rem; font-weight: 700; opacity: 0.6; margin-bottom: 13px; color: #a0204e; }
.tap-hint {
  display: inline-flex; align-items: center; gap: 7px;
  border: 2.5px dashed #a0204e; border-radius: 50px;
  padding: 7px 20px; font-size: 0.98rem; font-weight: 800; opacity: 0.7;
  color: #a0204e;
  animation: wag 2s ease-in-out infinite;
}
@keyframes wag { 0%,100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
.hf {
  position: absolute; font-size: 3.5rem;
  animation: fy 4s ease-in-out infinite; pointer-events: none; opacity: 0.16;
}
@keyframes fy { 0%,100%{transform:translateY(0) rotate(-8deg);} 50%{transform:translateY(-18px) rotate(8deg);} }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 22px; padding: 22px 26px 32px;
  max-width: 1300px; margin: 0 auto;
}

/* ── CARD ── */
.card {
  border-radius: var(--radius); background: white;
  box-shadow: 0 6px 28px rgba(0,0,0,0.09);
  cursor: pointer; overflow: hidden;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  border: 3.5px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.5) rotate(-6deg); }
  to   { opacity:1; transform:scale(1); }
}
.card:hover { transform:translateY(-12px) scale(1.04) rotate(.8deg); box-shadow:0 24px 56px rgba(0,0,0,0.15); }
.card:active { transform:scale(0.91); }
.card.playing { animation: cb .5s cubic-bezier(.34,1.56,.64,1) !important; }
@keyframes cb { 0%{transform:scale(1);} 30%{transform:scale(1.22) rotate(-4deg);} 65%{transform:scale(.94) rotate(2deg);} 100%{transform:scale(1);} }

.card-face {
  height: 160px;
  display: flex; align-items: center; justify-content: center;
  font-size: 5.5rem; position: relative;
}
.card-face span { filter: drop-shadow(0 6px 14px rgba(0,0,0,0.18)); line-height: 1; }
.star-pop {
  position: absolute; top: 8px; right: 12px;
  font-size: 1.6rem; transform: scale(0); opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1); pointer-events: none;
}
.card.playing .star-pop { transform: scale(1) rotate(25deg); opacity: 1; }
.card.learned .star-pop { transform: scale(0.85); opacity: 0.55; }

.card-info { padding: 15px 12px 20px; text-align: center; border-top: 3px solid rgba(0,0,0,0.05); }
.kn-word { font-size: 1.85rem; font-weight: 900; color: #1a1a2e; line-height: 1.1; }
.en-word { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; opacity: 0.4; }
.sound-pill {
  display: inline-block; margin-top: 9px; border-radius: 50px;
  padding: 5px 16px; font-size: 0.88rem; font-weight: 800; color: white;
}
.relation-badge {
  display: inline-block; margin-top: 6px; border-radius: 50px;
  padding: 3px 12px; font-size: 0.72rem; font-weight: 700;
  background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.4);
}

/* ── SENTENCES ── */
.sentence-section {
  max-width: 1300px; margin: 0 auto 60px;
  padding: 0 26px;
}
.sentence-title {
  font-size: 1rem; font-weight: 800; color: #444;
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px;
  text-align: center;
}
.sentence-card {
  background: white; border: 3px solid transparent;
  border-radius: 20px; padding: 16px 20px; margin-bottom: 12px;
  cursor: pointer;
  transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
  display: flex; align-items: center; gap: 16px;
  animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  box-shadow: 0 4px 18px rgba(0,0,0,0.07);
}
.sentence-card:hover { transform: translateX(8px) scale(1.01); box-shadow: 0 10px 32px rgba(0,0,0,0.12); }
.sentence-card.playing { background: #fff9e6; border-color: #FFD93D; }
.sentence-emoji { font-size: 2rem; flex-shrink: 0; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.15)); }
.sentence-text { font-size: 1.1rem; font-weight: 800; color: #1a1a2e; line-height: 1.5; }
.sentence-meaning { font-size: 0.76rem; color: #888; font-style: italic; margin-top: 2px; }

/* ── CONFETTI ── */
.cf { position:fixed; border-radius:3px; top:-20px; pointer-events:none; z-index:9999; animation:cff 1.4s ease-in forwards; }
@keyframes cff { to { transform: translateY(110vh) rotate(600deg); opacity:0; } }

/* ── RESPONSIVE ── */
@media (max-width: 580px) {
  .grid { grid-template-columns: repeat(2,1fr); gap:13px; padding:14px 12px 28px; }
  .card-face { height:115px; font-size:3.8rem; }
  .kn-word { font-size:1.35rem; }
  .panel-hero h2 { font-size:2rem; }
  .sentence-section { padding: 0 12px; }
}
@media (min-width:900px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); }
  .card-face { height:175px; font-size:6rem; }
  .kn-word { font-size:2.1rem; }
}


/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.topbar-title{font-size:clamp(15px,2vw,28px);}
.hero h1{font-size:clamp(22px,3.5vw,52px);}
.hero h2{font-size:clamp(22px,3.5vw,52px);}
.hero p{font-size:clamp(13px,1.6vw,22px);}
.hero{padding:clamp(18px,3vw,48px) clamp(20px,5vw,80px) clamp(44px,6vw,80px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.card{border-radius:clamp(16px,2vw,28px);}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">❤️ ನನ್ನ ಕುಟುಂಬ</div>
  <div class="top-right">
    <div class="score-pill" id="scorePill">⭐ 0 / 12</div>
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
  </div>
</div>

<!-- HERO -->
<div class="panel-hero">
  <span class="hf" style="top:8px;left:4%;">🏠</span>
  <span class="hf" style="top:18px;right:6%;animation-delay:-2s;">💛</span>
  <h2>👨‍👩‍👧‍👦 ನನ್ನ ಕುಟುಂಬ</h2>
  <p>My Family</p>
  <span class="tap-hint">👆 ಕಾರ್ಡ್ ಒತ್ತಿ ಹೆಸರು ಕೇಳಿ!</span>
</div>

<div class="grid" id="grid"></div>

<!-- SENTENCES -->
<div class="sentence-section">
  <div class="sentence-title">📝 ವಾಕ್ಯಗಳು</div>
  <div id="sentences"></div>
</div>

<script>
const family = [
  // Proper person emojis — gender-specific, age-appropriate, universally rendered
  { kn:'ಅಪ್ಪ',      en:'Father',          emoji:'👨',     relation:'ತಂದೆ',              sound:'ಅ-ಪ್ಪ',          bg:'#e3f2fd', border:'#2196F3', pill:'#0D47A1' },
  { kn:'ಅಮ್ಮ',      en:'Mother',          emoji:'👩',     relation:'ತಾಯಿ',              sound:'ಅ-ಮ್ಮ',          bg:'#fce4ec', border:'#E91E63', pill:'#880E4F' },
  { kn:'ಅಣ್ಣ',      en:'Elder Brother',   emoji:'👦',     relation:'ಹಿರಿಯ ಸಹೋದರ',     sound:'ಅ-ಣ್ಣ',          bg:'#e8f5e9', border:'#4CAF50', pill:'#1B5E20' },
  { kn:'ಅಕ್ಕ',      en:'Elder Sister',    emoji:'👧',     relation:'ಹಿರಿಯ ಸಹೋದರಿ',    sound:'ಅ-ಕ್ಕ',          bg:'#f3e5f5', border:'#9C27B0', pill:'#6A1B9A' },
  { kn:'ತಮ್ಮ',      en:'Younger Brother', emoji:'🧒',     relation:'ಕಿರಿಯ ಸಹೋದರ',     sound:'ತ-ಮ್ಮ',          bg:'#e0f7fa', border:'#00BCD4', pill:'#006064' },
  { kn:'ತಂಗಿ',      en:'Younger Sister',  emoji:'👶',     relation:'ಕಿರಿಯ ಸಹೋದರಿ',    sound:'ತ-ಂಗಿ',          bg:'#fff8e1', border:'#FF9800', pill:'#E65100' },
  { kn:'ತಾತ',       en:'Grandfather',     emoji:'👴',     relation:'ಅಜ್ಜ',              sound:'ತಾ-ತ',           bg:'#efebe9', border:'#795548', pill:'#4E342E' },
  { kn:'ಅಜ್ಜಿ',     en:'Grandmother',     emoji:'👵',     relation:'ಅಜ್ಜಿ',             sound:'ಅ-ಜ್ಜಿ',         bg:'#fbe9e7', border:'#FF5722', pill:'#BF360C' },
  { kn:'ಚಿಕ್ಕಪ್ಪ',  en:'Uncle',           emoji:'🧔',     relation:'ತಂದೆಯ ತಮ್ಮ',       sound:'ಚಿ-ಕ್ಕ-ಪ್ಪ',     bg:'#e8eaf6', border:'#3F51B5', pill:'#1A237E' },
  { kn:'ಚಿಕ್ಕಮ್ಮ',  en:'Aunt',            emoji:'👩‍🦱',  relation:'ಚಿಕ್ಕಪ್ಪನ ಹೆಂಡತಿ', sound:'ಚಿ-ಕ್ಕ-ಮ್ಮ',     bg:'#fce4ec', border:'#F06292', pill:'#880E4F' },
  { kn:'ಮಗ',        en:'Son',             emoji:'👦',     relation:'ಗಂಡು ಮಗು',          sound:'ಮ-ಗ',            bg:'#e1f5fe', border:'#03A9F4', pill:'#01579B' },
  { kn:'ಮಗಳು',      en:'Daughter',        emoji:'👧',     relation:'ಹೆಣ್ಣು ಮಗು',        sound:'ಮ-ಗ-ಳು',         bg:'#f8bbd0', border:'#E91E63', pill:'#880E4F' },
];

const sentences = [
  { emoji:'👨',           text:'ಇವರು ನನ್ನ ಅಪ್ಪ.',      meaning:'This is my father.',      border:'#2196F3' },
  { emoji:'👩',           text:'ಇವರು ನನ್ನ ಅಮ್ಮ.',      meaning:'This is my mother.',      border:'#E91E63' },
  { emoji:'👴',           text:'ಇವರು ನನ್ನ ತಾತ.',       meaning:'This is my grandfather.', border:'#795548' },
  { emoji:'👵',           text:'ಇವರು ನನ್ನ ಅಜ್ಜಿ.',      meaning:'This is my grandmother.', border:'#FF5722' },
  { emoji:'👨‍👩‍👧‍👦', text:'ನಾವು ಒಂದು ಕುಟುಂಬ.',    meaning:'We are one family.',      border:'#9C27B0' },
];

const TOTAL = family.length;
document.getElementById('scorePill').textContent = `⭐ 0 / ${TOTAL}`;

let soundOn = true;
const learned = new Set();

function toggleSound() {
  soundOn = !soundOn;
  const b = document.getElementById('soundBtn');
  b.textContent = soundOn ? '🔊' : '🔇';
  b.classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='kn-IN'; u.rate=0.82; u.pitch=1.1;
  const v = window.speechSynthesis.getVoices().find(x=>x.lang==='kn-IN'||x.lang.startsWith('kn'));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

const CC = ['#FFD93D','#FF6B35','#06D6A0','#FF6B9D','#9B5DE5','#118AB2','#43e97b'];
function confetti(x,y) {
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='cf';
    el.style.cssText=`left:${x+(Math.random()-.5)*160}px;background:${CC[i%CC.length]};animation-duration:${.9+Math.random()*.9}s;animation-delay:${Math.random()*.2}s;width:${6+Math.random()*10}px;height:${8+Math.random()*14}px;transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2200);
  }
}

let di = 0;
function buildGrid() {
  const grid = document.getElementById('grid');
  family.forEach(f => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (di++ * 0.055) + 's';
    card.style.borderColor = f.border;
    card.innerHTML = `
      <div class="card-face" style="background:${f.bg};">
        <span class="star-pop">⭐</span>
        <span>${f.emoji}</span>
      </div>
      <div class="card-info">
        <div class="kn-word">${f.kn}</div>
        <div class="en-word">${f.en}</div>
        <div class="sound-pill" style="background:${f.pill};">${f.sound}</div>
        <div class="relation-badge">${f.relation}</div>
      </div>`;
    card.addEventListener('click', e => {
      card.classList.remove('playing');
      void card.offsetWidth;
      card.classList.add('playing');
      speak(f.kn);
      setTimeout(() => card.classList.remove('playing'), 520);
      if (!learned.has(f.kn)) {
        learned.add(f.kn);
        card.classList.add('learned');
        document.getElementById('scorePill').textContent = `⭐ ${learned.size} / ${TOTAL}`;
        const r = card.getBoundingClientRect();
        confetti(r.left + r.width/2, r.top + r.height/2);
      }
    });
    grid.appendChild(card);
  });
}

function buildSentences() {
  const container = document.getElementById('sentences');
  sentences.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'sentence-card';
    div.style.animationDelay = (0.5 + i * 0.07) + 's';
    div.style.borderColor = s.border;
    div.innerHTML = `
      <div class="sentence-emoji">${s.emoji}</div>
      <div>
        <div class="sentence-text">${s.text}</div>
        <div class="sentence-meaning">${s.meaning}</div>
      </div>`;
    div.addEventListener('click', () => {
      div.classList.add('playing');
      speak(s.text);
      setTimeout(() => div.classList.remove('playing'), 1800);
    });
    container.appendChild(div);
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
buildGrid();
buildSentences();
</script>
</body>
</html>
