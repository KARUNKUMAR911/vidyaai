<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fruits & Veggies Fun!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD600; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka One', cursive;
            overflow: hidden;
            height: 100vh; width: 100vw;
            user-select: none;
            background: #222;
        }

        /* ── FULL-SCREEN PHOTO ── */
        .screen {
            width: 100vw; height: 100vh;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        #bgPhoto {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: opacity 0.45s ease;
            z-index: 0;
        }

        #colorOverlay {
            position: absolute; inset: 0;
            z-index: 1;
            transition: background 0.6s ease;
            pointer-events: none;
        }

        .grad-top {
            position: absolute; top: 0; left: 0; right: 0;
            height: 200px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.60), transparent);
            z-index: 2; pointer-events: none;
        }
        .grad-bottom {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 280px;
            background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
            z-index: 2; pointer-events: none;
        }

        .bg-blob {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.07);
            pointer-events: none;
            animation: floatBlob 7s ease-in-out infinite alternate;
            z-index: 3;
        }
        .bg-blob:nth-child(1){ width:200px;height:200px;top:-50px;left:-50px;animation-delay:0s; }
        .bg-blob:nth-child(2){ width:130px;height:130px;bottom:70px;right:-20px;animation-delay:2s; }
        @keyframes floatBlob {
            from { transform: translateY(0) scale(1); }
            to   { transform: translateY(18px) scale(1.1); }
        }

        /* ── TOP BAR ── */
        .topbar {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            z-index: 10;
        }
        .topbar-btn {
            background: rgba(255,255,255,0.22);
            border: 2.5px solid rgba(255,255,255,0.45);
            color: white; padding: 8px 18px;
            border-radius: 50px; font-size: 15px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 5px;
            transition: transform 0.15s, background 0.15s;
            backdrop-filter: blur(6px);
        }
        .topbar-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.38); }
        .stars-display {
            background: rgba(255,215,0,0.3);
            border: 2.5px solid rgba(255,215,0,0.6);
            color: white; padding: 8px 18px;
            border-radius: 50px; font-size: 16px;
            font-family: 'Fredoka One', cursive;
            backdrop-filter: blur(6px);
        }

        /* ── TAB BAR ── */
        .tab-bar {
            position: absolute; top: 62px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 10px;
            z-index: 10;
        }
        .tab-btn {
            background: rgba(255,255,255,0.18);
            border: 2.5px solid rgba(255,255,255,0.38);
            color: white; padding: 8px 26px;
            border-radius: 50px; font-size: 15px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer; transition: all 0.2s;
            backdrop-filter: blur(6px);
        }
        .tab-btn.active {
            background: white; color: #333;
            border-color: white;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }
        .tab-btn:active { transform: scale(0.93); }

        /* ── PROGRESS DOTS ── */
        .dots-row {
            position: absolute; top: 118px; left: 0; right: 0;
            display: flex; justify-content: center;
            gap: 5px; flex-wrap: wrap; padding: 0 20px;
            z-index: 10;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s; flex-shrink: 0;
        }
        .dot.done    { background: rgba(255,255,255,0.65); }
        .dot.current {
            background: var(--gold);
            transform: scale(1.7);
            box-shadow: 0 0 8px var(--gold);
        }

        /* ── NAME CARD bottom ── */
        .name-card {
            position: absolute; bottom: 96px; left: 0; right: 0;
            display: flex; flex-direction: column;
            align-items: center; gap: 10px;
            z-index: 10; pointer-events: none;
        }
        .word-label {
            font-size: clamp(38px, 10vw, 70px);
            font-family: 'Fredoka One', cursive;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.55);
            animation: slideUp 0.4s ease both;
            line-height: 1; letter-spacing: 1px;
        }
        .fun-fact-chip {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.38);
            backdrop-filter: blur(8px);
            color: white; border-radius: 50px;
            padding: 7px 22px;
            font-size: clamp(13px, 3.5vw, 18px);
            font-family: 'Nunito', sans-serif; font-weight: 900;
            animation: slideUp 0.4s ease 0.12s both;
            text-align: center; max-width: 85vw;
        }

        /* ── BOTTOM BAR ── */
        .bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 10px 20px 22px;
            z-index: 10; gap: 10px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.2);
            border: 2.5px solid rgba(255,255,255,0.45);
            color: white; padding: 14px 20px;
            border-radius: 50px; font-size: 22px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer; transition: all 0.15s;
            min-width: 70px; text-align: center;
            backdrop-filter: blur(6px);
        }
        .nav-btn:hover  { background: rgba(255,255,255,0.35); transform: scale(1.06); }
        .nav-btn:active { transform: scale(0.92); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .next-btn {
            background: white; color: #333; border: none;
            padding: 16px 38px; border-radius: 50px;
            font-size: 18px; font-family: 'Fredoka One', cursive;
            cursor: pointer;
            box-shadow: 0 6px 22px rgba(0,0,0,0.3), 0 0 0 4px rgba(255,255,255,0.3);
            transition: all 0.18s;
        }
        .next-btn:hover  { transform: scale(1.06) translateY(-3px); }
        .next-btn:active { transform: scale(0.94); }
        .bottom-center { text-align: center; flex: 1; }
        .tap-hint {
            font-size: 14px; color: rgba(255,255,255,0.82);
            font-family: 'Nunito', sans-serif; font-weight: 700;
            animation: tapWiggle 1.8s ease-in-out infinite;
        }
        @keyframes tapWiggle {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.07); }
        }
        .autoplay-pill {
            display: none; background: var(--gold); color: #333;
            padding: 4px 14px; border-radius: 20px;
            font-size: 13px; font-family: 'Nunito', sans-serif;
            font-weight: 800; margin-top: 4px;
        }
        .autoplay-pill.show { display: inline-block; }

        /* ── SPEAK FAB ── */
        /* ── SOUND PILL (top bar) ── */
        .sound-pill {
            background: rgba(255,255,255,0.22);
            border: 2.5px solid rgba(255,255,255,0.45);
            color: white; padding: 8px 16px;
            border-radius: 50px; font-size: 15px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            transition: transform 0.15s, background 0.2s;
            backdrop-filter: blur(6px);
            white-space: nowrap;
        }
        .sound-pill:active { transform: scale(0.92); background: rgba(255,255,255,0.4); }
        .sound-pill.muted {
            background: rgba(0,0,0,0.25);
            border-color: rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.5);
            text-decoration: line-through;
        }

        .speak-fab {
            position: absolute; bottom: 96px; right: 18px;
            width: 54px; height: 54px; border-radius: 50%;
            background: rgba(255,255,255,0.22);
            border: 2.5px solid rgba(255,255,255,0.5);
            color: white; font-size: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s;
            z-index: 11; backdrop-filter: blur(6px);
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }
        .speak-fab:active { transform: scale(0.88); }
        .speak-fab.speaking { animation: speakPulse 0.5s ease infinite alternate; }
        @keyframes speakPulse {
            from { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            to   { box-shadow: 0 0 0 14px rgba(255,255,255,0); }
        }

        .float-star {
            position: fixed; font-size: 32px;
            pointer-events: none; z-index: 50;
            animation: floatUp 1.1s ease forwards;
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-90px) scale(1.5); opacity: 0; }
        }

        /* ── PARENT PANEL ── */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.55); z-index: 100;
            align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }
        .overlay.show { display: flex; }
        .panel {
            background: white; border-radius: 30px;
            padding: 26px; width: 92%; max-width: 400px;
            max-height: 88vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        .panel h2 { font-size: 20px; color: #e76f51; margin-bottom: 6px; text-align: center; font-family: 'Fredoka One', cursive; }
        .panel-progress {
            text-align: center; font-size: 13px; color: #666;
            background: #fff3ee; padding: 8px; border-radius: 12px;
            margin-bottom: 18px; font-family: 'Nunito', sans-serif; font-weight: 700;
        }
        .panel-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid #f0f0f0; }
        .panel-label { font-size: 14px; font-weight: 700; color: #333; font-family: 'Nunito', sans-serif; }
        .panel-sub   { font-size: 12px; color: #999; margin-top: 2px; font-family: 'Nunito', sans-serif; }
        .toggle { width: 52px; height: 28px; background: #ddd; border-radius: 14px; cursor: pointer; position: relative; transition: background 0.3s; border: none; flex-shrink: 0; }
        .toggle.on { background: #e76f51; }
        .toggle::after { content:''; position:absolute; width:22px; height:22px; background:white; border-radius:50%; top:3px; left:3px; transition:left 0.3s; box-shadow:0 2px 6px rgba(0,0,0,0.25); }
        .toggle.on::after { left: 27px; }
        .speed-row { display: flex; gap: 7px; }
        .speed-btn { padding: 7px 14px; border: 2px solid #e5e7eb; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; background: white; transition: all 0.2s; font-family: 'Nunito', sans-serif; }
        .speed-btn.active { border-color: #e76f51; background: #fff3ee; color: #e76f51; }
        .jump-section { margin-top: 14px; }
        .jump-section h4 { font-size: 12px; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; font-family: 'Nunito', sans-serif; font-weight: 700; }
        .jump-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
        .jump-btn { border: 2px solid #e5e7eb; border-radius: 12px; font-size: 12px; font-weight: 800; cursor: pointer; background: white; color: #555; transition: all 0.2s; padding: 8px 4px; font-family: 'Nunito', sans-serif; text-align: center; }
        .jump-btn:hover { background: #e76f51; color: white; border-color: #e76f51; }
        .jump-btn.done  { background: #d1fae5; color: #059669; border-color: #a7f3d0; }
        .jump-btn.cur   { background: #e76f51; color: white; border-color: #e76f51; }
        .close-panel-btn { width:100%; padding:15px; background:#e76f51; color:white; border:none; border-radius:20px; font-size:16px; font-family:'Fredoka One',cursive; cursor:pointer; margin-top:18px; transition:transform 0.15s; }
        .close-panel-btn:active { transform: scale(0.96); }

        /* ── CELEBRATION ── */
        .celeb-overlay { display:none; position:fixed; inset:0; background:linear-gradient(135deg,#e76f51 0%,#f4a261 100%); z-index:200; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; }
        .celeb-overlay.show { display: flex; }
        .celeb-stars { display:flex; gap:14px; margin-bottom:14px; }
        .celeb-star  { font-size:44px; animation:starPop 0.5s cubic-bezier(0.175,0.885,0.32,1.4) both; }
        .celeb-star:nth-child(2){ animation-delay:0.15s; }
        .celeb-star:nth-child(3){ animation-delay:0.30s; }
        @keyframes starPop { 0%{transform:scale(0) rotate(-30deg);opacity:0;} 100%{transform:scale(1) rotate(0deg);opacity:1;} }
        .celeb-big   { font-size:90px; margin-bottom:10px; animation:popIn 0.6s cubic-bezier(0.175,0.885,0.32,1.4) both; }
        .celeb-title { font-size:36px; color:white; margin-bottom:8px; font-family:'Fredoka One',cursive; text-shadow:0 3px 12px rgba(0,0,0,0.2); }
        .celeb-sub   { font-size:17px; color:rgba(255,255,255,0.92); white-space:pre-line; margin-bottom:28px; font-family:'Nunito',sans-serif; font-weight:700; }
        .celeb-btn   { background:white; color:#e76f51; border:none; padding:18px 44px; border-radius:50px; font-size:19px; font-family:'Fredoka One',cursive; cursor:pointer; box-shadow:0 8px 24px rgba(0,0,0,0.22); transition:transform 0.15s; }
        .celeb-btn:active { transform: scale(0.94); }

        @keyframes popIn   { 0%{transform:scale(0) rotate(-10deg);opacity:0;} 80%{transform:scale(1.12) rotate(4deg);} 100%{transform:scale(1) rotate(0deg);opacity:1;} }
        @keyframes slideUp { from{transform:translateY(28px);opacity:0;} to{transform:translateY(0);opacity:1;} }
        @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;} 100%{transform:translateY(110vh) rotate(720deg);opacity:0;} }
    </style>
</head>
<body>

<div class="screen" id="mainScreen" onclick="handleTap(event)">

    <img id="bgPhoto" src="" alt=""/>
    <div id="colorOverlay"></div>
    <div class="grad-top"></div>
    <div class="grad-bottom"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <!-- Top bar -->
    <div class="topbar" onclick="event.stopPropagation()">
        <a href="/dashboard" class="topbar-btn">🏠 Home</a>
        <div class="stars-display" id="starsDisplay">⭐ 0</div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="sound-pill" id="soundFab" onclick="event.stopPropagation(); toggleSound();">🔊 Sound</button>
            <button class="topbar-btn" onclick="openPanel(event)">⚙️ Parent</button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar" onclick="event.stopPropagation()">
        <button class="tab-btn active" id="tabFruits"     onclick="switchTab('fruits')">🍎 Fruits</button>
        <button class="tab-btn"        id="tabVegetables" onclick="switchTab('vegetables')">🥦 Vegetables</button>
    </div>

    <!-- Dots -->
    <div class="dots-row" id="dotsRow"></div>

    <!-- Name + fact -->
    <div class="name-card">
        <div class="word-label"    id="wordLabel">Apple</div>
        <div class="fun-fact-chip" id="funFactChip">I am red and crunchy!</div>
    </div>

    <button class="speak-fab" id="speakFab" onclick="event.stopPropagation(); tapSpeak();">🔊</button>

    <div class="bottom-bar" onclick="event.stopPropagation()">
        <button class="nav-btn" id="prevBtn" onclick="prevItem(event)" disabled>◀</button>
        <div class="bottom-center">
            <div class="tap-hint" id="tapHint">👆 Tap to see next!</div>
            <div class="autoplay-pill" id="autoplayPill">▶ Playing…</div>
        </div>
        <button class="next-btn" onclick="nextItem(event)">Next ▶</button>
    </div>
</div>

<!-- Parent Panel -->
<div class="overlay" id="parentOverlay">
    <div class="panel">
        <h2>🍽️ Parent Controls</h2>
        <div class="panel-progress" id="panelProgress">0 items seen</div>
        <div class="panel-row">
            <div><div class="panel-label">🔊 Voice Sound</div><div class="panel-sub">Speaks name aloud</div></div>
            <button class="toggle on" id="soundToggle" onclick="toggleSound()"></button>
        </div>
        <div class="panel-row">
            <div><div class="panel-label">▶️ Auto Play</div><div class="panel-sub">Changes card automatically</div></div>
            <button class="toggle" id="autoToggle" onclick="toggleAuto()"></button>
        </div>
        <div class="panel-row" style="border:none">
            <div><div class="panel-label">⏱️ Speed</div><div class="panel-sub">Seconds per card</div></div>
            <div class="speed-row">
                <button class="speed-btn"        onclick="setSpeed(3,this)">3s</button>
                <button class="speed-btn active" onclick="setSpeed(5,this)">5s</button>
                <button class="speed-btn"        onclick="setSpeed(8,this)">8s</button>
            </div>
        </div>
        <div class="jump-section">
            <h4>Jump to any card</h4>
            <div class="jump-grid" id="jumpGrid"></div>
        </div>
        <button class="close-panel-btn" onclick="closePanel()">✅ Keep Learning!</button>
    </div>
</div>

<!-- Celebration -->
<div class="celeb-overlay" id="celebOverlay">
    <div class="celeb-stars"><span class="celeb-star">⭐</span><span class="celeb-star">⭐</span><span class="celeb-star">⭐</span></div>
    <div class="celeb-big"   id="celebBig">🎉</div>
    <div class="celeb-title" id="celebTitle">Amazing!</div>
    <div class="celeb-sub"   id="celebSub">Great job!</div>
    <button class="celeb-btn" onclick="closeCelebration()">Keep Going! 🚀</button>
</div>

<script>
const data = {
    fruits: [
        { name:'Apple',       image:'fruits/apple.jpg',       fact:'I am red and crunchy!',              color:['#FF6B6B','#cc3333'] },

        { name:'Mango',       image:'fruits/mango.jpg',       fact:'I am the king of fruits!',           color:['#F77F00','#c05500'] },

        { name:'Orange',      image:'fruits/orange.jpg',      fact:'I am full of vitamin C!',            color:['#FB923C','#c05500'] },

        { name:'Lemon',       image:'fruits/lemon.jpg',       fact:'I am very sour!',                    color:['#FFC300','#a88000'] },
        { name:'Cherry',      image:'fruits/cherry.jpg',      fact:'I come in pairs!',                   color:['#C0392B','#8a2020'] },
        { name:'Pomegranate', image:'fruits/pomegranate.jpg', fact:'I have tiny red seeds inside!',      color:['#9B2335','#6a1020'] },
        { name:'Kiwi',        image:'fruits/kiwi.jpg',        fact:'I am fuzzy outside, green inside!',  color:['#4D7C0F','#2a4a00'] },

    vegetables: [
        { name:'Carrot',      image:'vegetables/carrot.jpg',      fact:'I help you see better!',         color:['#F77F00','#c05500'] },
        { name:'Tomato',      image:'vegetables/tomato.jpg',      fact:'I am red and juicy!',            color:['#FF6B6B','#cc3333'] },

        { name:'Potato',      image:'vegetables/potato.jpg',      fact:'I grow under the ground!',       color:['#C0392B','#8a2020'] },
        { name:'Onion',       image:'vegetables/onion.jpg',       fact:'I can make you cry!',            color:['#9B2335','#6a1020'] },
        { name:'Cucumber',    image:'vegetables/cucumber.jpg',    fact:'I am cool and green!',           color:['#43AA8B','#2a7a60'] },
        { name:'Eggplant',    image:'vegetables/eggplant.jpg',    fact:'I am purple and shiny!',         color:['#7B2D8B','#4e1a5e'] },
        { name:'Capsicum',    image:'vegetables/capsicum.jpg',    fact:'I come in many colours!',        color:['#E85D04','#aa3a00'] },
        { name:'Spinach',     image:'vegetables/spinach.jpg',     fact:'I make you strong!',             color:['#2D6A4F','#1a3d30'] },
        { name:'Peas',        image:'vegetables/peas.jpg',        fact:'I am small and round!',          color:['#4D7C0F','#2a4a00'] },
        { name:'Beetroot',    image:'vegetables/beetroot.jpg',    fact:'I turn everything pink!',        color:['#D62246','#9a1030'] },
        { name:'Cauliflower', image:'vegetables/cauliflower.jpg', fact:'I am white and fluffy!',         color:['#118AB2','#0a5c7a'] },
        { name:'Pumpkin',     image:'vegetables/pumpkin.jpg',     fact:'I am big and orange!',           color:['#FB923C','#c05500'] },
        { name:'Radish',      image:'vegetables/radish.jpg',      fact:'I am spicy and crunchy!',        color:['#FF6B6B','#aa2040'] },
    ],
};

let activeTab = 'fruits';
let current   = 0;
let stars     = 0;
let soundOn   = true;
let autoPlay  = false;
let autoSpeed = 5000;
let autoTimer = null;
let learned   = { fruits: new Set(), vegetables: new Set() };

function items() { return data[activeTab]; }

function switchTab(tab) {
    if (tab === activeTab) return;
    activeTab = tab;
    current   = 0;
    document.getElementById('tabFruits').classList.toggle('active', tab === 'fruits');
    document.getElementById('tabVegetables').classList.toggle('active', tab === 'vegetables');
    if (autoPlay) { clearInterval(autoTimer); autoPlay = false; syncAutoUI(); }
    updateScreen(true);
}

function updateScreen(animate = true) {
    const a = items()[current];

    const photo = document.getElementById('bgPhoto');
    photo.style.opacity = '0';
    photo.src = a.image;
    photo.onload  = () => { photo.style.opacity = '1'; };
    photo.onerror = () => { photo.style.opacity = '0'; };

    document.getElementById('colorOverlay').style.background =
        `linear-gradient(135deg, ${a.color[0]} 0%, ${a.color[1]} 100%)`;

    document.getElementById('wordLabel').textContent   = a.name;
    document.getElementById('funFactChip').textContent = a.fact;
    document.getElementById('prevBtn').disabled = current === 0;

    if (animate) {
        reAnimate('wordLabel',   'slideUp 0.4s ease both');
        reAnimate('funFactChip', 'slideUp 0.4s ease 0.12s both');
    }
    updateDots();
    if (soundOn) setTimeout(speakItem, 450);
}

function reAnimate(id, anim) {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = anim;
}

function speakItem() {
    if (!soundOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const a = items()[current];
    const u = new SpeechSynthesisUtterance(`${a.name}! ... This is a ... ${a.name}!`);
    u.rate = 0.68; u.pitch = 1.4; u.volume = 1;
    const fab = document.getElementById('speakFab');
    fab.classList.add('speaking');
    u.onend = () => fab.classList.remove('speaking');
    window.speechSynthesis.speak(u);
}
function tapSpeak() { speakItem(); }

function handleTap(e) {
    burstStar(e.clientX, e.clientY);
    nextItem(e);
}

function burstStar(x, y) {
    const el = document.createElement('div');
    el.className = 'float-star';
    el.textContent = ['⭐','✨','🌟'][Math.floor(Math.random()*3)];
    el.style.left = `${x - 16}px`;
    el.style.top  = `${y - 16}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
}

function nextItem(e) {
    if (e) e.stopPropagation();
    learned[activeTab].add(current);
    addStars(1);
    const list = items();
    if (learned[activeTab].size % 5 === 0 && current < list.length - 1) {
        showCelebration('🌟', 'Great Job!', `You learned ${learned[activeTab].size} ${activeTab}!\nKeep going! 🚀`);
        return;
    }
    if (current >= list.length - 1) {
        learned[activeTab].add(list.length - 1);
        showCelebration('🏆', 'You Did It!', `WOW! You learned ALL ${list.length} ${activeTab}!\nYou are a SUPERSTAR! ⭐⭐⭐`);
        return;
    }
    current++;
    updateScreen();
    if (autoPlay) resetAutoTimer();
}

function prevItem(e) {
    if (e) e.stopPropagation();
    if (current > 0) { current--; updateScreen(); }
}

function addStars(n) {
    stars += n;
    const el = document.getElementById('starsDisplay');
    el.textContent = `⭐ ${stars}`;
    el.style.transform = 'scale(1.35)';
    setTimeout(() => el.style.transform = '', 200);
}

function toggleAuto() {
    autoPlay = !autoPlay;
    syncAutoUI();
    autoPlay ? resetAutoTimer() : clearInterval(autoTimer);
}
function syncAutoUI() {
    document.getElementById('autoToggle').classList.toggle('on', autoPlay);
    document.getElementById('autoplayPill').classList.toggle('show', autoPlay);
    document.getElementById('tapHint').style.display = autoPlay ? 'none' : 'block';
}
function resetAutoTimer() {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => {
        learned[activeTab].add(current);
        const list = items();
        if (current < list.length - 1) { current++; updateScreen(); }
        else { clearInterval(autoTimer); showCelebration('🏆','You Did It!',`ALL ${list.length} ${activeTab} learned!`); }
    }, autoSpeed);
}
function setSpeed(s, btn) {
    autoSpeed = s * 1000;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (autoPlay) resetAutoTimer();
}

function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('soundToggle').classList.toggle('on', soundOn);
    document.getElementById('speakFab').style.opacity = soundOn ? '1' : '0.45';

    const pill = document.getElementById('soundFab');
    pill.textContent = soundOn ? '🔊 Sound' : '🔇 Muted';
    pill.classList.toggle('muted', !soundOn);

    if (!soundOn) window.speechSynthesis.cancel();
}

function updateDots() {
    const row = document.getElementById('dotsRow');
    row.innerHTML = '';
    items().forEach((_, i) => {
        const d = document.createElement('div');
        d.className = `dot ${i === current ? 'current' : learned[activeTab].has(i) ? 'done' : ''}`;
        row.appendChild(d);
    });
}

function openPanel(e) {
    if (e) e.stopPropagation();
    clearInterval(autoTimer);
    document.getElementById('panelProgress').textContent =
        `🍎 ${learned.fruits.size}/${data.fruits.length} fruits  •  🥦 ${learned.vegetables.size}/${data.vegetables.length} veggies seen ✅`;
    buildJumpGrid();
    document.getElementById('parentOverlay').classList.add('show');
}
function closePanel() {
    document.getElementById('parentOverlay').classList.remove('show');
    if (autoPlay) resetAutoTimer();
}
function buildJumpGrid() {
    const grid = document.getElementById('jumpGrid');
    grid.innerHTML = '';
    items().forEach((a, i) => {
        const btn = document.createElement('button');
        btn.className = `jump-btn ${i === current ? 'cur' : learned[activeTab].has(i) ? 'done' : ''}`;
        btn.textContent = a.name;
        btn.onclick = () => { current = i; updateScreen(); closePanel(); };
        grid.appendChild(btn);
    });
}

function showCelebration(icon, title, sub) {
    clearInterval(autoTimer);
    document.getElementById('celebBig').textContent   = icon;
    document.getElementById('celebTitle').textContent = title;
    document.getElementById('celebSub').textContent   = sub;
    document.getElementById('celebOverlay').classList.add('show');
    if (soundOn) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance('Amazing! Well done! You are a superstar!');
        u.pitch = 1.4; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }
    launchConfetti();
}
function closeCelebration() {
    document.getElementById('celebOverlay').classList.remove('show');
    if (current < items().length - 1) { current++; updateScreen(); }
    if (autoPlay) resetAutoTimer();
}

function launchConfetti() {
    const cols = ['#FF6B6B','#FFC300','#2ECC71','#3498DB','#9B59B6','#fff','#fbbf24','#f472b6','#FB923C'];
    for (let i = 0; i < 80; i++) {
        const c = document.createElement('div');
        const size = Math.random() * 16 + 7;
        c.style.cssText = `position:fixed;width:${size}px;height:${size}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'4px'};left:${Math.random()*100}vw;top:-24px;z-index:300;animation:confettiFall ${Math.random()*2.2+1.8}s ease ${Math.random()*.8}s forwards;pointer-events:none;`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
    }
}

updateDots();
updateScreen(false);
setTimeout(speakItem, 900);
</script>
</body>
</html>
