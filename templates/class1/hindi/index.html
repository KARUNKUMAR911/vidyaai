<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class 1 • Hindi</title>
  <style>
    :root { --ink:#111827; --muted:#6b7280; --bg:#fff7ed; --card:#ffffff; --accent:#f97316; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(900px 500px at 15% 10%, #ffedd5, transparent 55%),
                  radial-gradient(900px 500px at 85% 20%, #dbeafe, transparent 55%),
                  var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 18px 60px rgba(17, 24, 39, 0.10);
      border: 1px solid rgba(17, 24, 39, 0.06);
    }
    .pill {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      background: rgba(249, 115, 22, 0.10);
      color: #9a3412;
      border: 1px solid rgba(249, 115, 22, 0.25);
    }
    h1 { margin: 14px 0 8px; font-size: 24px; }
    p { margin: 0 0 16px; color: var(--muted); line-height: 1.5; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(17, 24, 39, 0.12);
      color: var(--ink);
      background: #fff;
    }
    a.btn.primary {
      border-color: rgba(249, 115, 22, 0.35);
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: white;
    }
  

/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.card{border-radius:clamp(16px,2vw,28px);}

/* Progress Card */
.progress-card {
    background: white; margin: -18px 16px 20px;
    border-radius: 18px; padding: 14px 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    display: flex; align-items: center; gap: 14px;
}
.progress-circle {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, #e64a19, #f57c00);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 18px; font-weight: 900; flex-shrink: 0;
}
.progress-info { flex: 1; }
.progress-info h4 { font-size: 14px; font-weight: 800; color: #333; }
.progress-info p  { font-size: 12px; color: #888; margin-top: 2px; }
.progress-bar-wrap {
    flex: 1; background: #f0f0f0;
    border-radius: 10px; height: 8px; overflow: hidden; margin-top: 6px;
}
.progress-bar-inner {
    height: 100%; background: linear-gradient(90deg, #e64a19, #ffab91);
    border-radius: 10px; width: 0%; transition: width 0.5s;
}
</style>
</head>
<body>
  <div class="card">
    <span class="pill">Coming Soon</span>
    <h1>Class 1 Hindi</h1>
    <p>This subject is not added yet. We can build it next.</p>
    <div class="actions">
      <a class="btn primary" href="/class/1">Back to Class 1</a>
      <a class="btn" href="/learn">Go to Dashboard</a>
    </div>
  </div>

<script>
async function loadProgress() {
    try {
        const res = await fetch('/api/lesson_progress/load?grade=1&subject=hindi');
        const data = await res.json();
        const lessons = data.lessons || {};
        const total = data.totalLessons || document.querySelectorAll('.card[data-lesson], .chapter-card[data-lesson]').length || 1;
        const completed = Object.values(lessons).filter(x => x.completed).length;
        const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

        const numEl = document.getElementById('progressNum');
        const txtEl = document.getElementById('progressText');
        const barEl = document.getElementById('progressBar');
        if(numEl) numEl.textContent = pct + '%';
        if(txtEl) txtEl.textContent = completed + ' of ' + total + ' lessons completed';
        if(barEl) barEl.style.width = pct + '%';

        document.querySelectorAll('.card[data-lesson], .chapter-card[data-lesson], a[data-lesson]').forEach(card => {
            const key = card.getAttribute('data-lesson');
            const p = lessons[key] || {completed:false, stars:0};
            card.classList.remove('completed','inprogress','notstarted');
            const statusEl = card.querySelector('.chapter-status, .card-arrow');

            if (p.completed) {
                card.classList.add('completed');
                if(statusEl) statusEl.textContent = '\u2705';
                card.style.borderLeft = '4px solid #059669';
            } else if (p.stars > 0) {
                card.classList.add('inprogress');
                if(statusEl) statusEl.textContent = '\u23f3';
                card.style.borderLeft = '4px solid #f59e0b';
            } else {
                card.classList.add('notstarted');
                if(statusEl) statusEl.textContent = '\u25b6\ufe0f';
            }
        });
    } catch(e) { console.log('Progress load failed', e); }
}
loadProgress();
</script>

</body>
</html>
