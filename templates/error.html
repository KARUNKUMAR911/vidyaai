<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidyaAI - Oops!</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f3ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-align: center;
        }
        .error-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.1);
            max-width: 400px;
            width: 90%;
        }
        .error-code {
            font-size: 80px;
            font-weight: 900;
            color: #7c3aed;
            margin: 0;
            line-height: 1;
        }
        .error-icon {
            font-size: 60px;
            margin: 10px 0;
        }
        .error-message {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
        }
        .home-btn {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            display: inline-block;
            transition: transform 0.2s;
        }
        .home-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">{{ code }}</div>
        <div class="error-icon">🕵️‍♂️</div>
        <div class="error-message">{{ message }}</div>
        <a href="/dashboard" class="home-btn">🏠 Go Back Home</a>
    </div>
</body>
</html>
