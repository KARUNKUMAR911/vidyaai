<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Colors Fun! 🌈</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka One', cursive;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            background: #FF6B6B;
        }

        /* ── SCREEN ── */
        .screen {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.7s ease;
            position: relative;
            overflow: hidden;
        }

        /* Bubbly background blobs */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            pointer-events: none;
            animation: floatBlob 7s ease-in-out infinite alternate;
        }
        .bg-blob:nth-child(1) { width: 200px; height: 200px; top: -50px; left: -50px; animation-delay: 0s; }
        .bg-blob:nth-child(2) { width: 130px; height: 130px; bottom: 70px; right: -25px; animation-delay: 2.2s; }
        .bg-blob:nth-child(3) { width: 90px;  height: 90px;  top: 40%;    left: 4%;   animation-delay: 4s; }
        .bg-blob:nth-child(4) { width: 60px;  height: 60px;  top: 20%;    right: 8%;  animation-delay: 1.5s; }

        @keyframes floatBlob {
            from { transform: translateY(0) scale(1); }
            to   { transform: translateY(22px) scale(1.1); }
        }

        /* ── TOP BAR ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            flex-shrink: 0;
            z-index: 10;
            position: relative;
        }
        .topbar-btn {
            background: rgba(255,255,255,0.28);
            border: 3px solid rgba(255,255,255,0.5);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 15px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.15s, background 0.15s;
        }
        .topbar-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.45); }
        .stars-display {
            background: rgba(255,215,0,0.35);
            border: 3px solid rgba(255,215,0,0.65);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Fredoka One', cursive;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }

        /* ── PROGRESS DOTS ── */
        .dots-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 6px 16px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.30);
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .dot.done    { background: rgba(255,255,255,0.72); }
        .dot.current {
            background: #FFD600;
            transform: scale(1.7);
            box-shadow: 0 0 10px #FFD600;
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 24px 0;
            gap: 24px;
            min-height: 0;
            position: relative;
            z-index: 2;
        }

        /* ── LEFT: COLOR SWATCH HALF ── */
        .color-half {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        /* Big paint-blob swatch */
        .swatch-wrap {
            position: relative;
            width: min(32vw, 44vh);
            height: min(32vw, 44vh);
        }
        .swatch-shadow {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0,0,0,0.18);
            transform: translate(8px, 10px);
            transition: background 0.7s;
        }
        .swatch-circle {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.55);
            box-shadow: 0 10px 40px rgba(0,0,0,0.28), inset 0 -6px 20px rgba(0,0,0,0.15), inset 0 6px 20px rgba(255,255,255,0.25);
            transition: background 0.5s ease;
            cursor: pointer;
            animation: popIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4) both;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(10vw, 14vh);
        }
        .swatch-circle:active { transform: scale(0.92); }

        /* Shine highlight on swatch */
        .swatch-circle::before {
            content: '';
            position: absolute;
            top: 12%;
            left: 18%;
            width: 32%;
            height: 22%;
            border-radius: 50%;
            background: rgba(255,255,255,0.32);
            pointer-events: none;
        }

        /* Swatch ring pulse on tap */
        .swatch-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.55);
            pointer-events: none;
            opacity: 0;
        }
        .swatch-ring.pulse {
            animation: ringPulse 0.65s ease-out forwards;
        }
        @keyframes ringPulse {
            0%   { transform: scale(0.7); opacity: 0.9; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* Color name below swatch */
        .color-name {
            font-size: min(10vw, 13vh);
            font-family: 'Fredoka One', cursive;
            color: white;
            text-shadow: 0 4px 16px rgba(0,0,0,0.22);
            animation: slideUp 0.4s ease 0.2s both;
            line-height: 1;
            letter-spacing: 1px;
        }
        /* Color name in actual color (outlined for legibility) */
        .color-name-colored {
            font-size: min(5.5vw, 7.5vh);
            font-family: 'Fredoka One', cursive;
            color: white;
            animation: slideUp 0.4s ease 0.3s both;
            background: rgba(0,0,0,0.16);
            padding: 4px 18px;
            border-radius: 20px;
            letter-spacing: 1px;
            position: relative;
        }
        /* Little color dot inside the label */
        .color-name-colored::before {
            content: '●';
            margin-right: 7px;
            text-shadow: none;
            transition: color 0.5s;
        }

        /* ── RIGHT: THINGS OF THAT COLOR ── */
        .things-half {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* Grid of emoji things */
        .things-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            animation: bounceIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4) 0.1s both;
        }
        .thing-card {
            width:  min(16vw, 20vh);
            height: min(16vw, 20vh);
            border-radius: 22px;
            background: rgba(255,255,255,0.22);
            border: 3px solid rgba(255,255,255,0.45);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
            box-shadow: 0 6px 18px rgba(0,0,0,0.18);
        }
        .thing-card:active { transform: scale(0.88); background: rgba(255,255,255,0.4); }
        .thing-card:hover  { transform: scale(1.05); background: rgba(255,255,255,0.32); }
        .thing-emoji {
            font-size: min(7vw, 9vh);
            line-height: 1;
            transition: transform 0.2s;
        }
        .thing-card:hover .thing-emoji { transform: scale(1.15) rotate(-5deg); }
        .thing-name {
            font-size: min(2.4vw, 3vh);
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            color: rgba(255,255,255,0.92);
            text-align: center;
            line-height: 1;
        }

        /* ── BOTTOM BAR ── */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px 18px;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
            gap: 10px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.25);
            border: 3px solid rgba(255,255,255,0.5);
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 22px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            transition: all 0.15s;
            min-width: 70px;
            text-align: center;
        }
        .nav-btn:hover   { background: rgba(255,255,255,0.4); transform: scale(1.06); }
        .nav-btn:active  { transform: scale(0.92); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .next-btn {
            background: white;
            color: #333;
            border: none;
            padding: 16px 36px;
            border-radius: 50px;
            font-size: 18px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.22), 0 0 0 4px rgba(255,255,255,0.4);
            transition: all 0.18s;
            letter-spacing: 0.5px;
        }
        .next-btn:hover  { transform: scale(1.06) translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.28); }
        .next-btn:active { transform: scale(0.94); }
        .bottom-center { text-align: center; flex: 1; }
        .tap-hint {
            font-size: 15px;
            color: rgba(255,255,255,0.88);
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            animation: tapWiggle 1.8s ease-in-out infinite;
        }
        @keyframes tapWiggle {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.07); }
        }
        .autoplay-pill {
            display: none;
            background: #FFD600;
            color: #333;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            margin-top: 4px;
        }
        .autoplay-pill.show { display: inline-block; }

        /* ── SOUND PILL (top bar) ── */
        .sound-pill {
            background: rgba(255,255,255,0.22);
            border: 2.5px solid rgba(255,255,255,0.45);
            color: white; padding: 8px 16px;
            border-radius: 50px; font-size: 15px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            transition: transform 0.15s, background 0.2s;
            backdrop-filter: blur(6px);
            white-space: nowrap;
        }
        .sound-pill:active { transform: scale(0.92); background: rgba(255,255,255,0.4); }
        .sound-pill.muted {
            background: rgba(0,0,0,0.25);
            border-color: rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.5);
            text-decoration: line-through;
        }

        /* ── SPEAK FAB ── */
        .speak-fab {
            position: absolute;
            bottom: 90px;
            right: 18px;
            width: 56px; height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.28);
            border: 3px solid rgba(255,255,255,0.55);
            color: white;
            font-size: 26px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, background 0.15s;
            z-index: 5;
            box-shadow: 0 4px 14px rgba(0,0,0,0.2);
        }
        .speak-fab:active { transform: scale(0.88); background: rgba(255,255,255,0.5); }
        .speak-fab.speaking { animation: speakPulse 0.5s ease infinite alternate; }
        @keyframes speakPulse {
            from { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            to   { box-shadow: 0 0 0 14px rgba(255,255,255,0); }
        }

        /* ── MOBILE ── */
        @media (max-width: 540px) {
            .main-content { flex-direction: column; gap: 8px; padding: 2px 14px 0; }
            .color-half   { order: 1; gap: 8px; }
            .things-half  { order: 2; }
            .swatch-wrap  { width: min(36vw, 20vh); height: min(36vw, 20vh); }
            .color-name   { font-size: min(11vw, 7vh); }
            .color-name-colored { font-size: min(5.5vw, 4vh); }
            .thing-card   { width: min(18vw, 12vh); height: min(18vw, 12vh); border-radius: 16px; }
            .thing-emoji  { font-size: min(8vw, 6vh); }
            .thing-name   { font-size: min(2.8vw, 2.2vh); }
            .speak-fab    { bottom: 82px; right: 12px; width: 50px; height: 50px; font-size: 22px; }
        }

        /* ── PARENT PANEL ── */
        .overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }
        .overlay.show { display: flex; }
        .panel {
            background: white;
            border-radius: 30px;
            padding: 26px;
            width: 92%; max-width: 400px;
            max-height: 88vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        .panel h2 { font-size: 20px; color: #e55a00; margin-bottom: 6px; text-align: center; font-family: 'Fredoka One', cursive; }
        .panel-progress {
            text-align: center; font-size: 13px; color: #666;
            background: #fff4e0; padding: 8px; border-radius: 12px; margin-bottom: 18px;
            font-family: 'Nunito', sans-serif; font-weight: 700;
        }
        .panel-row {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 13px 0; border-bottom: 1px solid #f0f0f0;
        }
        .panel-label { font-size: 14px; font-weight: 700; color: #333; font-family: 'Nunito', sans-serif; }
        .panel-sub   { font-size: 12px; color: #999; margin-top: 2px; font-family: 'Nunito', sans-serif; }
        .toggle {
            width: 52px; height: 28px; background: #ddd;
            border-radius: 14px; cursor: pointer;
            position: relative; transition: background 0.3s; border: none; flex-shrink: 0;
        }
        .toggle.on { background: #e55a00; }
        .toggle::after {
            content: ''; position: absolute;
            width: 22px; height: 22px; background: white;
            border-radius: 50%; top: 3px; left: 3px;
            transition: left 0.3s; box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }
        .toggle.on::after { left: 27px; }
        .speed-row { display: flex; gap: 7px; }
        .speed-btn {
            padding: 7px 14px; border: 2px solid #e5e7eb;
            border-radius: 20px; font-size: 13px; font-weight: 700;
            cursor: pointer; background: white; transition: all 0.2s;
            font-family: 'Nunito', sans-serif;
        }
        .speed-btn.active { border-color: #e55a00; background: #fff4e0; color: #e55a00; }

        /* Jump grid — color swatches */
        .jump-section { margin-top: 14px; }
        .jump-section h4 {
            font-size: 12px; color: #888; margin-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
            font-family: 'Nunito', sans-serif; font-weight: 700;
        }
        .jump-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .jump-btn {
            aspect-ratio: 1; border: 3px solid #e5e7eb;
            border-radius: 50%; font-size: 10px; font-weight: 800;
            cursor: pointer; background: white; color: white;
            transition: all 0.2s; font-family: 'Nunito', sans-serif;
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .jump-btn.done   { border-color: transparent; opacity: 1; }
        .jump-btn.done::after  { content: '✓'; position: absolute; font-size: 14px; color: white; font-weight: 900; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
        .jump-btn.cur    { border: 3px solid #FFD600; box-shadow: 0 0 0 3px #FFD600; }
        .jump-btn span   { font-size: 9px; font-family: 'Nunito', sans-serif; font-weight: 800; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        .close-panel-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg,#e55a00,#c04400);
            color: white; border: none; border-radius: 16px;
            font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 18px;
            font-family: 'Fredoka One', cursive; letter-spacing: 0.5px;
            transition: transform 0.15s;
        }
        .close-panel-btn:active { transform: scale(0.97); }

        /* ── CELEBRATION ── */
        .celeb-overlay {
            display: none;
            position: fixed; inset: 0;
            background: linear-gradient(135deg,rgba(255,107,0,.97),rgba(255,60,0,.97));
            z-index: 200;
            align-items: center; justify-content: center;
            flex-direction: column; text-align: center; padding: 30px;
        }
        .celeb-overlay.show { display: flex; }
        .celeb-emoji  { font-size: 100px; animation: bounce 0.55s ease infinite alternate; line-height: 1; }
        .celeb-title  {
            font-size: 52px; font-family: 'Fredoka One', cursive;
            color: white; margin: 16px 0 8px;
            text-shadow: 0 4px 20px rgba(0,0,0,.3);
            animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.3) both;
        }
        .celeb-sub {
            font-size: 18px; color: rgba(255,255,255,.92);
            margin-bottom: 32px; line-height: 1.5;
            font-family: 'Nunito', sans-serif; font-weight: 800;
            white-space: pre-line;
        }
        .celeb-btn {
            padding: 20px 56px; background: white; color: #e55a00;
            border: none; border-radius: 50px; font-size: 22px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,.22);
            transition: transform 0.18s; letter-spacing: 0.5px;
        }
        .celeb-btn:hover  { transform: scale(1.06) translateY(-3px); }
        .celeb-btn:active { transform: scale(0.95); }
        .celeb-stars { display: flex; gap: 12px; margin-bottom: 10px; }
        .celeb-star { font-size: 44px; animation: starSpin 0.6s ease both; }
        .celeb-star:nth-child(2) { animation-delay: 0.12s; }
        .celeb-star:nth-child(3) { animation-delay: 0.24s; }
        @keyframes starSpin {
            from { transform: scale(0) rotate(-180deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* ── ANIMATIONS ── */
        @keyframes popIn {
            0%   { transform: scale(0.3) rotate(-12deg); opacity: 0; }
            65%  { transform: scale(1.15) rotate(3deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        @keyframes bounceIn {
            0%   { transform: scale(0.4) translateY(40px); opacity: 0; }
            65%  { transform: scale(1.08) translateY(-8px); }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(28px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        @keyframes bounce {
            from { transform: translateY(0) scale(1); }
            to   { transform: translateY(-18px) scale(1.08); }
        }
        @keyframes confettiFall {
            0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* ── FLOAT EMOJI ── */
        .float-emoji {
            position: fixed;
            font-size: 38px;
            pointer-events: none;
            z-index: 50;
            animation: floatUp 1.1s ease forwards;
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1);      opacity: 1; }
            100% { transform: translateY(-90px) scale(1.5); opacity: 0; }
        }
    
/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.celeb-emoji{font-size:clamp(70px,10vw,140px);}
.celeb-title{font-size:clamp(24px,3.5vw,54px);}
.celeb-sub{font-size:clamp(14px,1.8vw,26px);}
.celeb-stars{font-size:clamp(36px,5vw,72px);}
.celeb-btn{font-size:clamp(16px,2vw,28px);padding:clamp(14px,1.8vw,22px) clamp(36px,4vw,60px);border-radius:clamp(40px,5vw,60px);}
.card{border-radius:clamp(16px,2vw,28px);}
</style>
</head>
<body>

<!-- ═══════════════ MAIN SCREEN ═══════════════ -->
<div class="screen" id="mainScreen" onclick="handleTap(event)">

    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <!-- Top Bar -->
    <div class="topbar">
        <a href="/dashboard" class="topbar-btn" onclick="event.stopPropagation()">🏠 Home</a>
        <div class="stars-display" id="starsDisplay">⭐ 0</div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="sound-pill" id="soundFab" onclick="event.stopPropagation(); toggleSound();">🔊 Sound</button>
            <button class="topbar-btn" onclick="openPanel(event)">⚙️ Parent</button>
        </div>
    </div>

    <!-- Progress Dots -->
    <div class="dots-row" id="dotsRow"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Left: Color Swatch -->
        <div class="color-half">
            <div class="swatch-wrap" id="swatchWrap">
                <div class="swatch-shadow" id="swatchShadow"></div>
                <div class="swatch-circle" id="swatchCircle" onclick="tapSwatch(event)">
                    <span id="swatchEmoji">🍎</span>
                </div>
                <div class="swatch-ring" id="swatchRing"></div>
            </div>
            <div class="color-name" id="colorName">Red</div>
            <div class="color-name-colored" id="colorSub" style="--dot-color:#FF3B30">This is Red!</div>
        </div>

        <!-- Right: Things of that color -->
        <div class="things-half">
            <div class="things-grid" id="thingsGrid"></div>
        </div>

    </div>

    <!-- Speak FAB -->
    <button class="speak-fab" id="speakFab" onclick="event.stopPropagation(); tapSpeak();">🔊</button>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <button class="nav-btn" id="prevBtn" onclick="prevColor(event)" disabled>◀</button>
        <div class="bottom-center">
            <div class="tap-hint" id="tapHint">👆 Tap anywhere!</div>
            <div class="autoplay-pill" id="autoplayPill">▶ Playing…</div>
        </div>
        <button class="next-btn" onclick="nextColor(event)">Next ▶</button>
    </div>

</div>

<!-- ═══════════════ PARENT PANEL ═══════════════ -->
<div class="overlay" id="parentOverlay">
    <div class="panel">
        <h2>⚙️ Parent Controls</h2>
        <div class="panel-progress" id="panelProgress">0 of 12 colors completed</div>

        <div class="panel-row">
            <div>
                <div class="panel-label">🔊 Voice Sound</div>
                <div class="panel-sub">Speaks color name aloud</div>
            </div>
            <button class="toggle on" id="soundToggle" onclick="toggleSound()"></button>
        </div>

        <div class="panel-row">
            <div>
                <div class="panel-label">▶️ Auto Play</div>
                <div class="panel-sub">Changes color automatically</div>
            </div>
            <button class="toggle" id="autoToggle" onclick="toggleAuto()"></button>
        </div>

        <div class="panel-row" style="border:none">
            <div>
                <div class="panel-label">⏱️ Speed</div>
                <div class="panel-sub">Seconds per color</div>
            </div>
            <div class="speed-row">
                <button class="speed-btn"        onclick="setSpeed(3,this)">3s</button>
                <button class="speed-btn active" onclick="setSpeed(5,this)">5s</button>
                <button class="speed-btn"        onclick="setSpeed(8,this)">8s</button>
            </div>
        </div>

        <div class="jump-section">
            <h4>Jump to any color</h4>
            <div class="jump-grid" id="jumpGrid"></div>
        </div>

        <button class="close-panel-btn" onclick="closePanel()">✅ Continue Learning!</button>
    </div>
</div>

<!-- ═══════════════ CELEBRATION ═══════════════ -->
<div class="celeb-overlay" id="celebOverlay">
    <div class="celeb-stars">
        <span class="celeb-star">⭐</span>
        <span class="celeb-star">⭐</span>
        <span class="celeb-star">⭐</span>
    </div>
    <div class="celeb-emoji" id="celebEmoji">🎉</div>
    <div class="celeb-title" id="celebTitle">Amazing!</div>
    <div class="celeb-sub"   id="celebSub">You learned a color!</div>
    <button class="celeb-btn" onclick="closeCelebration()">Keep Going! 🚀</button>
</div>

<script>
/* ── COLOR DATA ── */
const colors = [
    {
        name: 'Red',
        hex: '#E63946',
        bg: ['#E63946', '#a81c26'],
        emoji: '🍎',
        things: [
            { emoji: '🍎', name: 'Apple'      },
            { emoji: '🍓', name: 'Strawberry' },
            { emoji: '🌹', name: 'Rose'       },
            { emoji: '🚒', name: 'Fire Truck' },
        ]
    },
    {
        name: 'Orange',
        hex: '#F77F00',
        bg: ['#F77F00', '#b85c00'],
        emoji: '🍊',
        things: [
            { emoji: '🍊', name: 'Orange'   },
            { emoji: '🥕', name: 'Carrot'   },
            { emoji: '🎃', name: 'Pumpkin'  },
            { emoji: '🦊', name: 'Fox'      },
        ]
    },
    {
        name: 'Yellow',
        hex: '#FFD600',
        bg: ['#FFD600', '#c9a800'],
        emoji: '🌻',
        things: [
            { emoji: '🌻', name: 'Sunflower' },
            { emoji: '🍋', name: 'Lemon'     },
            { emoji: '⭐', name: 'Star'      },
            { emoji: '🐝', name: 'Bee'       },
        ]
    },
    {
        name: 'Green',
        hex: '#2DC653',
        bg: ['#2DC653', '#1a8c38'],
        emoji: '🐸',
        things: [
            { emoji: '🐸', name: 'Frog'    },
            { emoji: '🍃', name: 'Leaf'    },
            { emoji: '🥦', name: 'Broccoli'},
            { emoji: '🐢', name: 'Turtle'  },
        ]
    },
    {
        name: 'Blue',
        hex: '#1E90FF',
        bg: ['#1E90FF', '#0060cc'],
        emoji: '🌊',
        things: [
            { emoji: '🌊', name: 'Ocean'  },
            { emoji: '🐋', name: 'Whale'  },
            { emoji: '🫐', name: 'Blueberry'},
            { emoji: '☔', name: 'Umbrella'},
        ]
    },
    {
        name: 'Purple',
        hex: '#9B5DE5',
        bg: ['#9B5DE5', '#6a2aaa'],
        emoji: '🍇',
        things: [
            { emoji: '🍇', name: 'Grapes'   },
            { emoji: '🦄', name: 'Unicorn'  },
            { emoji: '💜', name: 'Heart'    },
            { emoji: '🔮', name: 'Crystal'  },
        ]
    },
    {
        name: 'Pink',
        hex: '#FF69B4',
        bg: ['#FF69B4', '#cc2d80'],
        emoji: '🌸',
        things: [
            { emoji: '🌸', name: 'Blossom'    },
            { emoji: '🩰', name: 'Ballet'     },
            { emoji: '🐷', name: 'Pig'        },
            { emoji: '🍭', name: 'Lollipop'   },
        ]
    },
    {
        name: 'Brown',
        hex: '#A0522D',
        bg: ['#A0522D', '#6e3010'],
        emoji: '🐻',
        things: [
            { emoji: '🐻', name: 'Bear'      },
            { emoji: '🍫', name: 'Chocolate' },
            { emoji: '🌰', name: 'Chestnut'  },
            { emoji: '🪵', name: 'Wood'      },
        ]
    },
    {
        name: 'Black',
        hex: '#2c2c2c',
        bg: ['#3a3a3a', '#111111'],
        emoji: '🐧',
        things: [
            { emoji: '🐧', name: 'Penguin'  },
            { emoji: '🎱', name: '8-Ball'   },
            { emoji: '🐾', name: 'Paw'      },
            { emoji: '🦇', name: 'Bat'      },
        ]
    },
    {
        name: 'White',
        hex: '#e0e0e0',
        bg: ['#8fa8c8', '#5c7a9a'],
        emoji: '🐑',
        things: [
            { emoji: '🐑', name: 'Sheep'    },
            { emoji: '☁️', name: 'Cloud'    },
            { emoji: '🥛', name: 'Milk'     },
            { emoji: '⛄', name: 'Snowman'  },
        ]
    },
    {
        name: 'Grey',
        hex: '#9E9E9E',
        bg: ['#7B8D9E', '#4a5e6e'],
        emoji: '🐘',
        things: [
            { emoji: '🐘', name: 'Elephant' },
            { emoji: '🌧️', name: 'Rain'     },
            { emoji: '🪨', name: 'Rock'     },
            { emoji: '🐺', name: 'Wolf'     },
        ]
    },
    {
        name: 'Rainbow',
        hex: 'linear-gradient(90deg,#FF6B6B,#FFD600,#2DC653,#1E90FF,#9B5DE5)',
        bg: ['#FF6B6B', '#9B5DE5'],
        emoji: '🌈',
        things: [
            { emoji: '🌈', name: 'Rainbow'  },
            { emoji: '🎨', name: 'Paint'    },
            { emoji: '🦜', name: 'Parrot'   },
            { emoji: '🎠', name: 'Carousel' },
        ]
    },
];

/* ── STATE ── */
let current   = 0;
let stars     = 0;
let soundOn   = true;
let autoPlay  = false;
let autoSpeed = 5000;
let autoTimer = null;
let learned   = new Set();

/* ── UPDATE SCREEN ── */
function updateScreen(animate = true) {
    const c = colors[current];

    // Background
    document.getElementById('mainScreen').style.background =
        `linear-gradient(135deg, ${c.bg[0]} 0%, ${c.bg[1]} 100%)`;

    // Swatch
    const swatch = document.getElementById('swatchCircle');
    if (c.name === 'Rainbow') {
        swatch.style.background = 'linear-gradient(135deg,#FF6B6B,#F77F00,#FFD600,#2DC653,#1E90FF,#9B5DE5)';
    } else {
        swatch.style.background = c.hex;
    }
    document.getElementById('swatchEmoji').textContent = c.emoji;
    document.getElementById('swatchShadow').style.background = c.bg[1] + '88';

    // Labels
    document.getElementById('colorName').textContent = c.name;
    document.getElementById('colorSub').textContent  = `This is ${c.name}!`;
    document.getElementById('colorSub').style.setProperty('--dot-color', c.hex);

    // Things grid
    buildThingsGrid(c.things, animate);

    // Prev button
    document.getElementById('prevBtn').disabled = current === 0;

    if (animate) {
        reAnimate('swatchCircle',  'popIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4) both');
        reAnimate('colorName',     'slideUp 0.4s ease both');
        reAnimate('colorSub',      'slideUp 0.4s ease 0.1s both');
    }

    updateDots();
    if (soundOn) setTimeout(speakColor, 450);
}

function buildThingsGrid(things, animate) {
    const grid = document.getElementById('thingsGrid');
    grid.innerHTML = '';
    if (animate) {
        grid.style.animation = 'none';
        void grid.offsetWidth;
        grid.style.animation = 'bounceIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4) 0.1s both';
    }
    things.forEach((t, i) => {
        const card = document.createElement('div');
        card.className = 'thing-card';
        card.style.animationDelay = `${0.08 + i * 0.07}s`;
        card.innerHTML = `<div class="thing-emoji">${t.emoji}</div><div class="thing-name">${t.name}</div>`;
        card.onclick = (e) => {
            e.stopPropagation();
            floatEmoji(t.emoji, e.clientX, e.clientY);
            speakWord(t.name);
        };
        grid.appendChild(card);
    });
}

function reAnimate(id, anim) {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = anim;
}

/* ── SPEAK ── */
function speakColor() {
    if (!soundOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const c = colors[current];
    const msg = `${c.name}! ... This is ${c.name}!`;
    const u = new SpeechSynthesisUtterance(msg);
    u.rate = 0.68; u.pitch = 1.4; u.volume = 1;
    const fab = document.getElementById('speakFab');
    fab.classList.add('speaking');
    u.onend = () => fab.classList.remove('speaking');
    window.speechSynthesis.speak(u);
}

function speakWord(word) {
    if (!soundOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.rate = 0.72; u.pitch = 1.4; u.volume = 1;
    window.speechSynthesis.speak(u);
}

function tapSpeak() { speakColor(); }

/* ── TAP SWATCH ── */
function tapSwatch(e) {
    e.stopPropagation();
    const ring = document.getElementById('swatchRing');
    ring.classList.remove('pulse');
    void ring.offsetWidth;
    ring.classList.add('pulse');
    floatEmoji(colors[current].emoji, e.clientX, e.clientY);
    speakColor();
}

/* ── FLOAT EMOJI ── */
function floatEmoji(emoji, x, y) {
    const el = document.createElement('div');
    el.className = 'float-emoji';
    el.textContent = emoji;
    el.style.left = `${x - 19}px`;
    el.style.top  = `${y - 19}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
}

/* ── DOTS ── */
function updateDots() {
    const row = document.getElementById('dotsRow');
    row.innerHTML = '';
    colors.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = `dot ${i === current ? 'current' : learned.has(i) ? 'done' : ''}`;
        row.appendChild(d);
    });
}

/* ── NAVIGATION ── */
function handleTap(e) { nextColor(e); }

function nextColor(e) {
    if (e) e.stopPropagation();
    learned.add(current);
    addStars(1);

    if (learned.size % 4 === 0 && current < colors.length - 1) {
        showCelebration('🌈', 'Great Job!', `You learned ${learned.size} colors!\nKeep going! 🚀`);
        return;
    }
    if (current >= colors.length - 1) {
        learned.add(colors.length - 1);
        showCelebration('🎨', 'You Did It!', `WOW! You know ALL ${colors.length} colors!\nYou are a SUPERSTAR! ⭐⭐⭐`);
        return;
    }
    current++;
    updateScreen();
    if (autoPlay) resetAutoTimer();
}

function prevColor(e) {
    if (e) e.stopPropagation();
    if (current > 0) { current--; updateScreen(); }
}

function addStars(n) {
    stars += n;
    const el = document.getElementById('starsDisplay');
    el.textContent = `⭐ ${stars}`;
    el.style.transform = 'scale(1.35)';
    setTimeout(() => el.style.transform = '', 200);
}

/* ── AUTO PLAY ── */
function toggleAuto() {
    autoPlay = !autoPlay;
    document.getElementById('autoToggle').classList.toggle('on', autoPlay);
    document.getElementById('autoplayPill').classList.toggle('show', autoPlay);
    document.getElementById('tapHint').style.display = autoPlay ? 'none' : 'block';
    autoPlay ? resetAutoTimer() : clearInterval(autoTimer);
}

function resetAutoTimer() {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => {
        learned.add(current);
        if (current < colors.length - 1) { current++; updateScreen(); }
        else { clearInterval(autoTimer); showCelebration('🎨','You Did It!',`ALL ${colors.length} colors learned!`); }
    }, autoSpeed);
}

function setSpeed(s, btn) {
    autoSpeed = s * 1000;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (autoPlay) resetAutoTimer();
}

/* ── SOUND ── */
function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('soundToggle').classList.toggle('on', soundOn);
    document.getElementById('speakFab').style.opacity = soundOn ? '1' : '0.45';

    const pill = document.getElementById('soundFab');
    pill.textContent = soundOn ? '🔊 Sound' : '🔇 Muted';
    pill.classList.toggle('muted', !soundOn);

    if (!soundOn) window.speechSynthesis.cancel();
}

/* ── PARENT PANEL ── */
function openPanel(e) {
    if (e) e.stopPropagation();
    clearInterval(autoTimer);
    document.getElementById('panelProgress').textContent =
        `${learned.size} of ${colors.length} colors completed ✅`;
    buildJumpGrid();
    document.getElementById('parentOverlay').classList.add('show');
}

function closePanel() {
    document.getElementById('parentOverlay').classList.remove('show');
    if (autoPlay) resetAutoTimer();
}

function buildJumpGrid() {
    const grid = document.getElementById('jumpGrid');
    grid.innerHTML = '';
    colors.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = `jump-btn ${i === current ? 'cur' : learned.has(i) ? 'done' : ''}`;
        if (c.name === 'Rainbow') {
            btn.style.background = 'linear-gradient(135deg,#FF6B6B,#FFD600,#2DC653,#1E90FF,#9B5DE5)';
        } else {
            btn.style.background = c.hex;
        }
        if (!learned.has(i) || i === current) {
            btn.innerHTML = `<span>${c.name}</span>`;
        }
        btn.title = c.name;
        btn.onclick = () => { current = i; updateScreen(); closePanel(); };
        grid.appendChild(btn);
    });
}

/* ── CELEBRATION ── */
function showCelebration(emoji, title, sub) {
    clearInterval(autoTimer);
    document.getElementById('celebEmoji').textContent = emoji;
    document.getElementById('celebTitle').textContent = title;
    document.getElementById('celebSub').textContent   = sub;
    document.getElementById('celebOverlay').classList.add('show');
    if (soundOn) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance('Amazing! Well done! You are a superstar!');
        u.pitch = 1.4; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }
    launchConfetti();
}

function closeCelebration() {
    document.getElementById('celebOverlay').classList.remove('show');
    if (current < colors.length - 1) { current++; updateScreen(); }
    if (autoPlay) resetAutoTimer();
}

/* ── CONFETTI ── */
function launchConfetti() {
    const cols = ['#FF6B6B','#FFC300','#2ECC71','#3498DB','#9B59B6','#fff','#fbbf24','#f472b6','#FB923C'];
    for (let i = 0; i < 85; i++) {
        const c = document.createElement('div');
        const size = Math.random() * 16 + 7;
        c.style.cssText = `
            position:fixed; width:${size}px; height:${size}px;
            background:${cols[Math.floor(Math.random()*cols.length)]};
            border-radius:${Math.random()>0.5?'50%':'4px'};
            left:${Math.random()*100}vw; top:-24px; z-index:300;
            animation:confettiFall ${Math.random()*2.2+1.8}s ease ${Math.random()*0.8}s forwards;
            pointer-events:none;
        `;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
    }
}

/* ── INIT ── */
updateDots();
updateScreen(false);
setTimeout(speakColor, 900);
</script>
