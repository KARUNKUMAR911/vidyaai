<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಬಣ್ಣಗಳು - LKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&display=swap');

  :root {
    --bg: #1a1a2e;
    --topbar: #16213e;
    --text-light: #f0f0ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text-light);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,107,107,0.1) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(77,150,255,0.1) 0%, transparent 50%);
  }

  /* TOPBAR */
  .topbar {
    background: var(--topbar);
    border-bottom: 2px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .topbar-left { display: flex; align-items: center; gap: 12px; }

  .back-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 10px;
    color: white;
    padding: 8px 14px;
    font-size: 18px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }

  .topbar-title {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff6b6b, #ffd93d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sound-btn {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: white;
    padding: 8px 16px;
    font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.5; }

  /* HERO */
  .hero {
    text-align: center;
    padding: 32px 20px 16px;
  }
  .hero-emoji { font-size: 3rem; animation: spin 3s ease-in-out infinite; }
  @keyframes spin {
    0%,100% { transform: rotate(-10deg) scale(1); }
    50% { transform: rotate(10deg) scale(1.1); }
  }
  .hero h1 {
    font-size: 2.4rem;
    font-weight: 800;
    margin-top: 8px;
    background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
  }

  /* TTS NOTICE */
  .tts-notice {
    background: rgba(255,209,61,0.1);
    border: 1px solid rgba(255,209,61,0.3);
    border-radius: 14px;
    margin: 0 20px 16px;
    padding: 10px 16px;
    font-size: 0.8rem;
    color: rgba(255,209,61,0.85);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 18px;
    padding: 8px 24px 48px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    border-radius: 22px;
    padding: 0;
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 8px 28px rgba(0,0,0,0.4);
    transition: transform 0.18s, box-shadow 0.18s;
    animation: popIn 0.4s both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  .card:nth-child(1)  { animation-delay: 0.03s; }
  .card:nth-child(2)  { animation-delay: 0.06s; }
  .card:nth-child(3)  { animation-delay: 0.09s; }
  .card:nth-child(4)  { animation-delay: 0.12s; }
  .card:nth-child(5)  { animation-delay: 0.15s; }
  .card:nth-child(6)  { animation-delay: 0.18s; }
  .card:nth-child(7)  { animation-delay: 0.21s; }
  .card:nth-child(8)  { animation-delay: 0.24s; }
  .card:nth-child(9)  { animation-delay: 0.27s; }
  .card:nth-child(10) { animation-delay: 0.30s; }
  .card:nth-child(11) { animation-delay: 0.33s; }
  .card:nth-child(12) { animation-delay: 0.36s; }

  .card:hover {
    transform: translateY(-7px) scale(1.04);
    box-shadow: 0 18px 44px rgba(0,0,0,0.5);
  }
  .card:active { transform: scale(0.95); }

  .card.playing {
    animation: pulse 0.5s ease !important;
  }
  @keyframes pulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.13); }
    100% { transform: scale(1); }
  }

  /* Color swatch — top half of card */
  .swatch {
    height: 110px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
  }
  .swatch::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 30px;
    background: inherit;
    filter: brightness(0.8);
    clip-path: ellipse(60% 100% at 50% 100%);
  }

  /* Card info — bottom */
  .card-info {
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
    padding: 12px 10px 14px;
    text-align: center;
  }
  .card-name-kn {
    font-size: 1.15rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
  }
  .card-name-en {
    font-size: 0.75rem;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
    font-style: italic;
  }

  .footer {
    text-align: center;
    padding: 14px;
    color: rgba(255,255,255,0.2);
    font-size: 0.78rem;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 8px 14px 40px; }
    .swatch { height: 85px; font-size: 2rem; }
    .card-name-kn { font-size: 0.95rem; }
    .hero h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="/class/lkg/kannada" class="back-btn">←</a>
    <span class="topbar-title">ಬಣ್ಣಗಳು</span>
  </div>
  <div class="topbar-right">
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
      <span id="soundIcon">🔊</span>
      <span id="soundLabel">ಧ್ವನಿ ಆನ್</span>
    </button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-emoji">🌈</div>
  <h1>ಬಣ್ಣಗಳು</h1>
  <p>12 ಸುಂದರ ಬಣ್ಣಗಳು • ಕಾರ್ಡ್ ಒತ್ತಿ ಕೇಳಿ!</p>
</div>

<!-- TTS NOTICE -->
<div class="tts-notice">
  <span>📱</span>
  <span>ಧ್ವನಿ ಕೇಳಲು Android TTS ನಲ್ಲಿ Kannada ಭಾಷೆ ಸ್ಥಾಪಿಸಿ.</span>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<div class="footer">VidyaAI • LKG ಕನ್ನಡ</div>

<script>
const colors = [
  { kn: 'ಕೆಂಪು',    en: 'Red',    bg: '#e74c3c', emoji: '🔴' },
  { kn: 'ನೀಲಿ',     en: 'Blue',   bg: '#2980b9', emoji: '🔵' },
  { kn: 'ಹಳದಿ',     en: 'Yellow', bg: '#f1c40f', emoji: '🟡' },
  { kn: 'ಹಸಿರು',    en: 'Green',  bg: '#27ae60', emoji: '🟢' },
  { kn: 'ಕಿತ್ತಳೆ',  en: 'Orange', bg: '#e67e22', emoji: '🟠' },
  { kn: 'ನೇರಳೆ',    en: 'Purple', bg: '#8e44ad', emoji: '🟣' },
  { kn: 'ಗುಲಾಬಿ',   en: 'Pink',   bg: '#e91e8c', emoji: '🩷' },
  { kn: 'ಕಂದು',     en: 'Brown',  bg: '#795548', emoji: '🟤' },
  { kn: 'ಬಿಳಿ',     en: 'White',  bg: '#ecf0f1', emoji: '⬜' },
  { kn: 'ಕಪ್ಪು',    en: 'Black',  bg: '#2c3e50', emoji: '⬛' },
  { kn: 'ಬೂದು',     en: 'Grey',   bg: '#95a5a6', emoji: '🩶' },
  { kn: 'ಆಕಾಶ ನೀಲಿ', en: 'Sky Blue', bg: '#3498db', emoji: '🩵' },
];

let soundOn = true;

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? 'ಧ್ವನಿ ಆನ್' : 'ಧ್ವನಿ ಆಫ್';
  document.getElementById('soundToggle').classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN';
  u.rate = 0.85;
  u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const knVoice = voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn'));
  if (!knVoice) return; // Kannada only, no fallback
  u.voice = knVoice;
  window.speechSynthesis.speak(u);
}

function buildGrid() {
  const grid = document.getElementById('grid');
  colors.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="swatch" style="background:${c.bg};">${c.emoji}</div>
      <div class="card-info">
        <div class="card-name-kn">${c.kn}</div>
        <div class="card-name-en">${c.en}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      card.classList.remove('playing');
      void card.offsetWidth;
      card.classList.add('playing');
      speak(c.kn);
      setTimeout(() => card.classList.remove('playing'), 500);
    });
    grid.appendChild(card);
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}

buildGrid();
</script>
</body>
</html>
