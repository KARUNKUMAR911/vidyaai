<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VidyaAI – My Family!</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;width:100vw;user-select:none}
.screen{width:100vw;height:100vh;display:flex;flex-direction:column;transition:background .6s ease}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:rgba(0,0,0,0.15);backdrop-filter:blur(10px);flex-shrink:0;z-index:10}
.topbar-btn{background:rgba(255,255,255,0.22);border:none;color:white;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.stars-display{background:rgba(255,215,0,0.3);border:1px solid rgba(255,215,0,0.5);color:white;padding:7px 16px;border-radius:20px;font-size:14px;font-weight:700}
.sound-pill{background:rgba(255,255,255,0.22);border:2px solid rgba(255,255,255,0.45);color:white;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:transform 0.15s,background 0.2s;backdrop-filter:blur(6px);white-space:nowrap;font-family:inherit}
.sound-pill:active{transform:scale(0.92);background:rgba(255,255,255,0.4)}
.sound-pill.muted{background:rgba(0,0,0,0.25);border-color:rgba(255,255,255,0.25);color:rgba(255,255,255,0.5);text-decoration:line-through}

/* PROGRESS DOTS */
.dots-row{display:flex;justify-content:center;gap:8px;padding:8px 16px;flex-wrap:wrap;flex-shrink:0;background:rgba(0,0,0,0.1)}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.28);transition:all .3s;flex-shrink:0;cursor:pointer}
.dot.done{background:rgba(255,255,255,0.65)}
.dot.current{background:#fbbf24;transform:scale(1.6);box-shadow:0 0 10px #fbbf24}

/* MAIN */
.main-content{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 24px;gap:28px;min-height:0;cursor:pointer}

/* LEFT — character illustration */
.char-half{flex:1.1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;height:100%}

/* SVG character frame */
.char-frame{
  width:min(36vw,52vh);height:min(36vw,52vh);
  background:rgba(255,255,255,0.18);
  border:3px solid rgba(255,255,255,0.45);
  border-radius:28px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 16px 48px rgba(0,0,0,0.28);
  animation:slideUp .45s ease .05s both;
  flex-shrink:0;cursor:pointer;
  transition:transform .15s;
  overflow:hidden;
  position:relative;
}
.char-frame:active{transform:scale(0.95)}
.char-frame svg{width:85%;height:85%}

/* name */
.member-name{font-size:min(8vw,10vh);font-weight:900;color:white;text-shadow:0 4px 16px rgba(0,0,0,0.25);animation:popIn .5s cubic-bezier(0.175,0.885,0.32,1.275) both;text-align:center;line-height:1}
.member-role{font-size:min(3vw,3.5vh);font-weight:600;color:rgba(255,255,255,.65);animation:slideUp .4s ease .2s both;text-align:center;background:rgba(255,255,255,0.15);padding:4px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.25)}

/* RIGHT — info cards */
.info-half{flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px;height:100%}

.info-card{background:rgba(255,255,255,0.18);backdrop-filter:blur(16px);border:2px solid rgba(255,255,255,0.35);border-radius:22px;padding:14px 18px;width:100%;animation:slideUp .4s ease both;box-shadow:0 6px 24px rgba(0,0,0,0.1)}
.info-card:nth-child(1){animation-delay:.1s}
.info-card:nth-child(2){animation-delay:.18s}
.info-card:nth-child(3){animation-delay:.26s}
.info-card:nth-child(4){animation-delay:.34s}

.card-label{font-size:10px;font-weight:800;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.card-value{font-size:min(3.5vw,4.2vh);font-weight:800;color:white;line-height:1.2}
.card-sub{font-size:min(2.5vw,3vh);font-weight:600;color:rgba(255,255,255,.7);margin-top:3px;line-height:1.3}

/* relationship tree chips */
.rel-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.rel-chip{background:rgba(255,255,255,0.22);border:1.5px solid rgba(255,255,255,.38);border-radius:20px;padding:4px 12px;font-size:min(2.2vw,2.8vh);font-weight:700;color:white}

/* love words */
.love-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.love-word{font-size:min(3vw,3.8vh);animation:popIn .3s ease both}

/* BOTTOM BAR */
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 16px;background:rgba(0,0,0,0.14);backdrop-filter:blur(10px);flex-shrink:0}
.nav-btn{background:rgba(255,255,255,0.22);border:2px solid rgba(255,255,255,.35);color:white;padding:11px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.nav-btn:hover{background:rgba(255,255,255,0.38);transform:scale(1.04)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.next-btn{background:white;color:#333;border:none;padding:13px 30px;border-radius:50px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.22);transition:all .2s}
.next-btn:hover{transform:scale(1.05) translateY(-2px)}
.bottom-center{text-align:center}
.tap-hint{font-size:13px;color:rgba(255,255,255,.72);font-weight:600}

/* MOBILE */
@media(max-width:540px){
  .main-content{flex-direction:column;gap:10px;padding:8px 14px}
  .char-half,.info-half{flex:none;height:auto;width:100%}
  .char-frame{width:min(48vw,26vh);height:min(48vw,26vh)}
  .member-name{font-size:min(12vw,8vh)}
  .member-name{font-size:min(12vw,8vh)}
  .info-card{padding:10px 14px}
  .card-value{font-size:min(4.5vw,3.5vh)}
}

/* PARENT PANEL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.overlay.show{display:flex}
.panel{background:white;border-radius:28px;padding:26px;width:92%;max-width:400px;max-height:88vh;overflow-y:auto}
.panel h2{font-size:19px;color:#ec4899;margin-bottom:6px;text-align:center}
.panel-progress{text-align:center;font-size:13px;color:#666;background:#fdf2f8;padding:8px;border-radius:10px;margin-bottom:18px}
.panel-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #f0f0f0}
.panel-label{font-size:14px;font-weight:700;color:#333}
.panel-sub{font-size:12px;color:#999;margin-top:2px}
.toggle{width:48px;height:26px;background:#ddd;border-radius:13px;cursor:pointer;position:relative;transition:background .3s;border:none;flex-shrink:0}
.toggle.on{background:#ec4899}
.toggle::after{content:'';position:absolute;width:20px;height:20px;background:white;border-radius:50%;top:3px;left:3px;transition:left .3s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.toggle.on::after{left:25px}
.jump-section{margin-top:14px}
.jump-section h4{font-size:12px;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.jump-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.jump-btn{padding:12px 6px;border:2px solid #e5e7eb;border-radius:12px;font-size:22px;font-weight:800;cursor:pointer;background:white;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.jump-btn span{font-size:11px;font-weight:700;color:#aaa}
.jump-btn:hover{border-color:#ec4899;background:#fdf2f8}
.jump-btn.done{background:#d1fae5;border-color:#a7f3d0}
.jump-btn.done span{color:#059669}
.jump-btn.cur{background:#fdf2f8;border-color:#ec4899}
.jump-btn.cur span{color:#ec4899}
.close-panel-btn{width:100%;padding:13px;background:linear-gradient(135deg,#ec4899,#db2777);color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px}

/* QUIZ */
.quiz-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:150;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.quiz-overlay.show{display:flex}
.quiz-card{background:white;border-radius:28px;padding:24px;width:92%;max-width:460px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.35);animation:popIn .35s cubic-bezier(0.175,0.885,0.32,1.275)}
.quiz-title{font-size:15px;color:#888;font-weight:700;margin-bottom:14px}
/* big character shown in quiz */
.quiz-char{font-size:90px;margin-bottom:8px;animation:bounce .5s ease infinite alternate;display:block}
.quiz-question{font-size:20px;font-weight:800;color:#333;margin-bottom:18px;line-height:1.3}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quiz-opt{padding:14px 8px;border:3px solid #e5e7eb;border-radius:18px;cursor:pointer;transition:all .2s;background:white;display:flex;flex-direction:column;align-items:center;gap:4px}
.quiz-opt-emoji{font-size:36px;line-height:1}
.quiz-opt-label{font-size:14px;font-weight:800;color:#555}
.quiz-opt:hover{border-color:#ec4899;background:#fdf2f8;transform:scale(1.03)}
.quiz-opt.correct{border-color:#059669;background:#d1fae5}
.quiz-opt.correct .quiz-opt-label{color:#059669}
.quiz-opt.wrong{border-color:#dc2626;background:#fee2e2}
.quiz-opt.wrong .quiz-opt-label{color:#dc2626}
.quiz-opt:disabled{cursor:not-allowed;transform:none}
.quiz-feedback{margin-top:14px;font-size:15px;font-weight:700;min-height:20px}
.quiz-feedback.good{color:#059669}
.quiz-feedback.bad{color:#dc2626}
.quiz-retry-btn{display:none;margin-top:10px;padding:11px 26px;background:#ec4899;color:white;border:none;border-radius:50px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(236,72,153,0.4);transition:all .2s}
.quiz-retry-btn:hover{transform:scale(1.05)}

/* RELATIONSHIP QUIZ — special type */
.quiz-rel-img{font-size:70px;margin-bottom:4px;display:block;animation:bounce .5s ease infinite alternate}
.quiz-rel-stem{font-size:16px;color:#666;font-weight:600;margin-bottom:10px}

/* CELEBRATION */
.celeb-overlay{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:30px}
.celeb-overlay.show{display:flex}
.celeb-emoji{font-size:80px;animation:bounce .5s ease infinite alternate}
.celeb-title{font-size:38px;font-weight:900;color:white;margin:14px 0 8px;text-shadow:0 4px 16px rgba(0,0,0,.3)}
.celeb-sub{font-size:17px;color:rgba(255,255,255,.9);margin-bottom:28px;line-height:1.6;white-space:pre-line}
.celeb-btn{padding:17px 48px;background:white;border:none;border-radius:50px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.22);transition:transform .2s}
.celeb-btn:hover{transform:scale(1.05)}

/* ANIMATIONS */
@keyframes popIn{0%{transform:scale(.2) rotate(-15deg);opacity:0}65%{transform:scale(1.12) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes bounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-14px) scale(1.06)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
@keyframes heartPop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}


/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.hero h1{font-size:clamp(22px,3.5vw,52px);}
.hero h2{font-size:clamp(22px,3.5vw,52px);}
.hero p{font-size:clamp(13px,1.6vw,22px);}
.hero{padding:clamp(18px,3vw,48px) clamp(20px,5vw,80px) clamp(44px,6vw,80px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.quiz-question{font-size:clamp(16px,2vw,30px);}
.quiz-opt{font-size:clamp(14px,1.7vw,24px);padding:clamp(13px,1.7vw,24px) clamp(8px,1vw,16px);border-radius:clamp(13px,1.5vw,22px);}
.celeb-emoji{font-size:clamp(70px,10vw,140px);}
.celeb-title{font-size:clamp(24px,3.5vw,54px);}
.celeb-sub{font-size:clamp(14px,1.8vw,26px);}
.celeb-btn{font-size:clamp(16px,2vw,28px);padding:clamp(14px,1.8vw,22px) clamp(36px,4vw,60px);border-radius:clamp(40px,5vw,60px);}
.card{border-radius:clamp(16px,2vw,28px);}
.card-sub{font-size:clamp(11px,1.3vw,18px);}
</style>
</head>
<body>

<div class="screen" id="mainScreen">

  <!-- TOP BAR -->
  <div class="topbar">
    <a href="/lkg" class="topbar-btn">&#127968; Home</a>
    <div class="stars-display">&#11088; <span id="starsDisplay">0</span></div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="sound-pill" id="soundFab" onclick="event.stopPropagation(); toggleSound();">🔊 Sound</button>
      <button class="topbar-btn" onclick="openPanel(event)">&#9881;&#65039; Parent</button>
    </div>
  </div>

  <!-- PROGRESS DOTS -->
  <div class="dots-row" id="dotsRow"></div>

  <!-- MAIN -->
  <div class="main-content" id="mainContent">

    <!-- LEFT: character -->
    <div class="char-half">
      <div class="char-frame" id="charFrame" onclick="bounceChar(event)">
        <svg id="charSvg" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="member-name"  id="memberName">Mummy</div>
      <div class="member-role"  id="memberRole">She is your Mother</div>
    </div>

    <!-- RIGHT: info cards -->
    <div class="info-half" id="infoHalf"></div>

  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="nav-btn" id="prevBtn" onclick="prev(event)" disabled>&#8592; Back</button>
    <div class="bottom-center">
      <div class="tap-hint">&#128070; Tap to continue!</div>
    </div>
    <button class="next-btn" onclick="next(event)">Next &#8594;</button>
  </div>
</div>

<!-- PARENT PANEL -->
<div class="overlay" id="parentOverlay">
  <div class="panel">
    <h2>&#128149; Family Controls</h2>
    <div class="panel-progress" id="panelProgress">0 of 6 members learned</div>
    <div class="panel-row">
      <div><div class="panel-label">&#128266; Voice Sound</div><div class="panel-sub">Reads names and relationships</div></div>
      <button class="toggle on" id="soundToggle" onclick="toggleSound()"></button>
    </div>
    <div class="jump-section">
      <h4>Jump to any member</h4>
      <div class="jump-grid" id="jumpGrid"></div>
    </div>
    <button class="close-panel-btn" onclick="closePanel()">&#10003; Continue Learning!</button>
  </div>
</div>

<!-- QUIZ -->
<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-card" id="quizCard">
    <div class="quiz-title" id="quizTitle">Quick Quiz! &#127919;</div>
    <div id="quizCharArea"></div>
    <div class="quiz-question" id="quizQuestion"></div>
    <div class="quiz-options"  id="quizOptions"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <button class="quiz-retry-btn" id="quizRetryBtn" onclick="retryQuiz()">&#128260; Try Again!</button>
  </div>
</div>

<!-- CELEBRATION -->
<div class="celeb-overlay" id="celebOverlay">
  <div class="celeb-emoji" id="celebEmoji">&#127881;</div>
  <div class="celeb-title" id="celebTitle">Amazing!</div>
  <div class="celeb-sub"   id="celebSub"></div>
  <button class="celeb-btn" id="celebBtn" onclick="closeCelebration()">Keep Going! &#128640;</button>
</div>

<script>
/* ══════════════════════════════════════════════════
   SVG CHARACTER BUILDERS
   Each returns an SVG string for that family member
   ══════════════════════════════════════════════════ */

function svgMummy() {
  return `
  <!-- dress / body -->
  <ellipse cx="100" cy="170" rx="46" ry="48" fill="#f9a8d4"/>
  <rect x="70" y="130" width="60" height="55" rx="14" fill="#f9a8d4"/>
  <!-- hair long -->
  <ellipse cx="100" cy="72" rx="40" ry="42" fill="#92400e"/>
  <rect x="62" y="80" width="14" height="50" rx="7" fill="#92400e"/>
  <rect x="124" y="80" width="14" height="50" rx="7" fill="#92400e"/>
  <!-- face -->
  <ellipse cx="100" cy="78" rx="32" ry="34" fill="#fde68a"/>
  <!-- eyes -->
  <ellipse cx="88" cy="72" rx="5" ry="6" fill="#1e1b4b"/>
  <ellipse cx="112" cy="72" rx="5" ry="6" fill="#1e1b4b"/>
  <circle cx="90" cy="70" r="2" fill="white"/>
  <circle cx="114" cy="70" r="2" fill="white"/>
  <!-- eyelashes -->
  <line x1="84" y1="67" x2="82" y2="63" stroke="#1e1b4b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="88" y1="66" x2="88" y2="62" stroke="#1e1b4b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="92" y1="67" x2="94" y2="63" stroke="#1e1b4b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="108" y1="67" x2="106" y2="63" stroke="#1e1b4b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="112" y1="66" x2="112" y2="62" stroke="#1e1b4b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="116" y1="67" x2="118" y2="63" stroke="#1e1b4b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- brows -->
  <path d="M83,65 Q88,62 93,65" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
  <path d="M107,65 Q112,62 117,65" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
  <!-- nose -->
  <ellipse cx="100" cy="82" rx="4" ry="3" fill="#fbbf24" opacity=".6"/>
  <!-- smile -->
  <path d="M88,91 Q100,102 112,91" fill="none" stroke="#e11d48" stroke-width="2.5" stroke-linecap="round"/>
  <!-- cheeks -->
  <ellipse cx="80" cy="86" rx="9" ry="6" fill="#fca5a5" opacity=".5"/>
  <ellipse cx="120" cy="86" rx="9" ry="6" fill="#fca5a5" opacity=".5"/>
  <!-- bindi -->
  <circle cx="100" cy="60" r="4" fill="#dc2626"/>
  <!-- dupatta -->
  <path d="M58,128 Q70,115 100,118 Q130,115 142,128" fill="#fda4af" opacity=".7"/>
  <!-- arms -->
  <ellipse cx="60" cy="152" rx="10" ry="28" fill="#f9a8d4" transform="rotate(-12,60,152)"/>
  <ellipse cx="140" cy="152" rx="10" ry="28" fill="#f9a8d4" transform="rotate(12,140,152)"/>
  <!-- hands -->
  <circle cx="52" cy="178" r="10" fill="#fde68a"/>
  <circle cx="148" cy="178" r="10" fill="#fde68a"/>
  <!-- heart -->
  <text x="88" y="158" font-size="22" fill="#e11d48">&#10084;</text>
  `;
}

function svgDaddy() {
  return `
  <!-- trousers -->
  <rect x="68" y="155" width="30" height="55" rx="8" fill="#1e40af"/>
  <rect x="102" y="155" width="30" height="55" rx="8" fill="#1e40af"/>
  <!-- shirt -->
  <rect x="62" y="110" width="76" height="58" rx="14" fill="#3b82f6"/>
  <!-- collar -->
  <polygon points="100,110 88,125 100,118 112,125" fill="white"/>
  <!-- buttons -->
  <circle cx="100" cy="132" r="3" fill="white"/>
  <circle cx="100" cy="145" r="3" fill="white"/>
  <!-- short hair -->
  <ellipse cx="100" cy="68" rx="36" ry="28" fill="#1c1917"/>
  <!-- face -->
  <ellipse cx="100" cy="78" rx="32" ry="34" fill="#fde68a"/>
  <!-- ears -->
  <ellipse cx="68" cy="80" rx="7" ry="10" fill="#fde68a"/>
  <ellipse cx="132" cy="80" rx="7" ry="10" fill="#fde68a"/>
  <!-- eyes -->
  <ellipse cx="88" cy="74" rx="5" ry="6" fill="#1e1b4b"/>
  <ellipse cx="112" cy="74" rx="5" ry="6" fill="#1e1b4b"/>
  <circle cx="90" cy="72" r="2" fill="white"/>
  <circle cx="114" cy="72" r="2" fill="white"/>

let current=0, stars=0, soundOn=true;
let learned=new Set();
let quizType='name'; // 'name' or 'relationship'

/* ══════════════════════════════════════════════════
   UPDATE SCREEN
   ══════════════════════════════════════════════════ */
function updateScreen(animate=true){
  const m=members[current];

  /* background */
  document.getElementById('mainScreen').style.background=
    `linear-gradient(135deg,${m.color[0]} 0%,${m.color[1]} 100%)`;

  /* SVG character */
  const svg=document.getElementById('charSvg');
  svg.innerHTML=m.svgFn();

  /* char frame bg tint */
  document.getElementById('charFrame').style.background=
    `radial-gradient(circle at 50% 60%, ${m.bgCircle}55, rgba(255,255,255,0.08))`;

  /* labels */
  document.getElementById('memberName').textContent=m.name;
  document.getElementById('memberRole').textContent=m.role;

  /* info cards */
  buildInfoCards(m);

  document.getElementById('prevBtn').disabled=(current===0);

  if(animate){
    ['memberName','memberRole'].forEach((id,idx)=>{
      const el=document.getElementById(id);
      el.style.animation='none'; void el.offsetWidth;
      el.style.animation=idx===0
        ?'popIn .5s cubic-bezier(0.175,0.885,0.32,1.275) both'
        :`slideUp .4s ease ${.08+idx*.1}s both`;
    });
    const cf=document.getElementById('charFrame');
    cf.style.animation='none'; void cf.offsetWidth;
    cf.style.animation='slideUp .45s ease .05s both';
  }

  updateDots();
  if(soundOn) setTimeout(speak,500);
}

/* ══════════════════════════════════════════════════
   INFO CARDS
   ══════════════════════════════════════════════════ */
function buildInfoCards(m){
  const half=document.getElementById('infoHalf');
  half.innerHTML='';

  /* card 1 — relationship sentence */
  const c1=card();
  c1.innerHTML=`<div class="card-label">&#128149; Who is ${m.name}?</div>
    <div class="card-value">${m.relationship}</div>`;
  half.appendChild(c1);

  /* card 2 — relationship chips */
  const c2=card();
  c2.innerHTML=`<div class="card-label">&#128101; Family Links</div>
    <div class="rel-chips">${m.relChips.map(r=>`<span class="rel-chip">${r}</span>`).join('')}</div>`;
  half.appendChild(c2);

  /* card 3 — loves */
  const c3=card();
  c3.innerHTML=`<div class="card-label">&#10024; ${m.name} Loves</div>
    <div class="love-row">${m.loves.map((l,i)=>`<span class="love-word" style="animation-delay:${i*.06}s">${l}</span>`).join('')}</div>
    <div class="card-sub" style="margin-top:6px">${m.loveNote}</div>`;
  half.appendChild(c3);

  /* card 4 — fun fact */
  const c4=card();
  c4.innerHTML=`<div class="card-label">&#128161; Fun Fact</div>
    <div class="card-sub" style="font-size:min(3vw,3.5vh);color:white;font-weight:700;line-height:1.4">${m.fact}</div>`;
  half.appendChild(c4);
}

function card(){
  const d=document.createElement('div');
  d.className='info-card';
  return d;
}

/* ══════════════════════════════════════════════════
   CHAR BOUNCE
   ══════════════════════════════════════════════════ */
function bounceChar(e){
  e.stopPropagation();
  const cf=document.getElementById('charFrame');
  cf.style.animation='none'; void cf.offsetWidth;
  cf.style.animation='popIn .4s cubic-bezier(0.175,0.885,0.32,1.275)';
  if(soundOn) speak();
}

/* ══════════════════════════════════════════════════
   SPEECH
   ══════════════════════════════════════════════════ */
function speak(){
  if(!soundOn||!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const m=members[current];
  const u=new SpeechSynthesisUtterance(
    `${m.name}! ${m.role}. ${m.relationship} ${m.fact}`
  );
  u.rate=0.8; u.pitch=1.2; u.volume=1;
  window.speechSynthesis.speak(u);
}

/* ══════════════════════════════════════════════════
   PROGRESS DOTS
   ══════════════════════════════════════════════════ */
function updateDots(){
  const row=document.getElementById('dotsRow');
  row.innerHTML='';
  members.forEach((m,i)=>{
    const d=document.createElement('div');
    d.className=`dot ${i===current?'current':learned.has(i)?'done':''}`;
    d.title=m.name;
    d.onclick=(e)=>{e.stopPropagation();current=i;updateScreen();};
    row.appendChild(d);
  });
}

/* ══════════════════════════════════════════════════
   NAVIGATION
   ══════════════════════════════════════════════════ */
function handleTap(){next();}

function next(e){
  if(e) e.stopPropagation();
  learned.add(current);
  addStars(1);

  /* quiz after every 3 members AND at the last member */
  const isQuiz=(learned.size%3===0)||(current===members.length-1);
  if(isQuiz){ showQuiz(); return; }

  if(current>=members.length-1){
    showFinalCelebration(); return;
  }
  current++; updateScreen();
}

function prev(e){
  if(e) e.stopPropagation();
  if(current>0){current--;updateScreen();}
}

function addStars(n){
  stars+=n;
  document.getElementById('starsDisplay').textContent=stars;
}

/* ══════════════════════════════════════════════════
   PARENT PANEL
   ══════════════════════════════════════════════════ */
function openPanel(e){
  if(e) e.stopPropagation();
  document.getElementById('panelProgress').textContent=
    `${learned.size} of ${members.length} members learned ✅`;
  buildJumpGrid();
  document.getElementById('parentOverlay').classList.add('show');
}
function closePanel(){document.getElementById('parentOverlay').classList.remove('show');}

function buildJumpGrid(){
  const grid=document.getElementById('jumpGrid');
  grid.innerHTML='';
  members.forEach((m,i)=>{
    const btn=document.createElement('button');
    btn.className=`jump-btn ${i===current?'cur':learned.has(i)?'done':''}`;
    btn.innerHTML=`${m.emoji}<span>${m.name}</span>`;
    btn.onclick=()=>{current=i;updateScreen();closePanel();};
    grid.appendChild(btn);
  });
}

function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('soundToggle').classList.toggle('on',soundOn);

  const pill = document.getElementById('soundFab');
  pill.textContent = soundOn ? '🔊 Sound' : '🔇 Muted';
  pill.classList.toggle('muted', !soundOn);

  if(!soundOn) window.speechSynthesis.cancel();
}

/* ══════════════════════════════════════════════════
   QUIZ  (alternates between name-quiz & relationship-quiz)
   ══════════════════════════════════════════════════ */
function showQuiz(){
  window.speechSynthesis.cancel();

  /* pick quiz type based on how many learned */
  quizType= learned.size<=3 ? 'name' : (Math.random()<0.5?'name':'relationship');

  const m=members[current];

  document.getElementById('quizFeedback').textContent='';
  document.getElementById('quizFeedback').className='quiz-feedback';
  document.getElementById('quizRetryBtn').style.display='none';

  const charArea=document.getElementById('quizCharArea');
  const optsEl=document.getElementById('quizOptions');
  optsEl.innerHTML='';

  if(quizType==='name'){
    /* show character, ask the name */
    document.getElementById('quizTitle').textContent='Quick Quiz! 🎯';
    charArea.innerHTML=`<span class="quiz-char">${m.emoji}</span>`;
    document.getElementById('quizQuestion').textContent=`Who is this family member?`;

    /* 4 options — names */
    const pool=shuffle(members.filter((_,i)=>i!==current)).slice(0,3).map(x=>x.name);
    pool.push(m.name);
    shuffle(pool).forEach(name=>{
      const mem=members.find(x=>x.name===name);
      const btn=document.createElement('button');
      btn.className='quiz-opt';
      btn.innerHTML=`<span class="quiz-opt-emoji">${mem.emoji}</span>
        <span class="quiz-opt-label">${name}</span>`;
      btn.onclick=()=>checkQuiz(btn,name,m.name,'name');
      optsEl.appendChild(btn);
    });

  } else {
    /* show name, ask the relationship */
    document.getElementById('quizTitle').textContent='Relationship Quiz! 🌳';
    charArea.innerHTML=`<span class="quiz-rel-img">${m.emoji}</span>
      <div class="quiz-rel-stem">This is <strong>${m.name}</strong></div>`;
    document.getElementById('quizQuestion').textContent=`What is ${m.name}'s relationship to you?`;

    /* 4 options — roles */
    const correctRole=m.role;
    const wrongRoles=shuffle(
      members.filter((_,i)=>i!==current).map(x=>x.role)
    ).slice(0,3);
    const allRoles=shuffle([correctRole,...wrongRoles]);
    allRoles.forEach(role=>{
      const mem=members.find(x=>x.role===role)||members[0];
      const btn=document.createElement('button');
      btn.className='quiz-opt';
      btn.innerHTML=`<span class="quiz-opt-emoji">${mem.emoji}</span>
        <span class="quiz-opt-label" style="font-size:12px;text-align:center;line-height:1.3">${role}</span>`;
      btn.onclick=()=>checkQuiz(btn,role,correctRole,'relationship');
      optsEl.appendChild(btn);
    });
  }

  document.getElementById('quizOverlay').classList.add('show');
}

function checkQuiz(btn, selected, correct, type){
  document.querySelectorAll('.quiz-opt').forEach(b=>{b.onclick=null;b.disabled=true;});
  const fb=document.getElementById('quizFeedback');

  if(selected===correct){
    btn.classList.add('correct');
    fb.textContent='🎉 Correct! Well done!';
    fb.className='quiz-feedback good';
    addStars(2);
    if(soundOn){
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance('Correct! Excellent!');
      u.pitch=1.4; window.speechSynthesis.speak(u);
    }
    setTimeout(()=>{
      document.getElementById('quizOverlay').classList.remove('show');
      afterQuiz();
    },1300);
  } else {
    btn.classList.add('wrong');
    /* highlight correct */
    document.querySelectorAll('.quiz-opt').forEach(b=>{
      const lbl=b.querySelector('.quiz-opt-label');
      if(lbl&&lbl.textContent.trim()===correct) b.classList.add('correct');
    });
    fb.textContent=`Not quite! The answer is: "${correct}"`;
    fb.className='quiz-feedback bad';
    const card=document.getElementById('quizCard');
    card.style.animation='none'; void card.offsetWidth;
    card.style.animation='shake .4s ease';
    if(soundOn){
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance('Not quite! Try again!');
      u.pitch=1.0; window.speechSynthesis.speak(u);
    }
    document.getElementById('quizRetryBtn').style.display='inline-block';
  }
}

function retryQuiz(){showQuiz();}

function afterQuiz(){
  if(current>=members.length-1){
    showFinalCelebration();
  } else {
    current++; updateScreen();
  }
}

/* ══════════════════════════════════════════════════
   CELEBRATIONS
   ══════════════════════════════════════════════════ */
function showCelebration(emoji,title,sub,btnLabel,color,onBtn){
  const ov=document.getElementById('celebOverlay');
  ov.style.background=`linear-gradient(135deg,${color}f5,${color}cc)`;
  document.getElementById('celebEmoji').textContent=emoji;
  document.getElementById('celebTitle').textContent=title;
  document.getElementById('celebSub').textContent=sub;
  const btn=document.getElementById('celebBtn');
  btn.textContent=btnLabel;
  btn.style.color=color;
  btn.onclick=onBtn;
  ov.classList.add('show');
  if(soundOn){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance('Amazing! You know your whole family! You are a family champion!');
    u.pitch=1.4; u.rate=0.85; window.speechSynthesis.speak(u);
  }
  launchConfetti();
}

function showFinalCelebration(){
  showCelebration(
    '🏡','You Know Your Family!',
    'WOW! You learned all 6 family members!\nMummy, Daddy, Grandma, Grandpa,\nBrother and Sister — you know them all!\n❤️ Family is everything! ❤️',
    'Start Again 🔄','#db2777',
    ()=>{
      document.getElementById('celebOverlay').classList.remove('show');
      current=0; stars=0; learned.clear();
      document.getElementById('starsDisplay').textContent='0';
      updateScreen(false);
    }
  );
}

function closeCelebration(){
  document.getElementById('celebOverlay').classList.remove('show');
}

/* ══════════════════════════════════════════════════
   CONFETTI
   ══════════════════════════════════════════════════ */
function launchConfetti(){
  const cols=['#FF6B6B','#FFC300','#2ECC71','#f9a8d4','#a78bfa','#fff','#fbbf24','#fb7185'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');
    const sz=Math.random()*14+5;
    c.style.cssText=`position:fixed;width:${sz}px;height:${sz}px;
      background:${cols[~~(Math.random()*cols.length)]};
      border-radius:${Math.random()>.5?'50%':'3px'};
      left:${Math.random()*100}vw;top:-20px;z-index:300;
      animation:confettiFall ${Math.random()*2+2}s ease ${Math.random()*.8}s forwards;
      pointer-events:none;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4500);
  }
}

/* ══════════════════════════════════════════════════
   UTILS
   ══════════════════════════════════════════════════ */
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

/* ══════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════ */
document.getElementById('mainContent').addEventListener('click',handleTap);
updateDots();
updateScreen(false);
setTimeout(speak,900);
</script>
