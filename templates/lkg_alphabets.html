<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ABC Fun! 🌈</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --gold: #FFD600;
            --gold-dark: #c9a800;
            --dark: rgba(0,0,0,0.18);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka One', cursive;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            background: #FF6B6B;
        }

        /* ── SCREEN ── */
        .screen {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.7s ease;
            position: relative;
            overflow: hidden;
        }

        /* Bubbly background blobs */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.10);
            pointer-events: none;
            animation: floatBlob 7s ease-in-out infinite alternate;
        }
        .bg-blob:nth-child(1) { width: 180px; height: 180px; top: -40px; left: -40px; animation-delay: 0s; }
        .bg-blob:nth-child(2) { width: 120px; height: 120px; bottom: 60px; right: -20px; animation-delay: 2s; }
        .bg-blob:nth-child(3) { width: 80px; height: 80px; top: 40%; left: 5%; animation-delay: 4s; }

        @keyframes floatBlob {
            from { transform: translateY(0) scale(1); }
            to   { transform: translateY(20px) scale(1.1); }
        }

        /* ── TOP BAR ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            flex-shrink: 0;
            z-index: 10;
            position: relative;
        }
        .topbar-btn {
            background: rgba(255,255,255,0.28);
            border: 3px solid rgba(255,255,255,0.5);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 15px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.15s, background 0.15s;
        }
        .topbar-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.45); }
        .stars-display {
            background: rgba(255,215,0,0.35);
            border: 3px solid rgba(255,215,0,0.65);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Fredoka One', cursive;
            letter-spacing: 1px;
        }

        /* ── PROGRESS DOTS ── */
        .dots-row {
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 6px 16px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: rgba(255,255,255,0.28);
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .dot.done  { background: rgba(255,255,255,0.7); }
        .dot.current {
            background: var(--gold);
            transform: scale(1.6);
            box-shadow: 0 0 10px var(--gold);
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 20px 0;
            gap: 20px;
            min-height: 0;
            position: relative;
            z-index: 2;
        }

        /* Letter half */
        .letter-half {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .letter-shadow {
            position: absolute;
            font-family: 'Fredoka One', cursive;
            font-weight: 400;
            color: rgba(0,0,0,0.15);
            line-height: 1;
            font-size: min(34vw, 50vh);
            transform: translate(7px, 9px);
            pointer-events: none;
        }
        .big-letter {
            font-size: min(34vw, 50vh);
            font-family: 'Fredoka One', cursive;
            color: white;
            line-height: 1;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 6px 20px rgba(0,0,0,0.25));
            animation: popIn 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.4) both;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .big-letter:active { transform: scale(0.9) rotate(-5deg); }

        /* Letter tap sparkle ring */
        .letter-ring {
            position: absolute;
            width: min(34vw, 50vh);
            height: min(34vw, 50vh);
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.5);
            pointer-events: none;
            opacity: 0;
        }
        .letter-ring.pulse {
            animation: ringPulse 0.6s ease-out forwards;
        }
        @keyframes ringPulse {
            0%   { transform: scale(0.6); opacity: 0.9; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* small-letter label below big letter */
        .letter-label-row {
            display: flex;
            gap: 14px;
            margin-top: 4px;
        }
        .letter-case {
            background: rgba(255,255,255,0.22);
            border: 3px solid rgba(255,255,255,0.45);
            color: white;
            border-radius: 16px;
            padding: 4px 16px;
            font-size: min(5vw, 7vh);
            font-family: 'Fredoka One', cursive;
            animation: slideUp 0.4s ease 0.25s both;
        }

        /* Image half */
        .image-half {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .image-frame {
            width:  min(34vw, 46vh);
            height: min(34vw, 46vh);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 14px 44px rgba(0,0,0,0.35), 0 0 0 5px rgba(255,255,255,0.4);
            position: relative;
            animation: bounceIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4) 0.1s both;
            cursor: pointer;
            flex-shrink: 0;
        }
        .image-frame:active { transform: scale(0.95); }
        #mainImage {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease;
        }
        .image-glow {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.25));
            border-radius: 26px;
            pointer-events: none;
        }
        .word-label {
            font-size: min(7vw, 9vh);
            font-family: 'Fredoka One', cursive;
            color: white;
            text-shadow: 0 3px 12px rgba(0,0,0,0.22);
            animation: slideUp 0.4s ease 0.2s both;
            line-height: 1;
            letter-spacing: 1px;
        }
        .word-sub-label {
            font-size: min(3.4vw, 4.5vh);
            color: rgba(255,255,255,0.9);
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            animation: slideUp 0.4s ease 0.3s both;
            background: rgba(0,0,0,0.15);
            padding: 4px 14px;
            border-radius: 20px;
        }

        /* ── BOTTOM BAR ── */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px 18px;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
            gap: 10px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.25);
            border: 3px solid rgba(255,255,255,0.5);
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 22px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            transition: all 0.15s;
            min-width: 70px;
            text-align: center;
        }
        .nav-btn:hover  { background: rgba(255,255,255,0.4); transform: scale(1.06); }
        .nav-btn:active { transform: scale(0.92); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .next-btn {
            background: white;
            color: #333;
            border: none;
            padding: 16px 36px;
            border-radius: 50px;
            font-size: 18px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.22), 0 0 0 4px rgba(255,255,255,0.4);
            transition: all 0.18s;
            letter-spacing: 0.5px;
        }
        .next-btn:hover { transform: scale(1.06) translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.28); }
        .next-btn:active { transform: scale(0.94); }
        .bottom-center { text-align: center; flex: 1; }
        .tap-hint {
            font-size: 15px;
            color: rgba(255,255,255,0.85);
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            animation: tapWiggle 1.8s ease-in-out infinite;
        }
        @keyframes tapWiggle {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.07); }
        }
        .autoplay-pill {
            display: none;
            background: var(--gold);
            color: #333;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            margin-top: 4px;
        }
        .autoplay-pill.show { display: inline-block; }

        /* ── SPEAK BUTTON (big, kid-friendly) ── */
        .speak-fab {
            position: absolute;
            bottom: 90px;
            right: 18px;
            width: 56px; height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.28);
            border: 3px solid rgba(255,255,255,0.55);
            color: white;
            font-size: 26px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, background 0.15s;
            z-index: 5;
            box-shadow: 0 4px 14px rgba(0,0,0,0.2);
        }
        .speak-fab:active { transform: scale(0.88); background: rgba(255,255,255,0.5); }
        .speak-fab.speaking { animation: speakPulse 0.5s ease infinite alternate; }
        @keyframes speakPulse {
            from { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            to   { box-shadow: 0 0 0 14px rgba(255,255,255,0); }
        }

        /* ── SOUND PILL (top bar) ── */
        .sound-pill {
            background: rgba(255,255,255,0.28);
            border: 3px solid rgba(255,255,255,0.5);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 15px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            transition: transform 0.15s, background 0.2s;
            white-space: nowrap;
        }
        .sound-pill:active { transform: scale(0.92); background: rgba(255,255,255,0.45); }
        .sound-pill.muted {
            background: rgba(0,0,0,0.25);
            border-color: rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.55);
            text-decoration: line-through;
        }

        /* ── MOBILE ── */
        @media (max-width: 540px) {
            .main-content { flex-direction: column; gap: 8px; padding: 4px 14px 0; }
            .letter-half  { order: 1; }
            .image-half   { order: 2; }
            .big-letter, .letter-shadow { font-size: min(38vw, 22vh); }
            .image-frame  { width: min(52vw, 26vh); height: min(52vw, 26vh); }
            .word-label   { font-size: min(9vw, 6vh); }
            .letter-case  { font-size: min(6vw, 5vh); }
            .speak-fab    { bottom: 82px; right: 12px; width: 50px; height: 50px; font-size: 22px; }
            .sound-pill   { font-size: 13px; padding: 6px 12px; }
        }

        /* ── PARENT PANEL OVERLAY ── */
        .overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }
        .overlay.show { display: flex; }
        .panel {
            background: white;
            border-radius: 30px;
            padding: 26px;
            width: 92%; max-width: 400px;
            max-height: 88vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        .panel h2 {
            font-size: 20px;
            color: #7c3aed;
            margin-bottom: 6px;
            text-align: center;
            font-family: 'Fredoka One', cursive;
        }
        .panel-progress {
            text-align: center; font-size: 13px; color: #666;
            background: #f3f0ff; padding: 8px; border-radius: 12px; margin-bottom: 18px;
            font-family: 'Nunito', sans-serif; font-weight: 700;
        }
        .panel-row {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 13px 0; border-bottom: 1px solid #f0f0f0;
        }
        .panel-label { font-size: 14px; font-weight: 700; color: #333; font-family: 'Nunito', sans-serif; }
        .panel-sub   { font-size: 12px; color: #999; margin-top: 2px; font-family: 'Nunito', sans-serif; }
        .toggle {
            width: 52px; height: 28px; background: #ddd;
            border-radius: 14px; cursor: pointer;
            position: relative; transition: background 0.3s; border: none; flex-shrink: 0;
        }
        .toggle.on { background: #7c3aed; }
        .toggle::after {
            content: ''; position: absolute;
            width: 22px; height: 22px; background: white;
            border-radius: 50%; top: 3px; left: 3px;
            transition: left 0.3s; box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }
        .toggle.on::after { left: 27px; }
        .speed-row { display: flex; gap: 7px; }
        .speed-btn {
            padding: 7px 14px; border: 2px solid #e5e7eb;
            border-radius: 20px; font-size: 13px; font-weight: 700;
            cursor: pointer; background: white; transition: all 0.2s;
            font-family: 'Nunito', sans-serif;
        }
        .speed-btn.active { border-color: #7c3aed; background: #f3f0ff; color: #7c3aed; }
        .jump-section { margin-top: 14px; }
        .jump-section h4 {
            font-size: 12px; color: #888; margin-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
            font-family: 'Nunito', sans-serif; font-weight: 700;
        }
        .jump-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
        .jump-btn {
            aspect-ratio: 1; border: 2px solid #e5e7eb;
            border-radius: 10px; font-size: 14px; font-weight: 800;
            cursor: pointer; background: white; color: #7c3aed;
            transition: all 0.2s; font-family: 'Fredoka One', cursive;
        }
        .jump-btn:hover      { background: #7c3aed; color: white; border-color: #7c3aed; }
        .jump-btn.done       { background: #d1fae5; color: #059669; border-color: #a7f3d0; }
        .jump-btn.cur        { background: #7c3aed; color: white; border-color: #7c3aed; }
        .close-panel-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg,#7c3aed,#6d28d9);
            color: white; border: none; border-radius: 16px;
            font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 18px;
            font-family: 'Fredoka One', cursive; letter-spacing: 0.5px;
            transition: transform 0.15s;
        }
        .close-panel-btn:active { transform: scale(0.97); }

        /* ── CELEBRATION ── */
        .celeb-overlay {
            display: none;
            position: fixed; inset: 0;
            background: linear-gradient(135deg,rgba(124,58,237,.97),rgba(109,40,217,.97));
            z-index: 200;
            align-items: center; justify-content: center;
            flex-direction: column; text-align: center; padding: 30px;
        }
        .celeb-overlay.show { display: flex; }
        .celeb-emoji  { font-size: 100px; animation: bounce 0.55s ease infinite alternate; line-height: 1; }
        .celeb-title  {
            font-size: 52px; font-family: 'Fredoka One', cursive;
            color: white; margin: 16px 0 8px;
            text-shadow: 0 4px 20px rgba(0,0,0,.3);
            animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.3) both;
        }
        .celeb-sub    {
            font-size: 18px; color: rgba(255,255,255,.92);
            margin-bottom: 32px; line-height: 1.5;
            font-family: 'Nunito', sans-serif; font-weight: 800;
            white-space: pre-line;
        }
        .celeb-btn {
            padding: 20px 56px; background: white; color: #7c3aed;
            border: none; border-radius: 50px; font-size: 22px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,.22);
            transition: transform 0.18s;
            letter-spacing: 0.5px;
        }
        .celeb-btn:hover  { transform: scale(1.06) translateY(-3px); }
        .celeb-btn:active { transform: scale(0.95); }

        /* Stars burst on celeb */
        .celeb-stars {
            display: flex; gap: 12px; margin-bottom: 10px;
        }
        .celeb-star { font-size: 44px; animation: starSpin 0.6s ease both; }
        .celeb-star:nth-child(2) { animation-delay: 0.12s; }
        .celeb-star:nth-child(3) { animation-delay: 0.24s; }
        @keyframes starSpin {
            from { transform: scale(0) rotate(-180deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* ── ANIMATIONS ── */
        @keyframes popIn {
            0%   { transform: scale(0.3) rotate(-12deg); opacity: 0; }
            65%  { transform: scale(1.15) rotate(3deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        @keyframes bounceIn {
            0%   { transform: scale(0.4) translateY(40px); opacity: 0; }
            65%  { transform: scale(1.08) translateY(-8px); }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(28px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        @keyframes bounce {
            from { transform: translateY(0) scale(1); }
            to   { transform: translateY(-18px) scale(1.08); }
        }
        @keyframes confettiFall {
            0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* ── FLOATING EMOJI (tap feedback) ── */
        .float-emoji {
            position: fixed;
            font-size: 36px;
            pointer-events: none;
            z-index: 50;
            animation: floatUp 1.1s ease forwards;
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1);    opacity: 1; }
            100% { transform: translateY(-80px) scale(1.4); opacity: 0; }
        }
    

/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.celeb-emoji{font-size:clamp(70px,10vw,140px);}
.celeb-title{font-size:clamp(24px,3.5vw,54px);}
.celeb-sub{font-size:clamp(14px,1.8vw,26px);}
.celeb-stars{font-size:clamp(36px,5vw,72px);}
.celeb-btn{font-size:clamp(16px,2vw,28px);padding:clamp(14px,1.8vw,22px) clamp(36px,4vw,60px);border-radius:clamp(40px,5vw,60px);}
</style>
</head>
<body>

<!-- ═══════════════ MAIN SCREEN ═══════════════ -->
<div class="screen" id="mainScreen" onclick="handleTap(event)">

    <!-- Decorative blobs -->
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <!-- Top Bar -->
    <div class="topbar">
        <a href="/dashboard" class="topbar-btn" onclick="event.stopPropagation()">🏠 Home</a>
        <div class="stars-display" id="starsDisplay">⭐ 0</div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="sound-pill" id="soundFab" onclick="event.stopPropagation(); toggleSound();">🔊 Sound</button>
            <button class="topbar-btn" onclick="openPanel(event)">⚙️ Parent</button>
        </div>
    </div>

    <!-- Progress Dots -->
    <div class="dots-row" id="dotsRow"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Left: Giant Letter -->
        <div class="letter-half">
            <div class="letter-shadow" id="letterShadow">A</div>
            <div class="big-letter" id="bigLetter" onclick="tapLetter(event)">A</div>
            <div class="letter-ring" id="letterRing"></div>
            <!-- Upper / lower case chips -->
            <div class="letter-label-row" id="letterCaseRow">
                <div class="letter-case" id="upperCase">A</div>
                <div class="letter-case" id="lowerCase">a</div>
            </div>
        </div>

        <!-- Right: Real Picture -->
        <div class="image-half">
            <div class="image-frame" onclick="tapImage(event)">
                <img id="mainImage" src="" alt="Apple"
                     onerror="this.src='https://placehold.co/400x400/ffffff/999999?text=🖼️'"/>
                <div class="image-glow" id="imageGlow"></div>
            </div>
            <div class="word-label"     id="wordLabel">Apple</div>
            <div class="word-sub-label" id="wordSubLabel">A is for Apple!</div>
        </div>

    </div>

    <!-- Big speaker button -->
    <button class="speak-fab" id="speakFab" onclick="event.stopPropagation(); tapSpeak();">🔊</button>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <button class="nav-btn" id="prevBtn" onclick="prevLetter(event)" disabled>◀</button>
        <div class="bottom-center">
            <div class="tap-hint" id="tapHint">👆 Tap anywhere!</div>
            <div class="autoplay-pill" id="autoplayPill">▶ Playing…</div>
        </div>
        <button class="next-btn" onclick="nextLetter(event)">Next ▶</button>
    </div>

</div>

<!-- ═══════════════ PARENT PANEL ═══════════════ -->
<div class="overlay" id="parentOverlay">
    <div class="panel">
        <h2>⚙️ Parent Controls</h2>
        <div class="panel-progress" id="panelProgress">0 of 26 letters completed</div>

        <div class="panel-row">
            <div>
                <div class="panel-label">🔊 Voice Sound</div>
                <div class="panel-sub">Speaks letter and word aloud</div>
            </div>
            <button class="toggle on" id="soundToggle" onclick="toggleSound()"></button>
        </div>

        <div class="panel-row">
            <div>
                <div class="panel-label">▶️ Auto Play</div>
                <div class="panel-sub">Changes letter automatically</div>
            </div>
            <button class="toggle" id="autoToggle" onclick="toggleAuto()"></button>
        </div>

        <div class="panel-row" style="border:none">
            <div>
                <div class="panel-label">⏱️ Speed</div>
                <div class="panel-sub">Seconds per letter</div>
            </div>
            <div class="speed-row">
                <button class="speed-btn"        onclick="setSpeed(3,this)">3s</button>
                <button class="speed-btn active" onclick="setSpeed(5,this)">5s</button>
                <button class="speed-btn"        onclick="setSpeed(8,this)">8s</button>
            </div>
        </div>

        <div class="jump-section">
            <h4>Jump to any letter</h4>
            <div class="jump-grid" id="jumpGrid"></div>
        </div>

        <button class="close-panel-btn" onclick="closePanel()">✅ Continue Learning!</button>
    </div>
</div>

<!-- ═══════════════ CELEBRATION ═══════════════ -->
<div class="celeb-overlay" id="celebOverlay">
    <div class="celeb-stars">
        <span class="celeb-star">⭐</span>
        <span class="celeb-star">⭐</span>
        <span class="celeb-star">⭐</span>
    </div>
    <div class="celeb-emoji" id="celebEmoji">🎉</div>
    <div class="celeb-title" id="celebTitle">Amazing!</div>
    <div class="celeb-sub"   id="celebSub">You learned the letter A!</div>
    <button class="celeb-btn" onclick="closeCelebration()">Keep Going! 🚀</button>
</div>

<!-- ═══════════════ SCRIPT ═══════════════ -->
<script>
/* ── DATA ── */
const alphabets = [
    {letter:'A', word:'Apple',      emoji:'🍎', image:'/static/images/alphabets/A.jpg', color:['#FF6B6B','#cc3333']},
    {letter:'B', word:'Butterfly',  emoji:'🦋', image:'/static/images/alphabets/B.jpg', color:['#FF8C42','#cc5511']},
    {letter:'C', word:'Cat',        emoji:'🐱', image:'/static/images/alphabets/C.jpg', color:['#F9C74F','#c99a00']},
    {letter:'D', word:'Dog',        emoji:'🐶', image:'/static/images/alphabets/D.jpg', color:['#43AA8B','#2a7a60']},
    {letter:'E', word:'Elephant',   emoji:'🐘', image:'/static/images/alphabets/E.jpg', color:['#4895EF','#1a68c0']},
    {letter:'F', word:'Fish',       emoji:'🐟', image:'/static/images/alphabets/F.jpg', color:['#7B2D8B','#4e1a5e']},
    {letter:'G', word:'Grapes',     emoji:'🍇', image:'/static/images/alphabets/G.jpg', color:['#27AE60','#1a7a40']},
    {letter:'H', word:'Horse',      emoji:'🐴', image:'/static/images/alphabets/H.jpg', color:['#C0392B','#8a2020']},
    {letter:'I', word:'Ice Cream',  emoji:'🍦', image:'/static/images/alphabets/I.jpg', color:['#00B4D8','#007aaa']},
    {letter:'J', word:'Jackfruit',  emoji:'🟡', image:'/static/images/alphabets/J.jpg', color:['#F77F00','#c05500']},
    {letter:'K', word:'Kangaroo',   emoji:'🦘', image:'/static/images/alphabets/K.jpg', color:['#7209B7','#4a0880']},
    {letter:'L', word:'Lion',       emoji:'🦁', image:'/static/images/alphabets/L.jpg', color:['#E85D04','#aa3a00']},
    {letter:'M', word:'Monkey',     emoji:'🐒', image:'/static/images/alphabets/M.jpg', color:['#118AB2','#0a5c7a']},
    {letter:'N', word:'Nest',       emoji:'🪺', image:'/static/images/alphabets/N.jpg', color:['#2B4162','#152030']},
    {letter:'O', word:'Orange',     emoji:'🍊', image:'/static/images/alphabets/O.jpg', color:['#F4844C','#c05020']},
    {letter:'P', word:'Peacock',    emoji:'🦚', image:'/static/images/alphabets/P.jpg', color:['#06A77D','#047a58']},
    {letter:'Q', word:'Queen Bee',  emoji:'🐝', image:'/static/images/alphabets/Q.jpg', color:['#9B2335','#6a1020']},
    {letter:'R', word:'Rainbow',    emoji:'🌈', image:'/static/images/alphabets/R.jpg', color:['#D62246','#9a1030']},
    {letter:'S', word:'Sunflower',  emoji:'🌻', image:'/static/images/alphabets/S.jpg', color:['#E9C46A','#b08800']},
    {letter:'T', word:'Tiger',      emoji:'🐯', image:'/static/images/alphabets/T.jpg', color:['#E76F51','#b04020']},
    {letter:'U', word:'Umbrella',   emoji:'☂️', image:'/static/images/alphabets/U.jpg', color:['#2176AE','#104e80']},
    {letter:'V', word:'Violet',     emoji:'💜', image:'/static/images/alphabets/V.jpg', color:['#6A0572','#3d0040']},
    {letter:'W', word:'Watermelon', emoji:'🍉', image:'/static/images/alphabets/W.jpg', color:['#2D6A4F','#1a3d30']},
    {letter:'X', word:'Xylophone',  emoji:'🎵', image:'/static/images/alphabets/X.jpg', color:['#1B998B','#0d6e62']},
    {letter:'Y', word:'Yak',        emoji:'🐃', image:'/static/images/alphabets/Y.jpg', color:['#C77DFF','#7b00cc']},
    {letter:'Z', word:'Zebra',      emoji:'🦓', image:'/static/images/alphabets/Z.jpg', color:['#22223B','#0a0a1a']},
];

/* ── STATE ── */
let current   = 0;
let stars     = 0;
let soundOn   = true;
let autoPlay  = false;
let autoSpeed = 5000;
let autoTimer = null;
let learned   = new Set();

/* ── UPDATE SCREEN ── */
function updateScreen(animate = true) {
    const a = alphabets[current];

    document.getElementById('mainScreen').style.background =
        `linear-gradient(135deg, ${a.color[0]} 0%, ${a.color[1]} 100%)`;

    document.getElementById('letterShadow').textContent = a.letter;
    document.getElementById('bigLetter').textContent    = a.letter;
    document.getElementById('upperCase').textContent    = a.letter;
    document.getElementById('lowerCase').textContent    = a.letter.toLowerCase();

    const img = document.getElementById('mainImage');
    img.style.opacity = '0';
    img.src = a.image;
    img.alt = a.word;
    img.onload = () => { img.style.opacity = '1'; };

    document.getElementById('imageGlow').style.background =
        `linear-gradient(to bottom, transparent 50%, ${a.color[1]}99)`;

    document.getElementById('wordLabel').textContent    = a.word;
    document.getElementById('wordSubLabel').textContent = `${a.letter} is for ${a.word}!`;

    document.getElementById('prevBtn').disabled = current === 0;

    if (animate) {
        reAnimate('bigLetter',   'popIn 0.55s cubic-bezier(0.175,0.885,0.32,1.4)');
        reAnimate('wordLabel',   'slideUp 0.4s ease both');
        reAnimate('wordSubLabel','slideUp 0.4s ease 0.1s both');
    }

    updateDots();
    if (soundOn) setTimeout(speakLetter, 450);
}

function reAnimate(id, anim) {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = anim;
}

/* ── SPEAK ── */
function speakLetter() {
    if (!soundOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const a = alphabets[current];
    const msg = `${a.letter}! ... ${a.letter} ... for ... ${a.word}!`;
    const u = new SpeechSynthesisUtterance(msg);
    u.rate = 0.68; u.pitch = 1.4; u.volume = 1;
    const fab = document.getElementById('speakFab');
    fab.classList.add('speaking');
    u.onend = () => fab.classList.remove('speaking');
    window.speechSynthesis.speak(u);
}

function tapSpeak() {
    speakLetter();
}

/* ── TAP LETTER (ring + emoji burst) ── */
function tapLetter(e) {
    e.stopPropagation();
    // ring pulse
    const ring = document.getElementById('letterRing');
    ring.classList.remove('pulse');
    void ring.offsetWidth;
    ring.classList.add('pulse');
    // float emoji
    floatEmoji(alphabets[current].emoji, e.clientX, e.clientY);
    speakLetter();
}

/* ── TAP IMAGE ── */
function tapImage(e) {
    e.stopPropagation();
    floatEmoji(alphabets[current].emoji, e.clientX, e.clientY);
    speakLetter();
}

/* ── FLOAT EMOJI ── */
function floatEmoji(emoji, x, y) {
    const el = document.createElement('div');
    el.className = 'float-emoji';
    el.textContent = emoji;
    el.style.left  = `${x - 18}px`;
    el.style.top   = `${y - 18}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
}

/* ── DOTS ── */
function updateDots() {
    const row = document.getElementById('dotsRow');
    row.innerHTML = '';
    alphabets.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = `dot ${i === current ? 'current' : learned.has(i) ? 'done' : ''}`;
        row.appendChild(d);
    });
}

/* ── NAVIGATION ── */
function handleTap(e) { nextLetter(e); }

function nextLetter(e) {
    if (e) e.stopPropagation();
    learned.add(current);
    addStars(1);

    if (learned.size % 7 === 0 && current < 25) {
        showCelebration('🌟', 'Great Job!', `You learned ${learned.size} letters!\nKeep going! 🚀`);
        return;
    }
    if (current >= 25) {
        learned.add(25);
        showCelebration('🏆', 'You Did It!', 'WOW! You learned ALL 26 letters!\nYou are a SUPERSTAR! ⭐⭐⭐');
        return;
    }
    current++;
    updateScreen();
    if (autoPlay) resetAutoTimer();
}

function prevLetter(e) {
    if (e) e.stopPropagation();
    if (current > 0) { current--; updateScreen(); }
}

function addStars(n) {
    stars += n;
    const el = document.getElementById('starsDisplay');
    el.textContent = `⭐ ${stars}`;
    // quick pop animation
    el.style.transform = 'scale(1.35)';
    setTimeout(() => el.style.transform = '', 200);
}

/* ── AUTO PLAY ── */
function toggleAuto() {
    autoPlay = !autoPlay;
    document.getElementById('autoToggle').classList.toggle('on', autoPlay);
    document.getElementById('autoplayPill').classList.toggle('show', autoPlay);
    document.getElementById('tapHint').style.display = autoPlay ? 'none' : 'block';
    autoPlay ? resetAutoTimer() : clearInterval(autoTimer);
}

function resetAutoTimer() {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => {
        learned.add(current);
        if (current < 25) { current++; updateScreen(); }
        else { clearInterval(autoTimer); showCelebration('🏆','You Did It!','ALL 26 letters learned!'); }
    }, autoSpeed);
}

function setSpeed(s, btn) {
    autoSpeed = s * 1000;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (autoPlay) resetAutoTimer();
}

/* ── SOUND ── */
function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('soundToggle').classList.toggle('on', soundOn);
    document.getElementById('speakFab').style.opacity = soundOn ? '1' : '0.45';

    const pill = document.getElementById('soundFab');
    pill.textContent = soundOn ? '🔊 Sound' : '🔇 Muted';
    pill.classList.toggle('muted', !soundOn);

    if (!soundOn) window.speechSynthesis.cancel();
}

/* ── PARENT PANEL ── */
function openPanel(e) {
    if (e) e.stopPropagation();
    clearInterval(autoTimer);
    document.getElementById('panelProgress').textContent =
        `${learned.size} of 26 letters completed ✅`;
    buildJumpGrid();
    document.getElementById('parentOverlay').classList.add('show');
}

function closePanel() {
    document.getElementById('parentOverlay').classList.remove('show');
    if (autoPlay) resetAutoTimer();
}

function buildJumpGrid() {
    const grid = document.getElementById('jumpGrid');
    grid.innerHTML = '';
    alphabets.forEach((a, i) => {
        const btn = document.createElement('button');
        btn.className = `jump-btn ${i === current ? 'cur' : learned.has(i) ? 'done' : ''}`;
        btn.textContent = a.letter;
        btn.onclick = () => { current = i; updateScreen(); closePanel(); };
        grid.appendChild(btn);
    });
}

/* ── CELEBRATION ── */
function showCelebration(emoji, title, sub) {
    clearInterval(autoTimer);
    document.getElementById('celebEmoji').textContent = emoji;
    document.getElementById('celebTitle').textContent = title;
    document.getElementById('celebSub').textContent   = sub;
    document.getElementById('celebOverlay').classList.add('show');
    if (soundOn) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance('Amazing! Well done! You are a superstar!');
        u.pitch = 1.4; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }
    launchConfetti();
}

function closeCelebration() {
    document.getElementById('celebOverlay').classList.remove('show');
    if (current < 25) { current++; updateScreen(); }
    if (autoPlay) resetAutoTimer();
}

/* ── CONFETTI ── */
function launchConfetti() {
    const cols = ['#FF6B6B','#FFC300','#2ECC71','#3498DB','#9B59B6','#fff','#fbbf24','#f472b6','#FB923C'];
    for (let i = 0; i < 80; i++) {
        const c = document.createElement('div');
        const size = Math.random() * 16 + 7;
        c.style.cssText = `
            position:fixed; width:${size}px; height:${size}px;
            background:${cols[Math.floor(Math.random()*cols.length)]};
            border-radius:${Math.random()>0.5?'50%':'4px'};
            left:${Math.random()*100}vw; top:-24px; z-index:300;
            animation:confettiFall ${Math.random()*2.2+1.8}s ease ${Math.random()*0.8}s forwards;
            pointer-events:none;
        `;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
    }
}

/* ── INIT ── */
updateDots();
updateScreen(false);
setTimeout(speakLetter, 900);
</script>
</body>
</html>
