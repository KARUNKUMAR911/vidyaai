<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0f0a1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VidyaAI">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidyaAI - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f0a1e;
            --paper: #faf8f4;
            --gold: #c9a84c;
            --gold-light: #e8d49e;
            --muted: #7a7068;
            --accent: #3d2b8e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--ink);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Left panel — decorative */
        .panel-left {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 60px 50px;
            background: var(--ink);
            overflow: hidden;
        }

        .panel-left::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 60% at 30% 30%, rgba(61,43,142,0.35) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 70%, rgba(201,168,76,0.12) 0%, transparent 60%);
        }

        /* Grid lines */
        .panel-left::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(201,168,76,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.07) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 30% 40%, black 0%, transparent 70%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 8s ease-in-out infinite;
        }
        .orb-1 {
            width: 320px; height: 320px;
            background: radial-gradient(circle, #3d2b8e 0%, transparent 70%);
            top: 5%; left: -80px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 200px; height: 200px;
            background: radial-gradient(circle, #c9a84c 0%, transparent 70%);
            top: 40%; right: 0;
            animation-delay: -3s;
        }
        .orb-3 {
            width: 150px; height: 150px;
            background: radial-gradient(circle, #6b47dc 0%, transparent 70%);
            bottom: 20%; left: 30%;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .left-content {
            position: relative;
            z-index: 2;
        }

        .brand-mark {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: var(--paper);
            line-height: 1;
            letter-spacing: -2px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
        }

        .brand-mark span {
            color: var(--gold);
            font-style: italic;
            font-weight: 400;
        }

        .brand-tagline {
            margin-top: 20px;
            font-size: 15px;
            color: var(--muted);
            font-weight: 300;
            letter-spacing: 0.5px;
            max-width: 320px;
            line-height: 1.7;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
        }

        .divider-line {
            margin-top: 30px;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), transparent);
            opacity: 0;
            animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
        }

        .stats {
            margin-top: 30px;
            display: flex;
            gap: 36px;
            opacity: 0;
            animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.6s forwards;
        }

        .stat-num {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--paper);
            font-weight: 700;
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 2px;
        }

        /* Right panel — form */
        .panel-right {
            width: 460px;
            flex-shrink: 0;
            background: var(--paper);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 48px;
            position: relative;
            overflow: hidden;
        }

        .panel-right::before {
            content: '';
            position: absolute;
            top: -100px; right: -100px;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
        }

        .form-header {
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
        }

        .form-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .form-header p {
            margin-top: 8px;
            font-size: 14px;
            color: var(--muted);
            font-weight: 300;
        }

        .error-box {
            background: #fff0f0;
            border-left: 3px solid #dc2626;
            color: #9b1c1c;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 22px;
            opacity: 0;
            animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
        }
        .form-group:nth-child(1) { animation-delay: 0.45s; }
        .form-group:nth-child(2) { animation-delay: 0.55s; }

        .form-group label {
            display: block;
            font-size: 11px;
            color: var(--muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            padding: 14px 16px;
            background: white;
            border: 1.5px solid #e5e0d8;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .input-wrap input::placeholder { color: #bbb4aa; }

        .input-wrap input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(201,168,76,0.1);
        }

        .input-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #c9c0b5;
            pointer-events: none;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            background: var(--ink);
            color: var(--paper);
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            opacity: 0;
            animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.65s forwards;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #3d2b8e, var(--ink));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(15,10,30,0.25); }
        .btn-login:hover::before { opacity: 1; }
        .btn-login:active { transform: translateY(0); }

        .btn-login span { position: relative; z-index: 1; }

        .gold-bar {
            width: 40px; height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            border-radius: 2px;
            margin: 28px auto;
            opacity: 0;
            animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.75s forwards;
        }

        .signup-link {
            text-align: center;
            font-size: 13px;
            color: var(--muted);
            font-weight: 300;
            opacity: 0;
            animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.8s forwards;
        }

        .signup-link a {
            color: var(--ink);
            font-weight: 500;
            text-decoration: none;
            border-bottom: 1.5px solid var(--gold);
            padding-bottom: 1px;
            transition: color 0.2s;
        }

        .signup-link a:hover { color: var(--accent); }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 820px) {
            .panel-left { display: none; }
            .panel-right { width: 100%; padding: 50px 32px; justify-content: center; }
            body { background: var(--paper); }
        }
    
/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.header h1{font-size:clamp(22px,3.5vw,52px);}
.header p{font-size:clamp(13px,1.6vw,22px);}
.header{padding:clamp(18px,3vw,48px) clamp(20px,5vw,80px) clamp(44px,6vw,80px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.form-group label{font-size:clamp(13px,1.5vw,20px);}
.form-group input{padding:clamp(10px,1.3vw,18px);font-size:clamp(14px,1.5vw,20px);border-radius:clamp(10px,1.3vw,18px);}
</style>
</head>
<body>

    <!-- Left decorative panel -->
    <div class="panel-left">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <div class="left-content">
            <div class="brand-mark">Vidya<span>AI</span></div>
            <p class="brand-tagline">An intelligent study partner crafted for the curious mind — learn deeper, faster, further.</p>
            <div class="divider-line"></div>
            <div class="stats">
                <div>
                    <div class="stat-num">50K+</div>
                    <div class="stat-label">Students</div>
                </div>
                <div>
                    <div class="stat-num">120+</div>
                    <div class="stat-label">Subjects</div>
                </div>
                <div>
                    <div class="stat-num">98%</div>
                    <div class="stat-label">Satisfaction</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Right form panel -->
    <div class="panel-right">
        <div class="form-header">
            <h2>Welcome back.</h2>
            <p>Sign in to continue your learning journey</p>
        </div>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrap">
                    <input type="email" name="email" placeholder="your@email.com" required>
                    <svg class="input-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                    </svg>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" name="password" placeholder="••••••••" required>
                    <svg class="input-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                    </svg>
                </div>
            </div>

            <button type="submit" class="btn-login"><span>Sign In →</span></button>
        </form>

        <div class="gold-bar"></div>

        <div class="signup-link">
            New to VidyaAI? <a href="/signup">Create your account</a>
        </div>
    </div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/service-worker.js')
        .then(() => console.log('VidyaAI PWA Ready!'))
        .catch(err => console.log('SW Error:', err));
}
</script>
</body>
</html>
