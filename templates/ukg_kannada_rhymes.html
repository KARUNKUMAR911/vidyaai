<title>ಕನ್ನಡ ಪದ್ಯಗಳು - UKG ಕನ್ನಡ</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --radius: 28px; --top-h: 70px; }

body {
  font-family: 'Baloo Tamma 2', cursive;
  background: #f0f4ff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--top-h);
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 300;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
.topbar-title {
  font-size: 1.55rem; font-weight: 900;
  background: linear-gradient(90deg, #FDCB6E, #E17055, #FF6FD8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.top-right { display: flex; align-items: center; gap: 10px; }
.score-pill {
  background: #FDCB6E; color: #1a1a2e;
  font-weight: 900; font-size: 1rem;
  padding: 7px 18px; border-radius: 50px;
  box-shadow: 0 4px 14px rgba(253,203,110,0.45);
  white-space: nowrap;
}
.sound-btn {
  background: rgba(255,255,255,0.13);
  border: 2px solid rgba(255,255,255,0.22);
  color: white; border-radius: 12px;
  padding: 8px 14px; font-size: 1.2rem;
  cursor: pointer; font-family: inherit;
  transition: background 0.2s;
}
.sound-btn:hover { background: rgba(255,255,255,0.22); }
.sound-btn.off { opacity: 0.4; }

/* ── TAB NAV ── */
.tab-nav {
  display: flex;
  background: #1a1a2e;
  padding: 0 12px 14px;
  gap: 8px;
  overflow-x: auto; scrollbar-width: none;
  position: sticky; top: var(--top-h); z-index: 200;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 10px 18px; border-radius: 18px; border: none;
  cursor: pointer; font-family: 'Baloo Tamma 2', cursive;
  font-weight: 800; color: rgba(255,255,255,0.45);
  background: rgba(255,255,255,0.07);
  transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; position: relative;
}
.tab-btn .t-icon { font-size: 1.6rem; line-height: 1; }
.tab-btn .t-kn   { font-size: 0.88rem; }
.tab-btn .t-en   { font-size: 0.63rem; opacity: 0.55; font-weight: 600; }
.tab-btn.active  { color: #1a1a2e; transform: translateY(-3px) scale(1.06); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
.tab-btn[data-t="patriotic"].active { background: linear-gradient(135deg,#FF9933,#138808); color:white; }
.tab-btn[data-t="nature"].active    { background: linear-gradient(135deg,#43e97b,#38f9d7); }
.tab-btn[data-t="children"].active  { background: linear-gradient(135deg,#fa709a,#fee140); }
.tab-count {
  position: absolute; top: 5px; right: 7px;
  background: rgba(255,255,255,0.22); border-radius: 50px;
  padding: 1px 6px; font-size: 0.62rem; font-weight: 900;
}
.tab-btn.active .tab-count { background: rgba(0,0,0,0.12); }

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── PANEL HERO ── */
.panel-hero {
  padding: 28px 24px 16px; text-align: center; position: relative; overflow: hidden;
}
.panel-hero h2 { font-size: 2.5rem; font-weight: 900; line-height: 1.1; margin-bottom: 5px; }
.panel-hero p  { font-size: 1rem; font-weight: 700; opacity: 0.6; margin-bottom: 13px; }
.tap-hint {
  display: inline-flex; align-items: center; gap: 7px;
  border: 2.5px dashed currentColor; border-radius: 50px;
  padding: 7px 20px; font-size: 0.95rem; font-weight: 800; opacity: 0.7;
  animation: wag 2s ease-in-out infinite;
}
@keyframes wag { 0%,100%{transform:rotate(-1.5deg);} 50%{transform:rotate(1.5deg);} }
.hf {
  position: absolute; font-size: 3.5rem;
  animation: fy 4s ease-in-out infinite; pointer-events: none; opacity: 0.15;
}
@keyframes fy { 0%,100%{transform:translateY(0) rotate(-8deg);} 50%{transform:translateY(-18px) rotate(8deg);} }

/* ── RHYME CARDS LIST ── */
.rhymes-list {
  display: flex; flex-direction: column; gap: 24px;
  padding: 14px 26px 60px; max-width: 900px; margin: 0 auto;
}

/* ── RHYME CARD ── */
.rhyme-card {
  border-radius: var(--radius); background: white;
  box-shadow: 0 6px 28px rgba(0,0,0,0.09);
  overflow: hidden; border: 3.5px solid transparent;
  animation: slideUp 0.5s cubic-bezier(.34,1.56,.64,1) both;
  -webkit-tap-highlight-color: transparent;
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(40px) scale(0.95); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.rhyme-card:nth-child(1){ animation-delay:0.05s }
.rhyme-card:nth-child(2){ animation-delay:0.12s }
.rhyme-card:nth-child(3){ animation-delay:0.19s }

/* ── RHYME HEADER ── */
.rhyme-header {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 22px 18px; position: relative; cursor: pointer;
}
.rhyme-emoji-wrap {
  width: 68px; height: 68px; border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.6rem; flex-shrink: 0;
  background: rgba(255,255,255,0.2);
  box-shadow: 0 4px 14px rgba(0,0,0,0.18);
}
.rhyme-meta { flex: 1; min-width: 0; }
.rhyme-title { font-size: 1.25rem; font-weight: 900; color: white; line-height: 1.2; }
.rhyme-subtitle { font-size: 0.78rem; color: rgba(255,255,255,0.6); margin-top: 2px; font-style: italic; }
.rhyme-badge {
  display: inline-flex; align-items: center; gap: 4px; margin-top: 6px;
  background: rgba(255,255,255,0.18); border-radius: 50px;
  padding: 3px 10px; font-size: 0.72rem; font-weight: 800; color: rgba(255,255,255,0.9);
}

/* play button */
.play-btn {
  width: 54px; height: 54px; border-radius: 50%; border: none;
  font-size: 1.5rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.22);
  box-shadow: 0 4px 14px rgba(0,0,0,0.2);
  color: white; transition: all 0.2s; backdrop-filter: blur(4px);
}
.play-btn:hover { background: rgba(255,255,255,0.38); transform: scale(1.1); }
.play-btn.playing-btn {
  background: rgba(255,255,255,0.9); color: #1a1a2e;
  animation: pulse-play 0.8s ease-in-out infinite;
}
@keyframes pulse-play { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }

/* ── PROGRESS BAR ── */
.progress-bar-wrap {
  padding: 0 22px 14px; background: inherit;
}
.progress-bar-bg {
  height: 6px; border-radius: 6px; background: rgba(255,255,255,0.18); overflow: hidden;
}
.progress-bar-fill {
  height: 100%; border-radius: 6px; background: rgba(255,255,255,0.8);
  width: 0%; transition: width 0.4s ease;
}

/* ── LYRICS AREA ── */
.lyrics-wrap {
  border-top: 2px solid rgba(0,0,0,0.06);
  padding: 18px 22px 22px;
  background: #fafbff;
}
.lyrics-title {
  font-size: 0.75rem; font-weight: 900; color: #94a3b8;
  letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px;
}
.lyric-line {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 14px; cursor: pointer;
  transition: all 0.2s; margin-bottom: 4px;
  border: 2px solid transparent;
}
.lyric-line:hover { background: #f0f4ff; border-color: #e2e8f0; }
.lyric-line.active-line {
  background: linear-gradient(135deg, #fef9e7, #fdf3d0);
  border-color: #FDCB6E;
}
.lyric-num {
  font-size: 0.7rem; font-weight: 900; color: #cbd5e1;
  min-width: 20px; text-align: right; flex-shrink: 0;
}
.lyric-line.active-line .lyric-num { color: #f39c12; }
.lyric-text {
  font-size: 1.05rem; font-weight: 700; color: #475569; line-height: 1.4; flex: 1;
}
.lyric-line.active-line .lyric-text { color: #1a1a2e; font-weight: 900; }
.lyric-speak-icon {
  font-size: 0.9rem; opacity: 0; transition: opacity 0.2s; flex-shrink: 0;
}
.lyric-line:hover .lyric-speak-icon { opacity: 1; }
.lyric-line.active-line .lyric-speak-icon { opacity: 1; }

/* ── LEARNED BADGE ── */
.learned-badge {
  display: none; align-items: center; gap: 6px;
  padding: 12px 22px; background: #f0fdf4;
  border-top: 2px solid #86efac;
  font-size: 0.9rem; font-weight: 800; color: #15803d;
}
.rhyme-card.learned .learned-badge { display: flex; }

/* ── CONFETTI ── */
.cf { position:fixed; border-radius:3px; top:-20px; pointer-events:none; z-index:9999; animation:cff 1.4s ease-in forwards; }
@keyframes cff { to { transform:translateY(110vh) rotate(600deg); opacity:0; } }

/* ── RESPONSIVE ── */
@media (max-width:580px) {
  .rhymes-list { padding: 10px 12px 44px; gap: 16px; }
  .rhyme-title { font-size: 1.05rem; }
  .rhyme-emoji-wrap { width: 56px; height: 56px; font-size: 2rem; }
  .lyric-text { font-size: 0.95rem; }
  .panel-hero h2 { font-size: 2rem; }
  .play-btn { width: 46px; height: 46px; font-size: 1.2rem; }
}


/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.topbar-title{font-size:clamp(15px,2vw,28px);}
.hero h1{font-size:clamp(22px,3.5vw,52px);}
.hero h2{font-size:clamp(22px,3.5vw,52px);}
.hero p{font-size:clamp(13px,1.6vw,22px);}
.hero{padding:clamp(18px,3vw,48px) clamp(20px,5vw,80px) clamp(44px,6vw,80px);}
.header h1{font-size:clamp(22px,3.5vw,52px);}
.header p{font-size:clamp(13px,1.6vw,22px);}
.header{padding:clamp(18px,3vw,48px) clamp(20px,5vw,80px) clamp(44px,6vw,80px);}
.progress-bar-wrap{height:clamp(6px,1vw,12px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.rhyme-card{padding:clamp(14px,2vw,32px);border-radius:clamp(16px,2vw,28px);}
.rhyme-title{font-size:clamp(17px,2.2vw,32px);}
.card{border-radius:clamp(16px,2vw,28px);}
</style>

/* ── helpers ── */
function toggleSound() {
  soundOn = !soundOn;
  const b = document.getElementById('soundBtn');
  b.textContent = soundOn ? '🔊' : '🔇';
  b.classList.toggle('off', !soundOn);
  if (!soundOn && window.speechSynthesis) { window.speechSynthesis.cancel(); stopAllPlaying(); }
}

function getKnVoice() {
  return window.speechSynthesis.getVoices().find(v => v.lang==='kn-IN' || v.lang.startsWith('kn')) || null;
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

function updateScore() {
  const tot = Object.values(learnedByTab).reduce((s,st)=>s+st.size,0);
  document.getElementById('scorePill').textContent = `🎵 ${tot} / ${TOTAL}`;
}

function updateCnt(tid) {
  document.getElementById('cnt-'+tid).textContent = `${learnedByTab[tid].size}/${DATA[tid].length}`;
}

const CC = ['#FFD93D','#FF6B35','#06D6A0','#FF6B9D','#9B5DE5','#118AB2','#43e97b'];
function confetti(x,y) {
  for(let i=0;i<22;i++){
    const el=document.createElement('div');
    el.className='cf';
    el.style.cssText=`left:${x+(Math.random()-.5)*200}px;background:${CC[i%CC.length]};animation-duration:${.9+Math.random()*.9}s;animation-delay:${Math.random()*.25}s;width:${6+Math.random()*10}px;height:${8+Math.random()*14}px;transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2400);
  }
}

/* ── playback ── */
function stopAllPlaying() {
  if (currentPlayBtn) {
    currentPlayBtn.textContent = '▶';
    currentPlayBtn.classList.remove('playing-btn');
    currentPlayBtn = null;
  }
  currentLineEls.forEach(el => el.classList.remove('active-line'));
  currentLineEls = [];
  if (lineTimer) { clearTimeout(lineTimer); lineTimer = null; }
}

function speakLine(text, lineEl, allLineEls) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const kn = getKnVoice();
  if (!kn) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang='kn-IN'; u.rate=0.78; u.pitch=1.15; u.voice=kn;
  allLineEls.forEach(el => el.classList.remove('active-line'));
  lineEl.classList.add('active-line');
  window.speechSynthesis.speak(u);
}

function speakFullRhyme(lines, btn, lineEls, progressFill, cardEl, tid, rhymeTitle) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const kn = getKnVoice();
  if (!kn) return;

  stopAllPlaying();
  btn.textContent = '⏹'; btn.classList.add('playing-btn');
  currentPlayBtn = btn; currentLineEls = lineEls;

  let i = 0;
  function speakNext() {
    if (i >= lines.length) {
      stopAllPlaying();
      if (progressFill) progressFill.style.width = '100%';
      // mark as learned
      if (!learnedByTab[tid].has(rhymeTitle)) {
        learnedByTab[tid].add(rhymeTitle);
        updateScore(); updateCnt(tid);
        cardEl.classList.add('learned');
        const r = cardEl.getBoundingClientRect();
        confetti(r.left + r.width/2, r.top + 60);
      }
      return;
    }
    lineEls.forEach(el => el.classList.remove('active-line'));
    lineEls[i].classList.add('active-line');
    lineEls[i].scrollIntoView({ behavior:'smooth', block:'nearest' });
    if (progressFill) progressFill.style.width = `${((i+1)/lines.length)*100}%`;
    const u = new SpeechSynthesisUtterance(lines[i]);
    u.lang='kn-IN'; u.rate=0.78; u.pitch=1.15; u.voice=kn;
    u.onend = () => { i++; lineTimer = setTimeout(speakNext, 280); };
    window.speechSynthesis.speak(u);
  }
  speakNext();
}

/* ── build cards ── */
function buildList(tid) {
  const listEl = document.getElementById('list-'+tid);
  DATA[tid].forEach((r, ri) => {
    const card = document.createElement('div');
    card.className = 'rhyme-card';
    card.style.borderColor = r.border;
    card.style.animationDelay = (ri * 0.1) + 's';

    const linesHTML = r.lines.map((l, li) => `
      <div class="lyric-line" id="ll-${tid}-${ri}-${li}">
        <span class="lyric-num">${li+1}</span>
        <span class="lyric-text">${l}</span>
        <span class="lyric-speak-icon">🔊</span>
      </div>`).join('');

    card.innerHTML = `
      <div class="rhyme-header" style="background:${r.bg};">
        <div class="rhyme-emoji-wrap">${r.emoji}</div>
        <div class="rhyme-meta">
          <div class="rhyme-title">${r.title}</div>
          <div class="rhyme-subtitle">${r.subtitle}</div>
          <div class="rhyme-badge">📝 ${r.lines.length} ಸಾಲುಗಳು</div>
        </div>
        <button class="play-btn" id="pb-${tid}-${ri}">▶</button>
      </div>
      <div class="progress-bar-wrap" style="background:${r.bg};">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="pf-${tid}-${ri}"></div>
        </div>
      </div>
      <div class="lyrics-wrap">
        <div class="lyrics-title">📖 ಸಾಲುಗಳು — ಒತ್ತಿ ಪ್ರತ್ಯೇಕವಾಗಿ ಕೇಳಿ</div>
        ${linesHTML}
      </div>
      <div class="learned-badge">🎉 ಭೇಷ್! ಈ ಪದ್ಯ ಕಲಿತಿರಾ! ✅</div>
    `;

    listEl.appendChild(card);

    const btn = document.getElementById(`pb-${tid}-${ri}`);
    const progressFill = document.getElementById(`pf-${tid}-${ri}`);
    const lineEls = r.lines.map((_, li) => document.getElementById(`ll-${tid}-${ri}-${li}`));

    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (btn.classList.contains('playing-btn')) {
        window.speechSynthesis.cancel(); stopAllPlaying();
        progressFill.style.width = '0%';
        return;
      }
      speakFullRhyme(r.lines, btn, lineEls, progressFill, card, tid, r.title);
    });

    lineEls.forEach((el, li) => {
      el.addEventListener('click', () => speakLine(r.lines[li], el, lineEls));
    });
  });

  updateCnt(tid);
}

Object.keys(DATA).forEach(tid => buildList(tid));

if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
