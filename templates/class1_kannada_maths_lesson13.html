<!DOCTYPE html>
<html lang="kn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ಗಣಿತ ತರಗತಿ 1 — ಪಾಠ 13: ಮಾನಸಿಕ ಲೆಕ್ಕಾಚಾರ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans Kannada", "Segoe UI", sans-serif;
      background: #fff8f0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #1f2937;
      padding: 20px;
    }
    .card {
      width: min(560px, 100%);
      background: white;
      border-radius: 22px;
      padding: 22px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
      border: 1px solid #f3f4f6;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ede9fe;
      color: #5b21b6;
      font-weight: 900;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 22px;
      font-weight: 1000;
      margin-bottom: 8px;
      line-height: 1.25;
    }
    p {
      font-size: 14px;
      color: #6b7280;
      font-weight: 700;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    a {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 16px;
      font-weight: 900;
      font-size: 13px;
    }
    .primary { background: #7c3aed; color: white; }
    .ghost { background: #f3f4f6; color: #111827; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🧠 ಪಾಠ 13</div>
    <h1>ಮಾನಸಿಕ ಲೆಕ್ಕಾಚಾರ (Lesson 13)</h1>
    <p>
      ಈ ಪಾಠದ ಫೈಲ್ ಇನ್ನೂ ಸೇರಿಸಲಾಗಿಲ್ಲ. ದಯವಿಟ್ಟು <b>Lesson 13</b> HTML ಫೈಲ್ ನೀಡಿ ಅಥವಾ
      ನೀವು ಬಯಸಿದರೆ ನಾನು ಇದನ್ನು ಇಂಗ್ಲಿಷ್ ಮಾಧ್ಯಮದ ಪಾಠಕ್ಕೆ ಸಂಪರ್ಕ ಮಾಡುತ್ತೇನೆ.
    </p>
    <div class="row">
      <a class="primary" href="/class/1/kannada/maths">← ಹಿಂದಕ್ಕೆ (ಅಧ್ಯಾಯಗಳು)</a>
      <a class="ghost" href="/class/1/kannada">🏠 ಡ್ಯಾಶ್ಬೋರ್ಡ್</a>
    </div>
  </div>

</html>
