<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಪ್ರಾಣಿಗಳು - LKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0d1f14;
    --topbar: #112018;
    --text-light: #f0f0ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text-light);
    background-image:
      radial-gradient(circle at 15% 25%, rgba(107,203,119,0.12) 0%, transparent 50%),
      radial-gradient(circle at 85% 70%, rgba(253,203,110,0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 90%, rgba(0,206,201,0.07) 0%, transparent 40%);
  }

  /* TOPBAR */
  .topbar {
    background: var(--topbar);
    border-bottom: 2px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .topbar-left { display: flex; align-items: center; gap: 12px; }

  .back-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 10px;
    color: white;
    padding: 8px 14px;
    font-size: 18px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }

  .topbar-title {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(90deg, #6bcb77, #fdcb6e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sound-btn {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: white;
    padding: 8px 16px;
    font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.5; }

  /* HERO */
  .hero {
    text-align: center;
    padding: 32px 20px 16px;
  }
  .hero-emoji {
    font-size: 3.2rem;
    display: inline-block;
    animation: wobble 2.5s ease-in-out infinite;
  }
  @keyframes wobble {
    0%,100% { transform: rotate(-8deg); }
    50%      { transform: rotate(8deg) scale(1.1); }
  }
  .hero h1 {
    font-size: 2.4rem;
    font-weight: 800;
    margin-top: 8px;
    background: linear-gradient(135deg, #6bcb77, #fdcb6e, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
  }

  /* TTS NOTICE */
  .tts-notice {
    background: rgba(255,209,61,0.1);
    border: 1px solid rgba(255,209,61,0.28);
    border-radius: 14px;
    padding: 10px 16px;
    font-size: 0.8rem;
    color: rgba(255,209,61,0.85);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    max-width: 1100px;
    margin: 0 auto 16px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 18px;
    padding: 8px 24px 52px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    border-radius: 22px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    transition: transform 0.18s, box-shadow 0.18s;
    animation: popIn 0.45s both;
    position: relative;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.65); }
    to   { opacity: 1; transform: scale(1); }
  }

  .card:nth-child(1)  { animation-delay: 0.02s; }
  .card:nth-child(2)  { animation-delay: 0.04s; }
  .card:nth-child(3)  { animation-delay: 0.06s; }
  .card:nth-child(4)  { animation-delay: 0.08s; }
  .card:nth-child(5)  { animation-delay: 0.10s; }
  .card:nth-child(6)  { animation-delay: 0.12s; }
  .card:nth-child(7)  { animation-delay: 0.14s; }
  .card:nth-child(8)  { animation-delay: 0.16s; }
  .card:nth-child(9)  { animation-delay: 0.18s; }
  .card:nth-child(10) { animation-delay: 0.20s; }
  .card:nth-child(11) { animation-delay: 0.22s; }
  .card:nth-child(12) { animation-delay: 0.24s; }
  .card:nth-child(13) { animation-delay: 0.26s; }
  .card:nth-child(14) { animation-delay: 0.28s; }
  .card:nth-child(15) { animation-delay: 0.30s; }
  .card:nth-child(16) { animation-delay: 0.32s; }
  .card:nth-child(17) { animation-delay: 0.34s; }
  .card:nth-child(18) { animation-delay: 0.36s; }
  .card:nth-child(19) { animation-delay: 0.38s; }
  .card:nth-child(20) { animation-delay: 0.40s; }

  .card:hover {
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 20px 48px rgba(0,0,0,0.55);
  }
  .card:active { transform: scale(0.94); }

  .card.playing {
    animation: pulse 0.5s ease !important;
  }
  @keyframes pulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.13); }
    100% { transform: scale(1); }
  }

  /* Emoji area */
  .animal-face {
    height: 108px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.6rem;
    position: relative;
  }

  /* jungle leaf deco */
  .animal-face::before {
    content: '🌿';
    position: absolute;
    top: 6px; left: 8px;
    font-size: 1rem;
    opacity: 0.5;
  }
  .animal-face::after {
    content: '🌿';
    position: absolute;
    bottom: 6px; right: 8px;
    font-size: 1rem;
    opacity: 0.5;
    transform: scaleX(-1);
  }

  .card-info {
    padding: 12px 10px 16px;
    text-align: center;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
  }

  .card-kn {
    font-size: 1.1rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
  }
  .card-en {
    font-size: 0.75rem;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
    font-style: italic;
  }
  .card-sound {
    font-size: 0.72rem;
    margin-top: 5px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.3px;
  }

  .footer {
    text-align: center;
    padding: 14px;
    color: rgba(255,255,255,0.18);
    font-size: 0.78rem;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 8px 14px 40px; }
    .animal-face { height: 82px; font-size: 2.8rem; }
    .card-kn { font-size: 0.92rem; }
    .hero h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="/class/lkg/kannada" class="back-btn">←</a>
    <span class="topbar-title">ಪ್ರಾಣಿಗಳು</span>
  </div>
  <div class="topbar-right">
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
      <span id="soundIcon">🔊</span>
      <span id="soundLabel">ಧ್ವನಿ ಆನ್</span>
    </button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-emoji">🐾</div>
  <h1>ಪ್ರಾಣಿಗಳು</h1>
  <p>ಕಾಡು ಮತ್ತು ಸಾಕು ಪ್ರಾಣಿಗಳು • ಕಾರ್ಡ್ ಒತ್ತಿ ಕೇಳಿ!</p>
</div>

<!-- TTS NOTICE -->
<div class="tts-notice">
  <span>📱</span>
  <span>ಧ್ವನಿ ಕೇಳಲು Android TTS ನಲ್ಲಿ Kannada ಭಾಷೆ ಸ್ಥಾಪಿಸಿ.</span>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<div class="footer">VidyaAI • LKG ಕನ್ನಡ</div>

<script>
const animals = [
  { kn: 'ಆನೆ',      en: 'Elephant',  emoji: '🐘', sound: 'ಘೀಳು',   bg: 'linear-gradient(145deg,#4a5568,#2d3748)' },
  { kn: 'ಸಿಂಹ',     en: 'Lion',      emoji: '🦁', sound: 'ಘರ್ಜನೆ', bg: 'linear-gradient(145deg,#c8962a,#a07020)' },
  { kn: 'ಹುಲಿ',     en: 'Tiger',     emoji: '🐯', sound: 'ಘರ್ಜನೆ', bg: 'linear-gradient(145deg,#d4692a,#b05020)' },
  { kn: 'ಕೋತಿ',     en: 'Monkey',    emoji: '🐒', sound: 'ಚೀರಾಟ',  bg: 'linear-gradient(145deg,#8b6914,#6b4f10)' },
  { kn: 'ಜಿರಾಫೆ',   en: 'Giraffe',   emoji: '🦒', sound: 'ಶಬ್ದ',   bg: 'linear-gradient(145deg,#c8a020,#a07818)' },
  { kn: 'ಕರಡಿ',     en: 'Bear',      emoji: '🐻', sound: 'ಗರ್ಜನೆ', bg: 'linear-gradient(145deg,#6b4226,#4a2e1a)' },
  { kn: 'ಆಡು',      en: 'Goat',      emoji: '🐐', sound: 'ಮೇ ಮೇ',  bg: 'linear-gradient(145deg,#7a9e6a,#5a7e4a)' },
  { kn: 'ಹಸು',      en: 'Cow',       emoji: '🐄', sound: 'ಅಂಬಾ',   bg: 'linear-gradient(145deg,#5a8a6a,#3a6a4a)' },
  { kn: 'ನಾಯಿ',     en: 'Dog',       emoji: '🐕', sound: 'ಬೊಗಳು',  bg: 'linear-gradient(145deg,#8b7355,#6b5335)' },
  { kn: 'ಬೆಕ್ಕು',   en: 'Cat',       emoji: '🐈', sound: 'ಮ್ಯಾಂವ್', bg: 'linear-gradient(145deg,#9e7a9e,#7e5a7e)' },
  { kn: 'ಕುದುರೆ',   en: 'Horse',     emoji: '🐴', sound: 'ಕೆನೆತ',  bg: 'linear-gradient(145deg,#7a6a5a,#5a4a3a)' },
  { kn: 'ಕೋಳಿ',     en: 'Hen',       emoji: '🐔', sound: 'ಕ್ಕ್ ಕ್ಕ್', bg: 'linear-gradient(145deg,#c8762a,#a05620)' },
  { kn: 'ಮೀನು',     en: 'Fish',      emoji: '🐟', sound: 'ಶಬ್ದವಿಲ್ಲ', bg: 'linear-gradient(145deg,#2a7ec8,#1a5ea0)' },
  { kn: 'ಮೊಲ',      en: 'Rabbit',    emoji: '🐇', sound: 'ಶಬ್ದ',   bg: 'linear-gradient(145deg,#c8b4a0,#a09480)' },
  { kn: 'ನವಿಲು',    en: 'Peacock',   emoji: '🦚', sound: 'ಕೂಗು',   bg: 'linear-gradient(145deg,#1a8a6a,#0a6a4a)' },
  { kn: 'ಆಮೆ',      en: 'Tortoise',  emoji: '🐢', sound: 'ಶಬ್ದ',   bg: 'linear-gradient(145deg,#4a7a3a,#2a5a1a)' },
  { kn: 'ಕಪ್ಪೆ',    en: 'Frog',      emoji: '🐸', sound: 'ವಟ ವಟ',  bg: 'linear-gradient(145deg,#3a9a3a,#1a7a1a)' },
  { kn: 'ಹಾವು',     en: 'Snake',     emoji: '🐍', sound: 'ಉಸ್ಸ್',  bg: 'linear-gradient(145deg,#5a7a2a,#3a5a0a)' },
  { kn: 'ಆಕಳು',     en: 'Ox',        emoji: '🐂', sound: 'ಅಂಬಾ',   bg: 'linear-gradient(145deg,#4a6a5a,#2a4a3a)' },
  { kn: 'ಕತ್ತೆ',    en: 'Donkey',    emoji: '🫏', sound: 'ಕೂಗು',   bg: 'linear-gradient(145deg,#8a7a6a,#6a5a4a)' },
];

let soundOn = true;

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? 'ಧ್ವನಿ ಆನ್' : 'ಧ್ವನಿ ಆಫ್';
  document.getElementById('soundToggle').classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN';
  u.rate = 0.85;
  u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const knVoice = voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn'));
  if (!knVoice) return;
  u.voice = knVoice;
  window.speechSynthesis.speak(u);
}

function buildGrid() {
  const grid = document.getElementById('grid');
  animals.forEach(a => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="animal-face" style="background:${a.bg};">${a.emoji}</div>
      <div class="card-info">
        <div class="card-kn">${a.kn}</div>
        <div class="card-en">${a.en}</div>
        <div class="card-sound">${a.sound}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      card.classList.remove('playing');
      void card.offsetWidth;
      card.classList.add('playing');
      speak(a.kn);
      setTimeout(() => card.classList.remove('playing'), 500);
    });
    grid.appendChild(card);
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}

buildGrid();
</script>
</body>
</html>
