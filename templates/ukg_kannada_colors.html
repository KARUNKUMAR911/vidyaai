<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಬಣ್ಣಗಳು - UKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&display=swap');

  :root { --bg: #1a1a2e; --topbar: #16213e; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg); min-height: 100vh; color: #f0f0ff;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(255,107,107,0.1) 0%, transparent 50%),
      radial-gradient(circle at 85% 75%, rgba(77,150,255,0.1) 0%, transparent 50%);
  }

  /* TOPBAR */
  .topbar {
    background: var(--topbar); border-bottom: 2px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 64px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    background: rgba(255,255,255,0.1); border: none; border-radius: 10px;
    color: white; padding: 8px 14px; font-size: 18px; cursor: pointer;
    text-decoration: none; transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .topbar-title {
    font-size: 1.3rem; font-weight: 800;
    background: linear-gradient(90deg, #ff6b6b, #ffd93d);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sound-btn {
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: white; padding: 8px 16px; font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.5; }

  /* HERO */
  .hero { text-align: center; padding: 28px 20px 12px; }
  .hero-emoji { font-size: 3rem; display: inline-block; animation: spin 3s ease-in-out infinite; }
  @keyframes spin {
    0%,100% { transform: rotate(-10deg) scale(1); }
    50%      { transform: rotate(10deg) scale(1.1); }
  }
  .hero h1 {
    font-size: 2.2rem; font-weight: 800; margin-top: 8px;
    background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero p { font-size: 0.92rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

  /* TABS */
  .tabs {
    display: flex; gap: 10px; justify-content: center;
    padding: 12px 20px 4px; max-width: 1000px; margin: 0 auto;
  }
  .tab {
    flex: 1; max-width: 220px; padding: 10px 0;
    border-radius: 14px; font-family: 'Baloo Tamma 2', cursive;
    font-size: 0.9rem; font-weight: 700; cursor: pointer;
    border: none; transition: all 0.2s; text-align: center;
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5);
  }
  .tab.active-primary {
    background: linear-gradient(135deg, #ff6b6b, #e17055);
    color: white; box-shadow: 0 4px 18px rgba(255,107,107,0.4);
  }
  .tab.active-mixed {
    background: linear-gradient(135deg, #a29bfe, #6c5ce7);
    color: white; box-shadow: 0 4px 18px rgba(162,155,254,0.4);
  }
  .tab:hover:not(.active-primary):not(.active-mixed) {
    background: rgba(255,255,255,0.13); color: white;
  }

  /* TTS NOTICE */
  .tts-notice {
    background: rgba(255,209,61,0.1); border: 1px solid rgba(255,209,61,0.28);
    border-radius: 14px; padding: 10px 16px; font-size: 0.8rem;
    color: rgba(255,209,61,0.85); display: flex; gap: 8px;
    max-width: 1000px; margin: 12px auto 4px;
  }

  /* GRID */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 18px; padding: 16px 24px 52px; max-width: 1000px; margin: 0 auto;
  }

  .card {
    border-radius: 22px; overflow: hidden; cursor: pointer;
    box-shadow: 0 8px 28px rgba(0,0,0,0.4);
    transition: transform 0.18s, box-shadow 0.18s;
    animation: popIn 0.4s both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.65); }
    to   { opacity: 1; transform: scale(1); }
  }
  .card:nth-child(1) { animation-delay:0.02s; }
  .card:nth-child(2) { animation-delay:0.05s; }
  .card:nth-child(3) { animation-delay:0.08s; }
  .card:nth-child(4) { animation-delay:0.11s; }
  .card:nth-child(5) { animation-delay:0.14s; }
  .card:nth-child(6) { animation-delay:0.17s; }
  .card:nth-child(7) { animation-delay:0.20s; }
  .card:nth-child(8) { animation-delay:0.23s; }
  .card:nth-child(9) { animation-delay:0.26s; }

  .card:hover { transform: translateY(-7px) scale(1.04); box-shadow: 0 18px 44px rgba(0,0,0,0.5); }
  .card:active { transform: scale(0.95); }
  .card.playing { animation: cpulse 0.5s ease !important; }
  @keyframes cpulse { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 100%{transform:scale(1)} }

  .swatch {
    height: 115px; position: relative;
    display: flex; align-items: center; justify-content: center; font-size: 2.8rem;
  }
  /* mixing arrow for mixed colors */
  .mix-label {
    position: absolute; bottom: 8px; left: 0; right: 0;
    text-align: center; font-size: 0.7rem; font-weight: 700;
    color: rgba(255,255,255,0.7); letter-spacing: 0.5px;
  }

  .card-info {
    background: rgba(0,0,0,0.42); backdrop-filter: blur(4px);
    padding: 12px 10px 14px; text-align: center;
  }
  .card-kn { font-size: 1.1rem; font-weight: 800; color: #fff; }
  .card-en { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.45); margin-top: 2px; font-style: italic; }
  .card-fact { font-size: 0.72rem; color: rgba(255,255,255,0.3); margin-top: 4px; }

  .footer { text-align: center; padding: 14px; color: rgba(255,255,255,0.18); font-size: 0.78rem; }

  @media(max-width:480px){
    .grid { grid-template-columns: repeat(3,1fr); gap: 12px; padding: 12px 13px 40px; }
    .swatch { height: 85px; font-size: 2rem; }
    .card-kn { font-size: 0.92rem; }
    .hero h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/class/ukg/kannada" class="back-btn">←</a>
    <span class="topbar-title">ಬಣ್ಣಗಳು</span>
  </div>
  <div class="topbar-right">
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
      <span id="soundIcon">🔊</span>
      <span id="soundLabel">ಧ್ವನಿ ಆನ್</span>
    </button>
  </div>
</div>

<div class="hero">
  <div class="hero-emoji">🎨</div>
  <h1>ಬಣ್ಣಗಳು</h1>
  <p>ಪ್ರಾಥಮಿಕ ಮತ್ತು ಮಿಶ್ರ ಬಣ್ಣಗಳು • ಕಾರ್ಡ್ ಒತ್ತಿ ಕೇಳಿ!</p>
</div>

<div class="tabs">
  <button class="tab active-primary" id="tab-primary" onclick="switchTab('primary')">🔴 ಪ್ರಾಥಮಿಕ ಬಣ್ಣಗಳು</button>
  <button class="tab" id="tab-mixed" onclick="switchTab('mixed')">🟣 ಮಿಶ್ರ ಬಣ್ಣಗಳು</button>
</div>

<div class="tts-notice">
  <span>📱</span>
  <span>ಧ್ವನಿ ಕೇಳಲು Android TTS ನಲ್ಲಿ Kannada ಭಾಷೆ ಸ್ಥಾಪಿಸಿ.</span>
</div>

<div class="grid" id="grid"></div>
<div class="footer">VidyaAI • UKG ಕನ್ನಡ</div>

<script>
const primary = [
  { kn:'ಕೆಂಪು',  en:'Red',    bg:'#e74c3c', emoji:'🔴', fact:'ಪ್ರಾಥಮಿಕ ಬಣ್ಣ' },
  { kn:'ನೀಲಿ',   en:'Blue',   bg:'#2980b9', emoji:'🔵', fact:'ಪ್ರಾಥಮಿಕ ಬಣ್ಣ' },
  { kn:'ಹಳದಿ',   en:'Yellow', bg:'#f1c40f', emoji:'🟡', fact:'ಪ್ರಾಥಮಿಕ ಬಣ್ಣ' },
  { kn:'ಬಿಳಿ',   en:'White',  bg:'#ecf0f1', emoji:'⬜', fact:'ಎಲ್ಲ ಬಣ್ಣಗಳ ಮಿಶ್ರಣ' },
  { kn:'ಕಪ್ಪು',  en:'Black',  bg:'#2c3e50', emoji:'⬛', fact:'ಬೆಳಕಿನ ಅನುಪಸ್ಥಿತಿ' },
  { kn:'ಹಸಿರು',  en:'Green',  bg:'#27ae60', emoji:'🟢', fact:'ನೀಲಿ + ಹಳದಿ' },
];

const mixed = [
  { kn:'ಕಿತ್ತಳೆ',  en:'Orange', bg:'#e67e22', emoji:'🟠', fact:'ಕೆಂಪು + ಹಳದಿ = ಕಿತ್ತಳೆ' },
  { kn:'ನೇರಳೆ',   en:'Purple', bg:'#8e44ad', emoji:'🟣', fact:'ಕೆಂಪು + ನೀಲಿ = ನೇರಳೆ' },
  { kn:'ಹಸಿರು',   en:'Green',  bg:'#27ae60', emoji:'🟢', fact:'ನೀಲಿ + ಹಳದಿ = ಹಸಿರು' },
  { kn:'ಗುಲಾಬಿ',  en:'Pink',   bg:'#e91e8c', emoji:'🩷', fact:'ಕೆಂಪು + ಬಿಳಿ = ಗುಲಾಬಿ' },
  { kn:'ಕಂದು',    en:'Brown',  bg:'#795548', emoji:'🟤', fact:'ಕೆಂಪು + ಹಳದಿ + ನೀಲಿ' },
  { kn:'ಬೂದು',    en:'Grey',   bg:'#95a5a6', emoji:'🩶', fact:'ಕಪ್ಪು + ಬಿಳಿ = ಬೂದು' },
  { kn:'ಆಕಾಶ ನೀಲಿ',en:'Sky Blue',bg:'#3498db',emoji:'🩵', fact:'ನೀಲಿ + ಬಿಳಿ = ಆಕಾಶ ನೀಲಿ' },
  { kn:'ಮರಕ್ಕತ',  en:'Maroon', bg:'#922b21', emoji:'🔴', fact:'ಕೆಂಪು + ಕಪ್ಪು = ಮರಕ್ಕತ' },
];

let soundOn = true;
let activeTab = 'primary';

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? 'ಧ್ವನಿ ಆನ್' : 'ಧ್ವನಿ ಆಫ್';
  document.getElementById('soundToggle').classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN'; u.rate = 0.85; u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const kn = voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn'));
  if (!kn) return;
  u.voice = kn;
  window.speechSynthesis.speak(u);
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-primary').className = 'tab' + (tab==='primary' ? ' active-primary' : '');
  document.getElementById('tab-mixed').className   = 'tab' + (tab==='mixed'   ? ' active-mixed'   : '');
  buildGrid();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const data = activeTab === 'primary' ? primary : mixed;
  data.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="swatch" style="background:${c.bg};">
        ${c.emoji}
        ${activeTab==='mixed' ? `<div class="mix-label">🔀 ${c.fact}</div>` : ''}
      </div>
      <div class="card-info">
        <div class="card-kn">${c.kn}</div>
        <div class="card-en">${c.en}</div>
        ${activeTab==='primary' ? `<div class="card-fact">${c.fact}</div>` : ''}
      </div>
    `;
    card.addEventListener('click', () => {
      card.classList.remove('playing'); void card.offsetWidth; card.classList.add('playing');
      speak(c.kn);
      setTimeout(() => card.classList.remove('playing'), 500);
    });
    grid.appendChild(card);
  });
}

if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = () => {}; window.speechSynthesis.getVoices(); }
buildGrid();
</script>
</body>
</html>
