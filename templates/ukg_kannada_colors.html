<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಬಣ್ಣಗಳು - UKG ಕನ್ನಡ</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@500;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --radius: 30px; --top-h: 70px; }

body {
  font-family: 'Baloo Tamma 2', cursive;
  background: #f0f4ff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--top-h);
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 300;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
.topbar-title {
  font-size: 1.55rem; font-weight: 900;
  background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.top-right { display: flex; align-items: center; gap: 10px; }
.score-pill {
  background: #FFD93D; color: #1a1a2e;
  font-weight: 900; font-size: 1rem;
  padding: 7px 18px; border-radius: 50px;
  box-shadow: 0 4px 14px rgba(255,217,61,0.45);
  white-space: nowrap;
}
.sound-btn {
  background: rgba(255,255,255,0.13);
  border: 2px solid rgba(255,255,255,0.22);
  color: white; border-radius: 12px;
  padding: 8px 14px; font-size: 1.2rem;
  cursor: pointer; font-family: inherit;
  transition: background 0.2s;
}
.sound-btn:hover { background: rgba(255,255,255,0.22); }
.sound-btn.off { opacity: 0.4; }

/* ── TAB NAV ── */
.tab-nav {
  display: flex;
  background: #1a1a2e;
  padding: 0 12px 14px;
  gap: 8px;
  position: sticky; top: var(--top-h); z-index: 200;
}
.tab-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 10px 16px; border-radius: 18px; border: none;
  cursor: pointer; font-family: 'Baloo Tamma 2', cursive;
  font-weight: 800; color: rgba(255,255,255,0.45);
  background: rgba(255,255,255,0.07);
  transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; position: relative;
}
.tab-btn .t-icon { font-size: 1.7rem; line-height: 1; }
.tab-btn .t-kn   { font-size: 0.95rem; }
.tab-btn .t-en   { font-size: 0.68rem; opacity: 0.55; font-weight: 600; }
.tab-btn.active  { transform: translateY(-3px) scale(1.04); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
.tab-btn[data-t="primary"].active { background: linear-gradient(135deg,#ff6b6b,#e17055); color: white; }
.tab-btn[data-t="mixed"].active   { background: linear-gradient(135deg,#a29bfe,#6c5ce7); color: white; }
.tab-count {
  position: absolute; top: 5px; right: 7px;
  background: rgba(255,255,255,0.22); border-radius: 50px;
  padding: 1px 6px; font-size: 0.62rem; font-weight: 900;
}
.tab-btn.active .tab-count { background: rgba(0,0,0,0.15); }

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── PANEL HERO ── */
.panel-hero {
  padding: 30px 24px 18px; text-align: center; position: relative; overflow: hidden;
}
.panel-hero h2 { font-size: 2.8rem; font-weight: 900; line-height: 1.1; margin-bottom: 5px; }
.panel-hero p  { font-size: 1.05rem; font-weight: 700; opacity: 0.65; margin-bottom: 13px; }
.tap-hint {
  display: inline-flex; align-items: center; gap: 7px;
  border: 2.5px dashed currentColor; border-radius: 50px;
  padding: 7px 20px; font-size: 0.98rem; font-weight: 800; opacity: 0.7;
  animation: wag 2s ease-in-out infinite;
}
@keyframes wag { 0%,100%{transform:rotate(-1.5deg)} 50%{transform:rotate(1.5deg)} }
.hf {
  position: absolute; font-size: 3.5rem;
  animation: fy 4s ease-in-out infinite; pointer-events: none; opacity: 0.15;
}
@keyframes fy { 0%,100%{transform:translateY(0) rotate(-8deg)} 50%{transform:translateY(-18px) rotate(8deg)} }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 22px; padding: 20px 26px 60px;
  max-width: 1300px; margin: 0 auto;
}

/* ── CARD ── */
.card {
  border-radius: var(--radius); background: white;
  box-shadow: 0 6px 28px rgba(0,0,0,0.09);
  cursor: pointer; overflow: hidden;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  border: 3.5px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.5) rotate(-6deg); }
  to   { opacity:1; transform:scale(1); }
}
.card:hover { transform:translateY(-12px) scale(1.04) rotate(.6deg); box-shadow:0 24px 56px rgba(0,0,0,0.15); }
.card:active { transform:scale(0.91); }
.card.playing { animation: cb .5s cubic-bezier(.34,1.56,.64,1) !important; }
@keyframes cb { 0%{transform:scale(1)} 30%{transform:scale(1.22) rotate(-4deg)} 65%{transform:scale(.94) rotate(2deg)} 100%{transform:scale(1)} }

/* Card swatch face */
.card-face {
  height: 160px;
  display: flex; align-items: center; justify-content: center;
  font-size: 5.5rem; position: relative;
}
.star-pop {
  position: absolute; top: 8px; right: 12px;
  font-size: 1.6rem; transform: scale(0); opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1); pointer-events: none;
}
.card.playing .star-pop { transform: scale(1) rotate(25deg); opacity: 1; }
.card.learned .star-pop { transform: scale(0.85); opacity: 0.55; }

/* Mix formula pill at bottom of swatch */
.mix-tag {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 5px 8px; text-align: center;
  font-size: 0.68rem; font-weight: 800;
  color: white; letter-spacing: 0.2px;
  background: rgba(0,0,0,0.32); backdrop-filter: blur(6px);
}

/* Card info */
.card-info { padding: 14px 12px 18px; text-align: center; border-top: 3px solid rgba(0,0,0,0.05); }
.kn-word { font-size: 1.85rem; font-weight: 900; color: #1a1a2e; line-height: 1.1; }
.en-word { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; opacity: 0.4; color: #1a1a2e; }
.fact-pill {
  display: inline-block; margin-top: 9px; border-radius: 50px;
  padding: 5px 16px; font-size: 0.82rem; font-weight: 800; color: white;
}

/* ── CONFETTI ── */
.cf { position:fixed; border-radius:3px; top:-20px; pointer-events:none; z-index:9999; animation:cff 1.4s ease-in forwards; }
@keyframes cff { to { transform: translateY(110vh) rotate(600deg); opacity:0; } }

/* ── RESPONSIVE ── */
@media (max-width: 580px) {
  .grid { grid-template-columns: repeat(2,1fr); gap:13px; padding:12px 12px 44px; }
  .card-face { height:120px; font-size:4rem; }
  .kn-word { font-size:1.35rem; }
  .panel-hero h2 { font-size:2rem; }
}
@media (min-width: 900px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); }
  .card-face { height:178px; font-size:6.2rem; }
  .kn-word { font-size:2.1rem; }
}


/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.topbar-title{font-size:clamp(15px,2vw,28px);}
.hero h1{font-size:clamp(22px,3.5vw,52px);}
.hero h2{font-size:clamp(22px,3.5vw,52px);}
.hero p{font-size:clamp(13px,1.6vw,22px);}
.hero{padding:clamp(18px,3vw,48px) clamp(20px,5vw,80px) clamp(44px,6vw,80px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.card{border-radius:clamp(16px,2vw,28px);}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">🎨 ಬಣ್ಣಗಳು</div>
  <div class="top-right">
    <div class="score-pill" id="scorePill">⭐ 0 / 14</div>
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
  </div>
</div>

<!-- TAB NAV -->
<nav class="tab-nav">
  <button class="tab-btn active" data-t="primary" onclick="switchTab('primary',this)">
    <span class="t-icon">🔴</span><span class="t-kn">ಪ್ರಾಥಮಿಕ ಬಣ್ಣಗಳು</span><span class="t-en">Primary</span>
    <span class="tab-count" id="cnt-primary">0/6</span>
  </button>
  <button class="tab-btn" data-t="mixed" onclick="switchTab('mixed',this)">
    <span class="t-icon">🟣</span><span class="t-kn">ಮಿಶ್ರ ಬಣ್ಣಗಳು</span><span class="t-en">Mixed</span>
    <span class="tab-count" id="cnt-mixed">0/8</span>
  </button>
</nav>

<!-- PANEL: PRIMARY -->
<div class="panel active" id="panel-primary">
  <div class="panel-hero" style="background:linear-gradient(135deg,#ffe0e0,#fff8e1,#e8f5e9);">
    <span class="hf" style="top:8px;left:4%;">🔴</span>
    <span class="hf" style="top:10px;right:6%;animation-delay:-1.5s;">🔵</span>
    <span class="hf" style="bottom:6px;left:35%;animation-delay:-3s;">🟡</span>
    <h2 style="color:#b71c1c;">🎨 ಪ್ರಾಥಮಿಕ ಬಣ್ಣಗಳು</h2>
    <p style="color:#c62828;">Primary Colors</p>
    <span class="tap-hint" style="color:#c62828;">👆 ಕಾರ್ಡ್ ಒತ್ತಿ ಹೆಸರು ಕೇಳಿ!</span>
  </div>
  <div class="grid" id="grid-primary"></div>
</div>

<!-- PANEL: MIXED -->
<div class="panel" id="panel-mixed">
  <div class="panel-hero" style="background:linear-gradient(135deg,#ede7f6,#e8eaf6,#fce4ec);">
    <span class="hf" style="top:8px;left:4%;">🟠</span>
    <span class="hf" style="top:10px;right:6%;animation-delay:-1.5s;">🟢</span>
    <span class="hf" style="bottom:6px;left:35%;animation-delay:-3s;">🟤</span>
    <h2 style="color:#4527a0;">🔀 ಮಿಶ್ರ ಬಣ್ಣಗಳು</h2>
    <p style="color:#512da8;">Mixed Colors</p>
    <span class="tap-hint" style="color:#4527a0;">👆 ಕಾರ್ಡ್ ಒತ್ತಿ ಹೆಸರು ಕೇಳಿ!</span>
  </div>
  <div class="grid" id="grid-mixed"></div>
</div>

<script>
const DATA = {
  primary: [
    { kn:'ಕೆಂಪು',  en:'Red',    emoji:'🔴', bg:'#ffebee', swatch:'#e53935', border:'#e53935', pill:'#b71c1c', fact:'ಪ್ರಾಥಮಿಕ ಬಣ್ಣ 🎨' },
    { kn:'ನೀಲಿ',   en:'Blue',   emoji:'🔵', bg:'#e3f2fd', swatch:'#1e88e5', border:'#1e88e5', pill:'#0d47a1', fact:'ಪ್ರಾಥಮಿಕ ಬಣ್ಣ 🎨' },
    { kn:'ಹಳದಿ',   en:'Yellow', emoji:'🟡', bg:'#fffde7', swatch:'#fdd835', border:'#f9a825', pill:'#f57f17', fact:'ಪ್ರಾಥಮಿಕ ಬಣ್ಣ 🎨' },
    { kn:'ಬಿಳಿ',   en:'White',  emoji:'🤍', bg:'#fafafa', swatch:'#e0e0e0', border:'#bdbdbd', pill:'#616161', fact:'ಎಲ್ಲ ಬಣ್ಣಗಳ ಮಿಶ್ರಣ' },
    { kn:'ಕಪ್ಪು',  en:'Black',  emoji:'🖤', bg:'#eceff1', swatch:'#263238', border:'#455a64', pill:'#1a1a2e', fact:'ಬೆಳಕಿನ ಅನುಪಸ್ಥಿತಿ' },
    { kn:'ಹಸಿರು',  en:'Green',  emoji:'🟢', bg:'#e8f5e9', swatch:'#43a047', border:'#43a047', pill:'#1b5e20', fact:'ನೀಲಿ + ಹಳದಿ' },
  ],
  mixed: [
    { kn:'ಕಿತ್ತಳೆ',   en:'Orange',   emoji:'🟠', bg:'#fff3e0', swatch:'#fb8c00', border:'#fb8c00', pill:'#e65100', fact:'🔴 ಕೆಂಪು + 🟡 ಹಳದಿ' },
    { kn:'ನೇರಳೆ',    en:'Purple',   emoji:'🟣', bg:'#f3e5f5', swatch:'#8e24aa', border:'#8e24aa', pill:'#4a148c', fact:'🔴 ಕೆಂಪು + 🔵 ನೀಲಿ' },
    { kn:'ಹಸಿರು',    en:'Green',    emoji:'🟢', bg:'#e8f5e9', swatch:'#43a047', border:'#43a047', pill:'#1b5e20', fact:'🔵 ನೀಲಿ + 🟡 ಹಳದಿ' },
    { kn:'ಗುಲಾಬಿ',   en:'Pink',     emoji:'🩷', bg:'#fce4ec', swatch:'#e91e8c', border:'#e91e8c', pill:'#880e4f', fact:'🔴 ಕೆಂಪು + 🤍 ಬಿಳಿ' },
    { kn:'ಕಂದು',     en:'Brown',    emoji:'🟤', bg:'#efebe9', swatch:'#6d4c41', border:'#6d4c41', pill:'#3e2723', fact:'🔴 + 🟡 + 🔵 ಮಿಶ್ರಣ' },
    { kn:'ಬೂದು',     en:'Grey',     emoji:'🩶', bg:'#eceff1', swatch:'#78909c', border:'#78909c', pill:'#37474f', fact:'🖤 ಕಪ್ಪು + 🤍 ಬಿಳಿ' },
    { kn:'ಆಕಾಶ ನೀಲಿ', en:'Sky Blue', emoji:'🩵', bg:'#e1f5fe', swatch:'#29b6f6', border:'#29b6f6', pill:'#01579b', fact:'🔵 ನೀಲಿ + 🤍 ಬಿಳಿ' },
    { kn:'ಮರೂನ್',    en:'Maroon',   emoji:'🔴', bg:'#ffebee', swatch:'#b71c1c', border:'#b71c1c', pill:'#7f0000', fact:'🔴 ಕೆಂಪು + 🖤 ಕಪ್ಪು' },
  ]
};

const TABS = ['primary','mixed'];
const TOTAL = TABS.reduce((s,t) => s + DATA[t].length, 0);
let soundOn = true;
const learned = { primary: new Set(), mixed: new Set() };

function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

function toggleSound() {
  soundOn = !soundOn;
  const b = document.getElementById('soundBtn');
  b.textContent = soundOn ? '🔊' : '🔇';
  b.classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN'; u.rate = 0.82; u.pitch = 1.1;
  const v = window.speechSynthesis.getVoices().find(x => x.lang === 'kn-IN' || x.lang.startsWith('kn'));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

function updateScore() {
  const tot = TABS.reduce((s,t) => s + learned[t].size, 0);
  document.getElementById('scorePill').textContent = `⭐ ${tot} / ${TOTAL}`;
}

function updateCnt(tid) {
  document.getElementById('cnt-'+tid).textContent = `${learned[tid].size}/${DATA[tid].length}`;
}

const CC = ['#FFD93D','#FF6B35','#06D6A0','#FF6B9D','#9B5DE5','#118AB2','#43e97b'];
function confetti(x, y) {
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'cf';
    el.style.cssText = `left:${x+(Math.random()-.5)*160}px;background:${CC[i%CC.length]};animation-duration:${.9+Math.random()*.9}s;animation-delay:${Math.random()*.2}s;width:${6+Math.random()*10}px;height:${8+Math.random()*14}px;transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }
}

let di = 0;
function buildGrids() {
  TABS.forEach(tid => {
    const grid = document.getElementById('grid-'+tid);
    DATA[tid].forEach(c => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (di++ * 0.055) + 's';
      card.style.borderColor = c.border;
      card.innerHTML = `
        <div class="card-face" style="background:${c.bg};">
          <span class="star-pop">⭐</span>
          <span style="filter:drop-shadow(0 6px 18px rgba(0,0,0,0.18));line-height:1;">${c.emoji}</span>
          <div class="mix-tag" style="background:${c.swatch}cc;">
            ${tid === 'mixed' ? '🔀 ' : '🎨 '}${c.fact}
          </div>
        </div>
        <div class="card-info">
          <div class="kn-word">${c.kn}</div>
          <div class="en-word">${c.en}</div>
          <div class="fact-pill" style="background:${c.pill};">${c.fact}</div>
        </div>`;

      card.addEventListener('click', () => {
        card.classList.remove('playing');
        void card.offsetWidth;
        card.classList.add('playing');
        speak(c.kn);
        setTimeout(() => card.classList.remove('playing'), 520);
        if (!learned[tid].has(c.kn)) {
          learned[tid].add(c.kn);
          card.classList.add('learned');
          updateScore(); updateCnt(tid);
          const r = card.getBoundingClientRect();
          confetti(r.left + r.width/2, r.top + r.height/2);
        }
      });
      grid.appendChild(card);
    });
    updateCnt(tid);
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
buildGrids();
</script>
</body>
</html>
