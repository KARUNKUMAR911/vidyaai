<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಆಕಾರಗಳು - LKG Kannada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0f1923;
    --topbar: #141e2b;
    --text-light: #f0f0ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo Tamma 2', cursive;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text-light);
    background-image:
      radial-gradient(circle at 10% 30%, rgba(77,150,255,0.1) 0%, transparent 50%),
      radial-gradient(circle at 90% 70%, rgba(162,155,254,0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 10%, rgba(107,203,119,0.07) 0%, transparent 40%);
  }

  /* TOPBAR */
  .topbar {
    background: var(--topbar);
    border-bottom: 2px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .topbar-left { display: flex; align-items: center; gap: 12px; }

  .back-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 10px;
    color: white;
    padding: 8px 14px;
    font-size: 18px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }

  .topbar-title {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(90deg, #a29bfe, #6bcb77);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sound-btn {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: white;
    padding: 8px 16px;
    font-size: 0.85rem;
    font-family: 'Baloo Tamma 2', cursive;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .sound-btn:hover { background: rgba(255,255,255,0.22); }
  .sound-btn.off { opacity: 0.5; }

  /* HERO */
  .hero {
    text-align: center;
    padding: 32px 20px 16px;
  }
  .hero-emoji {
    font-size: 3rem;
    display: inline-block;
    animation: float 2.5s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(15deg); }
  }
  .hero h1 {
    font-size: 2.4rem;
    font-weight: 800;
    margin-top: 8px;
    background: linear-gradient(135deg, #a29bfe, #4d96ff, #6bcb77);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
  }

  /* TTS NOTICE */
  .tts-notice {
    background: rgba(255,209,61,0.1);
    border: 1px solid rgba(255,209,61,0.28);
    border-radius: 14px;
    margin: 0 20px 16px;
    padding: 10px 16px;
    font-size: 0.8rem;
    color: rgba(255,209,61,0.85);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 18px;
    padding: 8px 24px 52px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 28px 14px 20px;
    text-align: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 28px rgba(0,0,0,0.4);
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    animation: popIn 0.45s both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.65) rotate(-5deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .card:nth-child(1)  { animation-delay: 0.03s; --accent: #ff6b6b; }
  .card:nth-child(2)  { animation-delay: 0.06s; --accent: #4d96ff; }
  .card:nth-child(3)  { animation-delay: 0.09s; --accent: #ffd93d; }
  .card:nth-child(4)  { animation-delay: 0.12s; --accent: #6bcb77; }
  .card:nth-child(5)  { animation-delay: 0.15s; --accent: #ff6fd8; }
  .card:nth-child(6)  { animation-delay: 0.18s; --accent: #a29bfe; }
  .card:nth-child(7)  { animation-delay: 0.21s; --accent: #00cec9; }
  .card:nth-child(8)  { animation-delay: 0.24s; --accent: #fdcb6e; }
  .card:nth-child(9)  { animation-delay: 0.27s; --accent: #fd79a8; }
  .card:nth-child(10) { animation-delay: 0.30s; --accent: #55efc4; }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.07), transparent 60%);
    pointer-events: none;
  }

  .card:hover {
    transform: translateY(-8px) scale(1.04);
    box-shadow: 0 20px 48px rgba(0,0,0,0.5);
    border-color: var(--accent, rgba(255,255,255,0.3));
  }
  .card:active { transform: scale(0.94); }

  .card.playing {
    animation: pulse 0.5s ease !important;
  }
  @keyframes pulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.14); }
    100% { transform: scale(1); }
  }

  /* SVG shape canvas */
  .shape-wrap {
    width: 90px;
    height: 90px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shape-wrap svg {
    width: 100%;
    height: 100%;
    overflow: visible;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  }

  .card-name-kn {
    font-size: 1.15rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
  }
  .card-name-en {
    font-size: 0.75rem;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
    margin-top: 3px;
    font-style: italic;
  }

  .footer {
    text-align: center;
    padding: 14px;
    color: rgba(255,255,255,0.18);
    font-size: 0.78rem;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 8px 16px 40px; }
    .shape-wrap { width: 70px; height: 70px; }
    .card-name-kn { font-size: 1rem; }
    .hero h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="/class/lkg/kannada" class="back-btn">←</a>
    <span class="topbar-title">ಆಕಾರಗಳು</span>
  </div>
  <div class="topbar-right">
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
      <span id="soundIcon">🔊</span>
      <span id="soundLabel">ಧ್ವನಿ ಆನ್</span>
    </button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-emoji">🔷</div>
  <h1>ಆಕಾರಗಳು</h1>
  <p>ವಿವಿಧ ಆಕಾರಗಳು • ಕಾರ್ಡ್ ಒತ್ತಿ ಕೇಳಿ!</p>
</div>

<!-- TTS NOTICE -->
<div class="tts-notice">
  <span>📱</span>
  <span>ಧ್ವನಿ ಕೇಳಲು Android TTS ನಲ್ಲಿ Kannada ಭಾಷೆ ಸ್ಥಾಪಿಸಿ.</span>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<div class="footer">VidyaAI • LKG ಕನ್ನಡ</div>

<script>
const shapes = [
  {
    kn: 'ವೃತ್ತ', en: 'Circle', color: '#ff6b6b',
    svg: `<circle cx="45" cy="45" r="38" fill="#ff6b6b" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>`
  },
  {
    kn: 'ಚೌಕ', en: 'Square', color: '#4d96ff',
    svg: `<rect x="8" y="8" width="74" height="74" rx="6" fill="#4d96ff" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>`
  },
  {
    kn: 'ತ್ರಿಕೋಣ', en: 'Triangle', color: '#ffd93d',
    svg: `<polygon points="45,5 88,82 2,82" fill="#ffd93d" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>`
  },
  {
    kn: 'ಆಯತ', en: 'Rectangle', color: '#6bcb77',
    svg: `<rect x="4" y="20" width="82" height="50" rx="6" fill="#6bcb77" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>`
  },
  {
    kn: 'ರೊಂಬಸ್', en: 'Diamond', color: '#ff6fd8',
    svg: `<polygon points="45,4 86,45 45,86 4,45" fill="#ff6fd8" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>`
  },
  {
    kn: 'ಅಂಡಾಕಾರ', en: 'Oval', color: '#a29bfe',
    svg: `<ellipse cx="45" cy="45" rx="42" ry="28" fill="#a29bfe" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>`
  },
  {
    kn: 'ಐದು ಕೋನ', en: 'Pentagon', color: '#00cec9',
    svg: `<polygon points="45,4 86,34 70,82 20,82 4,34" fill="#00cec9" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>`
  },
  {
    kn: 'ಆರು ಕೋನ', en: 'Hexagon', color: '#fdcb6e',
    svg: `<polygon points="45,4 82,24 82,66 45,86 8,66 8,24" fill="#fdcb6e" stroke="#fff" stroke-width="3" stroke-opacity="0.3"/>`
  },
  {
    kn: 'ನಕ್ಷತ್ರ', en: 'Star', color: '#fd79a8',
    svg: `<polygon points="45,4 54,34 86,34 61,54 70,84 45,66 20,84 29,54 4,34 36,34" fill="#fd79a8" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/>`
  },
  {
    kn: 'ಹೃದಯ', en: 'Heart', color: '#e17055',
    svg: `<path d="M45 80 C10 55 5 20 25 12 C35 8 45 18 45 18 C45 18 55 8 65 12 C85 20 80 55 45 80Z" fill="#e17055" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/>`
  },
];

let soundOn = true;

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? 'ಧ್ವನಿ ಆನ್' : 'ಧ್ವನಿ ಆಫ್';
  document.getElementById('soundToggle').classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN';
  u.rate = 0.85;
  u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const knVoice = voices.find(v => v.lang === 'kn-IN' || v.lang.startsWith('kn'));
  if (!knVoice) return;
  u.voice = knVoice;
  window.speechSynthesis.speak(u);
}

function buildGrid() {
  const grid = document.getElementById('grid');
  shapes.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="shape-wrap">
        <svg viewBox="0 0 90 90">${s.svg}</svg>
      </div>
      <div class="card-name-kn">${s.kn}</div>
      <div class="card-name-en">${s.en}</div>
    `;
    card.addEventListener('click', () => {
      card.classList.remove('playing');
      void card.offsetWidth;
      card.classList.add('playing');
      speak(s.kn);
      setTimeout(() => card.classList.remove('playing'), 500);
    });
    grid.appendChild(card);
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}

buildGrid();
</script>
</body>
</html>
