<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಆಕಾರಗಳು - LKG ಕನ್ನಡ</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@500;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --radius: 30px; --top-h: 70px; }

body {
  font-family: 'Baloo Tamma 2', cursive;
  background: #f0f4ff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--top-h);
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 300;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
.topbar-title {
  font-size: 1.55rem; font-weight: 900;
  background: linear-gradient(90deg, #a29bfe, #4d96ff, #6bcb77);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.top-right { display: flex; align-items: center; gap: 10px; }
.score-pill {
  background: #FFD93D; color: #1a1a2e;
  font-weight: 900; font-size: 1rem;
  padding: 7px 18px; border-radius: 50px;
  box-shadow: 0 4px 14px rgba(255,217,61,0.45);
  white-space: nowrap;
}
.sound-btn {
  background: rgba(255,255,255,0.13);
  border: 2px solid rgba(255,255,255,0.22);
  color: white; border-radius: 12px;
  padding: 8px 14px; font-size: 1.2rem;
  cursor: pointer; font-family: inherit;
  transition: background 0.2s;
}
.sound-btn:hover { background: rgba(255,255,255,0.22); }
.sound-btn.off { opacity: 0.4; }

/* ── PANEL HERO ── */
.panel-hero {
  padding: 30px 24px 18px; text-align: center; position: relative; overflow: hidden;
  background: linear-gradient(135deg, #e8e0ff, #d4eaff, #d4f5e4);
}
.panel-hero h2 { font-size: 2.8rem; font-weight: 900; line-height: 1.1; margin-bottom: 5px; color: #2d1b69; }
.panel-hero p  { font-size: 1.05rem; font-weight: 700; color: #4a2fa0; opacity: 0.7; margin-bottom: 13px; }
.tap-hint {
  display: inline-flex; align-items: center; gap: 7px;
  border: 2.5px dashed #4a2fa0; border-radius: 50px;
  padding: 7px 20px; font-size: 0.98rem; font-weight: 800; color: #4a2fa0; opacity: 0.7;
  animation: wag 2s ease-in-out infinite;
}
@keyframes wag { 0%,100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
.hf {
  position: absolute; font-size: 3.5rem;
  animation: fy 4s ease-in-out infinite; pointer-events: none; opacity: 0.14;
}
@keyframes fy { 0%,100%{transform:translateY(0) rotate(-8deg);} 50%{transform:translateY(-18px) rotate(8deg);} }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 22px; padding: 20px 26px 60px;
  max-width: 1300px; margin: 0 auto;
}

/* ── CARD ── */
.card {
  border-radius: var(--radius); background: white;
  box-shadow: 0 6px 28px rgba(0,0,0,0.09);
  cursor: pointer; overflow: hidden;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  border: 3.5px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.5) rotate(-6deg); }
  to   { opacity:1; transform:scale(1); }
}
.card:hover { transform:translateY(-12px) scale(1.04); box-shadow:0 24px 56px rgba(0,0,0,0.15); }
.card:active { transform:scale(0.91); }
.card.playing { animation: cb .5s cubic-bezier(.34,1.56,.64,1) !important; }
@keyframes cb { 0%{transform:scale(1);} 30%{transform:scale(1.22) rotate(-4deg);} 65%{transform:scale(.94) rotate(2deg);} 100%{transform:scale(1);} }

/* Shape face */
.card-face {
  height: 170px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.star-pop {
  position: absolute; top: 8px; right: 12px;
  font-size: 1.6rem; transform: scale(0); opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1); pointer-events: none;
}
.card.playing .star-pop { transform: scale(1) rotate(25deg); opacity: 1; }
.card.learned .star-pop { transform: scale(0.85); opacity: 0.55; }

.shape-svg {
  width: 110px; height: 110px;
  filter: drop-shadow(0 6px 16px rgba(0,0,0,0.18));
}

/* Card info */
.card-info { padding: 15px 12px 20px; text-align: center; border-top: 3px solid rgba(0,0,0,0.05); }
.kn-word { font-size: 1.85rem; font-weight: 900; color: #1a1a2e; line-height: 1.1; }
.en-word { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; opacity: 0.4; color: #1a1a2e; }
.sound-pill {
  display: inline-block; margin-top: 9px; border-radius: 50px;
  padding: 5px 16px; font-size: 0.88rem; font-weight: 800; color: white;
}

/* ── CONFETTI ── */
.cf { position:fixed; border-radius:3px; top:-20px; pointer-events:none; z-index:9999; animation:cff 1.4s ease-in forwards; }
@keyframes cff { to { transform: translateY(110vh) rotate(600deg); opacity:0; } }

/* ── RESPONSIVE ── */
@media (max-width: 580px) {
  .grid { grid-template-columns: repeat(2,1fr); gap:13px; padding:12px 12px 44px; }
  .card-face { height: 120px; }
  .shape-svg { width: 80px; height: 80px; }
  .kn-word { font-size: 1.35rem; }
  .panel-hero h2 { font-size: 2rem; }
}
@media (min-width: 900px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); }
  .card-face { height: 190px; }
  .shape-svg { width: 130px; height: 130px; }
  .kn-word { font-size: 2.1rem; }
}


/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.topbar-title{font-size:clamp(15px,2vw,28px);}
.hero h1{font-size:clamp(22px,3.5vw,52px);}
.hero h2{font-size:clamp(22px,3.5vw,52px);}
.hero p{font-size:clamp(13px,1.6vw,22px);}
.hero{padding:clamp(18px,3vw,48px) clamp(20px,5vw,80px) clamp(44px,6vw,80px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.card{border-radius:clamp(16px,2vw,28px);}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">🔷 ಆಕಾರಗಳು</div>
  <div class="top-right">
    <div class="score-pill" id="scorePill">⭐ 0 / 10</div>
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
  </div>
</div>

<!-- PANEL HERO -->
<div class="panel-hero">
  <span class="hf" style="top:8px;left:4%;">🔺</span>
  <span class="hf" style="top:10px;right:6%;animation-delay:-2s;">⭐</span>
  <span class="hf" style="bottom:6px;left:30%;animation-delay:-1s;">💠</span>
  <h2>🔷 ಆಕಾರಗಳು</h2>
  <p>Shapes</p>
  <span class="tap-hint">👆 ಕಾರ್ಡ್ ಒತ್ತಿ ಹೆಸರು ಕೇಳಿ!</span>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<script>
const shapes = [
  {
    kn: 'ವೃತ್ತ', en: 'Circle',
    bg: '#fff0f0', border: '#ff6b6b', pill: '#e53935',
    svg: `<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <circle cx="45" cy="45" r="40" fill="#ff6b6b"/>
      <circle cx="45" cy="45" r="40" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.35"/>
      <circle cx="30" cy="30" r="8" fill="white" fill-opacity="0.25"/>
    </svg>`
  },
  {
    kn: 'ಚೌಕ', en: 'Square',
    bg: '#f0f5ff', border: '#4d96ff', pill: '#1565c0',
    svg: `<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <rect x="7" y="7" width="76" height="76" rx="10" fill="#4d96ff"/>
      <rect x="7" y="7" width="76" height="76" rx="10" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.35"/>
      <rect x="16" y="16" width="20" height="20" rx="4" fill="white" fill-opacity="0.2"/>
    </svg>`
  },
  {
    kn: 'ತ್ರಿಕೋಣ', en: 'Triangle',
    bg: '#fffde7', border: '#ffd93d', pill: '#f9a825',
    svg: `<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <polygon points="45,5 87,83 3,83" fill="#ffd93d"/>
      <polygon points="45,5 87,83 3,83" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.35"/>
      <circle cx="45" cy="38" r="7" fill="white" fill-opacity="0.25"/>
    </svg>`
  },
  {
    kn: 'ಆಯತ', en: 'Rectangle',
    bg: '#f1f8e9', border: '#6bcb77', pill: '#2e7d32',
    svg: `<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="22" width="82" height="46" rx="9" fill="#6bcb77"/>
      <rect x="4" y="22" width="82" height="46" rx="9" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.35"/>
      <rect x="12" y="30" width="18" height="18" rx="4" fill="white" fill-opacity="0.2"/>
    </svg>`
  },
  {
    kn: 'ವಜ್ರ', en: 'Diamond',
    bg: '#fdf0ff', border: '#ce93d8', pill: '#7b1fa2',
    svg: `<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <polygon points="45,4 86,45 45,86 4,45" fill="#ce93d8"/>
      <polygon points="45,4 86,45 45,86 4,45" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.35"/>
      <circle cx="45" cy="30" r="6" fill="white" fill-opacity="0.3"/>
    </svg>`
  },
  {
    kn: 'ದೀರ್ಘವೃತ್ತ', en: 'Oval',
    bg: '#ede7f6', border: '#a29bfe', pill: '#4527a0',
    svg: `<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="45" cy="45" rx="42" ry="27" fill="#a29bfe"/>
      <ellipse cx="45" cy="45" rx="42" ry="27" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.35"/>
      <ellipse cx="30" cy="36" rx="9" ry="6" fill="white" fill-opacity="0.22"/>
    </svg>`
  },
  {
    kn: 'ಪಂಚಭುಜ', en: 'Pentagon',
    bg: '#e0f7fa', border: '#00bcd4', pill: '#00838f',
    svg: `<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <polygon points="45,5 84,33 69,80 21,80 6,33" fill="#00bcd4"/>
      <polygon points="45,5 84,33 69,80 21,80 6,33" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.35"/>
      <circle cx="45" cy="34" r="7" fill="white" fill-opacity="0.22"/>
    </svg>`
  },
  {
    kn: 'ಷಡ್ಭುಜ', en: 'Hexagon',
    bg: '#fff8e1', border: '#ffb300', pill: '#e65100',
    svg: `<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <polygon points="45,5 81,25 81,65 45,85 9,65 9,25" fill="#ffb300"/>
      <polygon points="45,5 81,25 81,65 45,85 9,65 9,25" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.35"/>
      <circle cx="34" cy="30" r="7" fill="white" fill-opacity="0.22"/>
    </svg>`
  },
  {
    kn: 'ನಕ್ಷತ್ರ', en: 'Star',
    bg: '#fce4ec', border: '#f48fb1', pill: '#c2185b',
    svg: `<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <polygon points="45,5 54,34 85,34 61,53 70,82 45,65 20,82 29,53 5,34 36,34" fill="#f48fb1"/>
      <polygon points="45,5 54,34 85,34 61,53 70,82 45,65 20,82 29,53 5,34 36,34" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.35"/>
      <circle cx="45" cy="34" r="5" fill="white" fill-opacity="0.3"/>
    </svg>`
  },
  {
    kn: 'ಹೃದಯ', en: 'Heart',
    bg: '#fff3e0', border: '#ff7043', pill: '#bf360c',
    svg: `<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <path d="M45 78 C12 54 6 22 26 13 C36 9 45 20 45 20 C45 20 54 9 64 13 C84 22 78 54 45 78Z" fill="#ff7043"/>
      <path d="M45 78 C12 54 6 22 26 13 C36 9 45 20 45 20 C45 20 54 9 64 13 C84 22 78 54 45 78Z" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.35"/>
      <circle cx="33" cy="28" r="7" fill="white" fill-opacity="0.25"/>
    </svg>`
  },
];

const TOTAL = shapes.length;
let soundOn = true;
const learned = new Set();

function toggleSound() {
  soundOn = !soundOn;
  const b = document.getElementById('soundBtn');
  b.textContent = soundOn ? '🔊' : '🔇';
  b.classList.toggle('off', !soundOn);
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'kn-IN'; u.rate = 0.82; u.pitch = 1.1;
  const v = window.speechSynthesis.getVoices().find(x => x.lang === 'kn-IN' || x.lang.startsWith('kn'));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

function updateScore() {
  document.getElementById('scorePill').textContent = `⭐ ${learned.size} / ${TOTAL}`;
}

const CC = ['#FFD93D','#FF6B35','#06D6A0','#FF6B9D','#9B5DE5','#118AB2','#43e97b'];
function confetti(x, y) {
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'cf';
    el.style.cssText = `left:${x+(Math.random()-.5)*160}px;background:${CC[i%CC.length]};animation-duration:${.9+Math.random()*.9}s;animation-delay:${Math.random()*.2}s;width:${6+Math.random()*10}px;height:${8+Math.random()*14}px;transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }
}

function buildGrid() {
  const grid = document.getElementById('grid');
  shapes.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i * 0.05) + 's';
    card.style.borderColor = s.border;
    card.innerHTML = `
      <div class="card-face" style="background:${s.bg};">
        <span class="star-pop">⭐</span>
        <span class="shape-svg">${s.svg}</span>
      </div>
      <div class="card-info">
        <div class="kn-word">${s.kn}</div>
        <div class="en-word">${s.en}</div>
        <div class="sound-pill" style="background:${s.pill};">${s.en} ▶</div>
      </div>`;

    card.addEventListener('click', e => {
      card.classList.remove('playing');
      void card.offsetWidth;
      card.classList.add('playing');
      speak(s.kn);
      setTimeout(() => card.classList.remove('playing'), 520);
      if (!learned.has(s.kn)) {
        learned.add(s.kn);
        card.classList.add('learned');
        updateScore();
        const r = card.getBoundingClientRect();
        confetti(r.left + r.width / 2, r.top + r.height / 2);
      }
    });
    grid.appendChild(card);
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
buildGrid();
</script>
</body>
</html>
