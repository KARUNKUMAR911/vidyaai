<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VidyaAI – UKG Our Environment!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Fredoka One',cursive;overflow:hidden;height:100vh;width:100vw;user-select:none}

.screen{width:100vw;height:100vh;display:flex;flex-direction:column;transition:background .7s ease;position:relative;overflow:hidden}

/* BLOBS */
.bg-blob{position:absolute;border-radius:50%;background:rgba(255,255,255,0.09);pointer-events:none;animation:floatBlob 8s ease-in-out infinite alternate}
.bg-blob:nth-child(1){width:240px;height:240px;top:-70px;left:-70px;animation-delay:0s}
.bg-blob:nth-child(2){width:150px;height:150px;bottom:70px;right:-35px;animation-delay:2.5s}
.bg-blob:nth-child(3){width:95px;height:95px;top:42%;left:2%;animation-delay:4s}
@keyframes floatBlob{from{transform:translateY(0) scale(1)}to{transform:translateY(22px) scale(1.1)}}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;flex-shrink:0;z-index:10;position:relative}
.topbar-btn{background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.48);color:white;padding:7px 16px;border-radius:50px;font-size:14px;font-family:'Fredoka One',cursive;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:transform .15s,background .15s}
.topbar-btn:active{transform:scale(.92);background:rgba(255,255,255,.42)}
.stars-display{background:rgba(255,215,0,0.32);border:3px solid rgba(255,215,0,0.62);color:white;padding:7px 16px;border-radius:50px;font-size:15px;font-family:'Fredoka One',cursive;letter-spacing:1px;transition:transform .2s}
.sound-pill{background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.48);color:white;padding:7px 14px;border-radius:50px;font-size:14px;font-family:'Fredoka One',cursive;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:transform .15s,background .2s;white-space:nowrap}
.sound-pill:active{transform:scale(.92)}
.sound-pill.muted{background:rgba(0,0,0,0.25);border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.5);text-decoration:line-through}

/* TAB BAR */
.tab-bar{display:flex;justify-content:center;gap:6px;padding:3px 14px 5px;flex-shrink:0;z-index:10;position:relative;flex-wrap:wrap}
.tab-btn{background:rgba(255,255,255,0.18);border:2.5px solid rgba(255,255,255,0.38);color:white;padding:6px 16px;border-radius:50px;font-size:13px;font-family:'Fredoka One',cursive;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn.active{background:white;color:#333;border-color:white;box-shadow:0 4px 16px rgba(0,0,0,.22)}
.tab-btn:active{transform:scale(.93)}

/* PROGRESS DOTS */
.dots-row{display:flex;justify-content:center;gap:5px;padding:4px 16px;flex-wrap:wrap;flex-shrink:0}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.28);transition:all .3s;flex-shrink:0}
.dot.done{background:rgba(255,255,255,0.68)}
.dot.current{background:#FFD600;transform:scale(1.65);box-shadow:0 0 9px #FFD600}

/* MAIN CONTENT */
.main-content{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 20px 0;gap:22px;min-height:0;cursor:pointer;position:relative;z-index:2}

/* LEFT — big illustration frame */
.left-half{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.scene-frame{width:min(34vw,46vh);height:min(34vw,46vh);border-radius:28px;background:rgba(255,255,255,0.16);border:4px solid rgba(255,255,255,0.44);box-shadow:0 14px 44px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer;animation:bounceIn .5s cubic-bezier(.175,.885,.32,1.4) both;transition:transform .12s;flex-shrink:0}
.scene-frame:active{transform:scale(.94) rotate(-2deg)}
.scene-frame svg{width:88%;height:88%}
.frame-ring{position:absolute;inset:-7px;border-radius:34px;border:5px solid rgba(255,255,255,.55);pointer-events:none;opacity:0}
.frame-ring.pulse{animation:ringPulse .65s ease-out forwards}
@keyframes ringPulse{0%{transform:scale(.85);opacity:.9}100%{transform:scale(1.22);opacity:0}}

.topic-name{font-size:min(8vw,10vh);font-family:'Fredoka One',cursive;color:white;text-shadow:0 4px 16px rgba(0,0,0,.25);animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both;text-align:center;line-height:1}
.topic-sub{font-size:min(3vw,3.5vh);font-weight:700;color:rgba(255,255,255,.8);font-family:'Nunito',sans-serif;animation:slideUp .4s ease .15s both;text-align:center;background:rgba(0,0,0,.14);padding:4px 14px;border-radius:20px}

/* RIGHT — info cards */
.right-half{flex:1;display:flex;flex-direction:column;justify-content:center;gap:10px;height:100%}

.info-card{background:rgba(255,255,255,0.18);backdrop-filter:blur(16px);border:2px solid rgba(255,255,255,0.34);border-radius:22px;padding:12px 16px;width:100%;animation:slideUp .4s ease both;box-shadow:0 6px 22px rgba(0,0,0,0.1)}
.info-card:nth-child(1){animation-delay:.08s}
.info-card:nth-child(2){animation-delay:.16s}
.info-card:nth-child(3){animation-delay:.24s}

.card-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;font-family:'Nunito',sans-serif}
.card-value{font-size:min(3.2vw,3.8vh);font-weight:800;color:white;line-height:1.25}
.card-sub{font-size:min(2.4vw,2.9vh);font-weight:600;color:rgba(255,255,255,.75);margin-top:3px;line-height:1.3;font-family:'Nunito',sans-serif}

/* emoji example row */
.example-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.eg-chip{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);border-radius:20px;padding:4px 11px;font-size:min(2vw,2.6vh);font-weight:700;color:white;display:flex;align-items:center;gap:4px;font-family:'Nunito',sans-serif;cursor:pointer;transition:transform .15s}
.eg-chip:hover{transform:scale(1.08)}

/* did-you-know pill */
.dyk-pill{background:rgba(0,0,0,.18);border:2px solid rgba(255,255,255,.28);border-radius:20px;padding:6px 14px;font-size:min(2.5vw,3vh);font-weight:700;color:rgba(255,255,255,.9);font-family:'Nunito',sans-serif;line-height:1.35;cursor:pointer;transition:background .2s}
.dyk-pill:hover{background:rgba(0,0,0,.28)}

/* BOTTOM BAR */
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 20px 16px;flex-shrink:0;position:relative;z-index:2;gap:10px}
.nav-btn{background:rgba(255,255,255,.22);border:3px solid rgba(255,255,255,.48);color:white;padding:12px 20px;border-radius:50px;font-size:20px;font-family:'Fredoka One',cursive;cursor:pointer;transition:all .15s;min-width:66px;text-align:center}
.nav-btn:hover{background:rgba(255,255,255,.38);transform:scale(1.05)}
.nav-btn:active{transform:scale(.92)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.next-btn{background:white;color:#333;border:none;padding:14px 32px;border-radius:50px;font-size:17px;font-family:'Fredoka One',cursive;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.22),0 0 0 4px rgba(255,255,255,.38);transition:all .18s}
.next-btn:hover{transform:scale(1.06) translateY(-3px)}
.next-btn:active{transform:scale(.94)}
.bottom-center{text-align:center;flex:1}
.tap-hint{font-size:13px;color:rgba(255,255,255,.82);font-family:'Nunito',sans-serif;font-weight:700;animation:tapWiggle 1.8s ease-in-out infinite}
@keyframes tapWiggle{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}

/* SPEAK FAB */
.speak-fab{position:absolute;bottom:88px;right:16px;width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.26);border:3px solid rgba(255,255,255,.52);color:white;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;z-index:5;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.speak-fab:active{transform:scale(.88)}
.speak-fab.speaking{animation:speakPulse .5s ease infinite alternate}
@keyframes speakPulse{from{box-shadow:0 0 0 0 rgba(255,255,255,.4)}to{box-shadow:0 0 0 14px rgba(255,255,255,0)}}

/* MOBILE */
@media(max-width:540px){
  .main-content{flex-direction:column;gap:8px;padding:4px 12px 0}
  .left-half,.right-half{flex:none;height:auto;width:100%}
  .scene-frame{width:min(48vw,26vh);height:min(48vw,26vh)}
  .topic-name{font-size:min(12vw,8vh)}
  .info-card{padding:9px 13px}
  .card-value{font-size:min(4.5vw,3.5vh)}
  .tab-btn{font-size:11px;padding:5px 11px}
  .speak-fab{bottom:80px;right:10px;width:48px;height:48px;font-size:20px}
}

/* PARENT PANEL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.overlay.show{display:flex}
.panel{background:white;border-radius:28px;padding:26px;width:92%;max-width:400px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.panel h2{font-size:19px;color:#16a34a;margin-bottom:6px;text-align:center;font-family:'Fredoka One',cursive}
.panel-progress{text-align:center;font-size:13px;color:#666;background:#f0fff4;padding:8px;border-radius:10px;margin-bottom:18px;font-family:'Nunito',sans-serif;font-weight:700}
.panel-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #f0f0f0}
.panel-label{font-size:14px;font-weight:700;color:#333;font-family:'Nunito',sans-serif}
.panel-sub{font-size:12px;color:#999;margin-top:2px;font-family:'Nunito',sans-serif}
.toggle{width:48px;height:26px;background:#ddd;border-radius:13px;cursor:pointer;position:relative;transition:background .3s;border:none;flex-shrink:0}
.toggle.on{background:#16a34a}
.toggle::after{content:'';position:absolute;width:20px;height:20px;background:white;border-radius:50%;top:3px;left:3px;transition:left .3s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.toggle.on::after{left:25px}
.jump-section{margin-top:14px}
.jump-section h4{font-size:12px;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;font-family:'Nunito',sans-serif;font-weight:700}
.jump-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.jump-btn{padding:11px 6px;border:2px solid #e5e7eb;border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;background:white;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Nunito',sans-serif;color:#444;line-height:1.2;text-align:center}
.jump-btn span.je{font-size:22px}
.jump-btn:hover{border-color:#16a34a;background:#f0fff4}
.jump-btn.done{background:#d1fae5;border-color:#a7f3d0;color:#059669}
.jump-btn.cur{background:#16a34a;color:white;border-color:#16a34a}
.close-panel-btn{width:100%;padding:13px;background:linear-gradient(135deg,#16a34a,#14532d);color:white;border:none;border-radius:14px;font-size:15px;font-family:'Fredoka One',cursive;cursor:pointer;margin-top:18px;transition:transform .15s}
.close-panel-btn:active{transform:scale(.96)}

/* QUIZ */
.quiz-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.74);z-index:150;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.quiz-overlay.show{display:flex}
.quiz-card{background:white;border-radius:28px;padding:24px 22px 28px;width:92%;max-width:460px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.35);animation:popIn .35s cubic-bezier(.175,.885,.32,1.275)}
.quiz-badge{display:inline-block;background:#f0fff4;color:#16a34a;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;margin-bottom:10px}
.quiz-emoji-big{font-size:76px;margin-bottom:8px;animation:bounce .5s ease infinite alternate;display:block}
.quiz-question{font-size:18px;font-weight:800;color:#333;font-family:'Nunito',sans-serif;margin-bottom:16px;line-height:1.4}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quiz-opt{padding:14px 8px;border:3px solid #e5e7eb;border-radius:18px;cursor:pointer;transition:all .2s;background:white;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'Nunito',sans-serif}
.quiz-opt-em{font-size:34px;line-height:1}
.quiz-opt-lbl{font-size:13px;font-weight:800;color:#555}
.quiz-opt:hover{border-color:#16a34a;background:#f0fff4;transform:scale(1.03)}
.quiz-opt.correct{border-color:#059669;background:#d1fae5}
.quiz-opt.correct .quiz-opt-lbl{color:#059669}
.quiz-opt.wrong{border-color:#dc2626;background:#fee2e2}
.quiz-opt.wrong .quiz-opt-lbl{color:#dc2626}
.quiz-opt:disabled{cursor:not-allowed;transform:none}
.quiz-feedback{margin-top:12px;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;min-height:20px}
.quiz-feedback.good{color:#059669}.quiz-feedback.bad{color:#dc2626}
.quiz-retry-btn{display:none;margin-top:10px;padding:11px 26px;background:#16a34a;color:white;border:none;border-radius:50px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 14px rgba(22,163,74,.4);transition:all .2s}
.quiz-retry-btn:hover{transform:scale(1.05)}

/* CELEBRATION */
.celeb-overlay{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#16a34a,#052e16);z-index:200;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
.celeb-overlay.show{display:flex}
.celeb-stars{display:flex;gap:14px;margin-bottom:14px}
.celeb-star{font-size:44px;animation:starPop .5s cubic-bezier(.175,.885,.32,1.4) both}
.celeb-star:nth-child(2){animation-delay:.15s}.celeb-star:nth-child(3){animation-delay:.30s}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.celeb-big{font-size:90px;margin-bottom:10px;animation:popIn .6s cubic-bezier(.175,.885,.32,1.4) both}
.celeb-title{font-size:36px;color:white;margin-bottom:8px;font-family:'Fredoka One',cursive;text-shadow:0 3px 12px rgba(0,0,0,.2)}
.celeb-sub{font-size:17px;color:rgba(255,255,255,.92);white-space:pre-line;margin-bottom:28px;font-family:'Nunito',sans-serif;font-weight:700}
.celeb-btn{background:white;color:#16a34a;border:none;padding:18px 44px;border-radius:50px;font-size:19px;font-family:'Fredoka One',cursive;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.22);transition:transform .15s}
.celeb-btn:active{transform:scale(.94)}

/* FLOAT EMOJI */
.float-em{position:fixed;font-size:36px;pointer-events:none;z-index:50;animation:floatUp 1.1s ease forwards}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(1.4);opacity:0}}

/* ANIMATIONS */
@keyframes popIn{0%{transform:scale(.2) rotate(-15deg);opacity:0}65%{transform:scale(1.12) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes bounceIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(26px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-14px)}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}


/* ===== RESPONSIVE SCALING - FULL WIDTH ===== */
.topbar{padding:clamp(10px,1.5vw,20px) clamp(16px,3vw,48px);}
.hero h1{font-size:clamp(22px,3.5vw,52px);}
.hero h2{font-size:clamp(22px,3.5vw,52px);}
.hero p{font-size:clamp(13px,1.6vw,22px);}
.hero{padding:clamp(18px,3vw,48px) clamp(20px,5vw,80px) clamp(44px,6vw,80px);}
.content{padding:clamp(6px,1vw,16px) clamp(12px,3.5vw,60px) clamp(80px,10vw,140px);}
.hl{font-size:clamp(13px,1.6vw,22px);}
.quiz-question{font-size:clamp(16px,2vw,30px);}
.quiz-opts{gap:clamp(8px,1.2vw,18px);}
.quiz-opt{font-size:clamp(14px,1.7vw,24px);padding:clamp(13px,1.7vw,24px) clamp(8px,1vw,16px);border-radius:clamp(13px,1.5vw,22px);}
.celeb-title{font-size:clamp(24px,3.5vw,54px);}
.celeb-sub{font-size:clamp(14px,1.8vw,26px);}
.celeb-stars{font-size:clamp(36px,5vw,72px);}
.celeb-btn{font-size:clamp(16px,2vw,28px);padding:clamp(14px,1.8vw,22px) clamp(36px,4vw,60px);border-radius:clamp(40px,5vw,60px);}
.card{border-radius:clamp(16px,2vw,28px);}
.card-sub{font-size:clamp(11px,1.3vw,18px);}
.emoji-big{font-size:clamp(40px,5.5vw,80px);}
</style>
</head>
<body>

<div class="screen" id="mainScreen">
  <div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div>

  <!-- TOP BAR -->
  <div class="topbar">
    <a href="/ukg" class="topbar-btn" onclick="event.stopPropagation()">🏠 Home</a>
    <div class="stars-display" id="starsDisplay">⭐ 0</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="sound-pill" id="soundFab" onclick="event.stopPropagation();toggleSound()">🔊 Sound</button>
      <button class="topbar-btn" onclick="openPanel(event)">⚙️ Parent</button>
    </div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar" onclick="event.stopPropagation()">
    <button class="tab-btn active" id="tab0" onclick="switchTopic(0)">🌍 Earth</button>
    <button class="tab-btn"        id="tab1" onclick="switchTopic(1)">🌱 Plants</button>
    <button class="tab-btn"        id="tab2" onclick="switchTopic(2)">🦁 Habitats</button>
    <button class="tab-btn"        id="tab3" onclick="switchTopic(3)">🌦️ Weather</button>
    <button class="tab-btn"        id="tab4" onclick="switchTopic(4)">♻️ Care</button>
  </div>

  <!-- PROGRESS DOTS -->
  <div class="dots-row" id="dotsRow"></div>

  <!-- MAIN -->
  <div class="main-content" id="mainContent" onclick="handleTap(event)">

    <!-- LEFT -->
    <div class="left-half">
      <div style="position:relative">
        <div class="scene-frame" id="sceneFrame" onclick="tapFrame(event)">
          <svg id="sceneSvg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="frame-ring" id="frameRing"></div>
      </div>
      <div class="topic-name" id="topicName">Our Earth</div>
      <div class="topic-sub"  id="topicSub">Land, Water &amp; Air</div>
    </div>

    <!-- RIGHT -->
    <div class="right-half" id="rightHalf"></div>

  </div>

  <button class="speak-fab" id="speakFab" onclick="event.stopPropagation();tapSpeak()">🔊</button>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="nav-btn" id="prevBtn" onclick="prev(event)" disabled>← Back</button>
  <button class="celeb-btn" onclick="location.reload()" style="margin-top:10px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.5);color:#fff;">&#x1f504; Play Again</button>
    <div class="bottom-center">
      <div class="tap-hint">👆 Tap to continue!</div>
    </div>
    <button class="next-btn" onclick="next(event)">Next →</button>
  </div>
</div>

<!-- PARENT PANEL -->
<div class="overlay" id="parentOverlay">
  <div class="panel">
    <h2>🌿 Environment Controls</h2>
    <div class="panel-progress" id="panelProgress">0 topics explored</div>
    <div class="panel-row">
      <div><div class="panel-label">🔊 Voice Sound</div><div class="panel-sub">Reads topic aloud</div></div>
      <button class="toggle on" id="soundToggle" onclick="toggleSound()"></button>
    </div>
    <div class="jump-section">
      <h4>Jump to any topic</h4>
      <div class="jump-grid" id="jumpGrid"></div>
    </div>
    <button class="close-panel-btn" onclick="closePanel()">✅ Keep Exploring!</button>
  </div>
</div>

<!-- QUIZ -->
<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-card" id="quizCard">
    <div class="quiz-badge">🌿 Environment Quiz!</div>
    <span class="quiz-emoji-big" id="quizEmoji">🌍</span>
    <div class="quiz-question" id="quizQuestion"></div>
    <div class="quiz-opts" id="quizOpts"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>

      { label:'♻️ Reduce, Reuse, Recycle', value:'The 3 Rs save our planet!',              sub:'REDUCE: use less. REUSE: use again. RECYCLE: make old things into new. Every small action counts!', chips:['↙️ Reduce','🔄 Reuse','♻️ Recycle'] },
      { label:'🌱 What Can YOU Do?',    value:'Kids can save the Earth too!',               sub:'Plant a tree 🌳  · Save water 💧 · Turn off lights 💡 · Carry a cloth bag 🛍️ · Never litter 🗑️ · Be kind to animals 🐾', chips:['🌳 Plant Trees','💧 Save Water','💡 Save Energy','🛍️ Less Plastic'] },
      { label:'💡 Did You Know?',        value:'',                                            sub:'If every child in India planted one tree, over 400 million trees would be added! That would absorb millions of tonnes of CO₂ every year!', dyk:true },
    ],

  },
];

/* STATE */
let topicIdx = 0;
let cardIdx  = 0;
let stars    = 0;
let soundOn  = true;
let learned  = new Set();

function topic()  { return topics[topicIdx]; }
function cards()  { return topic().cards; }
function allCount(){ return topics.reduce((s,t)=>s+t.cards.length,0); }
function learnedCount(){ return learned.size; }

/* UPDATE SCREEN */
function updateScreen(animate=true){
  const t = topic();
  const c = cards()[cardIdx];

  document.getElementById('mainScreen').style.background =
    `linear-gradient(135deg,${t.color[0]} 0%,${t.color[1]} 100%)`;

  // SVG
  document.getElementById('sceneSvg').innerHTML = t.svgFn();
  document.getElementById('topicName').textContent = t.name;
  document.getElementById('topicSub').textContent  = t.sub;

  // info cards
  buildCards(c, animate);

  document.getElementById('prevBtn').disabled = (topicIdx===0 && cardIdx===0);

  if(animate){
    const sf = document.getElementById('sceneFrame');
    sf.style.animation='none'; void sf.offsetWidth;
    sf.style.animation='bounceIn .5s cubic-bezier(.175,.885,.32,1.4) both';
    ['topicName','topicSub'].forEach((id,i)=>{
      const el=document.getElementById(id);
      el.style.animation='none'; void el.offsetWidth;
      el.style.animation=i===0
        ?'popIn .5s cubic-bezier(.175,.885,.32,1.275) both'
        :'slideUp .4s ease .15s both';
    });
  }

  updateDots();
  if(soundOn) setTimeout(speak,500);
}

function buildCards(c, animate){
  const rh = document.getElementById('rightHalf');
  rh.innerHTML = '';

  // Main relationship card
  const c1 = mkCard();
  c1.innerHTML = `<div class="card-label">${c.label}</div>
    ${c.value ? `<div class="card-value">${c.value}</div>` : ''}
    <div class="card-sub">${c.sub}</div>
    ${c.chips ? `<div class="example-row">${c.chips.map(ch=>`<span class="eg-chip" onclick="event.stopPropagation();speakWord('${ch.replace(/'/g,"\\'")}');floatWord('${ch}',event)">${ch}</span>`).join('')}</div>` : ''}`;
  if(animate) c1.style.animationDelay='.08s';
  rh.appendChild(c1);

  // Did you know card
  if(c.dyk){
    const c2 = mkCard();
    c2.innerHTML = `<div class="card-label">💡 Did You Know?</div>
      <div class="dyk-pill" onclick="event.stopPropagation();speakWord(this.textContent)">${c.sub}</div>`;
    if(animate) c2.style.animationDelay='.18s';
    rh.appendChild(c2);
  }

  // Progress in topic
  const c3 = mkCard();
  const total = cards().length;
  const prog  = Math.round(((cardIdx+1)/total)*100);
  c3.innerHTML = `<div class="card-label">📊 Progress in this topic</div>
    <div style="background:rgba(255,255,255,.25);border-radius:20px;height:10px;overflow:hidden;margin-top:4px">
      <div style="height:100%;width:${prog}%;background:white;border-radius:20px;transition:width .5s"></div>
    </div>
    <div class="card-sub" style="margin-top:5px">Card ${cardIdx+1} of ${total} · Topic ${topicIdx+1} of ${topics.length}</div>`;
  if(animate) c3.style.animationDelay='.26s';
  rh.appendChild(c3);
}

function mkCard(){
  const d = document.createElement('div');
  d.className='info-card';
  return d;
}

/* SPEAK */
function speak(){
  if(!soundOn||!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const c = cards()[cardIdx];
  const text = c.value ? `${c.value}. ${c.sub}` : c.sub;
  const u = new SpeechSynthesisUtterance(text);
  u.rate=0.8; u.pitch=1.2; u.volume=1;
  const fab=document.getElementById('speakFab');
  fab.classList.add('speaking');
  u.onend=()=>fab.classList.remove('speaking');
  window.speechSynthesis.speak(u);
}
function speakWord(w){
  if(!soundOn||!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(w);
  u.rate=0.75; u.pitch=1.3; window.speechSynthesis.speak(u);
}
function tapSpeak(){speak();}

/* TAP FRAME */
function tapFrame(e){
  e.stopPropagation();
  const ring=document.getElementById('frameRing');
  ring.classList.remove('pulse'); void ring.offsetWidth; ring.classList.add('pulse');
  floatWord(topic().emoji, e);
  speak();
}
function floatWord(emoji, e){
  const el=document.createElement('div');
  el.className='float-em'; el.textContent=emoji;
  const x=e.clientX||window.innerWidth/2;
  const y=e.clientY||window.innerHeight/2;
  el.style.left=`${x-18}px`; el.style.top=`${y-18}px`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

/* DOTS */
function updateDots(){
  const row=document.getElementById('dotsRow'); row.innerHTML='';
  cards().forEach((_,i)=>{
    const d=document.createElement('div');
    const key=`${topicIdx}-${i}`;
    d.className=`dot ${i===cardIdx?'current':learned.has(key)?'done':''}`;
    row.appendChild(d);
  });
}

/* NAVIGATE */
function handleTap(e){next(e);}

function next(e){
  if(e) e.stopPropagation();
  const key=`${topicIdx}-${cardIdx}`;
  learned.add(key);
  addStars(1);

  // If this is the last card of the topic → show quiz then advance
  if(cardIdx === cards().length-1){
    showQuiz(); return;
  }
  cardIdx++;
  updateScreen();
}

function prev(e){
  if(e) e.stopPropagation();
  if(cardIdx>0){ cardIdx--; updateScreen(); return; }
  if(topicIdx>0){ topicIdx--; cardIdx=cards().length-1; updateScreen(); }
}

function addStars(n){
  stars+=n;
  const el=document.getElementById('starsDisplay');
  el.textContent=`⭐ ${stars}`;
  el.style.transform='scale(1.35)';
  setTimeout(()=>el.style.transform='',200);
}

/* SWITCH TOPIC via tab */
function switchTopic(idx){
  if(idx===topicIdx && cardIdx===0) return;
  topicIdx=idx; cardIdx=0;
  topics.forEach((_,i)=>document.getElementById('tab'+i).classList.toggle('active',i===idx));
  updateScreen(true);
}

/* PARENT PANEL */
function openPanel(e){
  if(e) e.stopPropagation();
  document.getElementById('panelProgress').textContent=
    `${learned.size} of ${topics.reduce((s,t)=>s+t.cards.length,0)} cards explored ✅`;
  buildJumpGrid();
  document.getElementById('parentOverlay').classList.add('show');
}
function closePanel(){document.getElementById('parentOverlay').classList.remove('show');}

function buildJumpGrid(){
  const grid=document.getElementById('jumpGrid'); grid.innerHTML='';
  topics.forEach((t,i)=>{
    const btn=document.createElement('button');
    const done=t.cards.every((_,ci)=>learned.has(`${i}-${ci}`));
    const cur=i===topicIdx;
    btn.className=`jump-btn ${cur?'cur':done?'done':''}`;
    btn.innerHTML=`<span class="je">${t.emoji}</span>${t.name}`;
    btn.onclick=()=>{switchTopic(i);closePanel();};
    grid.appendChild(btn);
  });
}

function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('soundToggle').classList.toggle('on',soundOn);
  document.getElementById('speakFab').style.opacity=soundOn?'1':'0.45';
  const pill=document.getElementById('soundFab');
  pill.textContent=soundOn?'🔊 Sound':'🔇 Muted';
  pill.classList.toggle('muted',!soundOn);
  if(!soundOn) window.speechSynthesis.cancel();
}

/* QUIZ — shown after completing each topic */
function showQuiz(){
  const t = topic();
  const q = t.quiz;
  document.getElementById('quizEmoji').textContent = q.emoji || t.emoji;
  document.getElementById('quizQuestion').textContent = q.q;
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizFeedback').className = 'quiz-feedback';
  document.getElementById('quizRetryBtn').style.display = 'none';

  const opts = [...q.opts].sort(()=>Math.random()-.5);
  const container = document.getElementById('quizOpts'); container.innerHTML='';
  opts.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.innerHTML = `<span class="quiz-opt-em">${opt.split(' ')[0]}</span><span class="quiz-opt-lbl">${opt.split(' ').slice(1).join(' ')}</span>`;
    btn.onclick = ()=>checkQuiz(btn, opt, q.correct);
    container.appendChild(btn);
  });

  document.getElementById('quizOverlay').classList.add('show');
}

function checkQuiz(btn, selected, correct){
  document.querySelectorAll('.quiz-opt').forEach(b=>{b.onclick=null;b.disabled=true;});
  const fb=document.getElementById('quizFeedback');

  if(selected===correct){
    btn.classList.add('correct');
    fb.textContent='🎉 Correct! Brilliant!';
    fb.className='quiz-feedback good';
    addStars(3);
    if(soundOn){
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance('Correct! Brilliant!');
      u.pitch=1.4; window.speechSynthesis.speak(u);
    }
    setTimeout(()=>{
      document.getElementById('quizOverlay').classList.remove('show');
      afterQuiz();
    },1400);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-opt').forEach(b=>{
      const lbl=b.querySelector('.quiz-opt-lbl');
      if(b.querySelector('.quiz-opt-em')?.textContent+' '+(lbl?.textContent||'')===correct) b.classList.add('correct');
    });
    fb.textContent=`Not quite! The answer is "${correct.split(' ').slice(1).join(' ')}"`;
    fb.className='quiz-feedback bad';
    const card=document.getElementById('quizCard');
    card.style.animation='none'; void card.offsetWidth; card.style.animation='shake .4s ease';
    if(soundOn){
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance('Not quite! Try again!');
      u.pitch=1.0; window.speechSynthesis.speak(u);
    }
    document.getElementById('quizRetryBtn').style.display='inline-block';
  }
}

function retryQuiz(){showQuiz();}

function afterQuiz(){
  // All topics done?
  if(topicIdx >= topics.length-1){
    showCelebration('🌍','Earth Explorer!',
      'WOW! You completed ALL 5 topics!\nYou know about Earth, Plants, Habitats,\nWeather and how to Care for our Planet!\n🌿 Be a hero for Earth! 🌿');
    return;
  }
  topicIdx++;
  cardIdx=0;
  topics.forEach((_,i)=>document.getElementById('tab'+i).classList.toggle('active',i===topicIdx));
  updateScreen(true);
  showCelebration(topic().emoji, `${topics[topicIdx-1].name} Done! 🎉`,
    `Great work! You learned all about ${topics[topicIdx-1].name}!\nNow let's explore ${topic().name}! 🌟`);
}

/* CELEBRATION */
function showCelebration(emoji,title,sub){
  document.getElementById('celebBig').textContent=emoji;
  document.getElementById('celebTitle').textContent=title;
  document.getElementById('celebSub').textContent=sub;
  document.getElementById('celebOverlay').classList.add('show');
  if(soundOn){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance('Amazing! You are an Earth Explorer!');
    u.pitch=1.4; u.rate=0.85; window.speechSynthesis.speak(u);
  }
  launchConfetti();
}
function closeCelebration(){
  document.getElementById('celebOverlay').classList.remove('show');
}

/* CONFETTI */
function launchConfetti(){
  const cols=['#FF6B6B','#FFC300','#2ECC71','#3498DB','#9B59B6','#fff','#fbbf24','#f472b6','#FB923C'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');
    const sz=Math.random()*16+7;
    c.style.cssText=`position:fixed;width:${sz}px;height:${sz}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'4px'};left:${Math.random()*100}vw;top:-24px;z-index:300;animation:confettiFall ${Math.random()*2.2+1.8}s ease ${Math.random()*.8}s forwards;pointer-events:none;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}

/* INIT */
updateDots();
updateScreen(false);
setTimeout(speak,900);
